body:
  text: 卷之十三霍亂吐瀉吐瀉方論乾上坤下其卦為否陽隔陰而不降陰無陽而不升此否之所以痞而不通也人具此陰陽揮霍變亂結搏於中猝然吐瀉或瀉而不吐或吐而不瀉大抵心腹擾悶煩疼其視天地不交之否異乎否乎霍亂之證心腹猝痛嘔吐下利發熱憎寒頭痛眩暈先心痛則先吐先腹痛則先瀉心腹俱痛則吐瀉俱作甚則轉筋頽頓特反掌間蓋足陽明屬胃以養宗筋暴吐暴下津液驟亡宗筋失其所養故攣急甚則舌卷縮囊危甚風燭矣然亦何以致此哉曰胃傷暑毒露臥卑濕當風取涼風冷邪氣入於腸胃加以嗜好肥腥飲啖生冷居處不節激而發焉於是邪正相干中脘節閉氣不得通吐利暴作所謂脾受賊邪木來勝土者此也治法藿香正氣散加藿香生薑為上不惟可以溫散風邪抑亦可以調理吐瀉其若傷暑所致未可遽投香薷散沉冷之劑自合先治中脘如二陳湯橘皮半夏湯輩次則以香薷溫服散暑解煩昧者指為脾胃虛冷遽用人參白朮訶子肉豆蔻之屬以壯胃澀腸不思風冷未散輒以參朮訶蔻攔補寒邪邪氣得之愈盛愈作縱得淹延或下痢或久瀉或腹脹虛浮或中滿不食變證百出矣抑猶有説焉濕霍亂死者少乾霍亂死者多許仁則嘗有是言矣蓋謂所傷之物因吐利而出泄泄盡則止猶可幸免若上不得吐下不得利所傷之物擁閉正氣關格陰陽躁擾喘脹其能生乎則知揮霍變亂如人被髮交爭必有以挨之可也古方用來復丹正取疏利之意但多則太溫莫若薑湯下蘇感丸為愈霍亂氣息劣不欲言者不治又論治嘔吐莫先於助胃既助胃而復嘔吐者中脘挾風寒也治喘嗽莫先於調肺既調肺而復喘嗽者風寒在表或在裡也瀉痢之疾固腸斷下終不作效非腸胃間留蓄風寒邪氣之所致乎故必隨其感受解散於其先則某病某藥庶乎其對證矣解散風寒不換金正氣散為上其間增益則青皮官桂良薑乾薑擇用最良若欲其清解則紫蘇荊芥乾葛柴胡等輩劑量可也惟暑亦然每每隱伏作病或為熱嘔或為焦煩或為腹痛或泄痢不止暑中類多有之炎爍蘊隆念慮又當及此此説雖詳於卷首敬用申之吐瀉證治藿香正氣散治霍亂吐瀉通用腹痛者加桂小便不利者加茯苓方見嘔吐門此藥能溫散風寒濕氣若暑證加香薷五苓散治霍亂熱多發渴方見水飲門良薑飲治霍亂神效良薑霍香陳皮各一兩甘草炙三分上銼細每三錢水煎服又方藿香葉良薑木瓜上同煎治霍亂水瀉效治要除濕湯半夏曲川厚朴制蒼朮炒各二兩藿香葉陳皮茯苓各一兩甘草炙七錢上銼散每服四錢薑七片棗一枚煎服霍亂瀉而不吐者加桂吐而不瀉者去蒼朮加桂丁香吐瀉俱作兼腹痛者只加桂胡椒湯治霍亂吐瀉胡椒七粒生緑豆二十一粒上末煎宣木瓜湯溫和調下治中湯治飲食居處不節以致霍亂方見嘔吐門本方青皮陳皮乾薑能散風冷香薷銼散治傷暑霍亂方見暑門木瓜湯治吐瀉不已轉筋擾悶酸木瓜一兩茴香一分微炒甘草炙二分吳茱萸半兩蕩七次焙上銼散每四錢薑五片紫蘇十葉空腹急煎服四順附子湯治吐瀉過多手足逆冷六脈沉細氣小不語急服生附子白薑炮人參甘草炒各一分上銼每服四錢水二盞煎一盞空腹服腹痛加桂小便不利加茯苓仍用炒鹽尉或用薑附湯方見寒類薑鹽飲治乾霍亂欲吐不吐欲瀉不瀉痰壅腹脹鹽一兩生薑半兩切上同炒令色變以童尿二盞煎一盞分為二溫服鹽湯法治乾霍亂心腹絞痛欲吐不吐欲下不下先以鹽湯一盞頓服候吐出令透不吐再服續以銼理中湯倍加橘紅與之或藿香正氣散加官桂茯苓倍加枳殼或蘇合香丸用枳殼散調下蘇合香丸方見諸氣門用枳殼一分木瓜半分煎湯調下治乾霍亂不吐不瀉氣痞於中心腹絞痛此證最惡鹽尉方治霍亂吐瀉心腹作痛炒鹽二碗紙包紗護頓其胸前並腹肚上截以尉斗火尉氣透則蘇續又以炒鹽尉其背則十分無事霍亂吐瀉臨時無藥以生蒜頭研細塗心下及兩腳心即止附諸方不換金正氣散治霍亂轉筋嘔吐泄瀉頭疼方見瀉痢門六和湯治心脾不調氣不升降霍亂吐瀉暑天瀉痢方見暑門理中湯治中寒霍亂吐瀉方見寒門七氣湯三因方治七氣鬱結五臟之間互相刑剋陰陽不和揮霍變亂吐利交作半夏湯洗五兩厚朴薑製桂心各三兩白芍藥茯苓去皮各四兩紫蘇葉橘皮各二兩人參去蘆一兩上㕮咀每服四錢水一盞酒半盞生薑七片棗一枚煎七分溫服加減理中湯人參白朮乾薑甘草炙各等分若為寒氣濕氣所幹者加附子一兩名附子理中湯若霍亂吐瀉加陳皮青皮各一兩名治中湯若干霍亂心腹作痛先以鹽湯少許頻服候吐出令透即進此藥若嘔吐者於治中湯內加丁香半夏一兩每服生薑十片同煎若泄瀉者加橘紅茯苓各一兩名補中湯若溏泄不已者於補中湯內加附子一兩不喜飲米穀不化者加縮砂仁一兩共成八味若霍亂吐下心腹作痛手足逆冷於本方內去白朮加熟附名四順湯若傷寒結胸先以桔梗枳殼等分煎服不愈者及諸吐和後胸痞欲絶心膈高起急痛手不可近者加枳實茯苓各一兩名枳實理中湯若渴者再於枳實理中湯內加栝蔞根一兩若霍亂後轉筋者理中湯內加火煅石膏一兩若臍上築者腎氣動也去朮加官桂一兩半腎惡燥故去朮恐作奔豚故加官桂若悸多加茯苓一兩若渴欲飲水者添加朮半兩若腹滿者去白朮加附子一兩若飲酒過多及啖炙爆熱食發為鼻衄加川芎一兩若傷胃吐血以此藥能理中脘分利陰陽安定血脈泄瀉泄瀉方論胃為水穀之海其精英則流布以養臟腑其糟粕則傳送以歸大腸腸胃虛弱或挾風挾寒或傷暑傷濕停冷蓄熱冷熱不調泄瀉諸證皆能致之挾風者自汗惡風痛引腰背挾寒者筋節拘急身體怯寒傷暑者面垢燥渴泛引水漿傷濕者肌肉虛浮肢體重著冷則腸鳴肚冷而手足清熱則煩躁肚熱而手足溫冷熱不調者由熱積於內不能去其積徒以冷藥水之熱氣無所發泄故冷與熱搏而下注其或冷積於中不能去其滯徒以熱藥壓之冷積不得宣行故熱與冷干而成泄或澀或溏裡急後重是其候也外此則傷食一證失飢傷飽胃不能消心腹膨脹所下酸臭可驗焉治法當究其感受之源然後為之固實不窒其源吾恐決潰四出莫知其終者矣雖然脾胃合氣以消水穀水穀既分安有所謂泄人皆以泄為脾恙而不知腎病有泄焉腎泄何如曰腹痛無定處似痢非痢骨弱面黧腳下時冷者是也前件諸方條例於後至若泄利之後腹滿身疼是則為表裡俱病先當溫里急與四逆湯然後解表急以桂枝湯與之活人書言之詳矣抑猶有緒餘之論焉肝者脾之賊木能勝土古人慮之固也經曰肝腎氣虛為病泄瀉亦孰知腎者所以守司於下而肝者又門戶要束之具束則不泄也不然泄瀉而面色青慘者古書謂肝經受寒所致特設當歸厚朴湯以主之果何意哉下利惡證具載活人總括泄瀉證治理中湯治腸胃虛弱滲漉有聲泄瀉頻並人參白朮乾薑炒甘草炒各一兩加茯苓川厚朴制各三分上銼細每服三錢空心煎服調中散治腸虛泄瀉止嘔進食藿香葉縮砂莪朮炮乾薑炮肉桂茴香炒草果各半兩麥芽炒益智仁橘紅各三分蒼朮炒神麯炒甜梗各一兩甘草炙三錢上末每服三錢薑棗並少鹽煎服肉蔻散治脾虛腸鳴泄瀉不食大肉豆蔻一枚剜小竅子入乳香三小塊在內以麵裹煨面熟為度去面上末每一錢米飲調下治要除濕湯治風邪泄瀉加辣桂寒邪泄瀉加乾薑良薑通用加木香方見泄瀉門香薷銼散方見暑門治傷暑泄瀉更增茯苓平胃散治傷濕泄瀉橘紅厚朴制各三兩半蒼朮炒五兩半甘草炙一兩上銼細每服三錢薑棗煎服又法以生料五苓散對夾平胃散用陳米煎暑瀉濕瀉諸證皆驗黃連阿膠丸治暑瀉熱瀉方見嗽門用五苓散送下方見水飲門又洞泄方車前子末米飲下柏皮湯治協熱泄瀉亦治血痢柏皮三兩黃芩二兩黃連一兩上銼每服四錢水大盞煎七分入阿膠末半錢再煎少頃溫服薑附湯治冷證泄瀉方見寒類朮附湯通用見濕類大己寒丸治虛冷腸鳴滑泄良薑乾薑炮各六兩肉桂蓽茇各四兩上末麵糊丸桐子大每五十丸米飲下戊己丸治冷熱不調泄瀉吳茱萸炒黃連去須白芍藥等分上末米糊丸桐子大每三十丸空心米飲下真人養臟湯治冷熱不調泄瀉裡急後重罌粟殼去筋萼蜜炙一兩八錢木香白芍藥各八錢訶子肉六錢人參白朮當歸各三錢甘草炙肉桂各四錢上粗末每服二錢薑棗煎食前服先用縮砂煎湯下感應丸方見脹滿門俟其積消然後服此雞舌香散治飧食生冷久為冷積良薑辣桂香附淨炒益智仁天台烏藥各一兩甘草炙半兩上末每二錢入少鹽沸湯點吞感應丸三稜散酒食傷積用此京三稜炮莪朮炮益智仁甘草炙青皮去白各二兩白茯苓四兩上末每二錢稍鹽煎吞感應丸治傷食泄瀉俟酸臭出盡即服固腸散止之固腸散治冷瀉腸滑及下痢頻並罌粟殼去筋萼一兩蜜炙陳米炒一兩乾薑炮甘草炙各二錢半肉豆蔻生二錢木香一錢上末每二錢薑棗煎食前服實腸散治泄瀉不止川厚朴制一兩半肉豆蔻訶子炮縮砂橘紅蒼朮炒茯苓各一兩木香半兩甘草炒四錢上粗末每三錢薑棗煎服手足冷加炒乾薑安腎丸方見水飲門治腎泄腹痛無定處似痢非痢骨痛面黧腰腳時冷用和劑七氣湯送下方見氣門震靈丹治腎泄證候同前禹餘糧火煅醋淬不計遍次手拈得碎為度丁香代赭石如上修制赤石脂紫石英杵碎以上各四兩入坩堝內以瓦蓋口鹽泥固濟候乾用硬炭一十斤煅通紅火盡為度入地坑埋出火毒二宿研末乾的乳香另研沒藥五靈脂並去砂石研各二兩硃砂一兩研上併為細末糯米粉糊丸小雞頭大風乾每服三丸用炒故紙入棗煎湯調鍾乳粉少許空心送下小兒腎泄白膿褐汁面黯齒脫畏人怯寒震靈丹末入些鍾乳粉以棗煎炒故紙取熱汁調下木香散治脾腎俱虛泄瀉肉豆蔻麵裹紙煨故紙炒白朮白茯苓各半兩木香甘草炙各一分上銼細每三錢食前薑棗煎溫服二神丸治脾腎俱虛泄瀉不食破故紙四兩炒肉豆蔻二兩生上末用肥棗蒸爛取肉研膏夾和杵丸桐子大每服四十丸清米湯下若飯食後常一泄服此頓愈當歸厚朴湯治肝經受寒面色青慘厥而泄利當歸炒厚朴制各二兩官桂三兩良薑五兩上銼散每三錢食前服附諸方白朮芍藥湯機要方治太陰脾經受濕水泄注下體重微滿困弱無力不欲飲食暴泄無數水穀不化白朮芍藥各一兩甘草五錢上㕮咀每服一兩水煎升陽除濕湯拔粹方治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃色四肢困弱升麻柴胡防風神麯澤瀉豬苓各半兩蒼朮一兩陳皮甘草炙大麥芽各三錢上㕮咀水煎食後熱服升陽除濕防風湯東垣方如大便閉塞或裡急後重數至圊而不能便或有白膿或血慎勿利之利之則必致重病及鬱結而不通也又此道舉其陽則陰氣自降矣蒼朮米泔浸去皮乾淨四兩防風二錢白朮白茯苓白芍藥各一錢上㕮咀除蒼朮另作片子水一碗半煎至二盞納諸藥同煎至一大盞食前熱服益胃湯拔粹方治頭悶勞動則微痛不喜飲食四肢怠惰燥熱短氣口不知味腸鳴大便微溏黃色身體皆悶口乾不喜飲冷黃耆甘草半夏湯泡各二分黃芩柴胡人參白朮益智各三分當歸梢升麻各半錢陳皮半錢蒼朮一錢半上㕮咀水盞半煎八分食前通口服胃苓湯治感暑夾食泄瀉煩渴即平胃散五苓散相合蒼朮陳皮厚朴薑製甘草白朮茯苓豬苓澤瀉桂上㕮咀水煎入鹽少許服如作末藥湯服亦可柴苓湯分理陰陽治瀉解熱柴胡黃芩半夏甘草減半人參豬苓白朮茯苓澤瀉各等分水二鍾薑三片煎服養胃湯治脾胃虛寒嘔逆噁心腹脅脹痛腸鳴泄瀉方見痎瘧門五苓散益元散並見暑門丹溪方治一老人奉養太過飲食傷脾常常泄瀉亦是脾泄黃芩炒半兩白朮炒二兩白芍藥酒拌炒半夏泡各半兩神麯炒山楂炒各一兩半藿香一兩上為末青荷葉包飯燒熟研丸如梧子大食前白湯下錢氏白朮散治氣血俱虛神弱之人或吐瀉人參白茯苓白朮木香甘草藿香各一兩乾薑半兩上為粗末每服五錢水一鍾煎七分食前溫服參苓白朮散治脾胃氣虛飲食不進或致吐瀉方見虛勞門溫臍止瀉散治大人小兒久瀉滑脫不止乾薑微炒白芷附子生各一錢上為細末用生白蜜丸如彈子大按入內一二日即止泄瀉治例出明醫雜著王節齋曰泄本屬濕然多因飲食不節致傷脾胃而作須看時令分寒熱新舊而施治治法補脾消食燥濕利小便亦有升提下陷之氣用風藥以勝濕亦有久泄腸胃虛滑不禁者宜收澀之主方白朮二錢白茯苓白芍藥炒各一錢半以上三味泄瀉必用之藥陳皮一錢炙甘草去皮五分若傷食泄黃或食積加神麯大麥芽山楂子各一錢炒黃連七分消之腹中窄狹飽悶再加厚朴枳實木香各五分若小便赤澀短少加澤瀉豬苓木通各一錢以分利之夏月再加茵陳七分炒山梔仁四分若口渴引飲加乾葛一錢半人參麥門冬各一錢升麻滑石各四分烏梅肉二個若夏秋之間濕熱大行暴注水泄加炒黃連蒼朮澤瀉各一錢升麻木通各五分發熱燥渴加乾葛石膏各一錢黃疸小便黃赤加茵陳一錢山梔木通各五分若飲酒便泄此酒積熱瀉也加炒黃連茵陳乾葛各一錢木香五分神麯麥芽各八分若寒月溏泄清冷腹痛或傷生冷飲食加神麯麥芽炙乾薑各一錢砂仁益智木香各七分若久泄胃氣下陷服利小便之藥而不效宜加人參黃耆各一錢以補中氣升麻柴胡各四分以升提之加羌活防風藁本白芷等風藥各三四分助風以平之更加炙乾薑五分以固之若久泄脾胃虛弱食少難化加炙黃耆人參各一錢神麯麥芽各一錢二分木香煨過乾薑炙各五分若久瀉腸胃虛滑不禁加肉豆蔻一錢訶子皮赤石脂各一錢煨木香炙乾薑各五分針灸法脾俞二穴在十一椎下兩旁各開寸半主泄瀉中脘一穴在臍上四寸主腹痛泄瀉關元一穴在臍下三寸療腹泄不止天樞二穴在臍旁各開三寸治腹滿脾泄瀉痢大腸俞二穴在十六椎下各開寸半灸三壯治腸鳴腹䐜脹暴瀉
