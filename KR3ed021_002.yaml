body:
  text: 卷之二證治提綱得病有因治病活法雖貴於辨受病之證尤貴於問得病之因風則走注寒則拘攣暑則煩渴濕則重滯此受病之證然爾或耗於交淫或觸於驚恐或傷於酒食或深居簡出而受暑自非委曲尋問其因則以意治病豈不謬邪有人喉間麻癢醫問其平日所嗜曰常吃鳩子乃知鳩食半夏苗以生薑治之而愈有人昏迷不醒醫問其喜食者何有曰酷好煎炙飛禽乃用紅丸子小七香丸末之而入硃砂膏為小丸薄荷泡湯灌下須臾即蘇有人暑月深藏不出因客至於窗下忽爾倦怠力疲自作補湯得之反劇醫問其由連進兩服香薷飲作效舉此為例其他可推古云醫者意也苟不究其得病之因其何以為意會治病當先救急治病如奕棋當先救急急者何救其重而略其輕也假如病人發熱經日服通利之劑泄瀉不止嘔吐大作粥藥不入而熱猶未已治法略去發熱一節且以定嘔進食為先惟人參生薑入些炙甘草煎湯調蘇合香丸咽下養正丹斟酌丸數與之進劑以還嘔吐自定飲食漸進泄瀉亦自不作是元氣既正縱有微熱特假熱耳人參川芎柴胡甘草調理之治病如操舟操舟在手當風波震蕩之中一有轉移則舟覆矣醫權藥衡主持在我不可偏徇病家所欲尤不可張惶使病人驚間有病家粗識皮膚辨難反復萬勿惑焉又有瘥後觸犯再復隱諱不言須詰問其由庶得對病施藥用藥中病不必盡劑治寒以溫治熱以涼但中病即止矯枉則過正也蓋涼藥頻施必至於嘔惡沉冷溫藥頻施必至於煩躁烘熱所貴酌量權度一毫無過用焉是為活法經常用藥自有奇功人有中年以上素挾風痰腹中時痛忽爾感冒雖已發散寒邪無復發熱頭疼之苦奈何風痰嘔吐俱作諸藥罔功但用茯苓二陳湯加南木香白豆蔻作劑入生薑烏梅同煎調蘇合香丸二粒咽下白丸子二十丸連續兩服嘔止痰消自然思食繼是以北參川芎橘皮白豆蔻炙甘草調之若通小便則於內加麥門冬若通大便則於內加枳殼以咽神保丸四五丸大小腑一通頓遂勿藥之喜論肝脾生病經曰人迎緊盛傷於寒氣口緊盛傷於食蓋肝脈可以知風寒之出入脾脈可以驗飲食之盈虧肝亦主血脾亦主痰以其脈之虛實而益損之以其病之關係而對治之君請擇斯二者病人尺脈洪大此病在下部也當疏利而出之脈洪大主熱多是大小便不通或小腹結急臍下蓄血或腎氣攻刺發作奔豚或下焦停水外腎虛腫或風邪攻腎腳痹腰疼或腎臟風毒身下瘡癢當隨證體認以對病之劑主之大概通利為第一義臨診精思而熟審焉水氣腎氣血氣風毒擒縱治法此等證候先以青皮陳皮枳殼北梗半夏紫蘇生薑甘草解其寒邪調其衛氣然後斟酌用十棗湯吞養正丹輕者卻只用神保丸夾青木香丸以五靈脂入烏梅濃蜜煎湯咽下錢氏宣風散亦可以疏利風毒俟大便通快流行其病已減繼是二陳湯加當歸川芎木香縮砂輩調理之治痢要訣痢出於積滯積物積也滯氣滯也物積欲出氣滯而不與之出所以下墜裡急乍起乍止日夜凡百餘度病家所請莫不求其止孰知物積氣滯致有如是之證耶繼人但見有上項證候不論色之赤白脈之大小一皆以通利行之物積用巴豆大黃輩氣滯用枳殼桔梗青皮莪朮輩二者兼濟必能收功其間佐以黃連阿膠丸效驗尤著蓋痢疾多因傷暑伏熱酒面炙爆醞釀而成其阿膠尤大腸之要藥有熱毒留滯則能疏導無熱毒留滯則能安平市肆或無丸子即以炒阿膠當歸青皮赤茯苓黃連作劑入烏梅濃蜜同煎最能蕩滌惡穢積滯既去遍數自疏嗣是卻以木香茯苓縮砂白豆蔻陳皮甘草調之自然喜食食則糟粕入於大腸然後真人養臟湯易簡斷下湯可止則止矣簡徑治痢諸熱痢血痢及痢後大腸里痛用蘿蔔截碎研細濾清汁一小盞蜜水相半一盞同煎早午食前服日晡以米飲下黃連阿膠丸百粒無蘿蔔蘿蔔子代之又法熱痢舊年白梅並好茶蜜水各半煎服冷痢生薑汁蜜水各半煎服仍兼木香生肉豆蔻為佐蜜最治痢薑茶治痢法薑能助陽茶能助陰二者皆能消散又且調平陰陽況於暑毒酒食毒皆能解之也不問赤白冷熱通用之老生薑切如豆許與茶葉等分用新水煎服東坡醫文潞公作效噤口痢下痢噤口不食雖曰脾虛蓋亦熱氣閉隔心胸所致也俗用木香則失之溫用山藥則失之閉惟真料參苓白朮散加石菖蒲末以道地粳米飲乘熱調下或用人參茯苓石蓮子肉入些菖蒲與之胸次一開自然思食瘧痢用常山罌粟殼常山治瘧罌粟殼治痢人皆薄之固也然下痢日久腹中無痛當澀腸豈容不澀瘧以痰水作恙法當吐痰逐水又豈容不為之吐下於斯時也不有罌粟殼常山之劑其何以為對治乎但中間有藥輔之耳治瘧要訣凡瘧皆因腹中停蓄黃水惟水不行所以寒熱不歇此瘧家受病之處也治法暑瘧純熱以香薷散加青皮北大黃二個烏梅同煎侵晨溫服寒瘧多寒以二陳湯加青皮良薑多用薑同煎侵晨吞神保丸五粒並欲取下毒水則去其病根寒熱自解發瘧嘔吐勿用常山有中年人臟腑久虛大便常滑忽得瘧疾嘔吐異常惟專用人參為能止嘔其他瘧劑並不可施遂以茯苓二陳湯加人參縮砂而倍用白豆蔻進一二服病人自覺氣脈頗消於是寒熱不作蓋白豆蔻能消能磨流行三焦營衛一轉寒熱自平繼今遇有嘔吐發瘧之證或其人素嘔而發瘧謹勿用常山惟以生蘿蔔生薑各研自然汁半盞入蜜三四匙烏梅兩個同煎吞局方雄黃丸三四粒候其利下惡血痰水即以人參川芎茯苓半夏縮砂甘草調之萬一嘔不止而熱不退卻用真料小柴胡湯多加生薑主治其或嘔吐大作而又發熱且先與治瘧生熟飲嘔定以小柴胡湯繼之瘧有水有血水即水飲也血即淤血也惟水飲所以作寒熱惟淤血所以增寒熱常山逐水利飲固也苟無行血藥品佐助其間何以收十全之郊耶繼自今瘧家或衄血或唾血或大便血絲或月候適來適去皆是血證當以常山草果檳榔青皮烏梅甘草作劑於內加五靈脂桃仁為佐入生薑濃蜜同煎以主治之瘧證寒熱有根凡瘧固當以風寒暑濕別而治之或汗或下或吐或溫活人書之格法雖盧扁不能違矣然嘗見瘧之經久而不歇其故何耶有根在也根者何曰飲曰水曰敗血是爾惟癖為瘧之母惟敗血為暑熱之毒惟飲與水皆生寒熱故暑之脈虛水與飲之脈沉結癖之脈結聚挾水飲者為之逐水消飲結癖者脅必痛為之攻癖若敗血暑毒隨證而疏利之寒熱不除吾未之信常山治瘧須用大黃為佐瘧家多蓄痰涎黃水常山為能吐之利之是固然爾其有純熱發瘧或蘊熱內實之證投以常山大便點滴而下似泄不泄須用北大黃為佐大泄數行然後獲愈或曰巴豆丸子相依而行亦能泄也是又不然巴豆攻於下積苟欲蕩滌血熱不可以無大黃凡瘧方來於正發不可服藥服藥在於未發兩時之先否則藥病交爭轉為深害寒熱似瘧此傷寒一證而實非瘴瘧也其人肝脈浮盛頭痛怯風大抵小柴胡湯加青皮紫蘇主之嘔者多用生薑渴者多加烏梅其或傷暑兼之小柴胡湯加香薷入生薑烏梅同煎可也抑猶有説焉寒熱之根非通利不能除也萬一其根未鋤又當以麻仁丸神保丸輩與之是亦先解後攻之意吐汗下治瘧治瘧總要不過吐汗下而已當下而下不盡腹中尚有餘痛或大便一泄之後不復再泄但時時點滴而出者須再下之大黃以佐常山可也當汗而汗不匝或頭汗至胸而手足無汗者須周浹一身而汗之青皮以佐紫蘇可也所謂吐者須出盡其水飲若作吐劑常山豈容輟哉能於三者究竟焉收效必矣瘧後調理瘧之為厲大抵連綿有病瘥以後或飲食失節或恚怒傷中或梳洗感風又再發者何以處之曰熱多者二陳湯加青皮甘草熱少者二陳湯加青皮草果堅守胃氣而已二藥並用生薑烏梅蜜水同煎空心進劑其間斡運更用巴豆丸子藥疏利大便以泄毒氣其何厲之有或服巴藥過多以致腹痛可用生薑甘草煎湯溫和解之甘草生薑解諸藥毒退熱退熱用涼藥不可十分盡或餘熱些少未去不足關心自然無事否則熱去則寒起古人戒之一方多用川芎茯苓甘草少用白朮粗末水煎病後和胃收斂浮陽屢試得效柴胡退熱不及黃芩若藥弗瞑眩厥病弗瘳世俗治熱例用柴胡最為穩當至若黃芩一輩則指為大寒不敢用之不思藥病不相當鮮克有濟繼今退熱而熱不去者須用黃芩退熱有法凡壯熱煩躁用柴胡黃芩大黃解利之其熱乍輕而不退盍用黃芩川芎甘草烏梅作劑或用黃連生地黃赤茯苓同煎臨熟入燈心一捻主之其效亦速蓋川芎生地黃皆能調血心血一調其熱自退小兒風證解熱有三痰盛搐掣大便祕結當以枳殼大黃靈脂甘草利之小便赤澀心熱狂吼以辰砂五苓散入燈心行之既利大腸矣利小便矣而風證乍作面色乍紅常有怫鬱之狀何耶表熱表邪猶未解也人參羌活散加青皮紫蘇薄荷主之參蘇飲亦可矣滯血發熱其人脈澀必有漱水之證必有嘔惡痰涎之證必有兩腳厥冷之證亦必有小腹結急之證或唾紅或鼻衄此皆滯血作熱之明驗也用藥不止於柴胡黃芩當以川芎白芷桃仁五靈脂甘草佐之大便祕結者於中更加大黃濃蜜使滯血一通黑物流利則熱不復作佐助小柴胡湯傷寒留蓄惡血內外俱熱昏憒譫語亦有耳聾虛鳴之證與少陽經受病相似如服小柴胡湯不效當以黃連一分赤茯苓半分銼細入燈心煎與之男女通用凡大小産熱入血室小柴胡湯力所不及者於內加五靈脂仍以黃連赤茯苓湯佐之蓋心生血黃連茯苓皆清心涼血之劑所以收功若夫疏利血毒則活人書桃仁承氣湯有餘勇矣腎熱用五苓散腎氣內虛邪熱流入於腎經其脈洪大小便頻數所出澀少赤濁而痛此不可以牽牛行之治法瞿麥燈心煎湯調真料五苓散滲泄其熱邪水竇一通勿藥有喜下後大腸熱腫墜重諸有裡熱法當通利大便然下後腸頭熱腫而墜重者此更有熱有淤血挾氣而蓄在下焦也更用黃連黃芩大黃輩下之於內以炒阿膠炒枳殼百藥煎為佐多入濃蜜並烏梅同煎薑錢四五片可也通利大便有法凡通利大便若用大黃巴豆等藥而大便不通者陰陽關隔水火不升降故也有熱者來復丹夾三黃丸薄荷泡湯下無熱者養正丹夾神保丸橘皮煎湯下飯後隨即大便脾腎交濟所以有水穀之分脾氣雖強而腎氣不足故飲食下咽而大腸為之飧泄也治法二神丸用故紙肉豆蔻修合或不換金正氣散吞安腎丸主之蓋脾腎之氣交通則水穀自然克化此所謂妙合而凝者也脾泄腎泄有脾泄有腎泄脾泄者肢體重著中脘有妨面色虛黃腹肚微滿腎泄者膚腠怯冷腰膂痠疼上咳面黧臍腹作痛治脾泄用蒼朮白朮厚朴乾薑木香生肉豆蔻輩治腎泄用補骨脂及安腎丸震靈丹輩腎泄諸有泄瀉用不換金正氣散除濕湯之類以去風濕以安腸胃此上品藥也次則溫脾養胃之劑投之是為正法然用之而不作效抑且腹痛走上走下或臍間隱痛腰膂疼酸骨節軟弱面色黧悴尺脈虛弱病安在哉曰此腎泄也當以炒故紙生乾薑官桂木香當歸輩主之仍用安腎丸為佐其或腎水下涸心火上炎燥渴溺多引飲無度此陰陽離絶也識者憂焉大便脫泄白膿大人小兒泄痢無已其後變作白膿點滴而下或於糞尾見之為之溫脾不愈法當溫腎蓋腎主骨髓白膿者骨髓之異名也要之始作白痢其氣腥臭已經轉下而且淹涎日久無所謂痢矣今之白膿全無腥臭面色微黑骨力羸弱的見腎虛合用炒故紙當歸木香乾薑官桂主之嗣是少與震靈丹或玉華白丹為佐雖然又有婦人一證似痢非痢泄下白膿心腹暴痛吼不忍聞此當為之通血投通血之劑卻以養正丹輔之脫肛脫肛一證氣聚不散也裡急而不得出外脹而不得入先以枳殼散作劑又以枳殼燒灰存性細末摻敷或津唾調敷氣散則腫消矣仍用生薑汁調五苓散如膏入新水研散略煎吞黃連阿膠丸雖然此論肛門挾熱而腫脹也其或腸中虛薄不收則理中湯釣腸丸養臟湯輩主治烏賊骨木賊草敷之詳見脫肛類小便不通大凡水道不行其本在腎合用牽牛澤瀉其末在肺合用葶藶桑皮二者得兼必然中病其間更以木通滑石佐之又能透達雖然大便小便脈絡相貫也人有多日小便不通但用神保丸北亭丸輩大瀉數行小腸自利石淋沙淋凝脂而易散石淋結塊而難消攻療石淋專以枳殼散空心食前吞來復丹為妙但恐太陰玄精石不得其真惟得真料而常服之關絡開通忽而大便洞泄石塊自小便出轉胞轉胞證候孕婦多有之患在忍縮小便或喜食煎爆或飽後為熱所迫遂使小腸之氣逆而不通大腸之氣與之俱滯外水不能入膀胱內水不能出膀胱淋瀝急數每欲尿時痛不可言大便亦裡急頻並似痢非痢必以手從胸間按至臍下庶可立出小便否則逆上出而不禁甚者因此腹脹浮腫治法用涼藥疏利小腸中熱仍與通泄大腸逮其腹中攪痛大便大下則溺胞隨即歸正於是小便順流葵子散見附婦人摘奇方孕婦胎熱似痢孕婦七八個月傷暑傷熱以致子煩胎氣迫近於上咽喉窒礙心腹脹滿下墜似痢每登廁時坐一炊久忽而氣下方得大便一通世俗率用痢藥不知病在胎熱子煩可小柴胡湯下黃連阿膠丸或用炒阿膠淨黃連各一分枳殼北大黃半之分作兩劑烏梅薑蜜煎服俟其大便調導卻以川芎茯苓縮砂甘草繼之若五苓散感應丸香連駐車非其治也下焦蓄血血之為病冒悶煩躁迷忘驚狂痰嘔汗多骨熱肢冷此外證然爾何以知其蓄在下焦曰臍下結急外熱內痛尺脈洪而數也桃仁靈脂生地黃北大黃甘草利而逐之産婦血塊築痛此候因産斷趕血未盡所致世俗收生多就踏板趕血不思生産之時已坐草近地久矣産畢臟腑虛空又且近地趕血冷濕乘之風邪入之使敗淤凝為血塊是謂血母沖築硬痛非乳香沒藥延胡索五靈脂輩所能療也治法不換金正氣散加辣桂川芎白芷蓬莪朮乾薑同煎乘熱入法醋連進兩服冷濕風邪一散其塊自消散淤皆從大小便而出凡新産須就床上趕血下帳避風身體血滯作痛身體疼痛非濕則痰固也人有挾刀鋸之驚而又餒在其中為風寒水濕所傷致使心竅凝滯於是經絡壅閉血流不行腸肉骨節為之刺痛治法當歸川芎芍藥白芷靈脂大黃甘草利之黑物小片而下其痛有瘳身體胸腹隱熱隱疼拘急足冷此血之為病也以其飲酒嗜欲伏熱受暑得之惟熱毒暑毒酒毒為能傷血淤血未去新血不營身體所以隱痛拘急其裡熱足冷者血之證也用柴胡黃芩青皮枳殼靈脂桃仁木通甘草作劑多入大黃以利之俟其流利已盡小腹略無結急即以當歸川芎一倍橘皮半夏枳殼北梗木通甘草平之調其氣血於是有瘳血屬於心木通以通其心竅心竅既通經絡之流行可知矣血滯人之一身不離乎氣血凡病經多日療治不痊須當為之調血血之外證痰嘔煩渴昏憒迷忘常喜湯水漱口不問男女老少血之一字請加意焉用藥川芎蓬莪朮桃仁靈脂生地黃北大黃為要嘔甚者多加生薑以此先利其宿淤嗣是茯苓茯神川芎甘草調理之血崩素問云陰虛陽搏謂之崩此即血得熱則宣流之意也四物湯可以助陰生料枳殼散可以抑陽其間更以茯苓二陳湯和之使陰陽兩得其平血自循於經絡矣若夫衝任不固下元久虛以致血無關鎖則用膠艾湯加當歸木香咽下震靈丹為妙吐血血隨氣行氣逆而上奔則血不循於經絡而湧吐矣人知吐血出於上焦有熱固也然能用柴胡黃芩蒲黃茅花等輩而不能用枳殼北梗青皮生薑烏梅佐之又不能用通利丸子以開其中脘導其大便則氣如何而下降血如何而下行吾恐逆奔而上有不可得而止之者若夫依前治法血止而後又當以人參川芎當歸茯苓橘皮半夏甘草為之調理虛則加木香熱則加柴胡壅則加桑皮荊芥尤在權衡治渴有法凡病人兼有燥渴之證用烏梅栝蔞根乾葛甘草數輩皆不作效遂致引飲過多兩腳浮腫此證不可以為裡熱蓋腎水不上升心火不下降故也須用交感丹為主卻以烏梅濃蜜生薑甘草煎湯咽之腎水一升心火一降其渴自止腳亦不復腫矣酒家有病勿用溫藥有人飲酒過多因酒作病胸脘不快其氣捫隔服無數二陳湯竟無寸效由是不喜飲食復以調氣散投之致發大熱自後只用薄荷煎雞蘇丸麻仁丸日就痊愈乃知胸脘閉隔熱在上焦使然耳又有人酷好飲酒復感寒邪服不換金正氣散以致內熱愈熾煩渴且悶汗出如雨身體怯寒續後以小柴胡湯加枳殼白芍藥解之柴胡黃芩退熱枳殼寬中芍藥調營止汗頓然痊愈然則酒家抱病其可妄以溫藥嘗試一中乎傷寒筋惕肉瞤治法筋惕身瞤發汗太過所致也古人以真武湯主之然真武湯能止其汗而不能定其瞤瞤者動也汗出表虛外風必入於腠理人知風以動之所以惕惕而自瞤而不知汗多則傷血血虛無以榮筋筋愈急而四體百骸愈為之瞤動治法不用驅風併發散等輩惟人參當歸川芎芍藥半夏茯苓甘草作劑以五靈脂為佐入生薑烏梅同煎自有神效上藥專於生血生血乃所以收汗其或大便祕澀少加大黃以導之血脈一和不反掌而靜定矣發痙詳證廬江劉寶云産寶所載方藥甚詳獨無産後中風角弓反張一證按産後中風因懷胎時多啖生冷脾胃受濕復經乳臥之後津液內竭履地太早脫著不時以致風邪乘虛入於足太陽之經其證發熱頭疼或時不熱喘息痰咳言語不倫漸覺牙關緊急十指微動如摸物之狀加以項背強直或啞或叫目睛直視腸滑不禁身如反弓轉側不仁如此十無一生活人書謂太陽發痙是爾凡産後初得發熱常須審視若唇急舌謇手指微動便以中風藥品急治之用藥歸荊湯獨活酒附在濕門獨荊散防風散續命湯見附婦人方中男女通用胸脅痛引背上頭面兩手浮腫腎虛不能納氣歸元氣逆而上奔故胸膈滿痛以手摩挲痛走背上又從背摩挲則其氣循脅泄於後分而痛不作矣此氣之為病固也奈何腎虛又不能行水故水隨氣奔上乘於肺頭面兩手浮腫氣短而喘由是血化為水與之俱滯況其人舊來有風曰風曰水曰血曰氣四者合而為病其痛非常如沉香木香烏藥檳榔之類不能施其巧治法將何如曰先以二十四味流氣飲加獨活枳殼五靈脂炒牽牛入薑蜜烏梅同煎咽下養正丹二十粒雄黃丸十粒升降水火引導大便次用桑葉紫蘇木通阿膠當歸桃仁青皮桔梗炒芫花生大黃作劑依前煎以薑蜜烏梅取盡大便黑物即收全功肚皮痛腎虛不能行水加之酒面無度醉後輒睡酒與水交聚於腹中而面毒復纏滯其氣是以水滲於肚皮而作痛矣治法錢氏宣風散用蜜水煎咽下神保丸俟其大便流利然後以青木香丸一分安腎丸倍之用二陳湯入少鹽並生薑同煎空心咽下脾腎氣復自然向安胸膛氣隔有肺經伏熱而氣隔者有痰水在上而氣隔者大概以茯苓半夏枳殼桔梗為治法其肺熱者如聖湯加桑白皮佐之心下水氣者小半夏茯苓湯效胸煩活人書用山梔子附證治賦麻黃湯髮臘月寒傷營桂枝湯散冬天風傷衛九味羌活湯發三時之表三時傷寒春夏秋也六神通解散理晚發之邪三月天行謂之晚發香蘇散十神湯參蘇飲發表調中平和之藥外感內傷兼治葛根湯解肌湯小柴胡和解半表大柴胡三承氣攻熱邪傳裡理中湯四逆湯散寒中陰經以上治外感補中益氣湯治飽飢勞役升陽順氣湯療怒恐憂思調中益氣湯調胃脾失協參朮調中湯治脾肺俱傷升陽散火湯升散熱邪凡言熱者指外熱也升陽益胃湯分消濕氣以上治內傷和解散金沸草散治時行寒疫神朮散定風餅子療暴中風邪人參敗毒散升麻葛根湯解溫疫而身熱陽毒升麻湯雄黃解毒丸散天行而咽疼宣明雙解散主溫熱始終之要藥藿香正氣散治暑濕內外之良方香薷飲清暑益氣湯人參白虎湯益原散縮脾飲能祛實虛暑氣平胃散羌活勝濕湯升陽除濕湯五苓散朮附湯善解外內濕邪生料五積散解濕溫寒治表裡之寒濕防風通聖散清熱潤燥治表裡之熱燥搜風順氣丸神芎丸潤大腸燥症黃連解毒湯三黃丸瀉三焦火邪凡言火者指內火也當歸六黃湯瀉火滋陰防風當歸飲補虛退熱舟車丸三花神祐丸能除濕熱濕則生熱秦艽湯羌活愈風湯善解燥風燥則生風胃苓湯主傷暑泄瀉腹疼柴苓湯治傷寒泄瀉身熱桂苓白朮散療霍亂而口發渴加減理中湯治吐瀉而咽不幹蒼朮湯胃風湯治濕傷氣分白痢便膿地黃湯芍藥湯主熱傷血分赤痢下血萬安散七寶飲治瘧無汗而寒多熱少清脾飲六和湯療瘧有汗而寒少熱多華蓋散五拗湯主喘嗽因寒外襲洗肺散貝母散治咳嗽由火內生以上發表和中以治風寒暑濕燥火白虎湯瀉胃火有餘八珍湯補脾陰不足白朮和胃丸能養脾胃寬中進食丸喜滋形氣治中湯枳朮丸和中丸大安丸保和丸健脾消食香谷丸香稜丸積氣丹妙攻丸消塊丸破積除症木香枳殼丸療食停久發黃神妙列仙散治酒積陳成疸木香積術丸化滯湯調氣進食七轉靈應丹萬應丸取積追蟲丁香脾積丸妙應丸治心腹諸疼大黃備急丸三陽散主猝暴百病三稜消積丸治新傷生冷硬物內用巴豆木香檳榔丸療久患氣食痞膨內用大黃巴豆斬關去時新之冷積可仗大黃破結推陳久之熱症宜遵氣病宜調氣用木香檳榔香附枳殼血病宜和血以川芎當歸桃仁紅花越鞠丸木香流氣飲開鬱氣之無形蟠蔥散撞氣阿魏丸破積血之有質神砂一粒丹療氣鬱而為心疼神聖代針散治血積而作疝氣獨活寄生湯開氣血結滯在腰當歸拈痛湯散濕熱沉凝於足控涎丹小胃丹治濕熱流注四腹作疼金棗丹虎骨散療氣血怫鬱遍體為病以上調胃消食並治氣血濕熱鬱積二陳湯以豁痰三補丸而瀉火六君湯豁痰補氣調胃六物湯降火補血滋陰四物湯加黃柏知母是也當歸龍薈丸善降陰火兼治脅痛人參養胃湯能開結痰並療久瘧太平丸消化丸治痰嗽有功左金丸香連丸除熱痢必效洗心散瀉肝散瀉心肝之火滾痰丸化痰丸蠲熱燥之痰四七湯黑錫丹開痰結心胸清空膏涼膈散除火升頭膈石膏羌活散祛風明目川芎石膏湯瀉火定眩川芎茶調散治風熱上攻頭目葛花解醒湯療濕痰中滿胃腸龍腦雞蘇丸除心肺虛煩人參瀉肺湯散胸膈實火犀角地黃湯桃仁承氣湯茯苓補心湯阿魏丸小建中湯治火載血而上出當歸承氣湯瑞竹蒲黃散當歸和血散聚金丸伏龍肝散療陽迫陰而下行紅花當歸散千金桃仁煎六合湯理經脈不通涼血地黃湯解毒四物湯膠艾湯治崩漏不止金匱當歸散清熱安胎而易産丹溪天麻丸活血保産而無驚女金丹烏雞丸調氣血令老婦妊娠天一丸連翹飲瀉火濕主小兒百病醒脾散玉餅子肥兒丸香稜丸治嬰孩脾氣不足而致疾瀉青丸奪命散抱龍丸檳榔丸療童樨肝邪有餘而生災金箔鎮心丸金箔鎮心丹安神定驚五福化毒丹犀角消毒飲清熱解毒異功散補痘瘡之虛寒通聖散瀉斑疹之實熱內疏黃連湯千金漏蘆湯主陽痛腫掀向外內托復煎散淵然奪命丹治陰疽毒蘊於中立馬回疔丹萬靈奪命丹療疔瘡而有殊功神效太乙膏散腫潰堅湯治瘰癧而收實效紫金丹治藥食衆毒兼癰疽疔腫主解利如聖散療風濕諸邪及癱瘓痛風主發散香谷丸芎歸丸療痔而清熱涼血槐角丸烏王丸治漏而散濕補虛清心蓮子飲八正散治小便淋濁有虛實之分導滯通幽湯三和散療大腸燥結有血氣之異海藏五飲湯散五等之飲開結枳實丸消諸般之痰導痰湯三生丸豁痰疏風千緡湯四磨湯下氣定喘蘇子降氣湯消痰利氣三因七氣湯解鬱開心瓜蒂散稀涎散四靈散吐涎而祛風蘇青丹星香湯滌痰湯豁痰而順氣蘇合香丸烏藥順氣散勻氣散善開結氣小省風湯青州白丸子搜風丸能散風痰牛黃清心丸治諸痰熱而類風諸小續命湯療真中風而在脈三化湯主風入腑推陳潤燥至寶丹治邪入臟散熱消風龍星丹疏風清熱豁痰愈風丹潤燥祛風瀉火換骨丹續命丹治風痰充塞經絡而為癱瘓清燥湯健步丸療濕熱熏蒸筋骨而成痿疲南星治風痰蒼朮治濕痰天花粉治熱痰海石治燥痰半夏治寒痰柴胡瀉肝火黃連瀉心火白芍藥瀉脾火黃芩瀉肺火黃柏瀉腎火天門麥門知母石膏竹茹童便玄明粉上清丸能散虛火荊瀝竹瀝貝母瓜蔞韭汁薑汁霞天膏二瀝湯善開虛痰氣虛加以四君血虛加以四物以上治痰火氣風四君補氣並益脾四物補血兼滋腎八物湯十全大補湯補氣血兩虛固本丸祕傳補元丸補心腎不足錢氏白朮散參苓白朮散竹葉石膏湯補脾胃諸虛丹溪補陰丸金匱腎氣丸三一腎氣丸滋真陰久損崔氏八味丸補陰興陽天王補心丹寧神定志硃砂安神丸涼血清心八味定志丸補虛開竅茯菟丸萆薢分清飲除濁止淋固精丸固真太寶丸祕精收脫保和湯知母茯苓湯黃耆鱉甲湯止嗽寧肺保真湯十味人參散人參養榮湯除熱補虛一稱金七仙丹烏髮駐顏瓊玉膏固本酒延年益壽以上補氣血臟腑以方加減存乎人要審病而合宜用藥補瀉行於味須隨時而換氣奇偶復七方須知七方者奇偶復大小緩急也初中末三治要察初則發攻中則調和末則收補寒因熱用熱因寒用通因通用塞因塞用通因通用者通其積滯而下焦自然閉密也高者抑之下者舉之外者發之內者奪之塞因塞用者塞其下流而上焦自然開豁也寒則兼凝熱則開行風能勝濕濕能潤燥辛能散結甘能緩中淡能利竅苦以泄逆酸以收耗咸以軟堅升降浮沉則順之謂順其升降浮沉之性也寒熱溫涼宜逆也謂以寒治熱以熱治寒也病有淺深治有難易初感風寒乍傷飲食一藥可愈舊存痃癖久患虛勞萬方難瘳履霜之疾亟療無妄之藥勿試病若伏虛宜半攻而半補醫稱多術或用灸而用針針有劫病之功灸獲回生之驗針能去氣病而作痛灸則消血症以成形臟寒虛奪者治以灸爇脈因攣痹者療以針剌血實畜結腫熱者宜從砭石氣滯痿厥寒熱者當仿導引經絡不通病生於不仁者須覓醪醴血氣凝泣病生於筋脈者可行尉藥病剽悍者按而收之謂按摩也乾霍亂者刮而行之謂刮痧也醫業十三科宜精一派病情千萬變仔細推評姑撮碎言以陳管見後之學者庶達迷津
