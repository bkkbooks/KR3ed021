醋盡桃仁水浸去皮焙秦艽洗木香明阿膠炒酥各半兩雄黃安息香生髮紙拈火燒存性各二錢半上細末以紫河車狗肉杵黏為丸桐子大每七十粒月首五更空心米湯下午時又服如無胎衣以雄豬肚代用修事同雄麝丸治癆瘵殺瘵蟲下惡物雄黃雌黃青黛干代赭石煅醋淬硃砂研細各二錢半大蝦蟆一個酒炙黃男子天靈蓋酥炙黃三錢安息香阿魏酒浸研各二錢麝半錢川巴豆肉肥者十粒略去油上細末軟粳飯頭揉和杵丸桐子大每二十粒桃仁十四個去皮研煎湯月初五更空心下五枝散取下傳尸勞蟲桃枝李枝梅枝桑枝石榴枝並東向小枝各七莖長三寸青蒿一小握苦楝根白皮七寸生藍青七葉蔥白連根洗七片各寸截上以童尿一升半煎取其半去滓入安息香蘇合香阿魏各一錢煎至一盞濾清調硃砂雄黃雷丸枯白礬硫黃末各半錢雞心檳榔末一錢半麝一字分作二服月頭五更空心進一服五更五點又進一服約午前取下瘵蟲淨桶盛急鉗收油銚內煮仍傾油蟲入瓷器灰扎埋山僻處藍汁方殺瘵蟲惡蟲皆化為水生藍青葉研取自然汁一大盞上入雄黃枯白礬安息香紅硬降真香末各半錢麝少許研和月頭五更空心服藍青殺諸蟲解諸毒蠱毒通用此方貓肝方殺瘵蟲黑貓生取肝曬乾上為末月首五更空心醇酒調服或用酒浸而食之木香蛤蚧丸治癆瘵久嗽聲干骨痿瘦悴蛤蚧一對尾全者洗淨酥炙生鱉甲去裙醋炙焦白茯苓川芎當歸北五味子牛膝各七錢半綿黃耆柴胡知母貝母去心雞心檳榔明阿膠炒酥巴戟酒浸去心桃仁酒浸去皮焙各半兩肉豆蔻三個生木香秦艽洗羌活破故紙炒生髮紙拈火燒存性各三錢上細末煉蜜丸彈子大每一丸煎棗湯空心嚼下參耆散治癆瘵嗽喘咯血聲焦潮熱盜汗柴胡明阿膠炒酥黃耆蜜炙白茯苓紫菀茸當歸川芎半夏制貝母去心枳殼制北梗秦艽洗甘草焙各半兩人參北五味子羌活防風杏仁水浸去皮款冬花桑白皮炒各二錢半生鱉甲去裙米醋炙黃上粗末每服二錢半薑棗煎食後少頃服全鱉丸治癆瘵虛熱嗽喘知母貝母去心杏仁浸去皮各三兩柴胡二兩川芎一兩當歸明阿膠炒酥各半兩上粗截入厚瓷器中用中等活鱉一個生宰於頭上去鱉病以鱉肉並血並藥用醇酒五升同浸一宿密紙封次早慢火同煮俟香熟取鱉令病者隨意食之只留鱉甲併骨並藥焙乾為末以浸藥酒汁調米粉為糊丸桐子大每七十丸不時米飲下神授丸方見虛勞門論治瘵疾瘵蟲有效但隨時用飯頭丸服之庶得藥味鮮凡服藥永戒莧菜牛馬肉瘵有數蟲如蜈蚣如小蛇如蝦蟆如馬尾如亂絲如爛面如蒼蠅如壁蚰蟲上紫下白形鋭足細而有口或如白蟻孔竅中皆出此皆癆瘵根毒若傳至三人則如人形如鬼狀前方鱉甲生犀散已服後准七日又再服之附論滑伯仁論曰勞患人者有病機之不同有形狀之不一肌膚羸瘦骨熱如蒸服藥無效針灸無功何也對曰勞者虛勞也是因體虛之人房勞過損酒怒多端氣虛血耗諸疾蜂生致使陰陽失序寒熱自生陽虛曰生寒陰虛曰發熱久虛久熱變為骨蒸久則成勞久勞成疰疰者住也有二十四種之名有三十六種之類有九十九種之形種種不同症症各異內有勞疰尸疰鬼疰食疰蟲疰毒疰此六者為傳尸之勞患滅門絶戶醫難治之又云所因少壯之時醉飽迷房勞傷心腎蓋心主血腎主精精竭血衰失於調護而無滋化之源致生融融之熱咳咳之痰陰虛盜汗夜夢鬼交遺精困倦腰背痠痛咯血咯痰頰紅喉痛飲食減少骨肉枯羸是為不治故曰患此疾者有氣虛有血虛氣虛者易治血虛者難調故也又云治虛勞世用寒涼之藥治熱症熱之愈熱用熱藥治寒症寒之愈寒何也對曰東垣有云用苦寒之劑妄治勞傷之熱大寒則愈虛其中大熱則愈怯其內治療無端致傷脾胃殊不知甘能緩火勞者溫之保全者當求微病之初莫治已病之後察氣血之虧盈審病源之要道補益溫平無不效驗故集諸方補附於後附諸方加味十全大補湯治發熱漸成癆瘵者十全大補湯加柴胡黃連煎服如熱在骨髓更加青蒿鱉甲煎服方見虛癆瘵青骨散治男子婦人五心煩熱欲成癆瘵生地黃二兩人參一兩防風去蘆一兩北柴胡二兩薄荷葉七錢半秦艽赤茯苓胡黃連半兩熟地黃一兩上㕮咀每服五錢水一盞煎七分溫服太上混元丹醫方集成治勞損五臟補益真氣紫河車一具用少婦首生男子者良帶子全者於東流水洗斷血脈入麝香一錢在內以線縫定用生絹包裹懸胎於砂甕內入無灰酒五升慢火熬成膏沉香別研硃砂別研飛各一兩人參蓯蓉酒浸乳香別研安息香酒煮去沙各二兩白茯苓去皮二兩上為末入河車膏子和藥末杵千百下丸如梧桐子大每服七十丸空心溫酒下沉香湯尤佳服之可以輕身延年補損扶虛如病證虛極又須增加後項藥味川巴戟去心鍾乳粉陽起石煅鹿茸酒蒸龍骨附子炮去皮臍黃耆去蘆各二兩桑寄生紫菀生鹿角鎊各一兩修製為末和前藥為丸如婦人血海虛損營衛不足多致潮熱經候不調或閉斷不通又宜增加此藥當歸去蘆石斛去根紫石英煅醋淬七次水飛柏子仁炒別研麝茸酒蒸鱉甲醋炙卷柏葉各一兩牛膝去蘆酒洗一兩半修製為末和前藥為丸湯使如前虛寒者加炮熟附子二兩咳嗽者加紫菀茸二兩黃耆飲子濟生方治諸虛癆瘵四肢倦怠潮熱乏力日漸黃瘦胸膈痞塞咳嗽痰多甚則唾血黃耆蜜炙兩半當歸去蘆酒洗紫菀茸去土石斛去根地骨皮去根人參桑白皮附子炮去皮鹿茸酒蒸款冬花各一兩半夏湯洗七次甘草炙各半兩上㕮咀每服四錢水一盞姜七片棗一枚煎服此藥溫補營衛枯燥者不宜進唾血加阿膠蒲黃各半兩樂令建中湯治臟腑虛損身體消瘦潮熱自汗將成癆瘵此藥大能退虛熱生血氣經驗地仙散治骨蒸肌熱一切虛煩五蒸湯治骨蒸勞熱自汗俱見積熱門蘇合香丸和劑方治癆瘵傳尸骨蒸發熱肺痿喘急方見咳嗽門地骨皮散治虛勞潮熱骨蒸壯熱瘵證方見虛勞門遇仙灸和劑方治瘵捷法取癸亥日二更後六神皆聚時解去下衣直身平立以墨默記腰上兩傍陷處謂之腰腿穴然後上床合面臥每穴灸七壯勞蟲或吐或瀉而出取後用火焚之棄於江河中恐害人故也或依崔氏穴法灸之宜服後將軍丸將軍丸祕方治傳尸癆瘵前灸法並此藥乃異人傳授纍經驗錦紋大黃酒蒸曝焙麝香一錢研貫衆牙皂去皮醋炙桃仁去皮炒檳榔雷丸鱉甲醋炙黃各一兩蕪荑半兩上為末先將蒿葉二兩東邊桃柳李桑葉各七片水一碗煎七分去滓入蜜一大盞再熬至成膏入前藥末及麝安息香搗丸如梧桐子大每服三十丸食前棗湯下七聖神效散祕方治男子婦人遠年近日五勞七傷喘嗽血尸勞等疾前藥無效針灸不應命將終服此神效鹿茸大補湯方見虛勞門十全大補湯方見虛勞門黃耆益損湯方見虛勞門進熱飲方書無進熱飲今存之清心蓮子飲方見諸淋門地骨皮散方見虛勞門鱉甲散方方見積熱門上各一貼用無灰酒三升浸瓷器瓶內半月開時空心進二錢輕者半月重者一月必然痊可癆瘵治例出明醫雜著王節齊曰男子二十前後色欲過度損傷精血必生陰虛火動之病睡中盜汗午後發熱哈哈咳嗽倦怠無力飲食少進甚則痰涎帶血咯唾出血或咳血或吐血衄血身熱脈沉數肌肉消瘦此名癆瘵最重難治輕者用藥數十服重者期以歲年然必須病人愛命堅心定志絶房室息妄想戒惱怒節飲食以自培其根否則雖服良藥無用也此病治之於早則易若到肌肉消爍沉困著床尺脈沉取細數則難為矣又此病大忌服人參若曾服過多者亦難治今制一方於後治色欲證先見潮熱盜汗咳嗽倦怠趁早服之主方川芎熟地黃各一錢白芍藥炒當歸酒洗各一錢三分黃柏七分水拌炒知母一錢蜜水拌炒生地黃酒浸甘草炙各五分白朮二錢三分天門冬一錢去心陳皮七分乾薑三分炒紫色生薑三片水煎空心溫服若咳嗽盛加桑白皮馬兜鈴栝蔞仁各七分五味子十粒若痰盛加薑製半夏貝母栝蔞仁各一錢若盜汗多加牡蠣酸棗仁各七分浮小麥一撮若潮熱盛加桑白皮沙參地骨皮各七分若夢遺精滑加牡蠣龍骨山茱萸各七分若赤白濁加白茯苓一錢黃連三分炒若兼衄血咳血出於肺也加桑白皮一錢黃芩山梔仁各五分炒若兼嗽血痰血出於脾也加桑白皮貝母黃連栝蔞仁各七分若兼嘔血吐血出於胃也加山梔黃連乾薑蒲黃炒各一錢韭汁半銀盞薑汁小許若兼咯唾血出於腎也加桔梗玄參側柏葉炒各一錢若先見血證或吐衄盛大者宜先治血治法輕少者涼血止血盛大者先消淤血次止血涼血蓋血未多必有淤於胸膈者不先消化之則止之涼之不應也葛可久十藥神書方可次第檢用方內惟獨參湯止可用於大吐血後昏倦脈微細氣虛者雖氣虛而復有火可加天門冬五錢若如前所云陰虛火動潮熱盜汗咳嗽脈數不可用也說見本草集要人參條下明白此病屬火大便多燥然須節調飲食勿令泄瀉若胃氣復壞泄瀉稀溏則前項寒涼之藥難用矣急宜服藥理脾胃用白朮茯苓陳皮半夏神麯麥芽甘草等藥候胃氣復然後用前本病藥收功保後可合補陰丸常服之及用葛可久方又治癆瘵證方法出十藥神書心法附録曰夫人之生也稟天地氤氳之氣在乎保養真元固守根本則萬病不生四體康健若曰不養真元不固根本疾病由是生焉且真元根本則氣血精液也余嘗聞葛先師有言曰萬病莫若勞證最為難治蓋勞之起因人之壯年氣血完聚精液充滿之際不能保養性命酒色是貪日夜耽嗜無有休息以致耗散真元虛敗精液則嘔血吐痰以致骨熱體熱腎虛精竭面白額紅口乾咽燥白濁遺精盜汗飲食艱難氣力全無謂之火盛金衰重則半年而斃輕則一載而亡見醫者不究其源不窮其本或投之以大寒之劑或療之以大熱之藥妄為施治絶不取效殊不知大寒則愈虛其中大熱則愈竭其內所以世之醫勞者萬無一人焉先師用藥治勞如羿之射無不中的今開用藥次第於後用藥之法如嘔吐咯嗽血者先以十灰散遏住如甚者須以花蕊石散止之大抵血見熱則行見寒則凝見黑則止理之必然止血之後其人必倦其體次用獨參湯一補令其熟睡一覺不要驚動睡起病去五分後服諸藥保和湯止嗽寧肺保真湯補虛除熱太平丸潤肺除痿消化丸下痰消氣保和湯內分血盛痰盛喘盛熱盛風盛寒盛六事加味和之保真湯內分驚悸淋濁便澀遺精燥熱盜汗六事加味用之余無加用服藥之法每日仍濃煎薄荷湯灌嗽喉中用太平丸先嚼一丸漸漸咽下次噙一丸緩緩溶化至上床時亦如此用之夜則肺竅開藥必流入竅中此訣要緊如痰壅卻先用飴糖拌消化丸一百丸吞下次又依前噙太平丸令其仰面臥而睡服前七藥後若肺有嗽可煮潤肺丸食之如常七藥之前有餘暇煮此服之亦可續煮白鳳膏食之固其根源完其根本病可之後方可合十珍丸服之此為收功起身之妙用也甲字號十灰散治勞證嘔血吐血咯血嗽血先用此藥止之大薊小薊柏葉荷葉茅根茜根大黃山梔牡丹皮棕櫚皮各等分上各燒灰存性研極細末用紙包碗蓋於地上一夕出火毒用時先將白藕搗絞汁或蘿蔔汁磨京墨半碗調服五錢食後下如病勢輕用此立止如血出成升斗者用後藥止之乙字花蕊石散五內崩損湧噴血出升斗用此止之花蕊石火煅存性研如粉上童子小便一鍾煎溫調末三錢甚者五錢食後服下如男用酒一半女用醋一半與童便和藥服使淤血化為黃水服此訖以後藥補之丙字號獨參湯止血後服此藥補之大人參去蘆二兩上㕮咀水二鍾棗五個煎不拘時細細服之服後宜熟睡一覺後服諸藥除根丁字號保和丸治勞嗽肺成痿者服之決效知母貝母天門冬款冬花各三錢麥門冬去心天花粉薏苡仁杏仁五味子各二錢粉草炙馬兜鈴紫菀百合桔梗阿膠炒當歸生芐紫蘇薄荷各五分一方無地黃有百部一方有蒲黃上以水煎生薑一片入飴糖一匙入藥內服之每日三服食後進加減於後血盛加蒲黃茜根藕節大薊小薊茅花痰盛加南星半夏橘紅茯苓枳殼枳實栝蔞實炒喘盛加桑皮陳皮大腹皮蘿蔔子葶藶蘇子熱盛加山梔子炒黃連黃芩黃柏連翹一方加款花大黃風盛加防風荊芥金沸草甘菊細辛香附寒盛加人參芍藥桂皮五味蠟片戊字號保真湯治勞證體虛骨蒸服之決補當歸生芐白朮黃耆人參各三錢蓮心赤茯苓白茯苓各半錢天門冬麥門冬陳皮白芍藥知母黃柏炒五味子柴胡地骨皮熟芐各一錢赤芍藥甘草各一錢半上以水煎生薑三片棗一枚食後服驚悸加茯神遠志柏子仁酸棗仁淋濁加車前臺烏藥豬苓澤瀉便澀加木通石葦萹蓄遺精加龍骨牡蠣蓮鬚蓮子燥熱加滑石石膏青蒿鱉甲盜汗加浮麥子炒牡蠣黃耆麻黃根己字號太平丸治勞證久嗽肺痿肺癰並能噙服天門冬麥門冬知母貝母款冬花杏仁各二兩當歸生地黃熟地黃黃連阿膠珠各一兩半蒲黃京墨桔梗薄荷各一兩白蜜四兩麝香少許上為細末和勻用銀石器先下白蜜煉熟後下諸藥末攪勻再上火入麝香略熬三二沸丸如彈子大每日三服食後細嚼一丸煎薄荷湯緩緩化下次噙一丸臨臥時如痰盛先用飴糖拌消化丸吞下卻噙嚼此丸仰臥使藥流入肺竅則肺清潤其嗽退除七日病痊凡一切咳嗽只服此藥立愈庚字號沉香消化丸治熱痰壅盛青礞石煅黃金色明礬飛研細豬牙皂角南星火炮半夏生白茯苓陳皮各二兩枳殼枳實各一兩半薄荷黃芩各一兩沉香五錢上為細末和勻薑汁浸神麯攪糊為丸梧桐子大每服一百丸每夜臨臥飴糖拌吞次噙嚼太平丸二藥相攻痰嗽除根辛字號潤肺膏治久嗽肺燥肺痿羊肺一具杏仁淨研柿霜真酥真粉各一兩白蜜二兩上先將羊肺洗淨次將五味入水攪黏灌入肺中白水煮熟如常服食前與七藥相間服之亦佳壬字號白鳳膏治一切久怯弱極虛憊咳嗽吐痰咳血發熱黑嘴白鴨一隻大京棗二升參苓平胃散一升陳煮酒一瓶先將鴨縛定腳量患人飲酒多少隨量以酒燙溫將鴨項割開滴血入酒攪勻飲之直入肺經潤補其肺卻將鴨干撏去毛於脅邊開一孔取其腸雜拭乾次將棗子去核每個中實納參苓平胃散末填滿鴨肚中用麻扎定以沙甕一個置鴨在內四圍用火慢煨將陳煮酒作三次添入煮乾為度然後食其棗子陰乾隨意食用參湯送下後服補髓丹則補髓生精和血順氣癸字號補髓丹一名十珍丸治久勞虛敗髓干精竭血枯氣少服前藥愈後服此藥豬脊膂一條羊脊髓一條團魚一枚烏雞一隻四味制淨去骨存肉用酒一大碗於沙甕內煮熟擂細再入後藥大山藥五條蓮肉半斤京棗一百枚柿霜十枚四味修制淨用井花水一大瓶於沙甕內煮熟擂細與前熟肉一處再用慢火熬之卻下明膠四兩真黃蠟三兩上二味逐漸下與前八味和一處擂成膏子和平胃散末四君子湯末知母黃柏末各一兩共一十兩搜和成劑如十分硬再入白蜜同熬取起放青石上用木捶打如泥丸如梧桐子大每服一百丸不拘時候棗湯下
