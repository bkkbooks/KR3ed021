body:
  text: 卷之九虛勞虛勞方論蒙莊有言精太用則竭神太勞則憊借是可以論病矣夫人所以根本此性命者氣與血也若男若女氣血均有獨不能保而有之終日役役神倦力疲飢飽越常喜怒失節形寒飲冷縱欲恣情遂使五臟氣血俱虛此五勞之所從始也六極七傷類焉故心家虛則便濁汗多肝家虛則筋攣目眩腎家虛則腰痛泄精肺家虛則咳嗽哄熱脾胃虛則嘔吐不食日就羸黃或乃胃熱消穀飲食雖多亦不生肌肉而轉加瘦悴矣前是數證其間大抵心下引脅俱疼蓋滯血不消新血無以養之也治法大要潮熱者不可過用寒涼祕結者不可驟與疏泄嗽喘者不可妄施發散咯血者不可錯認以為熱但以滋養營血為上調平臟氣次之某病某藥又於養血調氣之中而增益也其或骨間有熱以致四肢緩弱不舉此則骨痿欲斯疾之有瘳也難哉雖然當歸地黃黃耆芍藥固養血之上藥也亦當以益胃消痰輩佐之蓋人以穀氣為本所謂精氣血氣由穀氣而生古人以五味五穀五藥養其病者不無先後於其間也當歸地黃戀膈引痰黃耆芍藥多則傷胃是可膠柱調瑟而劑量輕重之不審乎抑余聞諸虛不足皆成勞倦此可療不可惡之疾也其視傳疰一種實霄壤焉傳疰者挾邪精鬼怪之氣而作也經曰人有逢年月之厄感鬼神之精無處不惡沉默而不能的知所苦積歲漸至委頓既往復傳疰於旁人須用通神明去惡氣等劑療之或者刳麝剸犀驅伐邪惡飛丹煉石引納清和蓋為尸疰設也前集咳嗽中亦略陳之又論勞倦之疾百脈空虛非滋潤黏膩之物以養之不能實也古方用鹿角膠阿膠牛乳飴糖酥酪煎蜜人參杏仁當歸熟地黃之類正此意耳或者妄施伏火金石附子燥熱等輩以致血氣乾涸心腎不交故火炎於上為痰嗽為咯血為口乾為五心熱水走於下為腳弱為遺精為赤白濁為小便滑數誤矣哉虛勞之脈大抵多弦或浮大或數皆虛勞之候也大者易治血氣未定可斂而正也弦者難治血氣已耗未易調補之若帶雙弦則為賊邪侵脾此尤難治加數劇則殆矣灸勞法膏肓二穴可以回生或肚臍相對取背脊骨對正灸亦有驗艾柱亦不可多虛勞證治十補湯方見痼冷門虛勞通用嗽加北五味子痰加半夏發熱加柴胡有汗加牡蠣虛寒加乾薑皆依原藥分兩稍不喜食則勿用雙和湯五勞六極七傷通用白芍藥二錢半當歸川芎黃耆蜜炙各一兩熟地黃洗酒蒸辣桂甘草炙各三分上粗末每服三錢薑棗煎食前服或入二陳湯同煎地骨皮散治虛勞潮熱骨蒸壯熱地骨皮洗秦艽洗去蘆柴胡枳殼制知母生當歸鱉甲醋炙黃各半兩川芎半兩甘草炙一分上粗末每服三錢桃柳枝各七寸姜三片烏梅一個同煎空心臨臥各一服潮熱甚加些大黃微利之枳殼散治虛勞大便祕澀枳殼五兩制甘草炙一兩半加杏仁去皮炒阿膠炒酥生地黃各一兩上細銼每服三錢姜五片蜜三匙烏梅一個同煎空腹服加味人參紫菀散治虛勞咳嗽人參北五味子紫菀茸陳皮貝母去心紫蘇葉桑白皮炒白茯苓各一兩杏仁去皮炒甘草炙各三分加川芎半夏曲各一兩阿膠炒酥半兩上粗末每服三錢姜七片棗二枚烏梅一個食後煎服大阿膠丸方見嗽門治虛勞嗽血咯血前血類茅蘇湯豆蘇湯薏苡湯人參湯咳嗽門用人參飲皆可煎湯嚼下肺熱加腦荷桑白皮天門冬人參芎歸湯治虛勞少血肺熱嗽血方見咳嗽門地黃飲治骨蒸勞熱咯血生地黃搗汁入薑汁少許服之以熱退為度或利則止大寧嗽湯勞嗽諸嗽通用神效北五味子茯苓桑白皮炒紫蘇細辛橘皮枳殼制杏仁去皮炒阿膠炒酥甘草炙罌粟殼去筋萼截碎蜜酒炒熱各一分半夏制二分上銼散每服三錢姜五片棗二枚烏梅半個食後煎服勞嗽多加川芎遠志丸治虛勞驚悸神氣不寧遠志薑汁醃取肉焙茯神去木黃耆炙熟地黃洗人參各一兩石菖蒲半兩當歸三分上末粟米糊丸桐子大每二十丸米飲下龍齒湯治心怔驚悸常懷憂慮如人將捕小便或少或多或濁半夏制辣桂各二兩人參白茯苓甘草炙當歸龍骨研北梗炒遠志水浸取肉炒枳殼制各一兩半黃耆蜜炙茯神去木各一兩上末每三錢姜五片棗二枚粳米百粒食前煎服養心湯吞十四友丸治虛勞少血心虛多驚精神恍惚方見驚悸門辰砂妙香散治虛勞心氣不平小便膩濁方見疸門麝香鹿茸丸治勞損虛冷精血不足方見痼冷門集驗鹿茸丸治諸虛勞倦補養心腎滋益血氣鹿茸酥炙熟地黃當歸酒浸焙枸杞子酸棗仁慢火炒去皮遠志薑汁醃取肉炒附子炮沉香牛膝酒浸焙山藥炮蓯蓉酒浸焙各一兩麝半兩上末煉蜜丸桐子大每五十丸空心鹽湯下還少丹補虛勞益心腎生精血山藥炮牛膝酒浸焙白茯苓山茱萸舶上茴香炒各一兩半續斷菟絲子洗酒浸爛研焙杜仲去粗皮薑汁塗炙截炒巴戟去心蓯蓉酒浸焙北五味子枳實遠志薑汁醃取肉焙熟地黃各一兩上末煉蜜丸桐子大每三十丸鹽湯下黃耆十補湯補虛勞養血氣黃耆蜜炙當歸酒浸焙熟地黃洗茯神各半兩白芍藥一兩人參白朮酸棗仁微炒半夏制陳皮北五味子肉桂天台烏藥甘草炙麥門冬去心各一分木香沉香各一錢上銼每服三錢姜五片棗二枚食前煎服鹿茸大補湯補虛損益氣血人參北五味子當歸白朮白茯苓熟地黃洗白芍藥黃耆炙甘草炙阿膠炒酥續斷洗半夏制山藥炮石斛酸棗仁浸去皮焙柏子仁略炒各一兩遠志酒浸取肉焙川白姜生各三分辣桂半兩鹿茸二兩去皮毛酥炙黃上細銼每服三錢半姜四片棗二枚食前煎服黃耆六一湯治虛勞自汗黃耆炙六錢甘草炙一錢加白朮白芍藥各三錢上粗末每服二錢薑棗煎服當歸散治虛汗盜汗人參當歸各一分上粗末分兩服以雄豬心一個新水煮熟取汁兩次煎藥空心臨臥服沉香鱉甲散治虛勞肢節疼痛方見身疼類參苓白朮散治虛勞胃弱飲食不進人參白茯苓白朮甘草炒山藥炮各二兩白扁豆制一兩半縮砂桔梗炒蓮子肉薏苡仁各一兩上末每二錢薑棗略煎服治中湯方見嘔吐門人參開胃湯方見脾疼門二陳湯方見瘧類可擇用桃仁煎治勞疰傳尸骨蒸倦弱大川椒出汗生犀角當歸續斷各一兩桃仁去皮炒鱉甲醋炙黃各一兩半蛤蚧一對去頭足洗酥炙木香白礬煅豬牙皂角各半兩安息香蘇合香雄黃各一分麝一錢上末煉蜜丸桐子大每二十丸米飲下或用正川椒泡湯下神授丸治傳尸勞疰最殺勞蟲正川椒色紅而大者去合口並子以黃稈紙二重託之於熱爐內頻撥令出油取頓地上用砂盆蓋以火灰遮密四周約一時許上碾末老酒浸白糕為糊丸桐子大每服三四十丸食前鹽湯下逐時常服滿一斤瘵疾自瘥昔人服之日久取下勞蟲如小蛇狀即瘥此藥亦治痹辣桂煎湯下治腰痛茴香酒下治腎冷鹽湯下神妙燒發方治癆瘵生髮燒存性為末水調空心服此亦用枕骨之意蘇合香丸方見諸氣門皆要藥也黃耆益損湯治諸虛勞倦肉桂熟地黃半夏制甘草炙各三分石斛酒炒當歸川芎黃耆炙白朮各一兩白芍藥一兩半北五味子半兩木香三錢半上銼細每服三錢姜五片棗二枚食前煎服有熱加柴胡附諸方補陰丸明醫雜著論曰人之一身陰常不足陽常有餘況節欲者少過欲者多精血既虧相火必旺火旺則陰愈消而癆瘵咳嗽咯血吐血等證作矣故宜常補其陰使與陽齊則水能制火而水升火降斯無病矣故丹溪先生髮明補陰之說謂專補左尺腎水也古方滋補藥皆兼補右尺相火不知左尺原虛右尺原旺若左右平補依舊火勝於水只補其左制其右庶得水火俱平也右尺相火固不可衰若果相火衰者方宜補火但世之人火旺而致病者十俱八九火衰成疾者百無二三且人在少年腎水正旺似不必補然欲心正熾妄用太過至於中年欲心雖減然少年斫喪既多焉得復實乃至老年天真漸絶只有孤陽故補陰之藥自少以至老不可缺也丹溪先生髮明先聖之旨以正千載之訛其功其哉今立補陰丸方備加減法於後黃柏去皮酒拌炒褐色知母去皮毛酒拌炒忌鐵各三兩鎖陽酥炙乾二兩敗龜板酥炙透三兩熟地黃酒拌蒸忌鐵五兩五味子一兩枸杞子甘州者天門冬去心白芍藥酒炒各二兩乾薑炒紫色三錢寒月加至五錢上為細末煉淨蜜和入豬骨髓三條和藥末杵極勻丸梧子大每服八九十丸空心淡鹽湯送下寒月可用溫酒若有夢遺精滑病者加牡蠣童便煅七次白朮各一兩山茱萸去核椿根白皮炒過各七錢若有赤白濁病者加白朮白茯苓各二兩半山梔仁黃連炒各五錢若有軟弱無力者加牛膝酒洗二兩虎脛骨酥炙透二兩防己酒浸洗木瓜各五錢若有疝氣病者加蒼朮鹽炒一兩半黃連生薑汁炒山梔子仁炒各六錢川芎一兩吳茱萸炒青皮去瓤各五錢若脾胃虛弱胃寒易泄者加白朮三兩陳皮一兩乾薑炒加至七錢若眼目昏暗者加當歸酒洗川芎菊花各一兩柴胡黃連酒炒烏犀各五錢蔓荊子防風各三錢若兼氣虛之人加人參黃耆蜜炙各二兩若左尺既虛右尺亦微命門火衰陽事不舉加黑附子小便浸炮去皮肉桂去皮各七錢沉香五錢加減補陰丸熟地黃八兩菟絲子四兩鹽酒浸一宿當歸三兩酒浸白芍三兩炒鎖陽三兩酥炙杜仲二兩炒牛膝四兩酒浸破故紙枸杞一兩半虎骨二兩酥炙龜板三兩酥炙黃柏二兩炒山藥人參黃耆各二兩冬加乾薑一兩上為末豬骨髓入蜜丸梧子大空心服一百丸鹽湯下虎潛丸治痿與補腎丸同黃柏半斤酒炒龜板四兩酒炙知母二兩酒炒熟芐陳皮白芍藥各二兩鎖陽一兩半虎骨一兩炙乾薑半兩上為末酒糊丸或粥丸一方加金箔一片一方用生地黃懶言語加山藥加炒黃柏知母炙龜板各等分乾薑三分之一酒糊丸名補血丸一方無干姜冬月方加有當歸一兩半熟芐比前多一兩余同六味地黃丸金匱方治形體瘦弱無力多困腎氣久虛久新憔悴寢汗發熱五臟齊損遺精便血消渴淋濁等證婦人血虛無子者服之有效乾山藥山茱萸肉各四兩澤瀉去毛牡丹皮去心白茯苓去皮各三兩熟芐八兩上為末煉蜜為丸梧子大每服五六十丸空心白湯下寒月溫酒下如腎虛有飲作痰喘生薑湯下八味丸治腎氣虛乏下元冷憊臍腹疼痛夜多旋溺腳膝緩弱肢體倦怠麵皮萎黃或黧黑及虛勞不足渴欲飲水腰重疼痛小腹急痛小便不利方見痼冷門山藥丸和劑方治諸虛百損五勞七傷肌體消瘦耳聾目暗常服壯筋骨益腎水方見漏濁門四君子湯和劑方補氣和胃進食白朮人參茯苓甘草各等分上㕮咀水煎服四物湯和劑方補血和血調經當歸白芍藥芎藭地黃婦人用生男子用熟上㕮咀水煎服八物湯平補氣血調和陰陽白朮人參茯苓甘草白芍當歸地黃川芎上㕮咀水煎服黃耆建中湯和劑方治男子婦人諸虛不足羸乏少力此藥大生血氣補益營衛方見虛汗門人參養榮湯治男婦血虛短氣痿弱有汗潮熱等證人參白朮茯苓甘草炙川歸黃耆肉桂白芍藥炒遠志去心五味子熟地黃陳皮各等分上㕮咀水二鍾姜三片煎服加味補中益氣湯治動作勞倦可服人參一錢黃耆七分甘草四分白朮一錢當歸酒洗一錢二分陳皮去白一錢柴胡去蘆五分升麻三分麥門冬七分制去心天花粉五分黃柏七分酒鹽炒黃芩五分酒浸上㕮咀用水二鍾煎至一鍾去滓溫服加味虎潛丸治諸虛不足腰腿疼痛行步無力壯元陽滋腎水熟地黃酒洗八兩黃柏蜜炒褐色人參黃耆蜜炙當歸酒洗破故紙炒鎖陽酒洗龜板酥炙茯苓各二兩杜仲酥炙斷絲牛膝酒洗菟絲子酒浸蒸知母酒炒虎脛骨酥炙各二兩山藥炒枸杞子炒芍藥酒炒各三兩上為細末煉蜜和豬脊髓為丸如梧桐子大每服五六十丸空心鹽