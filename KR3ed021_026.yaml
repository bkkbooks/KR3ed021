二錢以車前子葉煎湯調下又方海金砂為細末新汲水調下五淋散夾五苓散竹園尿門冬草燈心蔥頭煎湯調下法制香附方治諸下血大香附杵去毛皮以童子小便浸一日夜曬乾截碎又用米醋蘸過焙乾上為末每二錢米湯調下治冷帶用炒艾葉煎湯調下又方淨香附酒醋各半煮透焙上為末黃秫米糊丸桐子大每四五十丸米湯下又方治血下帶下香附杵去皮二分童尿浸一日夜艾葉三分米醋煮透曬焙上為末秫米糊丸桐子大每五六十丸艾醋湯或醋湯下燒鹽酒治血閉腹痛産後淤血腹痛新布數重包裹白鹽一合炭火燒存性上研細末溫酒調下新布即青麻也能逐淤血桂枝酒治打撲傷墜淤血溷悶身體疼痛辣桂上為末每二錢溫酒調下或用辣桂一分大黃當歸各半分每三錢生薑紫蘇煎服取下黑物即安或未有藥倉猝且服米醋一小盞亦散淤血硃砂丸治打撲驚杵血入心竅不能語言硃砂為細末上以雄豬心生血和丸麻子大曬乾每服七丸石菖蒲煎湯下棗湯亦可咯血方天門冬去心青黛曬乾各四錢生蒲黃川薑黃油發灰各一錢上末煉蜜丸桐子大每五十丸入松陽柿中濕紙包煨香候冷桑白皮煎湯臨臥嚼下柿能戀肺咯血屬肺嘔血屬脾九竅出血方荊芥酒煎通口服又方暴驚風九竅血其脈虛者靈砂百粒分三次人參煎湯下此證不可錯認血得熱則宣流妄用涼藥誤矣又方治傷寒嘔血繼而齒縫皆流血不止開口川椒四十九粒上用法醋大盞同煎臨熟入白礬少許漱口含在口中少頃吐出再啜漱而含和濟芎歸湯治諸血作痛血暈沉迷血澀難産一切出血過多川芎當歸等分上為粗散每服三錢水盞半取一盞稍熱服不拘時加縮砂治胎動腹痛漏血又名芎藭湯膠艾湯治勞傷血氣月水過多淋瀝漏下連日不斷臍腹疼痛經血淋瀝不斷熟乾地黃白芍藥各四兩當歸去蘆頭艾葉微炒各三錢阿膠搗碎炒令黃燥芎藭甘草炙各二兩上為粗末每服三錢水一盞酒六分煎至八分去滓熱服空心食前日三服病甚者連夜並服産寶固經丸赤石脂煅艾葉補骨脂炒木賊各半兩附子炮一枚上末陳米飲和丸梧桐子大每服五十丸食前溫酒送下澤蘭丸治氣血不調肢體瘦弱熟乾地黃一兩半澤蘭去大枝梗人參去蘆頭黃耆去蘆頭銼牛膝去蘆酒浸一宿焙赤石脂各一兩白茯苓去皮木香萆薢酒浸一宿銼附子炮去皮臍續斷各三分乾薑炮肉桂去粗皮芎藭白朮當歸去蘆酒浸一宿銼碎微炒甘草炙微赤各半兩上為末煉蜜丸如梧桐子大每服三十丸溫米飲下空心食前産一百日內每日常服壯氣益血當歸建中湯治婦人一切血氣虛損方見虛汗門和劑大阿膠丸方見咳嗽門理中湯治胸脅逆冷心腹㽲痛方見泄瀉門和劑來復丹配類陰陽扶虛補損治心腹冷痛小兒慢驚風或吐利不止變成虛風搐搦者非風也胃氣欲絶故也用五粒研碎米飲送下老人伏暑迷悶紫蘇湯下婦人産後血逆上搶悶絶並惡露不下及赤白帶下並用醋湯下常服和陰陽益精神散腎陰濕止腹脅冷疼應諸疾不辨陰陽證並宜服之方見暑門震靈丹方見濕門和劑黑錫丹升降陰陽暖脾補腎氣衝胸腹膨脹刺痛方見痼冷門和劑金液丹固其氣治衄血方見脾胃類養正丹治婦人血氣帶下腹痛助陽接真升降陰陽方見痼冷門小烏沉湯調中快氣治心腹刺痛烏藥一兩去心香附子沙盆內淅去皮毛焙乾稱二兩甘草一分上為細末每服一錢鹽少許或不著鹽沸湯點不拘時參苓白朮散方見虛勞門附諸血諸血方論內經曰大怒則形氣絶而菀於上又曰怒則氣逆甚則吐血又曰陽明厥逆喘咳身熱善驚衄吐血又曰濕淫汗出為鼽衄又曰脾移熱於肝則為驚衄胞移熱於膀胱則癃而溺血又曰結陰者便血一升再結二升三結三升劉宗厚曰經云榮者水穀之精也和調五臟灑陳於六腑乃能入於脈也源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎灌溉一身目得之而能視耳得之而能聽手得之而能攝掌得之而能握足得之而能步髒得之而能液腑得之而能氣是以出入升降濡潤宣通者由此使然也注之於脈少則澀充則實常以飲食日滋故能陽生陰長取汁變化而赤為血也生化旺則諸經特此而長養衰耗竭則百脈由此而空虛可不知謹養哉故經曰一息不運則機緘窮一毫不續則穹壤判若夫失於調護者或暴喜傷心暴怒傷肝勞役太過飲酒墜墮積熱三焦以致陰火沸騰血從火起故錯經妄行而出諸竅是以從肺而上溢於鼻者曰衄血從胃而上溢於口者曰嘔血咯血唾血者出於腎也咳血嗽血出者出於肺也痰中帶血絲而出者或從腎或從肺來也又有血從毛孔出者曰肌衄血從齒出者曰牙宣其血出於小便來者曰溺血曰血淋出於大便者曰腸風痔血糞前來者曰近血糞後來者曰遠血流結於腸胃之間而成積者曰血瘕血蔑大抵血從下流者為順易治血從上溢者為逆難治丹溪曰口鼻出血皆是陽盛陰虛有升無降血隨氣上而出上竅法當補陰抑陽氣降則血歸經矣夫治血必血屬之藥欲求血藥其四物之謂乎河間謂隨證輔佐謂之六合湯者詳言之矣余故陳其氣味專司之要不可不察如川芎血中氣藥也通肝經性味辛散能行血滯於氣也地黃血中血藥也通腎經性味甘寒能生真陰之虛也當歸分三治血中主藥也通肝經性味辛溫全用能活血各歸其經也芍藥陰分藥也通脾經性味酸寒能和血治虛腹痛也若求陰藥之屬必於此而取則焉脾胃論有云若善治者隨證損益摘其一二味之所宜為主治可也此特論血病而求其血藥之屬也若氣虛血弱又當從長沙血虛以人參補之陽旺則生陰血也若四物者獨能主血分受傷為氣不虛也輔佐之屬若桃仁紅花蘇木血竭牡丹皮者血滯所宜蒲黃阿膠地榆百草霜棕櫚灰者血崩所宜乳香沒藥五靈脂凌霄花者血痛所宜肉蓯蓉瑣陽牛膝枸杞子益母草夏枯草敗龜板者血虛所宜乳酪血液之物血燥所宜乾薑桂者血寒所宜生地苦參血熱所宜特取其證治大略耳夫人生之血賴氣升降氣升則升氣降則降氣逆則逆氣和則和氣濁則亂如此失血豈不皆由氣濁遇熱妄行之所致也大抵治血莫先清熱氣清則血和氣濁則血亂斯言信矣大凡失血當先辨其血出何經當用此經清氣之藥然後涼血審其虛實調治之東垣云傷寒家衄血者仲景言不可發汗蓋為脈微也若浮緊者麻黃湯浮緩者桂枝湯脈已微者二藥俱不可用宜黃芩芍藥湯主之經曰諸見血身熱脈大者難治是火邪勝也身涼脈靜者易治是正氣復也故脈訣云鼻衄吐血沉細宜忽然脈大即傾危此之謂也犀角地黃湯治傷寒汗下不解鬱於經絡隨氣湧泄為衄血或溝道閉塞流入胃腹吐出清血如鼻衄吐血不盡余血停留致面色痿黃大便黑者更宜服之方見聲音門木香理中湯甘草乾薑湯治男婦飲食傷胃虛寒嘔吐衄血小柴胡湯茅蘇湯人參湯蘿蔔湯血餘散治諸嘔吐血方見前氣血門三黃補血湯治初見血及血多宜服熟地一錢生地五分當歸川芎各七分半柴胡黃耆牡丹皮各五分升麻芍藥二錢上以水煎服血不止可加桃仁五分酒大黃斟酌虛實用之內卻去柴胡升麻人參飲子治脾胃虛弱氣促氣弱精神短少衄血吐血人參去蘆三分黃耆一錢五味子五個白芍藥甘草各一錢當歸身三分麥門冬二分上件為粗散分作二服每服水一盞八分煎至一盞去滓稍熱服麥門冬飲子拔粹方治脾胃虛弱氣促氣弱精神短少衄血吐血方見內傷門歸脾湯治思慮傷脾不能統攝心血以致反行或吐血下血方見驚悸門是齊白朮散簡易方治積熱吐血咳血若因飲食過度負重有傷脾胃而吐血者最宜服之惟忌食熱面煎爆一切發風之物白朮二兩人參去蘆白茯苓去皮黃耆蜜浸各一兩山藥百合去心各七錢半甘草炙半兩柴胡前胡各二錢半上㕮咀每服三錢水一鍾姜三片棗一枚煎六分溫服黃連解毒湯三黃丸治積熱吐血咽膈不利並見火門龍腦雞蘇丸治膈熱咳嗽或吐血衄血方見積熱門茯苓補心湯治心虛為邪氣所傷吐血方見虛勞門四生丸良方治吐血衄血陽盛於陰血熱妄行生荷葉生艾葉生柏葉生地黃各等分上研爛丸如雞子大每服一丸水三鍾煎至一鍾濾過溫服藕汁散濟生方治吐衄不止生藕汁生地黃汁大薊汁各三合生蜜半匙上件藥汁調和令勻每服一小鐘不拘時候雙荷散聖惠方治猝暴吐血藕節七個荷葉頂七個上同蜜擂細水二鍾煎八分去滓溫服或研末蜜調下枇杷葉散治暑毒攻心嘔吐鮮血方見中暑門側柏散治內損吐血下血因酒太過勞傷於內血氣妄行其血如湧泉口鼻皆流須臾不救服此即安又治男子婦人九竅出血人參去蘆荊芥穗燒灰各一兩側柏葉蒸乾一兩五錢上為末每服三錢入飛羅面三錢拌和汲水調黏相似啜服一方治飲酒過多蘊熱胸膈以致吐血衄血葛花二兩黃連四兩上為末以大黃末熬膏子丸如梧桐子大每服一百丸溫湯下或煎服亦可衄血丹溪云涼血行血為主大抵與吐血同犀角地黃湯入鬱金黃芩升麻煎服金液丹和劑方固真氣治衄血方見氣血門生地黃散河間方治鬱熱衄血或咯吐血皆治之枸杞柴胡黃連地骨白芍甘草天門冬黃芩黃耆生地熟地各等分上㕮咀水煎服若下血加地榆茜根散黃芩芍藥湯治鼻衄不止方並見鼻門鼻通於腦血上溢於腦所以從鼻而出凡鼻衄並以茅花調止衄散時進折二泔仍令以麻油滴於鼻或以蘿蔔汁滴入亦可又茅花白芍藥對半尤好外迎法以井花水濕紙頂上貼之左鼻衄以線扎左手中指右出扎右手中指俱出兩手俱扎或炒黑蒲黃吹鼻中或龍骨末亦可止衄散黃耆六錢赤茯苓白芍藥當歸生芐阿膠各三錢上為末每服二錢食黃耆湯調下麥門冬飲治鼻衄川芎三黃散治實熱衄血並見鼻門清肺飲試效方治衄血吐血久不愈者五味子十個麥門冬當歸身人參生地黃各五分黃耆二錢上㕮咀作一服水二鍾煎至一鍾去滓食後溫服用三稜針氣街出血立愈一方治鼻衄不止用茅花塞鼻中外用茅花濃煎湯服咯唾血咯唾血者由於腎也又有淤血內積肺氣壅遏不能下降用天門冬麥門冬知母貝母桔梗黃柏熟地黃遠志百部或加乾薑丹溪云痰帶血絲出者用薑汁青黛童便竹瀝入血藥中用如四物湯加地黃膏牛膝膏之類主之阿膠丸治肺破嗽血唾血方見前氣血門一方治痰中見血牡丹皮白朮各一錢五分當歸芍藥桃仁研貝母各一錢山梔炒黑黃芩各八分桔梗七分甘草三分青皮五分上以水煎服又方治痰中血牡丹皮白朮各一錢五分貝母芍藥桑白皮桃仁研各一錢甘草三分山梔炒黑一錢一分上以水煎服又方治痰中血橘紅二錢五味十五個甘草三分人參五分半夏茯苓白朮枳殼桑白皮黃芩各一錢上以水一鍾姜三片煎服或加青黛二錢雞蘇散濟生方治勞傷肺經唾內有血咽喉不利雞蘇葉黃耆生地黃洗淨阿膠貝母去心白茅根各一兩麥門冬去心桔梗去蘆甘草炙各五錢上㕮咀每服四錢水一鍾姜三片煎七分溫服黃連阿膠丸濟生方治勞嗽血唾血方見咳嗽門咳嗽血丹溪云火升痰盛身熱多是血虛用青黛栝蔞仁訶子貝母海石山梔子為末蜜同薑汁丸噙化嗽盛者加杏仁後以八物湯加減調理痰盛者更加痰藥主之大阿膠丸局方治嗽血咯血金沸草散治肺熱嗽血並見咳嗽門茯苓補心湯治心氣虛耗不能藏血以致面色黃瘁五心煩熱咳嗽唾血及婦人懷孕惡阻嘔吐宜治之方見虛勞門人參芎歸湯治虛勞少血津液內耗心火自炎燥熱乘肺咳嗽咯血及血不榮肌動輒毛寒咳嗽方見咳嗽門雞蘇丸拔粹方治虛熱昏冒倦怠下虛上壅嗽血衄血黃耆防風荊芥各一兩雞蘇葉八兩即金錢薄荷桔梗川芎甘草菊花生地黃各半兩片腦五分上為末煉蜜丸如彈子大每服一丸用麥門冬去心煎湯送下牙宣血戴氏曰牙宣有二證有風壅牙宣有腎虛牙宣風壅牙宣消風散擦之仍服腎虛牙宣以腎主骨牙者骨之餘虛而上炎故宣服涼劑而愈甚者此屬腎經下虛上盛宜鹽湯下安腎丸間黑錫丹仍用薑鹽炒香附黑色為末揩擦其妙不可言也消風散方見傷風門安腎丸方見水飲門黑錫丹方見痼冷門肌衄巢氏曰肝藏血心之液為汗言肝心俱傷於邪故血從膚腠而出也名曰肌衄一方治肌衄用男胎髮燒灰庵之立效溺血巢氏云心主於血與小腸合若心家有熱結於小腸故小便血也血虛者四物湯加牛膝膏實者當歸承氣湯下之琥珀散治尿血增味導赤散治血淋尿血瞿麥湯姜蜜湯五苓散並治小便尿血方並見諸淋門小薊飲子治下焦結熱血淋尿血生芐小薊滑石通草淡竹葉蒲黃炒藕節當歸酒浸梔子炒甘草炙各半兩上用水煎空心服當歸承氣湯當歸厚朴枳實大黃芒硝上銼水煎便血大便下血者皆由五臟傷損所為臟氣既傷則風邪易入積熱在內而大便下血治宜四物湯加炒山梔升麻秦艽阿膠虛者加乾薑溫散之法制香附方治諸下血方見氣血門黃連香薷飲治伏暑純下鮮血方見暑門敗毒散治風熱流入大腸經下血不止方見中寒門胃風湯治風濕乘虛入於腸胃或下淤血方見痢門當歸和血散治腸癖下血濕毒下血槐花青皮各六錢當歸身升麻各二錢荊芥穗熟地黃白朮各六分川芎四分上為末每服二三錢清米飲調下一方治中毒下血用蝟皮燒存性研細每服二錢水調下日進三服腸風下血方別有腸風門類故不載矣拾遺腋氣方明白礬黃丹入麝少許末之敷又方白礬研飛過臨臥以紙襯棹上伸手托壁柱以礬擦腋下令熱痛即換衣著舊衣用灰汁洗又方好緑礬半生半煅為細末入少輕粉研細每半錢匕浴後以生薑汁調擦候十分熱痛即止又方治腋下遺臭不可向邇大蜘蛛一個以黃泥入少赤石脂並鹽杵為窠子納裹蜘蛛燒令通紅候冷取蜘蛛研細入輕粉一字米醋調膏臨臥浴淨敷之腋下來早瀉黑汁惡物為效埋之僻處又方夜明砂為末用豉汁調敷跌破出血方烏賊魚骨細末敷亦治湯火傷爛頭破傷風方大南星末水調塗四圍水出為效失缺頰骨差方恣酒令醉通關散入鼻嚏即止腳筋冷縮頑痹方大川椒去肉二分炒出汗辣桂川白姜華陰細辛各一分上為末酒麵糊丸桐子大每七十丸食前溫酒下附諸雜方體氣方田螺散治體氣患此疾者因內有油濕是用大田螺一枚水中養之俟厴開以巴豆一粒去殼將針挑巴豆放在內取去拭乾仰傾盞內夏月一宿冬月五七宿自然成水取搽腋下絶根一方先用胭脂搽腋下其出狐臭之處黃色就將前說巴豆田螺去厴掩於狐臭之上絹帛勒緊其狐臭以大便出則絶根矣一方用熟蒸餅一個擘開作兩邊摻密陀僧細末一錢急夾在腋下略睡少時候冷熱之除根附倒倉法倒倉法治癱勞蠱癩等證推陳致新扶虛補損可吐可下用黃色肥牯牛腿精肉二十斤或十五斤順取長流急水於大鍋內煮候水乾少再添湯不可用冷水以肉爛成粥為度濾去滓用肉湯再熬如琥珀色隔宿不吃晚飯大便祕者隔宿進神芎丸不祕者不用五更於密室不通風處溫服一鍾伺隔間藥行又繼續服至七八鍾病人不欲服強再與之必身體皮毛皆痛方見吐下寒月則重湯溫之病在上欲吐多者須緊服又不可太緊恐其不納病在下欲利多者須疏服又不可太疏恐其不達臨時消息大抵先見下方可使吐須極吐下伺其上下積俱出盡在大便中見如胡桃肉狀無臭氣則止吐利後或渴不得與湯其小便必長取以飲病者名曰輪回酒與一二碗非惟可以止渴抑亦可以滌蕩余垢睡一二日覺飢甚乃與粥淡食之待三日後始與少菜羹自養半月覺精神煥發形體輕健沉疴悉安矣大概中間飲至七八鍾時藥力經涉經絡骨節搜逐宿垢正邪寧不抵牾悉有急悶似痛非痛自然惡況此皆好消息邪不能勝正將就擒耳尤須寧耐忍受又於欲吐未吐欲泄未泄交作皆有惱聒意思皆須歡喜樂受一以靜處之此等有大半日景象不先說知使方寸瞭然鮮有不張皇者矣未行此法前一月不可近婦人已行此法半年不可近婦人五年不可吃牛肉性急好淫不守禁忌者皆不可行此法倒倉全在初起三鐘慢飲最緊要能行經隧中去丹溪曰腸胃為市以其無物不有而谷為最多故曰倉倉積穀之室也倒者傾去積垢而滌濯使之潔淨也經曰胃為受盛之官故五味入口即入於胃留毒不散積聚既久致傷沖和諸病生焉今用黃牯牛肉其義至矣夫牛坤土也黃土之色也以順為德而效法乎健以為功者牡之用也肉者胃之藥也熟而為液無形之物也橫散入肉絡由腸胃而滲透肌膚毛竅爪甲無不入也積聚久則形質成依附腸胃回薄曲折處以為棲泊之窠臼阻礙津液氣血重蒸燔灼成病自非剖腸刮骨之神妙孰能去之又豈合勺銖兩之丸散所能窺犯其籓牆戶牖乎夫牛肉全重厚和順之性潤枯澤槁豈有損也其方出於西域之異人人於中年後行一二次亦卻疾養壽之一助也附取吐方獨聖散治中風痰迷心竅癲狂煩亂人事昏沉痰涎壅盛及治五癇心風等證瓜蒂不拘多少上為細末每服一錢以齏汁調下四靈散治證同前瓜蒂一錢人參蘆二錢赤小豆甘草各一錢半上為細末每服一二錢或少至半錢量情與之食後齏汁調下四玄散治證同前緑礬赤小豆豬牙皂角不蛀者去皮弦炙明礬二錢蔥管藜蘆五錢上為細末每服半錢或一二錢漿水調下如牙關緊閉斡開灌之魚骨鯁方魚骨鯁用砂糖白炭皮末紫蘇葉滑石末和丸含口中津液咽下骨自隨下一方治魚刺骨鯁在喉內用山楂樹獨根向下者與玉簪花根同搗取自然汁用匙或竹筒盛汁送入口內不可著牙著牙皆化纍驗附自縊法凡自縊高懸者徐徐抱住解繩不得截斷上下安被臥之以一人腳踏其兩肩手挽其發常令弦急勿使緩縱一人以手按據胸上數摩動之一人摩捋臂脛屈伸之若已強直但漸屈之並按其腹如此一時頃雖得氣從口出呼吸眼開仍引按不住須臾以少桂湯及粥清灌令喉潤漸漸能咽乃止更令兩人以管吹其兩耳此法最好無不活者自旦至暮雖冷亦可救自暮至旦陰氣盛為難救爾附救凍死法凡四肢直口噤只有微氣者用大釜炒灰暖以囊盛尉心上冷即換之目開氣出然後以粥清稍稍進之若不先溫其心便將火炙則冷氣與火爭必死孫真人救落水法醫方大成急解去死人衣帶艾灸臍中即活一方治瘋狗咬用小兒胎髮炒新香附子野菊花研細酒調服盡醉
