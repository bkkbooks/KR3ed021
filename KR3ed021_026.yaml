分通口服立生如神附産後諸方王節齊曰凡婦人産後陰血虛陽無所依而浮散於外故多發熱治法用四物湯補陰血而以炙乾姜之苦溫從治收其浮散使歸依於陰然産後脾胃虛多有過服飲食傷滯而發熱者誤作血虛則不效矣但遇産後發熱者須審問服何飲食有無傷積胸膈飽悶噯氣惡食泄瀉等證只作傷食治之若發熱而飲食自調者方用補血證法産後無得令虛當大補氣血為先雖有雜證以末治之一切病多是血虛皆不可發表産後中風切不可作風治必大補氣血為主然後治痰當以左右手之脈分其血氣多少而治産後中風口眼喎斜切不可服小續命湯産後水腫必用大補氣血為主少佐蒼朮茯苓使水自利産後大發熱必用乾薑輕者用茯苓淡滲其熱一應寒苦並發表之藥皆不可用産後發熱惡寒皆屬血虛左手脈不足補血藥多於補氣藥惡寒發熱腹痛者當去惡血腹滿者不是産後發熱乳汁不通及膨者無子當消用麥蘖二兩炒研細末清湯調下作四服有子者用木通通草豬蹄煎服凡産後有病先固正氣前條云産後大熱必用乾薑或曰用姜者何也此熱非有餘之熱乃陰虛生內熱耳故以補陰藥大劑服之且乾薑能入肺和肺氣入肝分引血藥生血然不可獨用必與補陰藥同用此造化自然之妙非天下之至神孰能與於此乎産後脈洪數産前脈細小澀弱多死懷孕者脈主洪數已産而洪數不假者多主死一方産後補虛人參白朮各一錢茯苓歸身尾陳皮川芎各半錢甘草炙三分有熱加黃芩一錢生薑三片水煎服産後消血塊方滑石三錢沒藥血竭各二錢如無牡丹皮代之上為末醋糊丸如惡露不下以皮湯下瓦壠子能消血塊又方治産後泄瀉黃芩白朮川芎茯苓乾薑滑石陳皮炒芍藥甘草炙上㕮咀水煎服又方治産後惡露不盡小腹作痛五靈脂香附一方加蛤粉上為末醋糊丸甚者入桃仁不去尖用參朮膏治産後胞損成淋瀝證人參二錢半白朮二錢桃仁陳皮茯苓各一錢黃耆一錢半甘草炙五分上㕮咀水煎豬羊胞後入藥作一服奪命丹濟生方治産後血入衣中脹滿衝心久而不下或去血過多肺氣喘促謂之孤陽絶陰亦難治之證宜急取鞋底炙熱小腹上下尉之次進此藥附子炮去皮臍半兩牡丹皮去心乾漆炒令煙盡各一兩上為末用酸醋一升大黃末一兩同熬成膏和藥丸如梧桐子大每服五十丸溫酒送下花蕊石散治産後胎衣不下極有神效方見跌撲門返魂丹治生産一十六證一名益母丸野天麻一名益母草方梗四五月節間開紫花時採花葉子陰乾半斤木香五錢赤芍藥六錢當歸七錢上同為末煉蜜丸如彈子大每服一丸隨飲子下子死腹中冷痛小便流出腹脹四肢冷爪甲青黑童便酒和勻煎沸化下産後惡血不盡臍腹刺痛童便和酒化下産時面垢顏赤胎衣不下敗血自下如帶或橫生不順心悶欲死童便酒薄荷自然汁和勻化下鹽酒亦可産後三四日起臥不得眼暗生花口乾煩躁心亂見鬼狂言不省人事童便酒薄荷汁下産後煩渴呵缺不思飲食手足麻疼溫米飲下産後浮腫氣喘小便澀咳嗽噁心口吐酸水脅痛腰痛無力酒下産後寒熱如瘧臍腸作痛米湯下桂枝湯亦可産後中風牙關緊急半身不遂失音不語童便和酒下産後大便祕心煩口渴童便酒化下薄荷自然汁亦可産後痢疾月未滿食冷物與血相擊或有積棗湯化下産後身體百節疼痛溫米飲下産後崩中蓋是傷酸物狀如雞肝脊背悶倦糯米秦艽湯下桂枝湯下亦可産後食熱面壅結成塊四肢無力睡後汗出不止月水不調久成骨蒸勞童便和酒下産後嘔逆虛脹酒下産後鼻衄口乾舌黑童便酒下産後赤白帶下秦艽同糯米煎湯下黑神散和劑方治婦人産後惡露不盡胎衣不下血氣攻心眩暈等證黑豆炒半斤熟地黃當歸酒浸去蘆肉桂去皮乾薑炮甘草炙芍藥蒲黃各四兩濟生方除蒲黃加附子上為末每服二錢熱酒調下清魂散濟生方治産後血暈昏不知人更宜先取乾漆或漆器燒煙鼻中熏之頻置醋炭房內次進此藥澤蘭葉人參去蘆一兩荊芥穗四兩甘草炙八錢川芎二兩上為末每服二錢熱湯溫酒各半盞調勻灌下愈風散聖惠方療産後中風不省人事口噤牙緊手足瘛瘲如角弓狀口吐涎沫亦治血暈四肢強直或築心眼倒吐瀉欲死荊芥穗略焙當歸身尾各等分上為末每服三錢豆淋酒調下用童子小便亦可其效如神口噤者斡開灌之或吹鼻中皆效一方用蜜丸或麵糊丸如梧子大每服五十丸空心米湯下人參湯永類鈐方治産後諸虛不足發熱盜汗人參去蘆歸身上等分為末豬腰子一雙去膜切作片以水三升糯米半合蔥二莖煮米熟取清汁一盞入藥二錢煎至八分不拘時服黃龍湯大全良方治婦人寒熱頭痛默默不欲食脅下痛嘔逆痰氣及産後傷風熱入胞室寒熱如瘧並經水時來時斷病後勞後餘熱不解柴胡四錢八分黃芩人參甘草各一錢八分上作一服用水二盞煎至一盞去滓溫服不拘時服漢防己散大全良方治産後風虛氣壅上攻頭面浮腫漢防己豬苓枳殼桑白皮各一兩商陸甘草各七錢半上㕮咀每服八錢水一盞半生薑三片煎至八分去滓溫服無時一方空心服參蘇飲聖惠方治婦人産後血入於肺面赤發腫欲死者人參一兩為末蘇木二兩捶碎上用水二碗煮取一碗去滓調人參末隨時加減服玉露散大全良方治産後乳脈不行身體壯熱疼痛頭目昏痛大便澀滯悉能治之涼膈壓熱下乳人參白茯苓甘草各半兩桔梗炒川芎白芷各一兩當歸二錢半芍藥七錢半上㕮咀每服四錢水一鍾半煎至七分去滓溫服食後如頭熱甚大便祕加大黃二錢半湧泉散治因氣乳汁少瞿麥穗麥門冬去心王不留行緊龍骨穿山甲炮黃各等分上為細末每服一錢熱酒調下先食豬蹄羹後服藥以木梳左右乳上梳三十餘下日三服豬蹄湯淡寮方治奶婦氣少力衰脈澀不行絶乳汁豬蹄七孔者一隻通草五兩上將豬蹄淨洗依食法事治次用水一斗同通草浸煮得四五升取汁飲之歌曰婦人吹乳意如何皂角燒灰蛤粉和熱酒一杯調八字須臾揉散笑呵呵理中湯方見中寒門蘇合香丸方見咳嗽門四物湯方見調經類論崩中帶下下部出血不止謂之崩中穢液常流謂之帶下崩中失血多因衝任虛損營道受傷得之冷帶雜下多因下焦不固內挾風冷得之是固然爾然崩中者投以當歸川芎香附諸黑藥之屬血暫止而終不止帶下者投以熟艾餘糧牡蠣海螵蛸之類帶暫歇而終不歇其故何哉經曰衛氣者所以溫分肉充皮膚肥腠理司開闔衛氣若虛則分肉不溫皮膚不充腠理不肥而開闔失其司耳況胃為血海水液會焉胃者中央之土又所以主肌肉而約血水也衛氣與胃氣俱虛則肌弱而膚空血之與水不能約制是以涓涓漏卮休作無時而不暫停矣然則封之止之其可不加意於固衛厚脾之劑乎此桂枝附子湯以之固衛見活人書而人參白朮茯苓草果丁香木香以之厚脾二者俱不可缺也雖然酒家嗜好炙爆亦有協熱而下血者此則黃連丸輩所不可無肺經脈微亦主帶下此則草果白朮雖可燥水亦須以阿膠佐之若夫帶之為患出於風冷停宿官桂乾薑細辛白芷先與散其寒邪然後為之封固所貴擇之精而用之審云一應婦人大小産及諸下血新瘥未得經久遽觸房事皆作崩中漏下二帶之疾又有月事久閉才得一通下部為風邪所搏致使敗淤出而未盡亦作崩中漏下黃水或粉紅滲漏無時其崩中下血不止者震靈丹三粒陳米並香附煎湯食前送下又方人參白朮炮乾薑炒甘草製半夏縮砂香附木香等分薑棗煎服又方圓白半夏銼碎以薑汁和麵捏餅包裹炙令香熟去面取半夏末之糯米稀糊丸麻子大每服五十丸芎歸湯沉香降氣湯各半食空送下此皆止血之聖藥附諸方膠艾湯和濟方治勞傷血氣衝任虛損月水過多淋瀝不斷及妊娠調攝失宜胎氣不安或因損動漏血傷胎並宜服之阿膠芎藭甘草炙各二兩當歸艾葉炒各三兩熟乾地黃白芍藥各四兩上㕮咀每服三錢水一盞酒半鍾煎八分熱服當歸芍藥湯東垣方治婦人經脈漏下不止其色鮮紅飲食減黃耆橘皮熟地黃各半兩蒼朮白朮當歸白芍藥各一錢炙甘草柴胡生地黃各二分上㕮咀煎服空心食前柴胡調經湯試效方治經水不止鮮紅項筋急腦痛脊骨強痛不思飲食羌活蒼朮各一錢獨活藁本升麻各半錢柴胡七分乾葛當歸甘草各三分紅花少許上㕮咀水煎去滓空心稍熱服取微汗立止艾煎丸治崩傷淋瀝不已小腹滿痛常服益榮調經吳茱萸湯泡當歸各七錢半熟地黃白芍藥各一兩半石菖蒲炒川芎人參熟艾四兩熟米飲調作餅子上為末酒糊為丸如桐子大每服五十丸酒飲任下鹿茸丸大全良方治衝任虛損以致經候過多又為風冷所乘尺脈微細甚者可灸關元百壯鹿茸火去毛醋炙煮赤石脂禹餘糧各一兩艾葉柏葉附子焙去皮臍各半兩熟地黃酒洗當歸酒浸續斷各二兩上為末酒糊為丸如梧桐子大每服五十丸空心溫酒下涼血地黃湯拔粹方治婦人血崩是腎水真陰不能鎮守包絡相火故血走而崩也生地當歸各五分黃連黃柏知母藁本川芎升麻各二分柴胡羌活防風各三錢黃芩甘草炙細辛荊芥蔓荊子各一分紅花少許上㕮咀水煎通口服食前一方治婦人血崩不止槐花一兩棕毛灰五錢上為末水一鍾鹽少許煎七分去滓溫服一方大全良方用棕白礬煅為末酒調二錢服帶下方暖宮妙丸治婦人赤白帶下艾葉龍骨當歸川芎牡蠣白芍藥牡丹皮茯苓赤石脂熟地黃各等分上為末麵糊為丸梧桐子大服五十丸空心艾醋湯下白芷散大全良方治婦人赤白帶下白芷一兩海螵蛸二個燒胎髮一團燒上為末空心酒調服二錢當歸散濟生方治婦人赤白帶下腹內疼痛不欲飲食日漸羸瘦當歸酒洗赤芍藥牡蠣火煅取粉熟地酒洗蒸焙阿膠白芍藥續斷酒浸各一兩地榆半兩上為末醋糊丸如梧桐子大每服五十丸空心米飲下一方丹溪方治白帶因七情所傷而脈數者黃連炒扁柏酒蒸黃柏炒各半兩香附醋炒白芍藥白朮各一兩椿根皮二兩炒白芷燒存性三錢上為末粥糊丸梧子大每服五十丸食前米飲下伏龍肝散治婦人五色帶下伏龍肝即灶心土麥門冬去心赤石脂各一兩甘草肉桂各五錢川芎三兩艾葉熟地黃各二兩乾薑燒七錢當歸頭七錢半上㕮咀水棗煎服或作末子米飲調下一方丹溪方治婦人有孕白帶蒼朮三錢白芷二錢黃連炒二錢黃芩炒三錢白芍藥山茱各二錢半椿根皮炒黃蘗炒各一錢半上為末糊丸空心溫酒下一方丹溪方治白帶兼風痛半夏茯苓川芎陳皮甘草蒼朮黃柏酒炒南星牛膝各等分上㕮咀水姜煎服一方治婦人白帶龜板炙枳子各二兩黃柏炒一兩白芍藥七錢半香附半兩乾薑炒二錢半山茱萸苦參椿根皮貝母各半兩上為末酒糊丸梧子大每服五十丸空心米飲下一方治白帶或時腹痛龜板酒炙二兩黃柏炒一兩乾薑炒一錢枳子二錢半上為末酒糊丸梧子大每服七十丸日服二次桂枝附子湯方見傷寒門黃連丸方見痢門芎歸湯方見痔類沉香降氣湯方見諸氣門血血論人具此陰陽即有此血氣氣陽也血陰也男以陽為主則陽勝乎陰女以陰為主則陰勝乎陽氣血之為病男女則同耳人皆知百病生於氣又孰知血為百病之胎乎血猶水也水行乎地中百川理則無壅遏之患人之血脈一或凝滯於經絡腸胃之間百病由此而根矣乍寒乍熱發黃發斑譫妄驚狂煩悶嘔惡癡痰自汗烘熱虛勞尿淋漏崩吐衄咳唾以致眩暈厥冷昏聵迷忘塊痛淤疼起止遺溺凡此數證非血而何經所謂先去其血然後調之良有以也夫血得寒則閉澀得熱