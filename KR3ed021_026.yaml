醋糊為丸如梧子大每服五六十丸漸加至七八十丸溫酒下或米飲下亦得忌煎炒辛辣之物及莧菜白薇丸大全良方治婦人無子白薇牡蒙藁本各五分薑黃當歸熟地黃各七分川芎人參柏子仁石斛桂心附子炮五味子防風甘草川牛膝吳茱萸桑寄生各六分川椒二分禹餘糧八分上為末煉蜜丸如梧桐子大空心酒下三十丸日二服忌生菜蔥熱面蕎麥蒜豬肉炙爆葵菜蕪荑菘菜海藻黏食臭物孕育備論經云少陰脈動甚者有子厥旨何哉曰手少陰之經屬心足少陰之經屬腎心之所主者血腎之所主者精精血合氣而成之也然而胞門子戶又所以為精血之會其於尺部二脈尤有可驗者焉且婦人尺部之脈滑是為血實必主月事不行若其來斷絶或中絶而不至者此皆無孕惟滑而不絶略無間斷於其間此則真胎孕之脈也婦人懷胎臟氣擁閉不可多睡不可憂懼勞役不可啖食黏滯辛辣強硬之物又不可妄施針灸所貴時行數步調暢自適使氣得其平若酒面炙爆熱毒熏蒸若感觸風邪傳染熱氣若誤服藥餌破血動胎若七情內傷快意縱欲則易致漏胎若腹痛方來用力太早若覺則驚動胎轉未得若抱持不正奔突後趨若近産多淫觸犯禁忌則易致産難既産之後或過用心力或素有痰阻或血虛氣逆或虛極乘寒則血暈眩悶之證生矣然而安胎之法有二因母病以致動胎者但療母病其胎自安或胎氣不堅因觸動以致母病者則安胎而母自産以膠艾湯芎歸湯各半縮砂佐之為良難産之劑前所謂四物湯加吳茱萸入醋夾煎黑神散用乳香煎湯調下皆其要藥産後血暈先以舊漆器燒煙微向其鼻次則五靈脂末半生半炒入蘇合香丸百沸湯調與之或黑神散入麝少許調以紫蘇湯或花蕊石散用童子小便溫溫調劑可也損孕驗法婦人面色青手足冷指甲黑而且遍體不仁腰腹痛割其或面青唇青以至舌間黯黑口角沫出則不容以人力勝之大要將産腹痛萬勿驚動且須憑物而行直至腰疼子逼育門方可用力蓋腎繫於腰而胎繫於腎故也俗於産下多用理中丸然蜜甘而滯不若但用理中湯俗於小兒初誕多用黃連然差苦傷胃不若但用甘草炙煎綿蘸入口良久迭用惡物自出俗於胎孕已成多服滑胎枳殼散然枳殼微寒須以縮砂烏藥為佐産後飲食米飲勿用産後盥洗沸湯是常調血以四物逐淤以黑神人所共知也若夫順氣等劑胎前産後尤當兼施而並用之血暈昏迷切勿用降真香薰之以塞其氣論王叔和劉元賓別男女法叔和以左手太陽浮大為男右手太陰沉細為女元賓以右手浮大為女左手沉實為男較是二說不無抵牾然即其脈經本旨而詳之又有若異而實同者經曰左手沉實為男右手浮大為女又曰左右手俱浮大者生二女俱沉實者生二男元賓之所主者此也經曰左手尺中浮大者男右手尺中沉細者女又曰尺脈俱浮産二男尺脈俱沉産二女叔和之所主者此也何者沉細之說與沉實之義不同左尺浮大之說與右手浮大者亦異欲知男女之法大抵沉實者可以為男沉細者斷然為女右手浮大者固知其女左尺浮大者大抵皆男沉細為女沉實為男即所謂諸陽為男諸陰為女者是也左尺浮大為男右手浮大為女即所謂左疾為男右疾為女者是也元賓言其詳蓋合左右手而別陰陽叔和言其略特不過脈經論尺脈之義矣尚何有異同之辨哉聖惠云凡脈得太陽為男得太陰為女蓋太陽則浮太陰則沉也脈經云尺脈左偏大為男尺脈右偏大為女左右俱大産二子大者而有力也左右手脈俱疾二子脈耒縱橫逆而不順並主夾胎左尺脈帶強右尺帶弱者為男右尺脈帶強左尺帶弱者為女胎婦遣面南而行忽從後呼之左回首者為男右回首者為女或於廁所呼之亦同又胎婦其夫左乳有核者生男右乳有核者生女附胎前諸方安胎當歸湯大全良方療妊娠五月舉動驚愕胎動不安下墜小腹痛引腰脅小便疼痛下血當歸阿膠川芎人參各一兩棗子二枚艾一虎口上細切酒水各三升合煮至三升納膠令煬分二服腹中當安小便當緩也一方有甘草無參棗旋覆花湯大全良方治妊娠六七月間胎不安常處亦名阻病旋覆花一兩厚朴白朮枳殼黃芩茯苓各三兩半夏炒一方無芍藥生薑各二兩上㕮咀每服一兩水鍾半煎至一鍾去滓溫服食前忌羊肉餳醋桃李雀肉阿膠散大全良方治妊娠胎動腹中痞痛不思飲食白茯苓白朮川芎阿膠炒各七錢半當歸炒陳皮各一兩甘草二錢半上㕮咀每服八錢生薑三片棗二枚水一鍾半煎至八分食前溫服當歸散金匱方妊娠宜常服之當歸川芎白芍藥黃芩各一兩白朮半兩上五味為末酒飲調服方寸匕日二次或用酒糊為丸如梧桐子大每服五十丸茶湯任下空心食前服日三次桑寄生散濟生方治胎漏經血妄行淋瀝不已當歸去蘆酒浸桑寄生川續斷酒浸川芎白朮香附子炒去毛阿膠蛤粉炒成珠人參茯神去木各一兩甘草炙五錢上㕮咀每服四錢水一鍾姜五片煎七分去滓不拘時服半夏茯苓湯和劑方治妊娠惡阻惡聞食氣胸膈痰逆嘔吐旋覆花陳皮去白麩炒桔梗白芍藥人參去蘆甘草炙川芎各半兩半夏炮二兩二錢半赤茯苓熟芐各七錢半上㕮咀每服四錢水一鍾姜四片煎七分空心熱服竹茹湯和劑方治妊娠嘔吐頭痛眩暈橘紅去白一兩人參麥門冬去心白朮各一兩甘草二錢半厚朴薑製白茯苓各半兩上㕮咀每服五錢水一鍾姜五片入竹茹一塊如彈子大同煎至八分溫服不拘時竹葉湯簡易方治妊娠心驚膽怯終日煩悶證曰子煩白茯苓四兩防風麥門冬去心黃芩各三兩上㕮咀每服四錢水一鍾竹葉五片煎服不拘時羚羊角散永類經方治妊娠中風頭項強直筋脈攣急言語謇澀痰涎不利或時發搐不省人事名曰子癇羚羊角鎊川獨活酸棗仁炒五加皮各半錢薏