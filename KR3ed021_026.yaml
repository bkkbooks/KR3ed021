body:
  text: 卷之二十六婦人産婦傷寒方論或問婦人傷寒可得聞乎曰傷寒三百九十七條一百一十三方此張氏截然之筆削也於某證則有某藥何嘗以男女為別哉要之月事去來産前産後男子所無請發明其蘊以解世俗之惑蓋婦人以血為主發熱惡寒經水適來經曰熱除而胸滿譫語者是則邪氣結於胸脅當刺期門隨其實而取之傷風經日續生寒熱發作似瘧而經水適斷者是則血結而不行當以小柴胡湯散之所謂治之而愈者此也至如傷寒發熱經水適來晝醒暮譫如見怪狀是則里無留邪熱隨血散所謂不治自愈者此也前乎吐血下血兩條並以犀角地黃湯桃仁承氣湯抵當湯丸之類言之詳矣抑産前産後治法將何擇焉曰産前安胎産後消淤於是遵依條列斟酌輕重而調理之安胎者何桑寄生阿膠縮砂為要藥他如桂枝半夏桃仁大黃墮胎及燥熱等輩則不可輕用也消淤者何川芎蒲黃赤芍藥生地黃為要藥他如內補攔住敗血之劑則不可輕進也朱氏以阿膠桑寄生人參茯苓白朮等為細末糯米飲調劑為孕婦安胎以紅花一分官桂芍藥甘草半之薑棗同煎為解表消淤以蔥白生薑大劑濃汁為産前發散以小柴胡湯去半夏和解熱入子宮郭稽中以枳殼防風一度甘草減半末之點服主大便祕澀又以蜜導一法真可活人然則産婦證治觀此可以問津索途矣雖然知安胎則不可不調氣知消淤則不可不扶虛枳殼香附陳皮以調氣也當歸川芎黃耆人參以扶虛也退熱則柴胡黃芩解肌則紫蘇乾葛滋腸則麻仁枳殼助陽則乾薑良薑其間採托雖未備古人之經然而甘辛為陽酸苦為陰皆不越古人之意姑存之篇末以便學者之觀覽云婦人論男女均有此血氣人皆曰婦人以血為本何邪蓋其血勝於氣耳血藏於肝流注子臟而主其血者在心上為乳汁下為月水合精而為胞胎獨非血乎血之所以流暢於經絡者氣實使之又不可舉一而遺一也女子十四而天癸至男子二八天癸至精氣溢瀉衝任二脈男女均有任脈通太衝之脈盛故月候以時而行衝任者血之海也月候者經絡之餘也經言其常其來有期無過不及反此皆病其不行則尤甚百病生焉自其血氣和平陰陽調順則精血聚而胞胎成胞胎已成而心腎二脈其動也應手而疾蓋心之所主者血腎之所主者精精血交併而成之精勝則為男血勝則為女此亦自然之理也自其血氣不調陰陽愆伏過於陽則經脈前期而來過於陰則經脈後期而至蓋血性得熱則宣流得寒則凝澀陰氣乘陽內寒血澀故其來乍少陽氣乘陰血熱流散故其來乍多過於不及皆致病也然經脈不行其候有三一則血氣盛實經絡遏閉其脈滑實見之當通經疏利一則形體憔悴經絡涸竭其脈虛弱見之當滋養血氣一則風冷內傷七情內賊以致經絡痹滯其脈浮澀見之解散風冷去淤生熱經脈不行此諸病之所由生也是故血虛烘熱盜汗筋攣則為虛勞血少水涸燥氣乘肺則為干嗽宿寒留滯血與氣搏則為腹痛敗血結塊時發寒熱則為瘕症或風寒滯經血化為水流溢四肢謂之血分或脾不制水血與水並浮脹肌肉謂之虛腫或衝任氣虛內欲過度風邪冷熱諸氣入於胞門穢液與血相兼而下冷則多白熱則多赤冷熱不調赤白相半謂之赤白帶或衝任勞損經海傷動脾虛衛弱不能約制其血倏然暴下謂之崩中亦有非時血行淋瀝不斷謂之漏下崩之中復有淤血時崩時止謂之崩中漏下所下五色各應五臟五臟俱虛五色俱下婦人血海挾受風邪不換金正氣散加川芎官桂主之以至眩暈煩悶嘔惡怔忪迷亂多忘發狂妄語小便不禁此婦人以血受病最多而血之為病遇夜愈增劇也血屬陰陰虛則夜爭然則産育一科可得聞乎曰産前之病其脈貴乎實産後之病其脈貴乎虛産前為之順氣安胎産後為之扶虛消淤此其要也抑産育之後血衰氣弱宿淤未盡飲食起居梳洗解脫一有不謹得病猶甚易焉凡婦人血氣諸疾但用四物湯加以炒吳茱萸主之陰臟加多陽臟加少無不效者若産難若胎衣不下若胎損腹中則入醋夾煎或生料五積散加芎歸縮砂煎之以水醋或局方黑神散用乳香煎湯調下皆其類耳外此則有芎歸湯佐以縮砂調理胎婦腹痛或胎動下血更以炒阿膠並熟艾濟之至若胎婦喘咳則縮砂川芎炒阿膠等分入生薑烏梅紫蘇梗最良胎婦艱食則調氣散枳殼散等分入縮砂為妙大小産後津液涸燥滯血停留易至大便祕結枳殼散加炒桃仁用蜜水同煎入醋數沸可也縮胎之劑枳殼縮砂烏藥所不可無安胎之劑阿膠縮砂桑寄生又不可缺婦人多因怒氣傷胎所以安胎尤莫先於順氣其於産後發熱黑神散加川芎荊芥入生薑蔥白尤佳産後消淤黑神散須多服餌至一臘以後腹中略無疼痛方可與四物建中湯輩服之太早則補住敗血為害非輕若夫郭稽中所編産寶方論邇來書肆別有經驗節本辭簡理明此可為産科公據附調經諸方丹溪曰經候有枯閉不通者有不及期與過期者有妄行者有色紫黑及淡者有成塊者有作疼者夫經不通或因墮胎及多産傷血或因久患潮熱消血或因久發盜汗耗血或因脾胃不和飲食少進而不生血或因痢疾失血治宜生血補血除熱調胃之劑隨證用之或因七情傷心心氣停結故血閉而不行宜調心氣通心經使血生而經自行矣如虛中有熱月事不來以四物湯加黃芩治之常過期者血少也以芎歸參術兼痰藥治之過期紫黑有塊作痛血熱也以四物湯加香附黃連過期色淡挾痰者以二陳湯加芎歸常不及期者血熱也以四物湯加黃芩黃連香附肥人多兼痰藥治之血枯經閉者以四物湯加紅花桃仁痰多占住血海地位因而下多者目必漸昏肥人多有之以南星蒼朮川芎香附作丸服之肥人軀脂滿經閉者以導痰湯加芎歸黃連不可服地黃泥痰故也如用必以薑汁炒肥人少子亦由痰多脂膜閉塞子宮不能受精而施化也宜服上藥瘦人子宮無血精氣不聚亦令無子以四物湯養血養陰等藥經水未行臨經將來作痛者血實也一曰淤血鬱滯也以四物湯加桃仁香附黃連紅花或加延胡索莪朮木香有熱加柴胡黃芩經水行後而作痛者氣血俱虛也以八物湯加減煎服又云血為氣之配因氣而行成塊者氣之凝將行而痛者氣之滯行後作痛者氣血虛也色淡者亦虛也而有水以混之也錯經妄行者氣之亂也紫者氣之熱黑則熱之甚也今人悉指為風冷而行溫熱之劑禍不旋踵四物湯和劑方治衝任虛損月水不調常服調益營衛滋養血氣當歸去蘆川芎白芍藥熟乾地黃酒蒸焙各等分上㕮咀每服四錢水一盞煎八分空心服崩中去血過多者加熟艾煎服大溫經湯和劑方治衝任虛損月候不調或耒多不已或過期不行或崩中去血過多或經損娠淤血停留小腹急痛五心煩熱阿膠碎炒芎藭當歸去蘆人參去蘆肉桂去皮甘草炒芍藥牡丹皮各一兩半夏二兩半吳茱萸二兩各湯洗七次麥門冬去心五兩半上㕮咀每服三錢水一盞姜五片煎八分空心熱服調經散治經水或前或後或多或少或逾月不至或一月而來皆可服川歸酒洗一錢半麥門冬去心二錢吳茱萸擇去閉目者沸湯泡七次焙乾半錢人參去蘆半夏湯泡七次白芍藥牡丹皮去心川芎各一錢肉桂半錢阿膠炒甘草各七分半上細切作一服水二盞加生薑三片煎至一盞空心稍熱服逍遙散和劑方治血虛煩熱月水不調臍腹脹痛痰嗽潮熱甘草炙半兩當歸去蘆炒茯苓去皮芍藥白朮柴胡去苗各一兩上㕮咀每服三錢水一盞煨姜一塊薄荷少許煎服不拘時加減吳茱萸湯治衝任衰弱月候愆期或前或後或崩漏不止赤白帶下小腹急痛每至經脈行時頭眩飲食減少氣滿心忪肌膚不澤悉皆主之吳茱萸半兩麥門冬乾薑白茯苓牡丹皮南木香苦梗各三錢甘草三錢半當歸半兩北細辛一錢半防風官桂各一分半夏七錢上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓空心溫服桃仁散治婦人月水不調或淋瀝不斷斷後復來狀如瀉水四體虛翕不能飲食腹中堅痛不可行動月水或前或後或經月不來舉體沉重唯欲眠睡多思酸物桃仁粉草半夏各一兩赤芍藥生地黃各三兩澤蘭葉川牛膝當歸桂心牡丹皮人參蒲黃川芎各兩上為粗末每服五大錢水盞半姜三片煎七分空心去滓溫服牡丹散和劑方治血氣虛損內則月水不行外發潮熱肌體羸困漸成骨蒸並宜服之桂心牡丹皮芍藥延胡索炒沒藥別研陳皮去白紅花當歸去蘆甘草烏藥各一兩真蓬莪朮鬼箭蘇木各二錢半乾漆炒二兩上㕮咀每服三錢水一盞煎七分不拘時候內補當歸丸治血氣虛損月水不調或崩中漏下去血過多肌體羸困及月水將行腰腿痛重並皆治之真蒲黃炒七錢熟地黃半兩當歸酒煮阿膠炒白芷續斷乾薑炮甘草炙川芎各四兩肉桂附子炮去皮梢白芍藥各一兩白朮吳茱萸湯洗七次炒各三兩上為末煉蜜丸梧桐子大每服五十丸食前溫酒下內灸散和劑方治婦人血氣虛損崩中漏下淋瀝不已或凝積血塊腰腹刺痛凡月水不調血暈頭眩皆治藿香葉丁香皮熟乾地黃洗焙肉桂去皮各一兩半甘草炙當歸去蘆白朮山藥白芷各八兩茴香一兩半藁本去蘆乾薑炮川芎黃耆去苗木香白芍藥各一兩陳皮去白四兩上為末每服三錢水一盞姜五片艾十葉同煎空心熱服溫酒調下亦可如産後下血過多加蒲黃煎惡露不快加當歸紅花煎嘔吐加藿香生薑煎溫經湯大全良方治婦人血海虛寒月水不利當歸川芎芍藥桂心牡丹皮莪朮各半兩人參甘草牛膝各一兩上㕮咀每服五錢水一盞半煎至八分溫服不拘時服凌花散淡寮方治婦人月水不行發熱腹脹當歸酒浸凌霄花劉寄奴紅花酒浸候煎藥一二沸即入官桂去皮牡丹皮酒洗川白芷赤芍藥延胡索各等分上㕮咀每服四錢水一盞酒半盞煎八分再入紅花煎熱服四制醋附丸瑞竹堂方治婦人女子經候不調香附子去毛一斤作四分一分好酒浸七日一分小便浸七日一分鹽水浸七日一分米醋浸七日各焙乾上為末醋糊丸如梧桐子大每服七十丸空心食前鹽酒送下肥人依方服瘦人加澤蘭葉赤茯苓各二兩六合湯濟生方治婦人經事不行腹中結塊腰腿重痛當歸白芍藥官桂去皮熟地黃洗川芎莪朮炮各等分上㕮咀每服四錢水一盞煎七分空心服白薇丸大全良方治婦人月水不利四肢羸瘦漸覺虛乏當歸白薇柏子仁白芍藥川芎白朮桂心附子萆薢木香細辛吳茱萸各半兩人參石斛白茯苓川牛膝澤蘭葉各七錢半檳榔半兩熟地黃二兩牡丹皮紫石英各一兩上為末煉蜜丸如梧桐子大每服五十丸空心溫酒下茯苓補心湯淡寮方治婦人去血過多虛勞發熱用四物湯一兩參蘇飲三兩和均生薑五片煎八分溫服方見虛勞門增損四物湯蘭室祕藏方治血積當歸川芎白芍熟地黃蓬莪朮京三稜官桂乾漆炒煙盡各等分上㕮咀每服五錢水二盞煎一盞去滓溫服食前磨積丸楊氏家藏方治婦人積氣內攻經候不調腹脅膨脹刺痛京三稜莪朮各煨二兩茴香炒附子炮川楝子肉白芍藥乾薑炮各一兩半巴戟去心炒當歸洗艾葉醋炒各一兩七錢半上為末酒糊丸如梧桐子大每服五十丸空心溫酒下麥門冬散大全良方治婦人客熱四肢煩悶疼痛飲食不下麥門冬柴胡赤茯苓各一兩羚羊角赤芍藥桑白皮黃耆各三錢生地黃甘草各五錢上㕮咀每服一兩水二盞生薑三片煎至一盞去滓通口服黃耆散大全良方治婦人熱勞羸瘦四肢煩疼心燥口乾不欲飲食人參黃芩當歸各七錢半柴胡一兩半黃耆地骨皮赤茯苓麥門冬生地黃赤芍藥白芍藥各一兩上㕮咀每服一兩水