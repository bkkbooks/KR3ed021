body:
  text: 卷之十五積熱積熱方論酒面煎爆雄附峻補皆能生熱謂之積者何哉朝斯夕斯其所由來尚矣夫人偏陰不可以無陽偏陽不可以無陰惟在冷暖得中而已矯枉過正識者憂焉然則欲去積熱將何如曰三黃湯丸第一藥耳雖然凡熱皆出於心熱甚則能傷血熱出於心洗心散所不可缺熱能傷血四順清涼飲又不可無此自本自根之論也若夫酒後之面飯後之酒最易積熱又當防於未然積熱證治小柴胡湯諸熱通用方見傷寒總括敗毒散解熱次之方見寒類三黃湯治積熱蘊隆三焦皆熱大小便閉黃連去須黃芩大黃濕紙煨等分上銼細每服三錢薑三片慢火略煎食後服三黃丸證治同前即前項藥品等為末煉蜜丸桐子大每三四十丸熟水下洗心散治壯熱煩躁風熱壅塞大小便祕澀大黃濕紙煨甘草炒當歸芍藥麻黃不去節荊芥穗各三兩白朮七錢半上末每服二錢半生薑薄荷少許同煎食後服四順清涼飲治血熱蘊結壅滯大黃米上蒸曬乾赤芍藥當歸甘草微炙等分上為粗末每二錢半慢火煎服小柴胡湯亦治血熱可擇用八正散治心熱煩躁目赤咽疼小便淋閉大黃濕紙煨瞿麥木通滑石萹竹車前子山梔子甘草炙等分上銼每服三錢入燈心煎食後服大凡心熱要得小便流利而出甘露飲治諸瘡發熱生乾地黃熟地黃天門冬麥門冬並去心黃芩枇杷葉刷去毛淨山茵陳枳殼制石斛甘草炙等分上末每服二錢半食前煎服如干葛柴胡尤佳木通散治諸熱利小便生乾地黃木通荊芥地骨皮桑白皮炒甘草炙北梗等分上銼每三錢薑三片煎服甘豆湯治諸熱煩渴大小便澀黑豆二合甘草二錢上生薑七片井水煎汁服黃連湯治一切熱血熱眼熱酒熱並主之黃連去須銼碎上以井水浸良久磁碗盛之置鐵銚內隔湯烑取清汁服再銚牛黃涼膈丸治上焦壅熱口乾咽痛煩躁涎潮馬牙硝寒水石煅硬石膏各二兩甘草微炙一兩牛膽南星三分紫石英研飛半兩牛黃腦子麝香各一分上末煉蜜丸每兩作四十丸每服一丸溫薄荷人參湯調下解毒雄黃丸取積下熱雄黃研飛川鬱金各一分巴豆十四個去油上末醋煮麵糊丸麻子大每服五丸加至七丸熱茶清下裡實用此喉閉以熱茶清調灌竹茹湯治胃熱而嘔吐欲知胃熱手足心皆熱者是也半夏三分用薑汁半盞漿水一升煮去半切焙乾葛三兩甘草生三分上銼散每三錢青竹茹一彈子許薑棗煎溫服或加前胡諸熱酒蒸黃連丸黃連阿膠丸皆可用方見嗽門附諸方涼膈散治臟腑積熱口舌生瘡痰實不利煩躁多渴腸胃祕澀便溺不利一切風熱並皆治之連翹甘草炙大黃朴硝各二兩薄荷黃芩梔子仁各一兩上㕮咀每服水一鍾半竹葉七片蜜少許煎食後溫服既濟解毒湯治上熱頭目赤腫而痛胸膈煩悶不得安臥大便微祕大黃酒煨黃連酒炒黃芩酒炒甘草炙桔梗各二錢柴胡升麻連翹當歸身各一錢上㕮咀每服水二鍾煎食後溫服大金花丸治內外諸熱寢汗咬牙睡語驚悸溺血淋閉咳嗽衄血瘦弱頭痛併骨蒸肺痿喘嗽者黃連黃柏黃芩梔子仁大黃各等分上為末滴水丸如小豆大每服三十丸新汲水送下加味金花丸治內外諸熱氣壅痰涎溺血淋閉黃連黃柏黃芩山梔炒以上各二兩桔梗半夏泡陳皮人參去蘆各一兩上為細末滴水丸如小豆大每服五十丸淡薑湯送下清心蓮子飲治上盛下虛心火炎上口苦咽乾煩渴微熱小便赤澀或欲成淋者黃芩車前子麥門冬去心地骨皮甘草炙各半兩黃耆蜜炙石蓮子去心白茯苓人參各七錢半上㕮咀每服水一鍾煎服如發熱加柴胡薄荷經驗地仙散治骨蒸肌熱一切虛煩地骨皮防風去蘆各一兩雞蘇人參甘草各二錢五分上㕮咀每服一兩薑三片竹葉五片水二鍾煎至一鍾去滓通口服不拘時候五蒸湯治骨蒸勞熱自汗甘草人參去蘆知母黃芩各二錢茯苓熟地黃葛根各三錢石膏五錢竹葉二十片上銼㕮咀作一服入粳米一合煎服十全大補湯治諸虛不足五勞七傷不進飲食久病虛損時發潮熱人參養榮湯治久病虛損口乾食少咳而下利心驚悸熱而自汗並見虛勞門黃耆鱉甲散治男婦虛熱身瘦五心煩熱四肢怠惰咳嗽咽乾自汗食少人參肉桂桔梗各一錢五分生地黃半夏泡紫菀知母芍藥黃耆甘草桑白皮各二錢半天門冬鱉甲各五錢秦艽茯苓地骨皮柴胡各三錢上㕮咀每服一兩薑水煎服樂令建中湯治臟腑虛損身體消瘦潮熱自汗將成癆瘵此藥大能退虛熱生血氣前胡去蘆一兩細辛黃耆蜜炙人參去蘆桂心橘皮去白當歸去土白芍藥茯苓去皮麥門冬去心甘草炙各一兩半夏湯泡七次上㕮咀每服四錢水一鍾薑五片棗一枚煎服不拘時防風當歸飲子治煩渴發熱虛煩蒸病六物湯滋陰退熱並見火門龍腦雞蘇丸治心中鬱熱消煩渴涼上膈解酒毒治肺熱咳嗽吐血鼻衄崩中下血血淋勞煩諸淋胃熱口臭方見火門當歸補血湯東垣方治肌熱燥熱目赤面紅煩渴引飲晝夜不息其脈洪大而虛重按全無通評虛實論云脈虛血虛脈實血實又云血虛發熱證象白虎惟脈不長實為辨也若誤服白虎湯必死此病得之於飢困勞役黃耆一兩當歸酒製二錢上㕮咀都作一服水二盞煎至一盞去滓稍熱服之空心服柴胡飲子解一切肌骨蒸熱蓄積熱作往來及傷寒發熱不解或骨蒸肺痿喘嗽婦人余疾産後經病皆治柴胡人參黃芩甘草炙大黃當歸酒浸芍藥各等分上㕮咀每服七錢水二鍾薑三片煎八分食後服黃連安神丸治心煩懊憹反復心亂怔忡上熱胸中氣亂心下痞悶食入反出硃砂四錢黃連五錢生甘草二錢半上為細末湯浸蒸餅丸如黍米大每服一十丸食後時時津唾咽下內經云心肺位近而倚偶制其小服此緩治之理也補中益氣湯東垣方治陽虛發熱久患虛勞硃砂安神丸東垣方治心神煩亂怔忡兀兀欲吐氣亂而熱似懊憹狀並見內傷門瀉青丸錢氏方治肝經鬱熱當歸酒洗龍膽草川芎山梔炒大黃羌活防風去蘆上為末蜜為丸雞頭子大每服一二丸瀉黃散治脾熱口臭咽乾藿香七錢山梔一兩石膏五錢甘草三兩防風去蘆四兩上為末蜜酒拌微炒香每服一錢火鬱湯治手足心發熱升麻葛根柴胡白芍藥各一兩防風甘草各五錢上銼每服五錢連須蔥白三寸煎稍熱服不拘時大青丸治上焦熱結勞役發熱並瘟疫時行發熱方見火門風熱防風通聖散治風熱諸證方見中風類定風餅子不易方治風客陽經邪傷腠理背膂強直言語謇澀體熱惡寒痰厥頭痛肉瞤筋惕手顫鼻淵及飲酒過多嘔吐涎沫頭目暈眩常服消風去邪方見傷風門追風散和劑方治諸風上攻頭疼目眩鼻塞聲重皮膚瘙癢眉角牽引婦人血風一切頭風並皆治之白殭蠶去絲嘴炒荊芥各二兩石膏川烏炮去皮臍防風去蘆叉各四兩全蠍炒一錢川芎三兩麝香研甘草炙各一兩上為末每服半錢食後臨臥茶調下龍腦川芎丸御藥院方消風化滯除熱消痰通利七竅爽氣清神桔梗一兩五錢片腦六錢砂仁二錢白豆蔻五錢薄荷去土五兩三錢川芎防風去蘆甘草炙各一兩上為末煉蜜為丸每兩作二十丸每服二丸細嚼茶清送下附火證火證方論劉宗厚曰火之為病其害甚大其變甚速其勢甚彰其死甚暴何者蓋能燔灼焚焰飛走狂越消鑠於物莫能御之遊行乎三焦虛實之兩途曰君火也猶人火也曰相火也猶龍火也火性不妄動能不違於道常以稟位聽命運行造化生存之機矣夫人在氣交之中多動少靜欲不妄動其可得乎故凡動者皆屬火化火一妄行元氣受傷勢不兩立偏勝則病移害他經事非細故動之極也病則死矣經所謂一水不勝二火之火出於天造君相之外又有厥陽臟腑之火根於五志之內六欲七情激之其火隨起蓋大怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀動中則火起於肺心為君主自焚則死矣丹溪又啓火出五臟主病曰諸風掉眩屬肝火動之類經所謂一水不勝五火之火出自人為又考內經病機一十九條內舉屬火者五諸熱瞀瘛皆屬於火之類而河間又廣其説火之致病者甚多深契內經之旨曰諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之有聲如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼽衄血溢血泄淋閉身熱惡寒戰栗驚惑悲笑譫妄衄蔑血汙此皆少陰君火之熱乃真心小腸之氣所為也若瞀瘛暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁栗如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘛暴病暴死此皆少陽相火之熱乃心包絡三焦之氣所為也是皆火之變見為諸病也為脈虛則浮大實則洪數藥之所主各因其屬君火者心火也可以濕狀可以水滅可以直折惟黃連之屬可以制之相火者龍火也不可以水濕折之從其性而伏之惟黃柏之屬可以降之噫瀉火之法豈止如此虛實多端不可不察以臟氣司之黃連瀉心火黃芩瀉肺火芍藥瀉脾火大柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有餘之火耳若飲食勞倦內傷元氣火不兩立為陽虛之病以甘溫之劑除之如黃耆人參甘草之屬若陰微陽強相火熾盛以乘陰位日漸煎熬為血虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑折之如大黃朴硝之屬若腎水受傷真陰失守無根之火為陰虛之病以壯水之劑制之如生地黃玄參之屬若右腎命門火衰為陽脫之病以溫熱之劑濟之如附子乾薑之屬若胃虛過食冷物抑遏陽氣於脾土為火鬱之病以升散之劑發之如升麻葛根之屬不明諸此之類而求火之為病施治何所依據故於諸經集略其説備處方之用庶免實實虛虛之禍也滑氏曰虛勞證中多雲相火為患者何氣使然是為火也請明議焉對曰華他云三焦者相火也相火之相者譬之如丞相之相也善政之道輔佐周身維持綱紀所接元陽以為一身統領使百脈舒和上焦曰膻中之屬宣行氣血中焦曰中脘之緣腐熟水穀下焦曰膀胱之所溲便精溺無形而有用焉故曰三焦蓋三焦者為諸陽升降之方呼吸發源之所三元有道九竅流通神志相關命脈相繼周身有倚血氣無偏治化宣和是無虞矣又曰於火為患者何以驗云對曰於斯者是因體虛之人房勞過損腎水乾枯無因既濟相火頓生或因七情所感或因怒火傷肝肝木相乘為熱為風風邪鼓舞火性上炎為百病之長也華他云三焦積熱於火生焉六腑顛危從權所化且如脈來洪數者熱之有準芤浮中空者吐血無疑咳嗽咯痰須明虛實欲知治嗽先補其源身熱者滋陰清氣惡寒者和陽挽陰治寒遠寒治熱遠熱甘緩溫和調虛之則丹溪云陰虛火動證難治用四物湯加炒黃柏降火補陰龜板補陰乃陰中之至陰也又云氣從臍下起者陰火也氣從腳下起入腹如火者乃虛之極也蓋火起於九泉之下多死一法用附子末津調塞湧泉穴以四物湯加降火藥服之妙東垣瀉陰火升陽湯治肌熱煩熱面赤食少喘咳痰盛脈右關緩弱或弦或浮數羌活甘草炙黃耆蜜炙蒼朮各一兩升麻八錢柴胡一兩半人參黃芩各七錢黃連酒炒半兩石膏半兩秋深勿用上㕮咀每服一兩或半兩水煎服升陽散火湯治男子婦人四肢發熱肌熱筋痹熱骨髓中熱發困熱如燎捫之烙手此病多因血虛而得之或胃虛過食冷物抑遏陽氣於脾土火鬱則發之升麻葛根獨活羌活人參白芍各半兩防風二錢半柴胡八錢甘草炙三錢甘草生二錢上㕮咀每服半兩或一兩水煎稍熱服柴胡飲子治一切肌熱蒸熱積熱或汗後餘熱脈洪實弦數八正散治大人小兒心經蘊熱咽乾口燥目赤睛痛臟腑祕結小便赤澀三黃湯治積熱結滯臟腑大便祕結心膈煩躁三黃丸治男子婦人三焦積熱咽喉腫閉心膈煩躁小便赤澀大便祕結並宜治之大金花丸治中外諸熱寢汗咬牙時語驚悸溺血淋閉咳衄血瘦弱頭痛併骨蒸肺痿喘嗽去大黃加梔子名曰梔子金花丸又曰既濟解毒丸加味金花丸治內外諸熱氣壅痰涎溺血淋閉火證方並見積熱門黃連解毒湯治傷寒雜病熱毒煩躁乾嘔口渴喘滿陽厥極深蓄熱內甚方見眼目門大青丸治上焦熱結勞役發熱並痰火瘟疫發熱方見疫門涼膈散治大人小兒臟腑積熱口舌生瘡痰實不利煊爍多渴腸胃祕澀便溺不利方見積熱門神芎丸治一切熱證常服保養除痰飲消酒食清頭目利咽膈能令遍身結滯宣通氣利而愈神強體健耐傷省病大黃黃芩各二兩牽牛滑石各四兩黃連薄荷川芎各半兩上為末水為丸如小豆大溫水下十丸至十五丸二十丸清心湯即涼膈散料內加黃連五錢用蜜與竹葉同煎連翹山梔子大黃薄荷葉黃芩各五錢甘草一兩半朴硝二錢五分加黃連半兩上為細末每服五錢水一盞蜜少許竹葉十片同煎七分服黃芩湯治心肺蘊熱口瘡咽痛膈悶小便淋濁不利澤瀉梔子仁黃芩麥門冬去心木通生地黃黃連甘草各等分上㕮咀每服一兩水二盞薑五片煎至一盞食前溫服玄明粉御藥院方此藥大治邪熱所幹膈上氣滯臟腑祕澀並宜服之以朴硝煎過澄濾五七遍至夜於星月下露至天明自然結作青白塊子用磁罐子按實於炭火內從慢至緊自然成汁煎沸直候不響再加頂火一煅便取出於淨地上倒下用盆合蓋以去火毒然後研為細末每二斤入甘草生熟二兩為末一處攪勻臨睡斟酌用之或一錢二錢以桃花煎湯或蔥白湯下防風通聖散方見風門清燥湯方見痿門龍腦雞蘇丸方見鼻門地骨皮散治虛潮熱骨蒸壯熱六味地黃丸治腎氣虛久新憔悴寢汗發熱五臟齊損瘦弱虛煩骨蒸下血補陰丸降陰火治發渴骨蒸補腎水真陰不足俱見虛勞門大補丸丹溪方去腎經火燥下焦濕治筋骨軟氣虛以補氣藥下血虛以補血藥下並不單用川黃柏炒褐色上以水丸服六物湯滋陰血降腎火川芎白芍藥酒炒生地黃酒洗當歸酒洗黃柏蜜炒知母酒炒各等分上㕮咀用水一鍾半煎至八分食前溫服當歸龍膽丸治腎水陰虛風熱蘊積時發驚悸筋惕搐搦神志不寧營衛壅滯頭目昏眩肌肉瞤瘛胸膈咽嗌不利腸胃燥澀躁擾狂越罵詈驚駭火熱等證當歸龍膽草山梔仁黃連黃柏黃芩各一兩大黃蘆薈青黛各半兩木香一錢麝香五分上為末煉蜜為丸如小豆大薑湯下三二十丸此藥瀉肝心脾肺腎胃火之神藥也麥門冬湯千金方治諸疾後火熱乘肺咳唾有血胸脅脹滿上氣羸瘦五心煩熱渴而煩悶麥門冬桑白皮生地黃各一兩半夏紫菀桔梗淡竹茹麻黃各七錢半五味子甘草各五錢上㕮咀每服五錢或一兩入薑煎防風當歸飲子宣明方治煩渴發熱虛煩火證柴胡人參黃芩甘草各一兩滑石三兩大黃當歸芍藥防風各五錢上㕮咀每服一兩水二鍾生薑三片煎至一鍾去滓通口服不拘時如有痰嗽加半夏泄者去大黃左金丸丹溪方治肝火黃連六兩吳茱萸一兩上為末水丸或蒸餅丸白湯下五十丸滋陰降火湯養血降火之聖藥也川歸身酒洗地黃涼血用生補血用熟天門冬去心白芍藥薄荷炒白朮各一錢麥門冬去心甘草炙各五錢知母黃柏俱蜜水蒸遠志陳皮洗川芎各六分久病去之上㕮咀薑水煎服氣血虛加人參黃耆嗽加五味阿膠痰加栝蔞貝母吐血加丹皮藕汁熱加地骨皮痼冷痼冷方論苟得其養無物不長苟失其養無物不消人之處世飲食為上湯藥次之惟其口腹不充嗜欲無節所以臟中停寒而為之沉痼也男子精流女子帶下骨寒腦冷氣乏血衰嘔吐噁心久泄暴下皆其證耳療治之法雖貴乎溫補不貴乎大剛惟於滋血養氣中佐以薑桂雄附為愈抑古人所謂精不足者補之以味繼此尤當加意焉若夫執劑剛燥亟欲陽氣頓回吾恐腎水易涸心火獨炎識者未保其往痼冷證治十補湯治諸虛百損人參一分白朮白茯苓甘草炙辣桂黃耆蜜炙當歸川芎熟地黃白芍藥各半兩上銼散每服三錢半薑棗煎空心食前服加熟附子溫之附子理中湯沉附湯薑附湯並主痼冷須加當歸方並見寒類麝香鹿茸丸治真元虛憊精血耗少熟地黃山藥各三兩杜仲炒斷絲鹿茸酒炙各一兩半北五味子肉蓯蓉牛膝並酒浸焙各一兩沉香半兩麝香半錢上末煉蜜丸桐子大每三五十丸食前鹽湯下八味丸治下元冷憊腰腳痠重虛勞消渴熟地黃四兩山藥山茱萸各二兩辣桂熟附子各一兩澤瀉牡丹皮白茯苓各一兩半上為末煉蜜丸桐子大每服三十丸食前鹽湯下黑錫丹治脾腎俱虛冷氣刺痛止汗墜痰除濕破癖黑錫洗熔取淨透明硫黃結砂各二兩金鈴子蒸熟去皮核沉香木香熟附子葫蘆巴酒浸炒肉桂各半兩舶上茴香炒破故紙酒浸炒陽起石研細水飛肉豆蔻麵裹煨各一兩上用新鐵銚如常法結黑錫硫黃砂子地上出火毒候冷研極細余藥並末同研自朝至暮以黑光為度酒麵糊丸桐子大陰乾每三五十丸空心鹽湯下婦人艾醋湯下本方加蓯蓉牛膝白朮丁香名接氣丹治真元虛憊養正丹升降水火助陽接真治咳逆翻胃痰結頭暈腹痛腰疼霍亂吐瀉好硫黃研黑錫水銀硃砂研細各一兩上淨鐵籩以厚紙布扎柄先熔鉛濾去滓一兩淨再放籩內用鐵匙炒攪將熟硫黃末三錢重漸入其中或焰起亦莫管只急手攪炒令鉛熟無性其硫黃皆燒去但得鉛熟遂傾放地下紙上令硬即碾開以紗篩出鉛粉其餘成珠者再炒碾為末次將籩銚頓慢火爐上又熔鉛粉以熟硫黃末一兩漸入頻攪炒才見黃煙上急拖過冷爐上少頃又過火上再攪炒得鉛與硫黃皆成黑色極調和了卻放冷爐上候鉛硫微冷又頓在十分微微火上少頃入水銀以鐵匙頻攪切勿令青煙上煙上便走了水銀又次入硃砂末頻攪炒令十分調和即傾放地下紙上俟硬別碾為末糯米糊丸緑豆大每三十丸鹽湯空心下靈砂諸虛痼冷厥冷神效好硫黃一兩水銀三兩上修煉家有見成者贖研細糯米糊丸小麻子大每服五七丸加至十五丸空心人參棗湯下或鹽湯下疝氣偏墜木腎腫疼炒茴香入酒煎候溫下虛勞喘嗽生薑烏梅紫蘇莖煎湯下盜汗小便多煅牡蠣入鹽煎湯下痎瘧不已桃柳枝煎湯下脹滿腹痛腰疼莪朮湯下嘔逆翻胃丁香木香煎湯下白濁遺精白茯苓煎湯下中風痰厥面青木香湯研灌走注風遍身痛嚼蔥白酒下腳痛木瓜湯下氣滯生薑陳皮湯下婦人血痛氣痛延胡索五靈脂酒醋各半煎湯下小兒慢驚沉困胃虛神脫人參丁香煎湯吞下椒附散治腎氣上攻項背不能轉側亦治冷痹不仁熟附子末正川椒上每服附子末二大錢匕川椒二十一粒用白麵塞滿水盞半薑七片煎半去椒入鹽少許通口空心服大凡腎氣須以川椒引而歸經則安矣又一證腎虛血寒氣逆而脹胸腹走痛中脘痞滿兩眼多淚此寒泣血也二陳湯加官桂當歸下安腎丸立愈若大便澀更加枳殼二陳湯方見痎瘧門安腎丸方見水飲門附諸方沉香蓽澄茄丸和劑方治內挾積冷臍腹弦急痛引腰背面色萎黃臟腑自利小便滑數小腸一切氣痛並皆治之桃仁去皮尖二兩木香川楝子炮去核炙四兩附子炮去皮川烏炮去皮臍半兩沉香葫蘆巴肉桂去皮蓽澄茄補骨脂炒茴香巴戟天去心上㕮咀銼服三錢水一盞入鹽少許煎八分空心熱服復陽丹濟生方治陽虛陰盛手足厥冷暴吐大下脈細羸瘦傷寒陰證悉皆治之川烏去皮四兩炮天雄炮去皮二兩附子炮去皮臍鍾乳粉各一兩陽起石火煅四兩硃砂煅另研一兩上為末酒煮神麯糊丸如梧桐子大每服五十丸空心鹽湯下附子茴香散淡寮方治氣積冷心腹絞痛肉豆蔻乾薑炮附子大者一枚炮去皮臍各一兩茴香木香白朮炒人參甘草炙各半兩白茯苓丁香上㕮咀每服三錢水一盞鹽少許煎七分空心服雄朱丹百一選方治宿寒痼冷飲食嘔逆久則羸弱變為癆瘵硃砂雄黃各二兩以上用沙合一個先以牡丹皮二兩內外熏黃入藥於內以釅醋和臘茶作餅蓋定合口以赤石脂固濟合逢又用赤石脂泥裹合了一重再用黃泥紙筋又裹一重先以草火燒令乾次以炭火五斤漸又添一稱候火力漸消取出掘地坑一尺埋一宿去火毒取研入後藥丁香蓽茇赤石脂胡椒附子白朮各一兩乳香半兩與前赤石脂同研官桂木香上為末入前藥研勻以清酒二升二分熬去二分入附子末煮糊丸如梧桐子大每服十丸空心溫酒鹽湯任下祕澀小便不通方論腎主水膀胱為之腑水瀦於膀胱而泄於小腸實相通也然小腸獨應於心者何哉蓋陰不可以無陽水不可以無火水火既濟上下相交此營衛所以流行而水竇開闔所以不失其司耳惟夫心腎不濟陰陽不調故內外關格而水道澀傳送失度而水道滑熱則不通冷則不禁其熱盛者小便閉而絶無其熱微者小便難而僅有腎與膀胱俱虛客熱乘之故不能制水水挾熱而行澀焉是以數起而溺有餘瀝腎與膀胱俱冷內氣不充故胞中自滑所出多而色白焉是以遇夜而陰盛愈多若夫下焦蓄血其與虛勞內損則便溺自遺而不知下焦虛寒不能溫制水液則便溺欲出而不禁是皆心不與腎交通故或冷或熱而滑澀隨之矣繼自今心氣旺盛小便壅遏以清利行之如赤茯苓麥門冬燈心車前子之類是也心氣虛怯小便滑利以溫和益之如乳香益智巴戟人參之類是也演觸其間腎實腎虛皆可以舉隅而反或者膠柱調瑟詳於腎而略於心其可乎雖然小腸之與膀胱心腎所主固也然素問有云水之本在腎其末在肺則知天一之水自上而下相為貫通亦猶心腎之不可升降也昧者夜間忍縮小便使水氣上逆乘肺痰涎喘嗽激亂爭鳴其來不可御於此見肺主氣也小便澀滑又當調適其氣焉毋徒曰葶藶桑皮可以逐肺經之水小便不通證治草蜜湯治心腎有熱小便不通生車前草搗取自然汁半盞入蜜一匙調服蒲黃湯治心腎有熱小便不通赤茯苓木通車前子桑白皮炒荊芥燈心赤芍藥甘草微炙生蒲黃滑石等分上末每服二錢蔥頭一片紫蘇五葉煎湯調下八正散治心經邪熱小便赤澀不通方見積熱門五苓散方見水飲門加赤茯苓治小便不通每服二錢用燈心山茵陳各一握煎湯調下參耆湯治心肺虛而客熱乘之小便澀而數數而瀝赤茯苓七錢半生乾地黃黃耆桑螵蛸微炙地骨皮各半兩人參北五味子菟絲子酒浸研甘草炙各二錢半上細銼每服三錢新水煎臨熟入燈心二十一莖溫服平補丸治腎虛小便數而瀝如欲滲之狀或虛勞內損遺尿或下焦虛寒小便欲出而不禁通用方見消渴門茸香丸治下焦虛冷尿多或虛勞遺尿或欲出而不禁鹿茸酥炙肉蓯蓉酒浸焙當歸各半兩雞內金七錢半微炙龍骨牡蠣灰赤石脂禹餘糧煅醋淬碎為度各研細川白薑益智仁巴戟乳香各二錢半上細末糯米糊丸桐子大每服七十丸空心鹽湯下桃仁承氣湯治下焦蓄血漱水迷忘小腹急痛內外有熱加生蒲黃方見血類大小便不通證治掩臍法治小便大便不通連根蔥一莖不得洗帶土生薑一塊淡豆豉二十一粒鹽二匙同研爛捏餅烘熱掩臍中以帛扎定良久氣透自通不然再換一劑轉胞證治轉胞方治胞轉小便不能通先用良薑蔥頭紫蘇莖葉各一握上煎湯密室內熏洗小腹外腎肛門留湯再添蘸帛洗以手拊摩臍下拭乾綿被中仰坐垂腳自舒其氣次用蜀葵子二錢半赤茯苓赤芍藥白芍藥各半兩上銼每服三錢煎取清汁再暖乘熱調蘇合香丸三丸並研細青鹽半錢食前溫服又法炒鹽半斤囊盛尉小腹便多證治多溺方暖腎丸治腎虛多溺或小便不禁而濁葫蘆巴炒故紙炒川楝肉用牡蠣炒去牡蠣大熟地黃洗焙益智仁鹿茸酒炙山茱萸代赭石煮熱醋蘸七次研細赤石脂各三分龍骨海螵蛸熟艾米醋浸一宿炙焦丁香沉香滴乳香各二分禹餘糧煅醋淬碎為度細研三分上細末水煮糯米糊丸桐子大每服五十丸食前石菖蒲煎湯送下附諸方導氣除燥湯東垣方治小便閉塞不通乃血澀致氣不通而竅澀也知母酒炒三錢黃柏酒炒四分滑石炒黃色澤瀉茯苓去皮各二錢上件和勻每服半兩水三大盞煎至一盞去滓稍熱服空心如急閉不計時候腎疸湯東垣方治腎疸目黃甚至渾身黃小便赤澀升麻半兩羌活防風藁本獨活柴胡以上各五分以上治腎疸目黃渾身黃白朮半錢蒼朮一錢豬苓四分澤瀉三分茯苓二分以上治小便赤澀葛根五分甘草人參各三分黃柏一分曲六分上件銼如麻豆大分作二服每服水三盞煎至一盞去滓稍熱服食前鬱金黃連丸治心火上炎腎水不升致使水火不得相濟膀胱小腸積熱或癃閉不通或遺溺不禁或白濁如泔或膏淋如膿或如梔子水或如小石米粒或如粉糊相似者諸熱證也鬱金黃連各一兩黃芩琥珀研大黃酒浸各二兩滑石白茯苓各四兩黑牽牛炒取頭末三兩上為末水丸如梧子大每服五十丸沸湯下空心服如用消導飲食降心火可加沉香五錢一方治孕婦轉胞並男子小便不通用冬葵子山梔子炒滑石研各五錢木通三錢上作一服水煎溫服外用冬葵子滑石梔子為末田螺肉和搗成膏或用生蔥汁調貼臍中立通一方治遺尿失禁用益智去皮鹽炒烏藥各四兩上為末以山藥末六兩打糊為丸如梧桐子大每服七十丸空心清米飲送下大便祕澀方論凡人五味之秀者養臟腑諸陽之濁者歸大腸大腸所以司出而不納也今停蓄蘊結獨不得其疏導何哉抑有由矣熱邪入里則胃有燥糞三焦伏熱則津液中干此大腸之挾熱然也虛人臟冷而血脈枯老人腸寒而氣道澀此大腸之挾冷然也腹脹痛悶胸痞欲嘔此證結聚以宿食留滯得之腸胃受風涸燥祕澀此證閉塞以風氣燔灼得之若夫氣不下降而穀道難噫逆冷滿必有其證矣劑量治法熱者三黃湯冷者金液丹宿食者脾積丸風祕者脾約麻仁丸氣不下降則桔梗枳殼湯固在精擇而審處其間縱橫泛應亦自胸中活法充之矣然而大腸與肺為表裡大腸者諸氣之道路關焉熱則清利冷則溫利積聚者挨其積風壅者疏其風是固然爾孰知流行肺氣又所以為四者之樞紐乎不然叔和何以曰肺與大腸為傳送大便祕澀證治大黃飲子治身熱煩躁大便不通川大黃濕紙略煨杏仁去皮尖略煨梔子仁川升麻枳殼浸去穰碎炒各半兩生地黃一兩人參黃芩甘草炙各二錢半上銼散每服三錢生薑五片豉二十一粒小烏梅一枚煎服三黃湯三黃丸治熱證大便結方見積熱門甘豆湯治熱證風證大便不通方見積熱門金液丹治大便挾冷結滯用麻仁杏仁煎湯下方見脾疼門半硫丸治冷祕風祕老人祕結透明硫黃研十分細圓白半夏湯蕩七次焙乾等分上末生薑汁煮白麵糊築丸桐子大每服二十丸薑湯下或用蔥白一條生薑三片煎熟入阿膠二片溶開食前空心送下膠蜜湯治老人虛人大便祕澀連根蔥白三片上新水煎去蔥入透明阿膠炒二錢蜜二匙溶開食前溫服潤腸丸大便祕澀通用杏仁去皮尖略炒枳殼浸去穰炒麻仁陳皮各半兩阿膠炒防風各二錢半上末煉蜜丸桐子大每服五十丸老者蘇子煎湯下壯者荊芥泡湯下脾積丸治飲食停滯腹脹痛悶嘔惡吞酸大便祕結莪朮三兩京三稜二兩良薑半兩以上用米醋一升於磁瓶內煮乾乘熱切碎焙青皮去白一兩南木香半兩不蛀皂角三大挺燒存性百草霜深村鍋底者佳三匙上為細末用川巴豆半兩只去殼研如泥漸入藥末研和得所麵糊丸麻子大每服五丸加至十丸橘皮煎湯下木香逐氣丸治食積氣滯通利大便兼治腳氣小腸氣諸氣攻刺腹痛橘紅青皮去白檳榔雞心者各半兩南木香二錢半川巴豆肉一錢半研如泥漸入藥夾研上件並末用生薑自然汁調神麯末為糊丸麻子大每服十丸薑湯下如氣攻腹痛枳殼木瓜煎湯下二香丸治積滯氣祕心腹刺痛中滿壅嗽南木香丁香青皮浸去白曬橘紅草果仁肉豆蔻生白豆蔻仁五靈脂香潤者另研各半兩莪朮炮乘熱碎研縮砂仁各七錢半上細末用川巴豆肉半兩研如泥漸入藥末研和白麵稀糊丸麻子大候乾每服三丸加至五七丸止薑湯下壅嗽紫蘇生薑煎湯下獨棗湯治大便積日不通大好棗一枚擘開入輕粉半錢上以棗相合麻線扎縛慢火煮熟嚼細以棗汁送下脾約麻仁丸治風祕及脾約證小便數大便祕方見腳氣門用枳殼散送下追風毒銼散治風氣蕃盛大便祕結方見腳氣門疏風散治風毒祕結枳殼制半兩防風羌活獨活檳榔白芷威靈仙蒺藜炒赤去刺麻仁杏仁甘草炙各一分上粗末每二錢半薑五片蜜一匙慢火煎服桔梗枳殼湯治氣不下降大便不通方見氣門加紫蘇莖葉煎寬快湯治氣不下降大腑澀滯香附杵淨二兩天台烏藥去心枳殼制各一兩半縮砂仁七錢半蘇子炒半兩青木香三錢甘草炙七錢半上末每服二錢陳皮煎湯調下或吞青木香丸少許降氣湯治氣不下降大便不通方見腳氣門加枳殼杏仁煎此藥流行肺氣蘇感丸治氣祕不大便用紫蘇橘皮煎湯下或枳殼散送下蘇合香丸方見嗽門感應丸方見脹滿門蘇合四分感應六分研和別丸大凡腹痛而嘔欲利其大便諸藥皆吐惟蘇感丸用薑汁泡湯下最妙煨蒜方獨頭蒜煨熟去皮以綿裹納後部即通又掩臍法方見小便門臨用入輕粉少許尤速熏方不蛀皂角用碗燒置於桶內熏其後部自通調導飲治婦人産前産後大便不通當歸川芎防風枳殼制各四分甘草炙二錢上細銼每服三錢食前薑棗煎服附諸方潤腸丸東垣方治脾胃中伏火大便祕澀或乾燥祕塞不通全不思食乃風結祕血結祕皆令閉塞也以潤燥和血疏風自然通麻子仁桃仁去皮尖各一兩羌活當歸尾煨大黃各半兩上件除麻仁桃仁另研如泥外搗羅為末以上火煉蜜丸如桐子大每服三五十丸空心白湯送下如病人不大便為大便不通而澀其邪盛者急加酒製大黃以利之如血燥而大便燥乾者加桃仁酒製大黃如風結燥大便不行者加麻子仁大黃如風濕而大便不行者加皂角仁大黃秦艽以利之如脈澀覺身有氣澀而大便不通者加郁李仁大黃以除之氣燥如寒陰之病為寒結閉而大便不通者以局方中半硫丸或加煎附子乾薑湯冰冷與之其病雖陰寒之證常當服陽藥補之若大便不通者亦當十服中與一服藥微通其大便不令閉結乃治之大法若病人雖是陰證或是陰寒之證其病顯燥脈實堅亦宜與陽藥中少加苦寒之藥以去熱燥燥止勿加如陰燥欲坐井中者其二腎脈必按之虛或沉細而遲此易為辨耳知有客邪之病亦從權加藥去之當歸潤燥湯升麻二錢當歸熟地黃各一錢生地黃二錢甘草大黃桃仁埿子麻仁各一錢紅花少許上件除桃仁麻仁另研如泥外銼如麻豆大作一服水二大盞入桃仁麻仁煎至一盞去滓空心宿食消盡熱服之導滯通幽湯治大便難幽門不通上衝吸門不開噎塞不便燥閉氣不得下治在幽門以辛潤之當歸升麻桃仁泥各一錢生地黃熟地黃各五分紅花炙甘草各一分上件作一服水二盞煎至一盞去滓調檳榔細末半錢稍熱服四物湯治臟結祕澀當歸熟地黃川芎白芍藥大黃煨桃仁去皮尖各一錢上㕮咀作一服水二盞煎八分去滓服或為丸亦得橘杏麻仁丸治噎膈大便燥結方見膈噎門六味地黃丸治下焦燥熱小便澀而數方見虛損門大補丸治陰虛燥熱方見火門
