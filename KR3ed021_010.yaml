body:
  text: 卷之十漏濁漏濁方論精之主宰在心精之藏制在腎凡人酒色無度思慮過情心腎氣虛不能管攝往往小便頻數漏濁之所由生也因小便而出者曰尿精因見聞而出者曰漏精心不足而挾熱者為赤濁心不足而腎冷者為白濁陰不升陽不降上下乖暌是以有清濁不分之證藥法品量條列於下要必體認之精而後發用之審歟外此又有脾精不禁小便漏濁淋瀝不止手足力乏腰背痠疼盍用蒼朮等劑以斂脾精斂脾謂何精生於穀也漏濁證治約精丸治小便中泄精不止白龍骨二兩研細新韭子冬霜後採者一斤好酒浸一宿次日搗細上末酒調糯米為糊丸桐子大每服三十丸空心鹽湯下蓮子六一湯治心熱赤濁石蓮肉連心用六兩甘草炙一兩上末每服二錢食後燈心一小撮煎湯調下清心蓮子飲治心中客熱煩躁赤濁肥脂石蓮肉白茯苓各一兩益智仁遠志水浸取肉薑製炒麥門冬去心人參各半兩石菖蒲車前子白朮澤瀉甘草微炙各一分上銼散每服三錢添燈心一握煎服有熱加薄荷辰砂妙香散方見黃疸門蠟苓丸方見消渴門治小便赤濁又五苓散方見水飲門可夾和辰砂妙香散每服一錢用燈心並去心麥門冬煎湯調下男女通用雞清丸便濁通用圓白半夏生上為末用雞子清丸桐子大稍干以木豬苓末夾和慢火同炒丸子裂為度留木豬苓末養藥瓷器密收每三十丸食前白茯苓煎湯下或用鹽湯寧志膏調平心氣赤白濁通用方方見心疼門十四友丸治心虛便濁方見驚悸門妙應丸赤白濁通用真龍骨辰砂厚牡蠣以腐草鞋重包插定火煅並研細石菖蒲各二錢半白茯苓益智仁石蓮肉縮砂仁各三錢半川楝子蒸去皮取肉焙桑螵蛸瓦上焙菟絲子酒浸一宿焙杵各半兩上末以山藥碎炒末為糊丸桐子大每五十丸日間煎人參酸棗仁湯下臨臥粳米湯下遠志丸治心氣不足遺精白濁遠志水浸取肉姜醃焙乾山藥炒熟地黃洗灑天門冬去心龍齒研細各一兩半麥門冬去心北五味子車前子略炒白茯苓茯神去木地骨皮各一兩二錢半辣桂六錢一字上末煉蜜丸桐子大每五十丸食前粳米湯下茯菟丹赤白濁通用方見消渴門赤濁燈心煎湯下白濁白茯苓煎湯下平補丸治腎虛心熱小便急而數澀而瀝如水竇欲滲之狀又且油濁方見消渴門兼用辰砂妙香散佐之方見黃疸門牡蠣丸治精氣不禁白濁夢遺圓白半夏一兩湯洗十次每個作二片以木豬苓去皮二兩為粗末同半夏慢火炒黃放地出火毒一宿上末用木豬苓入煅過厚牡蠣粉一兩同末以山藥糊丸桐子大留木豬苓養藥瓷器密收每三十丸茯苓煎湯下金櫻子丸治諸虛漏精白濁真龍骨厚牡蠣煅桑螵蛸各一兩上以雄黑豆一盞淘濕將前三件置豆上蒸半日去豆焙三件為末入白茯苓一兩末金櫻子四十九枚去刺並瓤蒂洗淨捶碎瓷器內入水一盞濃煮汁濾清調茯苓末為糊丸桐子大每三十丸食前用益智五枚連殼捶碎北五味子十粒縮砂仁三個煎湯下小菟絲子丸用北五味子煎湯下治諸虛白濁方見疸門桑螵蛸散治心腎不和小便白濁或如米泔或為夢泄桑螵蛸蒸過略焙遠志水浸取肉曬薑汁和焙石菖蒲人參白茯神當歸龍骨別研鱉甲醋炙黃各半兩甘草炙二錢上為末每服二錢人參茯苓煎湯調下夜臥服生料四君子湯方見疸門生料五苓散方見水飲門二藥夾和每服二錢用燈心一撮同煎服治小便白濁龍齒補心湯治諸虛不足虛熱潮來心神驚惕睡臥不寧小便油濁龍齒煅別研人參當歸酒浸一宿焙熟地黃洗焙北梗焙酸棗仁炒白茯苓白茯神去木遠志水浸取肉曬薑汁醃焙枳殼去瓤麩炒麥門冬去心半夏曲白朮甘草炙各半兩肉桂二錢半綿黃耆七錢半蜜炙上粗末每服三錢水盞半姜五片粳米一小撮同煎不時服臨臥服煉鹽方治漏精白濁雪白鹽入瓷瓶內築十分實以瓦蓋頂黃泥塗封火煅一日取出放陰地上一夜密器收白茯苓山藥炒各一兩上為末入鹽一兩研和用沸湯浸棗取肉研夾煉蜜再研為丸桐子大每服三十丸空心棗湯下蓋欲甘以濟咸脾腎兩得也山藥丸乾山藥二兩北五味子蓯蓉酒浸焙各四兩菟絲子酒浸軟研焙三兩牛膝酒浸焙澤瀉熟地黃洗山茱萸茯神去木巴戟去心赤石脂各一兩杜仲銼薑汁醃炒一兩上末煉蜜丸桐子大常服三十丸鹽湯下安腎丸方見水飲門白丸子方見身疼門山藥丸方見前三藥夾和每服七十丸食前煎雙和湯送下方見虛勞門治虛勞羸瘦浮膩白濁還少丹治心腎俱虛漏精白濁方見虛勞類鹿茸益精丸治心虛腎冷漏精白濁鹿茸去皮酥炙微黃桑螵蛸瓦上焙肉蓯蓉當歸巴戟去心菟絲子酒浸軟研杜仲截碎薑汁醃炒斷絲川楝子蒸去皮取肉焙益智仁禹餘糧煅紅醋淬以碎為度各三分韭子微炒故紙炒山茱萸赤石脂龍骨別研各二分滴乳香一分上細末酒調糯米糊丸桐子大每七十丸食前白茯苓煎湯下家韭子丸治陽氣衰敗白濁遺精家韭子六兩炒鹿茸四兩酥炙蓯蓉酒浸焙牛膝熟地黃洗曬當歸各二兩巴戟去心菟絲子酒浸研焙各一兩半杜仲銼姜醃炒石斛桂心乾薑生各一兩上末酒調糯米為糊丸桐子大每服七十丸空心鹽湯下亦治胞冷遺尿震靈丹治腎經虛憊漏濁不止方見瀉門用二陳湯加白茯苓送下方見瘧類白丸子治陰陽不調清濁相干小便渾濁方見身疼門用茯苓湯送下分清飲治思慮過度清濁相干小便白濁益智仁一兩醋浸一宿川萆薢石菖蒲去毛天台烏藥白茯苓各一兩甘草四錢上為末每二錢鹽少許同煎食前服蒼朮難名丹治元陽氣衰脾精不禁漏濁淋漓腰疼力疲蒼朮杵去粗皮一斤米泔浸一日夜焙乾舶上茴香炒川楝子蒸去皮取肉焙乾各三兩川烏炮去皮臍故紙炒白茯苓龍骨別研各二兩上末酒麵糊丸桐子大硃砂為衣每服五十丸空心縮砂煎湯下粳米湯下蒼朮收斂脾精附諸方妙應丸治赤白濁真龍骨辰砂石菖蒲各二錢半川楝子取肉半兩白茯苓益智仁石蓮肉縮砂仁各一錢半桑螵蛸瓦上焙菟絲子酒浸一宿焙各半兩牡蠣破草鞋包火煅細研三錢上以山藥碎炒為糊丸如桐子大每服五十丸間日煎人參酸棗仁湯下臨臥粳米飲湯下遠志丸濟生方治因事有驚心神不寧夜夢驚墮小便白濁遠志去心薑汁醃石菖蒲各二兩茯神去木白茯苓去皮人參龍齒各一兩上為末煉蜜丸桐子大以辰砂為衣每服七十丸熱湯下一方治心經伏暑小便赤濁人參白朮赤茯苓去皮香薷澤瀉木豬苓去皮蓮肉麥門冬去心各等分上㕮咀每服四錢水一盞煎服一方治小便白濁出髓條酸棗仁炒白朮白茯苓破故紙人參益智洗淨大茴香左顧牡蠣童便煅各等分上為末加青鹽酒丸如桐子大每服三十丸溫酒米飲任下秘傳金鎖思仙丹治男子嗜欲過多精氣不固澀以去脫之劑蓮花蕊十兩暖無毒鎮心忌硫黃蒜石蓮子十兩味甘平溫無毒經秋正黑次水者是也本功益氣安心澀精止痛取淨粉用雞頭實十兩味甘平無毒益精氣強志取其實並中子搗爛曝乾再搗篩取淨粉上以金櫻子三斤取霜後半黃者木臼中轉杵卻刺勿損擘為兩片去水淘淨爛搗入大鍋以水煎不絕火約水耗半取出濾過重煎如稀餳市肆乾者焙之用水浸軟去子煎令如法入前藥末和丸桐子大每服三十丸空心鹽湯下針灸法陰交一穴在臍下一寸氣海一穴在臍下一寸半關元在臍下三寸夢泄夢泄方論邪客於陰神不守舍故心有所感夢而後泄也其候有三年少氣盛鰥曠矜持強制情欲不自覺知此泄如瓶滿而溢者也人或有之是為無病勿藥可矣心家氣虛不能主宰或心受熱陽氣不收此泄如瓶之側而出者也人多有之其病尤輕合用和平之劑臟腑積弱真元久虧心下攝念腎不攝精此泄如瓶之罅而漏者也人少有之其病最重須當大作補湯或謂夢泄尤甚於房勞此世俗習聞其說也獨不觀證候之有重輕乎外此又有一輩神氣消靡怪異橫生風邪乘其虛鬼氣於其正往往與妖魅交通是又厄運之不可曉者也法藥相助誠哉是言夢泄證治茯苓丸治心虛夢泄白茯苓上為末每服四錢粳米湯調下間用溫熟水調下空心食前臨臥日三服蓮子六一湯雞清丸方見漏濁門辰砂妙香散方見疸門治心熱夢泄並用燈心一握煎湯下鹿角散治臟腑久虛夢泄鹿角屑鹿茸去皮酥炙各一兩白茯苓三分人參白茯神桑螵蛸蒸焙芎藭當歸故紙炒龍骨別研新韭子酒浸一宿焙各半兩柏子仁去殼甘草炙各一分上末每服三錢半姜五片棗三枚粳米百粒食前煎服還少丹方見虛勞門鹿茸益精丸家韭子丸方見漏濁門大補虛損夢遺用十補湯送下方風痼冷門間用滴乳香末泡湯下震靈丹封固下焦治夢泄不止方見瀉門空心人參北五味子煎湯下附諸方秘傳龍骨鎖精丹白龍骨煅二兩半牡蠣煅二兩知母五錢黃柏六錢豬苓五錢人參去蘆一兩遠志甘草湯煮去心一兩半上為細末酒糊為丸如梧桐子大每服四五十丸空心鹽酒或鹽湯送下固精丸治心神不安腎虛自泄精知母炒黃柏酒炒各一兩牡蠣煅龍骨煅芡實蓮蕊茯苓遠志去心山茱萸肉各三錢上為末煮山藥糊丸梧子大硃砂為衣服五十丸芡實丸濟生方治思慮傷心疲勞傷腎心腎不交精元不固面少顏色驚悸健忘小便赤澀遺精白濁足脛痠疼耳聾目暗芡實蒸去皮蓮花須各二兩茯神去木山茱萸肉龍骨生用五味子枸杞子熟地黃酒蒸韭子炒肉蓯蓉酒洗川牛膝去蘆酒洗紫石英煅七次各一兩上為末酒煮山藥為丸如梧子大每服七十丸空心鹽湯下玉鎖丹御藥院方治精氣虛滑遺泄不禁龍骨蓮花蕊雞頭實烏梅肉各等分上為末用熟山藥去皮為膏和丸小豆大每服三十丸空心米飲下秘傳金鎖思仙丹桑螵蛸散並見漏濁門
