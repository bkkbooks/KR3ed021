木香半兩丁香一分澤瀉一兩半以上並生用海藻酒浸一宿焙乾海浮石米醋浸火煅紅淬醋又煅淬如此七次黑為度穿山甲熱火灰煨焦各一兩青皮去白二兩一兩生用一兩截碎以斑蝥五十個去頭足翅同炒黃色去斑蝥不用香附杵淨二兩一兩生用一兩以巴豆五十粒去殼同炒色焦去巴豆不用上件截碎夾和微炒併為末酒面稀糊丸桐子大每服三十丸溫酒送下此藥能泄斟酌用之川楝散治膀胱小腸氣木腎諸疝通用方見木腎門金山老艾瓜丸治腎氣攻刺及腳氣痠疼通用皆得效葫蘆巴慢火炒牛膝酒浸焙舶上茴香酒浸炒肉蓯蓉酒浸焙川續斷揀淨生用厚杜仲去粗皮薑製炒令絲斷天麻各二兩當歸酒浸焙沒藥別研各一兩上為末以艾去枝梗二兩大木瓜二枚切蓋去穰入艾塞滿蓋定竹針插麻線系蒸爛研細和藥為丸桐子大每服七十丸溫酒鹽湯任下腎氣方大七氣湯加炒牽牛煎服又方生薑母多開小孔納以川椒濕紙煨透老酒嚼下附諸方川楝子散治小腸氣痛木香不見火茴香鹽炒黃去鹽川楝子用巴豆十粒槌粹同川楝炒黃色去巴豆各一兩上為末每服二錢溫酒空心食前調服玄胡索散治小腸氣痛用玄胡索鹽炒乾薑各等分為細末空心鹽酒調下腎氣方丹溪方治諸疝定痛茴香破故紙吳茱萸鹽炒各五錢葫蘆巴七錢半木香三錢半上為末蘿蔔搗汁丸鹽湯下守效丸治㿗疝要藥不痛者蒼朮南星白芷散水山楂各一兩川芎枳殼又云枳實炒半夏各半兩秋冬加吳茱萸上為末神麯糊丸服又云有熱加山梔一兩堅硬加朴硝半兩又或加青皮荔枝核又方治㿗疝南星山楂蒼朮各二兩白芷半夏制枳核神麯各一兩海藻半兩昆布半兩玄明粉吳茱萸各二錢上為末酒糊丸積疝方山楂炒一兩茴香炒柴胡炒二錢牡丹皮一錢上為末酒糊丸如梧子大服五六十丸鹽湯下又方治疝作痛蒼朮香附俱鹽炒黃柏酒炒以上為君玄胡索益智仁桃仁以上為臣茴香炒附子鹽炒甘草以上為使上為末作湯服後一痛過更不再作矣治偏墜用沒藥川楝肉角茴全蠍為末每服二錢空心熱酒調下木腎木腎方論心火下降則腎水不患其不溫真陽下行則腎氣不患其不和溫溫其和安有所謂木強者哉惟夫嗜欲內戕腎家虛憊故陰陽不相交水火不相濟而沉寒痼冷凝滯其間脹大作疼頑痹結硬勢所必至矣執劑之法不可純用燥熱當溫散溫利以逐其邪邪氣內消營衛流轉盎如寒谷回春蓋有不疾而速不行而至者矣外此又有一種升高墜下外腎跌傷驚氣與敗血交攻亦有木強脹痛之證治法大要則同於中更為之消淤木腎證治川楝散治外腎脹大麻木痛硬及奔豚疝氣偏墜諸證川楝子不蛀者四十九個先切七個取肉以茴香二錢半慢火同炒並留茴香又切七個以破故紙二錢半同炒並留故紙又切七個以黑牽牛二錢半同炒並留牽牛又切七個以鹽一錢同炒並留鹽又切七個以斑蝥十四個去翅同炒去斑蝥不用又切七個以巴豆肉十四個作兩斷同炒去巴豆不用又切七個以蘿蔔子二錢半同炒去蘿蔔子不用外更別入茴香炒青木香各半兩辣桂南木香各二錢半上併為末酒調稀麵糊丸桐子大每服三十丸食前鹽湯下積日計功打墜瘀血證本方加延胡索半兩略炒入藥以沒藥研為末調酒下金鈴散煨棗方治膀胱小腸氣痛外腎脹大通治木腎方見腎氣門四神丸治腎冷疝氣脹痛吳茱萸揀淨一兩一半用老酒浸一宿一半用米醋浸一宿各焙乾大香附杵淨一兩蓽澄茄青木香各半兩上為末米糊丸桐子大每服七十丸食前鹽湯下或乳香蔥白煎湯下附諸方一方治木腎不痛枸杞子南星半夏黃柏酒炒蒼朮鹽炒山楂白芷神麯炒滑石昆布吳茱萸上為末酒糊丸桐子大空心鹽湯下七十丸治小腸氣及木腎偏墜方黑牽牛一斤用豬尿胞裝滿以線縛定口子好酒米醋各一碗於砂鍋內煮乾為度取去黑牽牛用青紅娘十九個於鐵鍋內炒燥去青紅娘子將牽牛研取頭末四兩另入豬苓澤瀉細末各二兩醋糊丸如梧桐子大每服三十丸空心鹽酒送下不可多服如多服令人頭眩如頭眩可服黑錫丹奪命丹和劑方遠年近日小腸疝氣臍下撮痛外腎偏墜腫硬陰間濕癢抓成瘡癬吳茱萸一斤酒浸四兩醋浸四兩湯浸四兩童便浸四兩各浸一宿用火焙乾澤瀉去灰土二兩上為末酒煮麵糊丸如梧子大每服五十丸溫酒鹽湯任下一方治木腎楮樹葉又云楊樹雄者曬乾為末酒糊丸桐子大空心鹽湯下五十丸
