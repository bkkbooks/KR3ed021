body:
  text: 卷之十八身體身疼方論凡人百骸四體肌肉皮膚關節脈絡總而謂之身風淫濕滯血刺痰攻皆能作痛至於骨之痠疼或寒或熱入里徹骨則倍蓰千萬大不侔焉蓋骨為髓之臟髓者飲食五味之實秀也髓虛則骨虛勢所必至矣痛在於身風之證以走注知之濕之證以重著驗之血有筋脈鑽刺之證痰有眩暈咳唾之證驅風除濕行血豁痰對證一投猶冀可以旦暮起病入於骨此勞極損傷之不可救藥者也其能生乎然則身痛之與骨痛毫釐千里之差於此不可以無辨雖然酒家之癖多為項腫臂痛蓋熱在上焦不能清利故醞釀日久生痰涎聚飲氣流入於項臂之間不腫則痛耳然而曰痰曰涎曰飲又有理一分殊之別伏於包絡隨氣上浮客肺壅嗽而發動者痰也聚於脾元隨氣上溢口角流出而不禁者涎也惟飲生於胃腑為嘔為吐此則胃家之病學者不可不知身疼證治人參順氣散身疼通用方見風類更增川芎半兩亦散風邪左經丸麝香丸增味五痹湯治風淫身痛並見風類加劑除濕湯生附除濕湯方見濕類五苓散見水飲類並主傷濕身痛黃耆建中湯方見濕類加川芎當歸治血刺身痛大半夏湯方見痰涎類加辣桂陳皮治痰證身痛消痰茯苓丸治臂痛不能舉手或左右轉移或兩臂如人抽拽圓白半夏蕩洗三次切碎曬乾一兩半茯苓一兩風化朴硝一分枳殼麩炒半兩上末薑汁煮稀麵糊丸桐子大每三十丸食後薑湯下天仙飲治痰注臂痛片子薑黃六錢天仙藤羌活白朮白芷梢各三錢半夏制半兩上銼每服三錢姜五片煎服間下千金五套丸方見脾疼類白丸子諸風痰涎通用圓白半夏七兩生水浸洗過南星三兩白附子生二兩川烏頭生去皮臍半兩上細末入生絹袋井水擺以手揉出滓再研入袋擺盡磁盆中曬露星至曉棄舊水換新水攪曬次早又換新水攪曬春五日夏三日秋七日冬十日去水曝乾研開糯米粉煎粥清丸緑豆大每三十丸薑湯下治酒家痰壅項腫白丸子二錢研末白豆蔻縮砂煎湯調下吐痰立愈自後二陳湯加荊芥服方見瘧門婆蒿根酒治風淫濕滯手足不舉筋節攣疼先與通關用全蠍七個新瓦上微炒末之麝一字上老酒三盞空心調作一服如覺已透則止未透次日再作一劑然病未盡除自後專以婆蒿根洗淨切碎酒煎日二服神效消飲丸倍術丸治酒癖停飲臂痛見水飲門沉香鱉甲散治勞倦身痛沉香人參牛膝茯苓秦艽木香黃耆微炙巴戟去心當歸半夏制柴胡荊芥各半兩熟附子辣桂去粗皮鱉甲浸去裙醋炙黃各一兩羌活熟地黃洗酒蘸蒸焙各七錢半全蠍二錢半大肉豆蔻四個上末每二錢蔥白二寸姜三片棗二枚食前煎服溫酒調下尤妙十補湯加製半夏添桂治勞倦身痛方見痼冷門舒筋散治風淫血刺身體疼痛四肢拘攣延胡索炒辣桂去粗皮當歸等分上末每二錢酒調下延胡索活血除風理氣補髓丹補益真元治臂痛腰痛杜仲去粗炒黑十兩破故紙十兩用芝麻五兩同炒候芝麻黑篩去之鹿茸二兩酒炙沒藥一兩別研上細末用胡桃肉三十個湯浸去皮杵為膏入面少許酒煮糊丸桐子大每百粒空心鹽湯下附諸方通氣防風湯拔粹方肩背痛不可回顧者此太陽氣鬱而不行以風藥散之背痛項強腰似折項似拔者此足太陽經不通也羌活獨活各一錢蒿本防風甘草各半錢川芎荊芥各三分上㕮咀水煎服麒麟竭散治寒濕搏於經絡以致氣血凝滯疼痛不可忍者血竭乳香沒藥白芍藥當歸水蛭炒令煙盡麝香各二錢虎脛骨酥炙黃半兩上為末每三錢溫酒調下食前當歸拈痛湯拔粹方治濕熱為病肢節煩痛肩背沉重胸膈不利及遍身疼痛下疰於足脛痛腫不可忍方見腳氣門丹溪方治上中下疼痛南星薑製蒼朮泔洗黃柏酒炒各二兩川芎一兩白芷半兩神麯炒一兩桃仁半兩威靈仙酒炒三錢羌活三錢走骨節防己半兩下行桂枝三錢行臂紅花酒洗錢半龍膽草半錢下行上為末麵糊丸梧子大每服一百丸空心白湯下一方治血氣虛有痰白濁陰火痛風人參一兩白朮熟芐川黃柏炒黑各二兩山藥海石南星各一兩鎖陽半兩敗龜板酒炙二兩乾薑燒灰半兩取其不走上為末粥丸一云酒糊丸一方治酒濕痰痛風黃柏酒炒威靈仙酒炒各五錢蒼朮羌活甘草三錢陳皮芍藥各一錢上為末每服一錢或二錢沸湯入薑汁調下諸風應效酒治一切諸般風氣濕痹通身骨節疼痛方見風門腰腰痛方論腰者腎之外候一身所恃以轉移闔闢者也蓋諸經皆貫於腎而絡於腰脊腎氣一虛凡衝風受濕傷冷蓄熱血瀝氣滯水積墮傷與夫失志作勞種種腰痛疊見而層出矣衝風者汗出乘風風邪風毒之胚胎也受濕者踐雨臥濕重著腫滯之萌蘖也腰間如水為傷冷發渴便閉為蓄熱血瀝則轉側如錐之所刺氣滯則鬱鬱悶悶而不伸積水沉重則小腸不得宣通墜墮損傷則瘀血為之凝結沮挫失志者腎之蠹疲精勞力者腎之戕舉是數證腎家之感受如此腰安得而不為痛乎內經曰腰者腎之府轉搖不能腎將憊矣審如是則痛在少陰必究其受病之源而處之為得雖然宗筋聚於陰器肝者腎之同系也五臟皆取氣於谷脾者腎之倉廩也鬱怒傷肝則諸筋縱弛憂思傷脾則胃氣不行二者又能為腰痛之寇故並及之腰痛證治青娥丸治腎虛腰痛益精助陽烏須壯腳用安胎飲吞神效破故紙四兩炒香杜仲去粗銼四兩用生薑二兩半擦醃炒乾上為末用胡桃肉三十個研膏入少熟蜜丸桐子大每服五十丸調氣散食前下方見脹滿門安腎丸治腎虛腰痛橘皮煎湯食前下方見水飲門獨活寄生湯治風邪冷濕傷腎腰腳背痛及新産腹痛腰腳攣疼最除風活血腳氣通用獨活二兩半桑寄生如無以續斷代之杜仲薑製炒細辛牛膝酒浸焙秦艽去蘆茯苓白芍藥辣桂川芎防風人參當歸熟地黃淨甘草炙各二兩上細銼每服三錢空心煎服下利者去地黃小續命湯治風攻腰痛方見風門加桃仁去皮尖炒生附湯治受濕腰痛附子生一分蒼朮炒杜仲薑製炒各半兩生乾薑白朮茯苓牛膝酒浸焙厚朴制甘草炙各一分上銼每三錢姜四片棗二枚食前煎服姜附湯治傷冷腰痛方見寒類加辣桂制杜仲食前煎服甘豆湯治內蓄風熱入腎腰痛大小便不通方見積熱門加續斷天麻間服敗毒散方見寒類蘇沈沉麝丸治血瀝腰痛方見血類用續斷牛膝桃仁炒煎湯磨下人參順氣散烏藥順氣散治氣滯腰痛方見諸風類加五加皮入少甘草煎湯調下腎著湯治腰間積水痛重方見濕門續用安腎丸並少許青木香丸繼之方見水飲門乳香趁痛散治打墜腰痛虎脛骨酒炙黃敗龜酒炙各二兩麒麟竭赤芍藥當歸沒藥自然銅煅醋淬細研防風白附子炮辣桂去粗白芷蒼耳子微炒骨碎補炒去毛各三兩牛膝天麻檳榔五加皮羌活各一兩上末每服一錢溫酒調下加全蠍炒腳氣通用茴香酒治打墜凝淤腰疼通用破故紙炒香研茴香炒辣桂等分上為末每服二錢熱酒調食前進故紙主腰痛主行血和劑七氣湯治失志傷腎氣挫腰痛方見氣類多加白茯苓少加沉香乳香麝香鹿茸丸八味丸治房勞傷腎腰痛十補湯下青娥丸治勞力腰痛三方見痼冷門調肝散治鬱怒傷肝發為腰痛半夏制三分辣桂宣木瓜當歸川芎牛膝好細辛各二分石菖蒲酸棗仁蕩去皮微炒甘草炙各一分上銼細每三錢姜五片棗二枚煎服沉香降氣湯和調氣散每服二錢半薑棗煎治憂思傷脾發為腰痛方見諸氣門橘香丸治腰痛經久不瘥橘核茴香葫蘆巴菴䕡子破故紙各炒附子炮等分上末酒煮糯米糊丸桐子大每服三四十丸食前鹽湯下神麯酒治腰痛不能轉側陳久神麯一大塊燒通紅淬老酒去神麯通口吞青娥丸兩服頓愈腰重痛方八角茴香炒末食前溫酒調下附諸方獨活湯治因勞役得腰痛沉重如水似折羌活防風獨活肉桂大黃煨澤瀉三錢桃仁五十個當歸連翹半兩甘草二錢防己酒連一兩上㕮咀水一盞酒一盞煎至一盞去滓通口食前服補髓丹百一選方升降水火補益心腎強筋壯骨治腎虛腰痛方見身體門若濕腰痛如坐水中蓋腎屬水久坐水濕處或為雨露所著濕流入腎經以致腰痛宜滲濕湯不效宜腎著湯若風傷腎而腰痛者或左右痛無常處牽引兩足宜五積散每服加防風半錢或加全蠍三個小續命湯獨活寄生湯可選而用經驗羌活桃仁湯治墜墮挫閃氣血凝滯攻刺腰痛神效桃仁去皮尖紅花牛膝酒洗玄胡索破故紙炒杜仲炒川歸尾酒洗羌活官桂蒼朮泔浸炒各等分茴香乳香少許上㕮咀用水一鍾酒半鍾煎至八分食前溫服補陰丸治腎虛腰痛方見虛勞門牛膝酒三因方治腎傷於風毒攻刺腰痛不可忍者地骨皮五加皮薏苡仁川芎牛膝各二兩甘草一兩生地黃十兩海桐皮二兩羌活一兩上㕮咀用絹帛裹藥入無灰酒內炙浸七日夏三五宿每服一杯日用三四服長令酒氣不絶一法加炒杜仲一兩杜仲酒三因方治風冷傷腎腰痛不能屈伸杜仲一兩去粗皮用薑汁製炒上用無灰酒三升浸十日每服二三合四五服針灸法腎俞二穴在十四椎下兩旁各寸半一法令患人正立用竹杖度臍點記度皆盡處灸隨年壯腎氣腎氣方論腎主納氣人之氣海系焉腎虛而為風寒所乘為暑濕所襲為喜怒憂恐所傷而水結不散又與氣搏是以群邪聚於其中曰疝曰奔豚曰小腸氣曰膀胱氣皆是物也其候不特外腎小腹作痛或攻刺於腰脅或遊走於背膂或冷氣搶心心下痛滿或手足厥冷痛繞臍傍或脅之左右如杯或臍之上下如臂或腹中纍纍如桃李或胃脘間覆大如盤有壯熱惡寒者有灑淅寒熱者有不得大小便者有裡急而下泄者有自汗出者有不欲食者其於陰間則卵有小大伸縮而上下不常囊有腫脹急痛而發歇無定挾冷觸怒則塊物逼上囊根或攻腹脅時和心平則塊物自循膋系歸入囊中凡此皆謂之腎氣治法綱領風則散之寒則溫之暑則解其熱濕則滲其水七情所發調其心氣水與氣搏行其小便其間以主治腎氣之劑參之固定則也然總治之法大要以流行疏利為先毋曰腎虛得病不敢疏泄蓋腎為邪氣所幹若非逐去病何由愈倘或姑息畏虛妄以剛劑兜住使大小腑祕而不通邪氣入腹衝心危殆必矣雖然腎氣發作固以腎虛得之然虛中有冷虛中有熱又有冷熱不調尤當詳審冷者脅邊及外腎清冷小便清而多遇寒則發是也熱者內挾暑氣或積酒毒或服暖藥於前外腎與小腹俱熱肛門間糞後亦熱小便數而澀遇熱則甚是也冷熱不調者小腹外腎乍冷乍熱大便小便或祕或利用藥溫涼當隨證而權度之但所謂流行疏導常常運斡於其中矣其若大小便流利之後或更有牽刺引疼或微氣遊注於肌膚之間此則腎虛血虛氣不還元當加潤養人參當歸川芎芍藥桑螵蛸葫蘆巴輩又不可無惟是逆氣長噓中脘停酸燥悶擾擾甚而至於嘔吐最為惡候何則天一生水腎實主之宗筋聚於陰器惟藉陽明以養之今脾土不濟腎水上乘必為酸汁必為涎飲荏苒逾時遂成暴吐醫家執劑之始皆知腎經惡燥如蒼朮白朮良薑之類誠不敢發用耳及其嘔吐大作薑術輩用之而不顧若猶未也則吳茱萸蓽茇剛燥等劑又加多焉雖附子亦用之而救急矣病勢至此脾土未強腎水已為之涸腎水既涸脾土又為之焦往往陰陽不升降營衛不流行大小二便關格澀閉而腎汁胃汁皆自其口出也如此者大抵不救臨病須當識證預與病家言之腎氣證治牡丹丸治風寒疝痛及諸血滯作痛牡丹皮四兩桃仁浸去皮炒別研官桂各五兩川烏頭一隻炮熱去皮尖上末煉蜜丸桐子大每服五十丸溫酒下血痛醋湯下養正丹方風痼冷門治奔豚氣痛嘔吐身冷調氣散下沉附湯治腎虛無陽小腸