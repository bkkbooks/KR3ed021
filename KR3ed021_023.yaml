body:
  text: 卷之二十三腸癰腸癰論癰發於外人可得見者猶為危急之疾而況隱伏腸間痛無定處人不可得而見者乎蓋癰疽五發在外則為發背發腦發眉發須發頤在內則為腸癰心癰腎癰肺癰臍癰等患治之得法尚庶幾焉一著少差枰棋去矣何則腸癰為病身皮甲錯腹皮緊急如腫之狀而按之濡體無哄熱腹無積聚者此積陰冷之所致也當以溫藥調之發熱無汗灑淅惡寒小腹腫強而按之痛小便澀數其候如淋者此內結熱之所致也當以涼劑利之其脈遲緊膿未成者可下其脈洪數膿已成者不可下甚者腹肚脹大轉側聞有水聲或繞臍生瘡膿汁穿出或臍中常常出膿或大便屢下膿血凡此皆為惡證其間寒熱氣急煩渴驚悸嘔惡唾膿咳嗽痰涎自汗自利如尋常發癰之狀亦類有此婦人尤多得之但恐世俗不識其證耳抑余聞焉內經有曰息賁病有人得之二三年遍身微腫其後大腸與臍俱出膿血遂至不救此亦腸癰類也又可不審思而明辨之乎腸癰證治牡丹散治腸癰冷證腹濡而痛時時利膿人參牡丹皮白茯苓天麻黃耆木香當歸川芎辣桂桃仁浸去皮炒各三分白芷薏苡仁甘草炙各二分上末每服三錢井水煎食前服木通散治腸癰熱證腹痛而強發熱惡寒小便似淋膿未成者用此木通薏苡仁葶藶炒甘木炙川升麻北梗桃仁浸去皮炒赤茯苓牡丹皮各一兩生乾地黃甜瓜子敗醬赤芍藥各一兩半大黃半兩朴硝一分上銼為散每服三錢井水一盞半薑五片煎服四聖散治腸癰癰疽便毒神效生黃栝蔞一枚去皮粉草末四錢沒藥末三錢乳香末一錢上件用好紅酒二大碗慢火煎至一碗分作兩服二日服盡大便順導惡物妙若干栝蔞則用二枚薏苡湯治腸癰冷熱證通用方見血類加北梗甘草煎服究原排膿內補散治腸癰冷證及癰疽等患人參當歸川芎厚朴薑製防風北梗焙白芷辣桂黃耆炙甘草炙白茯苓等分上為末每服三錢溫酒調下如不飲酒南木香煎湯下諸癰熱證黃栝蔞煎湯下雲母膏治內外一切癰腫結毒冷熱證通用藥料四十件修製法度詳見和劑方每服一錢丸如梧桐子大冷證以酒送下熱證甘草煎湯送下又肺癰胸膈間隱痛而咯膿血腥氣上衝濃煎北梗甘草湯送下服畢皆就枕蠟礬丸治諸癰腫毒痔瘻惡瘡方見痔門燒棗散治腸癰干棗連核燒存性川百藥煎研細等用上為末每服一錢米飲調下附諸方祕傳薏苡仁湯治腸癰腹中㽱痛煩毒不安或脹滿不食小便澀婦人産後虛熱多有此病縱非是癰證疑似間便可服薏苡仁五錢牡丹皮桃仁去皮尖炒各三錢瓜仁四錢上㕮咀分二帖每帖水二盞煎八分去滓溫服一方治肚癰便癰牽牛末一兩大黃半兩牛蒡子二錢半補骨脂一錢二分半上為細末冷蜜水調空心服每二錢加芒硝妙牡丹湯治腸癰小腹腫痞按之即痛小便如淋或小便自調時時發熱自汗出復惡寒其脈遲緊者膿末成可下之當有血洪數者膿已成不可下大黃蒸桃仁去皮尖各五錢牡丹一錢一字栝蔞實三錢芒硝三錢三分包上㕮咀作一服煎去滓入芒硝再煎沸頻服未效再服敗毒散方見傷寒門神效托裡散和劑方治癰疽發背腸癰奶癰無名毒腫焮作疼痛憎寒壯熱類若傷寒不問老幼虛人並治之忍冬草去梗黃耆各五兩去蘆當歸八兩二錢甘草炙八錢上為細末每服二錢酒一盞半煎至一盞病上食後病下食前少頃再進滓外敷未成內消已成即潰也一方治腹內癰腫大黃一兩取末四錢半破故紙一兩取末二錢牛蒡子一兩取末一錢牽牛一兩取末二錢半上和作二服蜜水調空心服以利為度丹溪云大腸有痰積死血流注用桃仁承氣湯加連翹秦艽近肚門破入風者難治防風之類桃仁承氣湯方見血門腸風腸風論腸胃不虛邪氣無從而入人惟坐臥風濕醉飽房勞生冷停寒酒面積熱以致榮血失道滲入大腸此腸風臟毒之所由作也挾熱下血清而色鮮腹中有痛挾冷下血濁而色黯腹內略疼清則為腸風濁則為臟毒有先便而後血者其來也遠有先血而後便者其來也近世俗糞前糞後之説非也治法大要先當解散腸胃風邪熱者與敗毒散冷者與不換金正氣散風邪既去然後隨其冷熱而對治之或曰血遇熱則行止血多用涼藥如地榆散柏皮湯黃連阿膠丸酒蒸黃連丸輩施之熱證固當然爾其或陽虛陰走正氣不得歸元則用木香理中湯附子理中湯震靈丹黑錫丹輩如之何而廢之要之芎歸湯一劑又調血之上品熱者如茯苓槐花冷者加茯苓木香此則自根自本之論也雖然精氣血氣生於穀氣靖惟大腸下血大抵以胃藥收功真料四君子湯參苓白朮散以枳殼散小烏沉湯和之胃氣一回血自循於經絡矣抑猶有説焉腸風之與蟲痔特介乎毫芒之間腸風之血自腸中來蟲痔之血肛門邊旁別一小竅射如血線是也逮夫肛門既脫腐血浸淫於其間則俱化為蟲蠹蝕腸口滴血淋漓自此又不能約而收之矣善調理者尤當以蕪荑艾葉苦楝根輩為之化蟲血屬於心雖曰川芎當歸主血當以茯苓茯神佐之前輩止血亦不用甘草但增棗入藥用腸風證治敗毒散不換金正氣散方並見寒類地榆散治腸風熱證下血地榆黃連茜根黃芩茯神各半兩梔子仁一分上粗末每服三錢薤白五寸同煎服又柏皮湯方見瀉類通用酒蒸黃連丸方見疸門黃連阿膠丸方見嗽門茯苓茯神煎湯下治諸下血腹痛痛即是血多服為佳附子理中湯方見寒類理中湯方見瀉類內加木香治虛冷腸風芎歸湯方見血類熱證加茯苓槐花冷證加茯苓木香小烏沉湯香附杵去皮毛焙二兩天台烏藥去心一兩甘草炒一分上為末每一錢鹽點服枳殼散正方不用加藥參苓白朮散方並見虛勞門四君子湯疸門四件夾和薑棗煎服治諸下血烏荊丸治腸風下血諸風抽掣川烏頭一兩炮去皮荊芥穗二兩上為末醋麵糊丸如桐子大每服二十丸枳殼散下不換金正氣散加川芎當歸同煎吞白丸子方見身疼門治腸風及便血妙四君子湯加制白扁豆黃耆治腸風五痔下血痿黃乏力豬臟丸治大人小兒大便下血日久多食易飢腹不痛里不急名曰野雞先用海螵蛸炙黃去皮取白者為末以木賊草煎湯調下服之三日後用淨黃連二兩銼碎嫩豬臟二尺去肥以黃連塞滿豬臟系兩頭煮十分爛研細添糕糊丸如桐子大每服三五十丸米飲下橄欖散治腸風臟毒久不止橄欖核於燈燭上燒存性研為末每服二錢用陳米飲食前調下蒜連丸一名金屑萬應丸治腸風臟毒方見血類法制香附方並黑散子治腸風臟毒方見血門類黑玉丹治腸風痔瘻等疾棕櫚頭髮以皂角水洗淨各二兩刺蝟皮槐角各三兩牛角髓四兩以上並燒存性生油麻雷丸各一兩苦楝根一兩一分乳香半兩麝香二錢豬蹄甲四十九個炒榼藤子炒香一兩一分上為末酒麵糊丸桐子大每服五十丸食前米飲下腸風黑散治腸風下血腹痛敗棕頭髮木饅頭木賊各燒存性槐角炒枳殼制各一分甘草炒焦烏梅肉炒各半分上為末每服二錢陳米飲乘熱調下木賊散治腸風下血木賊去節炒一兩木饅頭炒枳殼制槐角炒茯苓荊芥各半兩上為末每二錢濃煎棗湯調下槐角丸治腸風瀉血脫肛槐角一兩防風地榆當歸枳殼制木賊茯神各半兩上為末酒麵糊丸桐子大每服三十丸米飲下真人養臟湯方見瀉類加生槐花治腸風冷熱不調下血黑聖散治腸風臟毒痔瘻及諸下血當歸川芎茯苓地榆槐花焙敗棕艾葉燒存性百草霜上件等分為末每服二錢食前陳米飲調下鯽魚方治腸風血痔及下痢膿血大活鯽魚一個不去鱗肚下穿一孔去其腸穢入透明白礬一塊如金橘大以敗棕皮重包外用厚紙裹先煨令香熟去紙於尉斗內燒帶生存性為末每服一錢空心溫米飲調下震靈丹方見瀉類玉華白丹方見痢類治臟腑虛損大腸不收久作腸風下血二藥夾用煎不換金正氣散加川芎空心咽下黃龍丸治傷酒臟毒及暑瀉熱瀉黃連淨八兩用酒一大升煮乾研細水麵糊為丸如桐子大每服四五十丸陳米飲湯下消風散治腸風米飲調下吞烏荊丸酒蒸黃連丸隨意方見頭風類腸風久血方吳茱萸淨半兩蕩七次炒過黃連去須七錢上為末陳米糊丸桐子大每服五十丸陳米飲下食前服又方茅花敗荷葉敗棕各半兩燒存性香附杵淨一兩炒鹽和一半炒焦一半略炒上為末食前米飲調下二錢腸風方香附一兩制枳殼三分當歸川芎各半兩槐花炒甘草炙各一分上為粗末每服三錢新水一盞半薑棗煎食前服附諸方加減四物湯治腸風下血不止側柏葉生地黃當歸酒侵去蘆川芎各一兩枳殼去白炒荊芥穗槐花炒甘草炙各半兩上㕮咀每服四錢水一鍾薑三片烏梅少許同煎空心溫服腸風黑散和劑方治腸風下血或在糞前後並皆治之荊芥二兩亂髮槐花槐角各一兩燒甘草炙蝟皮炒各兩半枳殼去白二兩炒一兩上將所燒藥同入瓷瓶內鹽泥固濟燒存三分性出火毒同甘草枳殼搗羅為末每服三錢水一鍾煎七分空心服結陰丹拔粹方治腸風下血臟毒下血諸大便血疾枳殼去瓤麩炒威靈仙黃耆陳皮去白椿根白皮何首烏荊芥穗各半兩上為末酒糊丸梧子大每服五七十丸陳米飲入醋少許煎過要放溫水送下黃連貫衆散張子和方治腸風下血黃連雞冠花貫衆大黃烏梅肉枳殼荊芥各一兩甘草炙七錢五分上為末每服二錢溫米飲下食前一方治臟毒下血用黃連四兩酒侵春秋五日夏三日冬七日曬乾為末以烏梅肉六兩同搗為膏丸如梧子大每二三十丸空心白湯下一方治腸風下血滑石當歸生芐黃芩蒼朮各等分上以水煎服或以蒼朮生芐不犯鐵器為末丸服一方治腸風臟毒用茄蒂燒灰存性為末米飲調下二錢小兒服半錢諸痔諸痔論臟腑本虛外傷風濕內蘊熱毒醉飽交接多欲自戕以故氣血下墜結聚肛門宿滯不散而衝突為痔也肛邊發露肉珠狀如鼠孔時時滴潰膿血曰牡痔肛邊生瘡腫痛突出一枚數日膿潰即散曰牝痔腸口顆顆發癗且痛且癢出血淋瀝曰脈痔腸內結核有血寒熱往來登溷脫肛曰腸痔若血痔則每遇大便清血隨下而不止若酒痔則每遇飲酒發動瘡腫而血流若氣痔則憂恐鬱怒適臨乎前立見腫痛大便艱難強力則肛出而不收矣此諸痔之外證然也治法總要大抵以解熱調血順氣先之蓋熱則血傷血傷則經滯經滯則氣不運行氣與血俱滯乘虛而墜入大腸此其所以為痔也諸痔出血肛門間別有小竅下如血線不與便物共道痔久不愈必至穿穴瘡口不合漏無已時此則變而為瘻矣前乎治法之外抑猶有説焉腸風臟毒之與痔瘻同出而異名也歲積月纍淫蝕腸頭濕爛可畏此果何物致然哉蟲是也其間執劑又當為之化蟲不然古書何以謂之蟲痔氣血下墜衝突為痔既不能坐又不容行立則愈覺其墜矣惟高枕偃仰心平氣定其腫自收諸痔證治清心湯素問云諸痛癢瘡皆屬於心心主血熱諸痔受病之源也此藥主之黃連淨一兩茯神去木微赤茯苓各半兩上為末煉蜜丸如桐子大每服一百丸食前米飲下患痔只是吃白米稀粥疏其腸胃黃連阿膠丸治諸痔解熱調血方見嗽門用枳殼散送下方見虛勞門或黑豆煎湯下解裡熱先用此追風毒銼散治諸痔蘊熱腫痛大便不通加枳殼煎方見腳氣門清涼飲治諸痔熱證大便祕結當歸赤芍藥甘草炙大黃米上蒸曬等分上為粗末每服二錢新水煎服五痔散治諸痔不問冷熱內外鱉甲醋浸炙焦蝟皮銼碎炒焦豬甲銼碎炒焦蜂房炒各半兩蛇皮一條燒並各存性上為末入麝香少許每服一錢半食前米飲調下聖丸子諸痔通用榼藤子重一兩者三個去瓤酥炙豬牙皂角二兩酥炙蝟皮一個炙令焦大皂莢刺二兩燒各存性用沒藥別研槐角各三分麝少許上為末酒面稀糊丸桐子大每服三十丸枳殼散送下雞峰烏金散治痔漏穿山甲刺蝟皮黃牛角心各碎炒黃豬牙皂角槐子皂莢刺枳殼貫衆阿膠各等分再夾和牛角蝟皮山甲同炒黑上為末每服一錢半用胡桃肉研爛並調酒食前服大腸有熱荊芥泡湯調下漏血不止當歸煎湯調下槐角丸治諸痔及腸風下血脫肛槐角去梗一兩防風地榆當歸枳殼麩炒黃芩各半兩上為末酒面稀糊丸梧桐子大每服三十丸米飲下蝟皮丸治諸痔出血裡急疼痛槐花微炒艾葉炒黃枳殼制地榆當歸川芎黃耆白芍藥白礬煅貫衆各半兩蝟皮一兩炙焦頭髮燒三錢各存性豬後蹄垂甲十枚炙焦盈尺皂角一錠去弦核醋炙黃上為細末煉蜜丸桐子大每服五十丸食前米飲下收痔丸諸痔通用透明阿膠炒酥黃連淨貫衆各半兩盈尺皂角去弦核醋炙焦蝟皮灸焦蜂房炒焦蛇皮略炒皂角刺略炒穿山甲插入熱火灰中令焦豬後蹄垂甲燒以上各存性當歸川芎槐花並用二錢半上為末米醋煮麵糊丸桐子大每服七十丸調氣用枳殼散下消血熱荊芥煎湯下食前服蠟礬丸治諸痔諸癰惡瘡便毒明白礬煅為末熔蠟丸桐子大每服七丸溫熟水下豬甲散治諸痔豬後蹄垂甲不拘多少燒存性上為末陳米飲調二錢空心服青蛙丸治諸痔青色蛙長腳者取一個燒存性上為末雪糕丸桐子大每服十五丸空心先吃飯二匙次以胡桃肉切細煎湯調枳殼散送下若産婦發痔裡急作疼用黑豆一百粒陳米一合夾煎湯下亦先吃飯二匙穿山甲散治痔肛邊生鼠孔或成瘡痛穿山甲橫取後段尾根盡處一兩炙焦存性鱉甲半兩酒炙酥麝半錢細研上為末每服一錢半用蠟茶半匙夾和沸湯調下防風煎湯調亦得留滓敷痔又方單用穿山甲地榆散治痔生瘡腫痛地榆黃耆枳殼檳榔川芎黃芩赤芍藥槐花羌活各半兩白蘞蜂房炒焦甘草炙各一分上銼每服三錢新水煎服皂刺丸治痔痛而復癢皂莢刺二兩燒煙盡存性防風槐花各三分蛇床白礬煅白蒺藜炒去刺枳殼制羌活各半兩蜂房炒焦五倍子各一分上為末醋調緑豆粉為糊丸如小豆大每服五十丸以苦楝根煎湯下仍用童子熱尿入白礬末澆洗肛門皂角煎丸治內痔腸頭裡面生核寒熱往來滿尺皂角三錠去弦核醋炙刺蝟皮一兩炙黃白礬煅一兩豬後蹄垂甲十枚燒存性桃仁浸去皮尖川芎北梗甘葶藶炒焦各半兩薏苡白芷各一分上為末煉蜜丸如桐子大每服五十丸桑白皮煎湯下仍以藩蘺草根煎湯熏洗芎歸丸治痔下血不止川芎當歸黃耆神麯炒地榆槐花微炒各半兩阿膠炒酥荊芥穗木賊頭髮燒存性各一分上末煉蜜丸桐子大每服五十丸食前米飲下乾葛湯治酒痔白乾葛枳殼炒半夏制茯苓生乾地黃杏仁各半兩黃芩甘草各一分上銼碎每服三錢黑豆百粒薑五片白梅一個煎服橘皮湯治氣痔橘皮枳殼炒川芎槐花炒各半兩檳榔木香桃仁浸去皮尖紫蘇莖葉香附甘草炙各二錢半上銼每三錢薑棗煎服代赭石丸治痔變為瘻膿血不止代赭石煅醋淬研磁石煮米醋數沸蘸七次研白礬煅牡蠣灰龍骨研蝟皮炙焦皂莢刺燒豬後蹄垂甲燒各存性赤石脂川椒焙木賊蜂房炒上件等分細末神麯糊丸小豆大每服五十丸食前艾並生薑煎湯下漏血處以熟艾揉和血竭塞日三換荊枳湯治氣滯發痔荊芥穗枳殼炒槐花香附紫蘇莖葉甘草炙等分上為末每服二錢米湯調下芎歸湯方具載血類加茯苓槐花微炒治産婦諸痔敷痔方治腸口熱腫朴硝二錢硼砂半錢末之乾摻又大黃滑石等分末之井水調敷又朴硝五倍子等末敷之止血方明血竭末敷之通用方豬後蹄垂甲燒灰敷又水浸熊膽汁以筆敷又鴨嘴青膽礬煅為末用清蜜調筆敷可以消脫又雞子一個煮熟去黃取白切焙明礬煅白蘞各一錢同末敷有孔用紙拈蘸入熏洗方槐花荊芥枳殼艾葉水煎入白礬熏洗又木鱉七枚取仁研土礬末二錢少水煎熏二三次又藩蘺草根煎湯先熏後洗藩蘺花似小芙蓉又蝟皮三指許艾葉一團如燒香法置長桶中坐熏三次凡痔發於肛內者須用熏洗若腸口腫熱朴硝末新汲水調常常淋之治諸痔方凡痔皆因酒面炙爆蓄熱傷血惡血結聚於下焦不得疏通於是下墜而為痔患痔之人下部留蓄血熱多致大小便不通小腹結急才得一通又復閉塞且有漱水之證此下焦留蓄血熱明矣其下焦蓄血亦以尺脈洪盛見之合用逐淤湯主治須得大小便通快患處即以明白礬泡湯溫洗仍以蔥湯再沃次用桐殼灰穿山甲尾閭炙焦地膽去翅足秫米炒各一分為細末入膽礬少許研和酒調以筆蘸敷少頃痛來以蔥湯沃去準一時許前藥又增些膽礬若痛又認蔥湯沃之又等一時藥中又增些膽礬並如前法一日三次用前藥其膽礬又以漸加多於第一日矣後日三次用前藥其膽礬又以漸加多於第二日矣痛則沃之以蔥湯三日以還更不用藥只是明礬泡湯與白湯相間淋洗日三四次十餘日自然成痂如柿干之狀無膽礬以緑礬代之逐淤湯通利大小便取下黑物川芎白芷生乾地黃赤芍藥五靈脂枳殼制阿膠炒蓬莪朮茯苓茯神木通生甘草各一分實大黃生用桃仁蕩去皮焙各一分半上銼散每三錢井水一碗薑三片蜜三匙煎服以利為度淤血作痛通用治痔五聖丹雄黃葉子雌黃朴硝緑礬明白礬各半兩上件各別磕碎以銀窩一入雄黃二入雌黃三入朴硝四入緑礬五入白礬圓瓦片蓋定炭火煅一日夜看青煙出盡有紅煙上方好候冷取出紙襯頃地上用盆蓋出火毒一日夜入乳香沒藥末各一錢同研極細每抄一匙煎甘草湯調敷外用雞羽掃藥末蓋之日二次夜一次自然乾硬而脫逐日須用蔥白煎湯入朴硝溫洗軟帛拭乾然後敷藥治痔豬膽膏豬膽七枚各取汁以建盞盛炭火熬成膏用單紙攤敷須先用槐根取白皮煎湯溫洗然後敷藥熏痔方五倍子曬乾如燒香法置長桶內坐熏患處自然收縮治痔方紫荊皮新水煎食前服又方白芷末用米飲調食前服又方赤蜈蚣焙乾為末入腦以津唾調敷青紗上貼或朴硝末摻亦得又方五倍子焙黃銼碎每用一兩井水三大碗煎乘熱熏洗拭乾爛石膏燒紅碗覆地出毒細末敷附諸方乾葛湯治每遇飲酒發動痔瘡腫痛而流血乾葛枳殼炒半夏茯苓生芐杏仁各半兩黃芩甘草炙各二錢半上銼每服三錢黑豆一百粒薑三片白梅一個水煎服橘皮丸治因憂思恐怒適臨於前痔瘡發作腫痛大便難強努則肛出並皆治之橘皮枳殼炒川芎槐花炒各半兩檳榔木香桃仁炒去皮紫蘇莖葉香附甘草炙各二錢半上銼每服三錢薑棗煎服地黃丸治五痔滋陰必用之地黃酒蒸熟一兩六錢槐花炒黃柏炒杜仲炒白芷各一兩山藥山茱萸取肉獨活各八錢澤瀉牡丹皮各六錢茯苓六錢黃耆一兩半白附子二錢上為末煉蜜丸如梧子大每服五十丸空心米湯服下五灰散三因方治五種痔瘡不問內外並宜服之鱉甲治牡痔蝟皮治牝痔蜂房治脈痔蛇蛻治氣痔豬左足懸蹄甲治腸痔各等分上燒存性隨證倍用一分為末井花水調二錢空心臨臥時服之一方治熱痔疼痛不可忍者用鮮枸杞根數莖杵爛煎湯熏洗其痛立止四物湯方見虛勞門解毒湯方見積熱門灸法用大蒜一片頭垢捻成餅子先安頭垢餅於痔上外安蒜艾灸之便毒便毒論腎為作強之官所藏者志也男女大欲不能以直遂其志故敗精搏血留聚中途而結為便毒矣夫人腳腿與小腹合縫之間精氣所出之道路也或觸景而動心或夢泄而不泄既不得偶合陰陽又不能忘情息念精與血交滯其不為腫結也幾希便毒處所上不在腹下不在腿介乎兩者之中是也嘗怪世俗無知才覺有便毒證狀必以為熱氣所攻每每薄衣露足遂使寒邪乘之熱氣轉不得散日復一日敗精宿血愈聚而愈結焉不思一身宗筋上絡於舌本下聚於陰器筋得寒則急急則縮甚至傴僂而不獲伸於斯時也百藥並陳亦難責效況復從事於寒涼者乎治法散寒利熱泄其腎邪活其血脈是為捷徑外此老人氣滯亦或有之便毒證治雙解散治便毒內蘊熱氣外挾寒邪精血交滯腫結疼痛辣桂川大黃生白芍藥澤瀉牽牛炒取末桃仁去皮炒乾各一分甘草半分上為粗末每服三錢薑五片食前煎服日兩服先小便快熱從小便出後大便利皆是稠毒連翹湯治便毒腫結連翹獨活川升麻射干木通桑寄生赤茯苓甘草炙各七錢半大黃生用木香乳香沉香各半兩上銼細每服三錢慢火煎服復元通氣散便毒初發用此方穿山甲酒浸炙焦二兩天花粉酒浸一宿焙白芷舶上茴香炒白牽牛末炒延胡索擦去皮南木香當歸甘草炙各一兩青木香半兩上為細末每服二錢溫酒調食前服不飲酒南木香煎湯下退毒飲治便毒腫結穿山甲半兩蘸法醋炙焦木豬苓三錢法醋微炙上為末每服二錢食前老酒調下次以法醋煮肥皂研膏敷之妙五苓散疏利小便以泄敗精方見飲水門用蔥二莖煎湯調下追風毒銼散治便毒熱證大便祕結方見腳氣門又清涼飲通用方見痔門和劑流氣飲治便毒大便不通加生大黃食前服方見脹滿門究原排膿內補散便毒已消常服之方見腸癰門潰處以白蘞白芨沒藥乳香血竭為末敷之蠟礬丸治腫核痔漏諸癰方見痔門四聖散治便毒癰疽腸癰神效方見腸癰門敷方治便毒腫痛雄黃乳香各二錢半重黃柏一錢上為細末分作兩服以新水調敷自平皂角膏治癰疽便毒等皂角一條長尺以上者捶碎法醋煮爛研成膏敷之屢效膠方便毒初發水膠用水溶開塗敷若便毒已大而軟則用魚鰾膠於熱湯中煮軟乘熱研爛敷之或要換藥以熱湯洗去蕉葉方治便毒蕉弓葉乾者焙焦為末法醋生薑自然汁等分調敷又方紫背草研醋調敷附諸方祕傳蟬蛻散治便毒初起疼痛服之神效蟬蛻去土並頭足楓由蟲炙死各二錢蜈蚣三條燒存性雄黃三分上件共為細末分三服用好酒煎一二沸食前服忌食諸熱毒物祕傳獨聖散治一切便毒連連作痛更不腫起名曰陰毒服之立應取活蜈蚣一二條用炭火燒存性為末用好酒調服食前下雙解散治便毒內蘊熱氣外挾寒邪精血交錯腫結疼痛辣桂大黃白芍藥澤瀉牽牛炒搗研桃仁去皮各二錢半甘草五分乾薑一錢上㕮咀分二帖每服用水二盞煎七分食前服一方治便毒初發以生薑一大塊米醋一合以薑蘸醋磨取千步峰泥敷之即散千步峰泥地上人經行日久其泥突起者是附疳瘡方祕傳鳳凰衣散治疳瘡腫痛神效鳳凰衣即包雞子殼內衣是也不以多少輕粉冰片各少許上為極細末敷患處效麝香輕粉散治血疳陰蝕臁瘡耳疳一切惡瘡輕粉麝香各五分乳香沒藥明礬各一兩上為細末干貼一方治下疳瘡密陀僧黃連黃柏輕粉各等分上為細末以鹽艾湯沃洗乾摻附妒精瘡方津調散治妒精瘡膿汁淋漓臭爛黃連款冬花等分上為末以地骨皮蛇床子煎湯洗絹帛挹干津調藥敷歌曰陰瘡癢痛黃汁注輕粉石膏濕干敷不然細研生白礬冷水洗之根亦去又臘茶五倍末同調摻敷陰瘡便可消更有一般官局藥水銀和粉玉龍膏又婦人交接妒精瘡地龍蛇床作洗湯細研黃連款冬末唾津調敷是良方
