body:
  text: 卷之十二痎瘧痎瘧方論風寒暑濕邪自外來飲食居處邪由內作此痎瘧感受之胚胎也豈特夏傷於暑秋必為瘧哉古人蓋以其受病最多者言之耳瘧候何如始而呵欠繼而足冷面色青黃身體拘急寒栗鼓頷腰脊俱疼寒去未幾內外皆熱頭痛而渴但欲飲冷嘔惡妨滿而不嗜食者其候也或內伏寒痰寒從背起冷如掌大瘧之寒熱其豈非陰陽二氣更相勝負而作耶邪並於陰則寒邪並於陽則熱陰盛則寒多陽盛則熱熾其寒也湯火不能溫其熱也冰水不能寒衛氣與邪氣相值故邪正交爭而病以作衛氣與邪氣相離故汗出乃解而病以休衛氣晝行陽夜行陰得陽而外出故發於日間得陰而內搏故發於暮夜若乃邪氣內搏於五臟橫連於募原其道遠其行遲不能與衛氣交併故有隔日發有三四日一發衛氣之行疾行遲病作之有早有晏甚者內外失守真邪不分陰陽迭勝寒熱互起則休作無定時矣瘧有數種風瘧自感風而得惡風自汗煩躁頭疼轉而為瘧風陽氣也故先熱後寒可與解散風邪如川芎白芷青皮紫蘇之類或細辛檳榔佐之溫瘧一證亦先熱後寒此為傷寒壞病與風瘧大略則同熱多寒少小柴胡湯熱少寒多小柴胡湯內加官桂寒瘧自感寒而得無汗惡寒攣痛面慘轉而為瘧寒陰氣也故先寒後熱可與發散寒邪生料五積散增桂養胃湯或良薑乾薑官桂草果之類甚則薑附湯附子理中湯暑瘧者暑勝熱多得之一名疸瘧陰氣獨微陽氣獨發但熱不寒裡實不泄煩渴且嘔肌肉消鑠盍用小柴胡湯香薷散嘔者縮脾飲加生薑溫服下消暑丸熱多燥甚者少與竹葉湯常山柴胡於暑證最便濕瘧者冒襲雨濕汗出澡浴得之身體痛重肢節煩疼嘔逆脹滿盍用五苓散除濕湯加蒼朮茯苓輩寒多者朮附湯最良牝瘧者久受陰濕陰盛陽虛陽不能制陰所以寒多不熱氣虛而泄悽慘振振柴胡桂薑湯減半黃芩加以半夏施之為當食瘧一名胃瘧飲食無節飢飽有傷致然也凡食啖生冷咸藏魚鹽肥膩中脘生痰皆為食瘧其狀苦飢而不能食食則中滿嘔逆腹痛青皮陳皮草果半夏縮砂白豆蔻作劑或四獸湯下紅丸子自有奇功瘴瘧挾嵐瘴溪源蒸毒之氣致然也自嶺以南地毒苦炎燥濕不常人多瘴瘧其狀血乘上焦病欲來時令人迷困甚則發躁狂忘亦有啞不能言者皆由敗血淤於心毒涎聚於脾坡仙指為脾胃實熱所致又有甚於傷暑之瘧耳治之須用涼膈疏通大腸小柴胡加大黃治瘴木香丸觀音丸皆為要藥如前數證經久不瘥真氣已耗邪氣猶存則有所謂勞瘧瘧母者焉表裡俱虛真元未復疾雖暫止小勞復來謂之勞瘧法當調養氣血川芎當歸官桂芍藥輩所不可無彌年閲歲經吐汗下營衛虧損邪氣伏藏脅間結為症癖謂之瘧母此證未可直攻急作烏頭七棗湯以扶其里俟其內氣已充繼此經效瘧丹或消癖丸下之取愈大抵瘧之初得三數日間如火燎原不可向邇波濤洶湧未易回瀾當俟其稍定而圖之經所謂其盛者可待衰而已瘧方耒與正發及將解不可投藥耗其真氣投藥當於未發以前兩時之先或遇發日凌晨空心與之諸瘧之脈大約尺寸俱弦或浮數或緊實或緩澀或虛遲或左手濡而右手盛或尺寸盛而關中濡不可定名以為弦也總前治法弦數多熱者寒之弦遲多寒者溫之浮弦浮緊浮數其邪在表者可汗弦實沉實數實其邪在裡者可下若夫調胃氣利痰水分陰陽行三焦是又治法之綱領也渴欲水漿藥入輒吐人參煎湯效抑猶有説焉嘗讀二廣攝生見其論議若瘴瘧若暑毒每用疏轉之劑取下根源里有先傷暑後發瘧涉年餘者度其腹中有癖水磨沉香下解毒雄黃丸黑血如泥泄下極臭由是獲愈因知諸瘧皆有根在治法之外又當隨輕重而利導之實者與巴豆大黃虛者用養正丹輩不然常山於瘧每每作效何耶蓋瘧家多蓄黃水常山為能破其癖而下其水也痎瘧證治麻黃白朮湯治感風發瘧麻黃去節官桂青皮陳皮川芎白芷半夏曲紫蘇茯苓白朮北梗甘草炙各等分加細辛檳榔上銼散每服三錢薑四片棗二枚空心煎服五積散感寒發瘧初作以此解散蒼朮炒二兩北梗一兩麻黃去節枳殼制陳皮各六錢乾薑厚朴制各四錢川芎當歸白芍藥白芷甘草炒半夏制官桂茯苓各三錢上銼散每服三錢水盞半蔥白三寸薑三片煎半空心服養胃湯加桂痃治感寒發瘧厚朴制蒼朮炒半夏制各一兩人參茯苓草果藿香各半兩橘紅三分甘草炙一分上銼散每服三錢水盞半薑五片烏梅半個煎半溫服解毒雄黃丸方見積熱門養正丹主寒瘧方見痼冷門薑附湯附子理中湯主寒瘧方見寒類草果飲諸瘧通用加乾薑治寒瘧草果白芷良薑青皮川芎紫蘇葉甘草炒等分上銼散每三錢煎服小柴胡湯治暑瘧純熱方見血類或寒熱等則加桂香薷散治傷暑發瘧香薷四兩厚朴制扁豆制各二兩上銼散每三錢烏梅一個水煎臨熟入薑汁一匙溫服五物香薷湯香薷縮脾飲並主暑證方見暑類常山飲治傷暑發瘧嫩黃川常山知母草果仁甘草炙各一兩良薑六錢烏梅肉半兩上㕮咀每三錢水一碗薑五片棗三枚煎半稍冷服七寶銼散治暑瘧諸瘧川常山雞心檳榔青皮刮去白甘草炙各半兩草果仁二錢半上細銼每三錢桃柳枝各七寸烏梅三個水大碗煎半稍冷空心服五苓散治傷濕發瘧及小便不利方見水飲類加劑除濕湯朮附湯並主濕瘧或加官桂茯苓方見濕類柴胡桂薑湯治牝瘧但寒或寒多微熱柴胡二兩辣桂三分栝蔞根一兩乾薑炮甘草炙牡蠣煅各半兩黃芩三錢三字內加半夏曲半兩上銼散每服三錢薑棗煎服二陳湯治食瘧諸瘧陳皮半夏制各五兩茯苓三兩甘草炙一兩上㕮咀每服三錢薑五片烏梅半個煎服寒多者加草果熱多者加前胡如青皮檳榔縮砂白豆蔻之類隨意增用四獸湯治食瘧諸瘧和胃消痰半夏制人參茯苓白朮橘紅草果生薑烏梅大棗各等分甘草炙減半上㕮咀以鹽少許醃食頃濕紙厚裹慢火煨香熟每服四錢水一碗煎半溫服紅丸子治食瘧食積氣滯腹脹京三稜水浸軟截碎蓬莪朮制青皮陳皮各五兩胡椒乾薑炮各三兩上為末米醋煮米粉糊丸桐子大礬紅為衣每五十丸二陳湯四獸湯皆可下烏頭七棗湯治久瘧但久瘧但寒及脾寒發瘧或寒重熱輕大川烏頭一個慢火灰炮裂以鹽水浸再炮再浸凡七次去皮臍上細銼分二服每服薑七厚片棗七個蔥白三寸水大碗煎半先吃棗稍冷服又方用小附子一枚修制一同烏附皆能溫脾挾風則用川烏寒甚則用附子治瘴木香丸牽牛一斤淘去浮者焙搗取末四兩別頓雞心檳榔陳橘紅各二兩青木香人參熟附子厚朴制官桂去粗皮京三稜羌活獨活乾薑炮甘草炙川芎川大黃銼焙芍藥各半兩肉豆蔻六個上為末瓷器密收臨用稱牽牛一兩諸藥末共一兩研和煉蜜丸桐子大每服二十丸橘皮煎湯下以通利為度地龍飲治瘴瘧諸瘧大熱煩躁生地龍三條研細上入生薑汁薄荷汁生蜜各少許新汲水調下如熱熾加腦子少許觀音丸取下暑毒瘴毒圓白半夏生烏梅肉母丁香川巴豆不去油每件各十枚上為末薑麵糊丸麻子大上下以厚紙蓋貼有油又再易紙每服五丸臨臥冷水下此方舟人於海角遇一白衣授之芎歸鱉甲散治勞瘧寒熱當歸川芎芍藥青皮陳皮茯苓半夏制各一分鱉甲醋炙黃半兩上銼散每三錢薑五片棗二枚小烏梅一個水煎服熱多加柴胡寒多加草果五勞丸治勞瘧瘴瘧久病嫩黃常山三兩半桃仁去皮尖炒一兩二錢辣桂去粗皮七錢半淡豉三兩烏梅肉二兩半上曬乾為末煉蜜丸梧子大每三四十丸空心溫酒下不飲者熟水入些酒下經效瘧丹治瘧母結癖寒熱無已真阿魏雄黃各二錢半硃砂一錢半上沸湯泡阿魏研散雄朱為末和之稀麵糊丸桐子大每一丸人參煎湯候冷空心服瘴瘧桃枝煎湯冷服臨發磨一丸敷鼻頭口畔消癖丸治瘧母停水結癖腹脅堅痛芫花炒硃砂研細等分上為末煉蜜丸小豆許每十丸濃煎棗湯下去癖須用芫花大戟破水之劑下後即與養胃湯驅瘧湯治諸瘧久瘧草果仁青皮陳皮人參茯苓半夏制厚朴制蒼朮炒雞心檳榔白朮甘草炙各半兩良薑一分上銼散每三錢薑五片棗二枚烏梅一個空心煎服生熟飲治脾寒發瘧及寒多熱少草果肉豆蔻各二個一煨一生川厚朴方寸許二片生薑二塊半生半濕紙煨甘草二寸半生半炙上銼散分二服每服一碗水二棗一烏梅煎半空心服蒜丹丸截瘧消痰虢丹煅穿山甲熱灰中炮焦各一分土朱半兩上為末以獨頭蒜煨去皮研膏丸桐子大每十丸生薑烏梅紫蘇煎湯下七物湯治諸瘧常山酒浸蒸檳榔草果青皮陳皮川厚朴制甘草炒等分上銼細每服三錢薑五片烏梅二個水一碗煎半露一宿來早溫服之如熱多加柴胡截瘧丹臻志修合土朱二兩半淨末真緑豆粉二兩一兩生入藥一兩煮糊信砒有鋒芒者半兩研細生上用緑豆粉糊築和三件丸如麻子每服止二丸新汲水研桃軟空心服是日飲食微和而已勝金丸治一切瘧寒熱不一嘔惡頭疼煩渴喘息痰聚中滿雞心檳榔一兩自干川常山酒浸蒸焙四兩上為末水麵糊丸桐子大每服三十丸於未發前半日冷酒下便睡不得吃熱湯飲次日又用冷酒下二十丸仍不得吃熱飲食又次日飲食無拘治瘧方二陳湯二貼加常山二錢分作二服每服薑七片棗二枚烏梅二枚水一碗煎六分候微冷吞前件脾積丸七丸次日吞三丸六物湯治久瘧不已寒少熱多嫩常山二錢半柴胡雞心檳榔青皮去白各二錢草果仁甘草炙各一錢半上銼分三服每服大軟烏梅二個好夏酒準一啜許新水二盞煎半隔宿露空以紗蓋之次早拂明服苦寒熱等加製厚朴二錢略暖服是日飲食皆勿用熱附諸方白虎加桂枝湯活人方治瘧疾但熱不寒及有汗者知母甘草炙桂枝粳米各三兩石膏一斤上㕮咀每服五錢水盞半煎至一盞去滓溫服大柴胡湯治瘧熱多寒少目痛多汗脈大以此湯微利為度餘邪未盡以白芷石膏三物湯以盡其邪方見傷食門清脾飲濟生方治疸瘧脈來弦數但熱不寒或熱多寒少口苦咽熱小便赤澀青皮去白厚朴薑製白朮半夏湯泡七次黃芩草果仁柴胡去苗茯苓去皮甘草炙各等分上㕮咀每服四錢水盞半薑五片煎七分溫服不拘時正氣散徐同知方退寒瘧止胃寒進食藿香草果各四兩半夏陳皮厚朴砂仁甘草各一兩上銼為散生薑棗子煎服如瘧未至俟發日早服六和湯人參草果知母貝母烏梅白芷檳榔柴胡各一錢用酒拌常山二錢上㕮咀薑三片棗一枚酒水同煎露一宿臨發前二時服瘧疾治例出明醫雜著王節齋曰瘧是風暑之邪有一日一發有二日一發有三日一發有間日連二日發有日與夜各發有有汗有無汗有上半日發有下半日發有發於夜者治法邪從外入宜發散之然以扶持胃氣為本又須分別陽分陰分而用藥邪瘧及新發熱者可散可截虛瘧及久者宜補氣血若過服截藥致傷脾胃則必延綿不休主方柴胡去苗白朮蒼朮米泔浸各一錢以上三味瘧疾必用之藥陳皮七分甘草炙五分乾葛一錢二分若一日一發及午前發者邪生陽分加枯黃芩茯苓半夏各一錢熱甚頭痛加川芎軟石膏各一錢口渴加石膏知母麥門冬各一錢若間日或三日發午後或夜發者邪在陰分加川芎當歸酒炒芍藥熟地黃酒炒知母各一錢酒洗紅花酒炒黃耆各四分提起陽分可截之若間一日連發二日或日夜各發者氣血俱病加人參黃耆白茯苓各一錢以補氣川芎當歸白芍藥熟地黃各一錢以補血若陽瘧多汗用黃耆人參白朮以斂之無汗柴胡蒼朮白朮黃芩乾葛以發之若陰瘧多汗用當歸白芍藥熟地黃黃耆黃柏以斂之無汗柴胡蒼朮大川芎紅花升麻以發之故曰有汗者要無汗扶正為主無汗者要有汗散邪為主若病人胃氣弱飲食少或服截藥傷脾胃而少食者加人參一錢半酒炒芍藥大麥芽各一錢若傷食痞悶或有食積者加神麯麥芽枳實炒各二錢炒黃連五分若痰盛加薑製半夏南星枳實炒各一者黃芩黃連各六分若欲截之加檳榔黃芩青皮常山各一錢烏梅淨肉三個肥者若日久虛瘧寒熱不多或無寒而但微熱者邪氣已無只用四君子合四物湯加柴胡黃芩陳皮以滋補氣血
