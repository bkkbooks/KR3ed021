body:
  text: 附補遺卷之十四瀉痢瀉痢方論痢與瀉名目不同而感受之源一也風邪得之鼻壅惡風腰背強痛寒邪得之面慘惡寒肢體拘攣受暑得之面垢背寒自汗發渴受濕得之一身盡痛重著浮黃或停冷則悽清腸鳴或蘊熱則發熱煩躁冷熱不調者乍澀乍溏飲食傷飽者注下酸臭諸有積以肚熱纏痛推之諸有氣以狀如蟹渤驗之究其受病之源決之對病之劑大要以散風邪行滯氣開胃脘為先不可遽用肉豆蔻訶子白朮輩以補住寒邪不可遽投罌粟殼龍骨牡蠣輩以閉澀腸胃邪氣得補而愈盛補之愈盛而愈作不為纏擾撮痛則為裡急後重所以日夕淹延而未已也痢之赤白其赤者熱乘於血血滲大腸則赤也若風邪挾熱則所下黃而赤焉其白者冷搏腸間津液凝滯則白也若寒邪並之則所下白而黑焉冷熱相交故赤白相半重者狀若膿涕而血雜之輕者白涕中間微有赤縷是也內挾風邪故清血流注或濕毒乘虛入腸胃之間則下如豆汁或有淤血是也論者以手足寒為冷手足溫為熱於理甚當亦當合赤白而並觀之庶乎其的矣雖然風寒暑濕感之於外者也其有大嚼傷飽宿酒漿醯醢以成積滯房闥縱情加奔走勞役以耗精血此非病生於內者乎必明白內外而權度之則受病淺深用藥輕重知有定向矣毋概曰無積不成痢下痢壯熱須用敗毒散加陳米間與五苓散黃連阿膠丸下痢雖曰有積有暑如用藥不效即是腸胃有風邪熱者赤者與敗毒散冷者白者不換金正氣散加木香瀉痢證治敗毒散治風邪寒邪壯熱下痢方見寒類陳米飲調五苓散佐之方見水飲門不換金正氣散治風邪寒邪冷證下痢方見寒類治要除濕湯方見吐瀉門加官桂木香治風寒冷證下痢加乾薑茯苓治傷濕下痢仍以五苓散利其小便理中湯方見瀉門加厚朴木香茯苓治濕冷下痢艾姜丸治濕冷下痢膿血腹痛婦人下血干艾葉四兩炒焦存性川白姜一分炮上為末醋煮麵糊丸桐子大每七十丸食前清米飲下人參豆蔻散冷證瀉痢通用木香厚朴制蒼朮米泔浸曬乾薑炮肉豆蔻生各二兩半夏曲陳皮阿膠炒各四兩縮砂甘草炒各二兩半罌粟殼去筋萼醋醃炒四兩上銼每三錢薑棗煎食前服香薷銼散五物香薷湯六和湯方並見暑門治傷暑下痢五苓散佐之升麻湯升麻白芍藥甘草炙各十兩白乾葛十五兩上粗末每三錢姜三片同煎吞感應丸治傷暑下痢纏痛黃連阿膠丸方見嗽門柏皮湯方見瀉門治熱證發熱下痢亦治暑痢香連丸治冷熱不調瀉痢黃連一兩用茱萸半兩炒去茱萸不用木香一分上取香連為末醋糊丸桐子大每三十丸米飲下前戊己丸通用真人養臟湯治冷熱不調下痢方見瀉門依前法用之三稜散治食積下痢腹痛方見瀉門依前法用之感應丸方見諸氣門解毒雄黃丸方見積熱門治諸積下痢用五苓散送下和劑流氣飲大異香散五膈寬中散方見諸氣門治諸氣痢牛乳湯治氣痢泄如蟹渤蓽茇末二錢牛乳半升上同煎減半空腹服茱連丸治赤白下痢吳茱萸揀淨黃連去須半寸一截同炒熟分為二處上各碾末醋麵糊丸桐子大赤痢專服黃連白痢專服茱萸赤白並服或多或少以意增減每服七十丸陳米飲下以愈為度胃風湯治風冷客入腸胃泄下鮮血及腸胃濕毒下如豆汁或下瘀血人參白茯苓川芎當歸辣桂白朮白芍藥等分上銼每服三錢粟米百餘粒同煎食前熱服腹痛加木香肉蔻散治冷證久痢不止方見瀉門附子理中湯姜附湯方並見寒類朮附湯方見濕類治虛損久痢四肢厥冷以意擇用噤口痢方石蓮肉曬乾上為末每服二錢陳米飲調下便覺思食仍以日照東方壁土炒真橘皮為末薑棗略煎佐之斷下湯止赤白痢茯苓白朮各一錢甘草半錢草果連皮一枚大罌粟殼十四枚去筋萼剪碎醋浸炒燥加木香半錢上為粗末分作兩服每服姜五片大棗三個大烏梅三個食前煎服固腸散方見瀉門通用玉華白丹治臟腑久虛止瀉止痢陽起石入坩堝煅通紅酒淬頓陰地令乾莫見日白石脂煅紅左顧牡蠣鹽泥固濟煅紅取白者各半兩鍾乳粉一兩上研極細如粉和畢糯米糊丸空心米飲下渴者人參湯下亦治腸風下血又震靈丹方見瀉門通用赤石脂禹餘糧湯治瀉痢諸藥不效以此固其下焦赤石脂銼小塊禹餘糧煅醋淬以碎為度上等分夾和每服四錢空心煎溫服瀉痢須要衣服周密恐傷風冷凡蘊熱血痢裡急而痛甚雖已疏通蕩滌然其痛不減者非熱亦非積也營血虧少陽剛勝陰故爾用藥當以川芎為佐營血一調其痛立止附諸方防風芍藥湯拔粹方治泄痢飧泄身熱脈弦腹痛而渴及頭痛微汗防風芍藥黃芩各一兩上㕮咀每服一兩水二鍾煎至一鍾去滓食前通口服經驗柏皮湯治傷寒下痢亦治久血熱痢柏皮三兩黃芩二兩黃連一兩上㕮咀每服一兩水二鍾煎至一鍾去滓通口服腹痛加山梔小便不利加赤茯苓阿膠煎服芍藥柏皮湯子和方治一切溫熱噁心痢頻並窘痛無問膿血芍藥黃柏各一兩當歸黃連各半兩上為末水丸豆大溫水下三四十丸等服忌油膩生冷熱物黃連香薷飲治感暑下痢鮮血清暑益氣湯治暑病內傷下痢不思飲食發熱並見暑門白朮芍藥湯機要方治老人奉養太過飲食傷脾時或瀉痢錢氏白朮散治氣血俱虛之人或瀉或痢並見泄瀉門蒼朮芍藥湯拔粹方治痢疾痛甚者蒼朮二兩芍藥一兩黃芩官桂各五錢上㕮咀每服一兩水二鍾煎至一鍾溫服芍藥黃芩湯拔粹方治泄痢腹痛或後重身熱久不愈脈洪疾者及下痢膿血稠黏黃芩芍藥各一兩甘草炙半兩上㕮咀每服一兩水二鍾煎至一鍾去滓通口服食前調胃承氣湯小承氣湯大承氣湯俱見傷寒門四物湯保命集治下痢純血川芎當歸酒洗白芍藥生地黃槐花黃連御米殼等分上㕮咀水煎服地榆芍藥湯拔粹方治泄痢膿血乃至脫肛蒼朮八兩地榆二兩卷柏芍藥各三兩上㕮咀每服一兩水二鍾煎至一鍾食前通口服阿膠梅連丸宣明方治下痢無問久新赤白青黑疼痛諸證金井阿膠淨草灰炒透明自別研細赤茯苓烏梅肉去核炒赤芍藥黃柏銼炒黃連去須乾薑炮當歸酒洗各等分上為細末入阿膠研勻水丸梧子大溫米飲下十丸食前連夜五六服小兒丸如緑豆大忌油膩脂肥諸物石榴皮散經驗方治暴瀉不止及痢赤白用酸石榴皮燒存性不以多少空心米飲調下二錢保和丸專治脾虛因積作後重者不可下用此消導方見積聚門祕傳香連丸治男婦小兒諸般痢疾作痛並久痢虛脫濃血不止者服之神效如初痢一二日之間不可服恐攔住積滯熱毒他證愈劇反為咎矣川黃連酒潤炒五兩木香白豆蔻各一兩半乳香沒藥各五錢上為細末麵糊丸如彈子大每服一丸赤者甘草湯磨下白者生薑湯下黃連湯治痢疾黃連滑石生地黃白芍藥蒼朮臺術當歸青皮條黃芩各等分上㕮咀每服七錢水二盞煎八分去滓食遠溫服大柴胡湯治下痢舌黃口燥胸滿作渴身熱腹脹譫語此必有燥屎宜下後服木香黃連苦堅之三乙承氣湯暑毒溫熱傷後下痢膿血宜服二方見傷寒門針灸法見前泄瀉門詳施脫肛脫肛方論四十八難曰病之虛實出者為虛入者為實肛門之脫非虛無故然哉蓋惟實則溫溫則內氣充而有所蓄惟虛則寒寒則內氣餒而不能收而況大腸之厚薄膏脂之瘠肥亦視夫內氣之虛實何如耳大凡脫肛須以溫湯澆令和軟然後摩挲而入治法以溫斂行之其有産婦用力過多及小兒叫號弩氣久痢不止風邪襲虛亦有此證凡腸頭作癢即是腹中有蟲生艾苦楝根煎湯熏洗仍以干艾生薑煎服其脫肛腸風痔漏者登溷不可用舊紙若包裹湯藥雜物尤不可用才有一毫染汙其間立見痛腫如此急以溫湯滌之患在肛腸登溷後須用一洗脫肛證治蝟皮散治肛門脫出不收蝟皮一個罐內燒令焦黃存性磁石半兩法醋煎數沸蘸磁石七次為末辣桂三錢鱉頭一枚慢火炙令焦黃上細末每服二錢食前米飲調下仍以破草鞋底灸上面尉按令入鱉頭散治脫肛鱉頭慢火炙焦黃上為末塗敷腸頭用軟紙襯輕輕按入仍以方寸匕食前米飲調下磁石散治脫肛磁石半兩蘸入煎沸醋中凡七次上為末每服一錢空心米飲調下香荊散治脫肛大香附荊芥穗各半兩縮砂二錢半上末每服三錢食前新水煎數沸即服小兒通用釣腸丸治大腸虛冷脫肛不收及腸風諸痔白礬枯緑礬枯訶子煨取肉枳殼去瓤麩炒白附子生南星生半夏生附子去皮臍以上各一兩黃栝蔞一個燒存性蝟皮一個銼碎磁罐燒存性雞冠花銼炒二兩半胡桃仁七個不用油者罐內燒存性上細末醋煮麵糊丸桐子大每服二十丸空心溫酒下或枳殼散送下縮砂湯治大腸虛而挾熱脫肛紅腫縮砂黃連木賊上末每二錢米飲調下黃連阿膠丸方見嗽門治腸虛為暑熱所攻脫肛紅腫肛門熱痛仍以荊芥穗朴硝泡湯溫洗次用薄荷煎硼砂丸津液調敷鐵粉散治大腸本虛風毒客熱乘之脫肛紅腫鐵粉研細上入白蘞末夾和敷之即按入蒲黃膏治脫肛熱痛生蒲黃以豬膏和敷即按入桑螺膏治脫肛桑𣗬上緣桑螺子燒存性上末以豬膏和塗雨後緣桑者佳橡斗膏治脫肛橡斗子燒存性豬脂和敷木賊散治脫肛不熱木賊燒存性為末糝以帛按入獨虎散治脫肛不收五倍子半兩末井水三碗入磁瓶慢火煎半續入朴硝荊芥穗各一錢乘熱熏洗仍以五倍子末敷之石灰方治大腸積冷久年脫肛石灰炒熱以帛包裹肛坐其上冷又別換仍以海螵蛸末敷敗毒散小兒痢後風邪入大腸脫肛不收以此散風邪加陳米煎方見寒類桑葉方黃皮桑𣗬取葉三升煎帶溫上以布盛罨小兒肛門輕手按入次用門臼中細塵綿包撲之小兒灸法百會穴直取前後髮際折中橫取兩耳尖折中在順之中心端正螺毛處是也兩手握蒜炙灸則肛腸自收溫䘌證蟲蝕肛門咽乾唇瘡齒晦方見活人總括附諸方二靈散治久痢腸胃俱虛肛門自下龍骨煅五錢木賊燒存性二錢五分上為末摻托之一方治脫肛用五倍子為末每服三錢入白礬一塊水二碗煎洗一方用蔓陀羅花子連殼一對橡斗十六個搗碎水煎三五沸入朴硝熱洗其肛自收一方用浮萍為末干貼患處針灸法命門一穴在十四椎下灸二七壯治大腸虛冷脫肛不收長強一穴在尾閭骨尖底灸二七壯治痢腸風痔漏脫肛不收
