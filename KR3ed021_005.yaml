body:
  text: 卷之五諸氣附梅核氣積聚癥瘕痞塊諸氣方論人以氣為主一息不運則機緘窮一毫不續則穹埌判陰陽之所以升降者氣也血脈之所以流行者亦氣也營衛之所以運轉者氣也五臟六腑之所以相養相生者亦此氣也盛則盈衰則虛順則平逆則病氣也者獨非人身之根本乎人有七情病生七氣七氣者寒熱怒恚喜憂愁或以為喜怒憂思悲驚恐皆通也然則均調是氣將何先焉曰氣結則生痰痰盛則氣愈結故調氣必先豁痰如七氣湯以半夏主治而官桂佐之蓋良法也況夫冷則生氣調氣雖用豁痰亦不可無溫中之劑其間用桂又所以溫其中也不然七氣相干痰涎凝結如絮如膜甚如梅核窒礙於咽喉之間咯不出咽不下或中滿艱食或上氣喘急曰氣隔曰氣滯曰氣秘曰氣中以至五積六聚疝癖瘕症心腹塊痛發即欲絕殆無往而不至矣冷氣者生冷傷脾風冷入胃或血海虛冷冷則生氣用和劑七氣湯治中湯沉香降氣湯大沉香丸痰結者三因七氣湯指迷七氣湯易簡二陳湯中滿者痞滿不食水氣腫脹面目俱浮枳殼散加南木香大流氣飲指迷七氣湯順氣木香散三和散五皮散加半夏茯苓上氣者氣逆而上呼吸喘促分氣紫蘇湯蘇子降氣湯或嚼蘇合香丸以秘傳降氣湯送下氣隔者陰陽不和中脘窒塞五膈吐噫食不能下五膈寬中散和劑七氣湯加木香縮砂間以紅丸子佐之氣滯者滯於胸膈則脹滿滯於手足則浮腫滯於腰間則墜痛脹滿用異香散調氣散沉香降氣湯仍與神保丸或少蓬煎丸利之浮腫用三和散夾生料五苓散或五皮散加桂吞青木香丸局方流氣飲加赤茯苓枳殼腰痛俞山人降氣湯局方七氣湯加橘核或辣桂煎湯點調氣散吞青娥丸氣秘者停宿不消腸胃留滯大便不通蘇合香丸夾和感應丸或楊氏麝香丸局方麻仁丸並用枳殼散送下氣疾之人多因氣不歸元遂成氣中狀如中風仆倒昏迷牙關緊急只是無痰此為氣中不得誤用風藥及通關利腠等輩先以薑汁泡湯調蘇合香丸次用七氣湯大流氣飲加石菖蒲繼之氣順而蘇即以治中湯加木香以和其中使氣歸常道若更不能調則氣逆而厥又有變證五積者五臟之所積其病難醫六聚者六腑之所聚其病易治挾水為癖挾血為症氣血水飲皆能結塊輕者神保丸以麝香湯送下或少與蓬煎丸撞氣阿魏丸三稜煎丸重者如意丸頂珠丸酌量用又一證漉漉作聲腹中纏滯他無所苦此為水飲消飲丸倍術丸方並見水飲類二姜丸夾和用之人有血氣心知之性而無哀樂喜怒之常一種婦人平時任氣易為七情所傷適月事經季不行一身百病胸臆氣填嘔惡全不入食入食則吐痰涎或一塊如核窒塞胸喉而痛或一塊如卵築觸心下而疼或腹中塊物動而作痛攻刺腰背時發哄熱四肢乏力腳不能行小便白濁浮油帶下淋瀝日就瘦弱全似虛勞然而谷雖不入果子雜物常喜食之卻只是有孕諺所謂孕婦做得百般病者此也用藥但以二陳湯加縮砂桔梗薑棗烏梅同煎半夏理氣消痰縮砂安胎順氣北梗以開胸喉之隔服之自然安平若妄以剛劑溫胃胎氣必煩病無由愈白濁一節謹勿燥澀二陳湯加白茯苓以下白丸子方並見痰涎類可也若夫七情所發逆氣填胸不惟核膜上塞咽喉甚者攻擊滿悶欲絕產後尤多有之故曰產前安胎產後調氣男女或有胸喉間梅核作恙者觸事勿怒飲食勿冷諸氣證治和劑七氣湯治七氣所傷痰涎結聚心腹刺痛不能飲食半夏制焙五兩人參辣桂去粗皮各一兩甘草炙半兩上銼散每服三錢水大盞姜五片棗一枚煎至七分食前服和劑治中湯方見脾胃門沉香降氣湯治陰陽交滯心腹脹滿留飲停酸積冷諸證沉香一兩二錢縮砂仁三兩甘草爁二兩半香附炒淨一斤上末每一錢鹽一點沸湯點下大沉香丸治一切冷氣攻心腹刺痛胸膈噎塞婦人血氣刺痛並宜服之方見心氣類三因七氣湯證治如前有熱者可用此半夏五兩茯苓四兩厚朴制三兩紫蘇葉二兩上銼散每服四錢水盞半姜七片棗二枚煎六分不時服易簡二陳湯方見痰涎門枳殼散方見腳氣門治證同前加南木香煎服和劑流氣飲調營衛利三焦行痞滯消腫脹橘紅青皮紫蘇葉厚朴制香附炒淨甘草炙各四兩木通二兩大腹皮丁皮檳榔辣桂木香草果仁蓬莪朮煨藿香葉各一兩半麥門冬人參白朮木瓜赤茯苓石菖蒲白芷半夏制枳殼制各一兩上銼散每服三錢姜四片棗二枚煎服余見水腫門指迷七氣湯治七情相干陰陽不得升降氣道壅滯攻衝作疼青皮陳皮桔梗蓬莪朮辣桂藿香益智仁各一兩香附一兩半甘草炙三分加半夏制三分上銼散每服三錢水一盞姜四片棗一枚煎七分不時服順氣木香散治冷證腫脹泄瀉良薑乾薑炮茴香炒縮砂仁辣桂橘紅厚朴薑汁炙焙甘草爁蒼朮炒丁皮桔梗各等分上末每二錢半薑棗煎食前服三和散和暢三焦治痞脹浮腫大腹皮炒紫蘇莖葉沉香宣木瓜切焙羌活各一兩白朮川芎木香甘草炒陳橘皮去白檳榔濕紙煨各三分上粗末每二錢煎服加赤茯苓可以和氣利水五皮散治皮膚水氣大腹皮炒桑白皮炒茯苓皮生薑皮陳橘皮等分上粗末每三錢煎服分氣紫蘇湯治腹脅疼痛氣促喘急五味子去梗洗淨桔梗銼茯苓大腹皮陳橘皮洗淨草果仁桑白皮炙銼甘草炙各三斤上八味㕮咀為粗末秤二十斤淨入揀嫩枝葉乾紫蘇十五斤搗碎同一處拌勻每服四錢水一大盞姜錢三片入鹽少許同煎至七分去滓空心食前服常服和胃進食蘇子降氣湯治心腹脹滿喘促短急蘇子淨炒半夏洗七次各二兩半甘草炙二兩前胡去蘆陳皮去白厚朴薑汁製各一兩桂一兩去粗皮不見火川當歸去蘆一兩半上為㕮咀每服二錢至三錢水一大盞生薑三片煎至七分去滓溫服不拘時常服消痰飲散滯氣進飲食蘇合香丸療疰忤鬼氣猝心痛霍亂吐利時氣鬼魅瘴瘧赤白暴利淤血月閉痃癖疔腫驚癇鬼忤中人小兒吐乳大人狐貍等疾方見嗽類秘傳降氣湯治同前五加皮半兩酒浸半日炒黃色枳殼洗浸去瓤麩炒柴胡去蘆洗各一兩骨碎補燎去毛括淨銼炒半兩地骨皮半兩炒黃桔梗半兩炒黃色桑白皮二兩銼炒陳皮一兩炒黃色訶子炮取肉半兩炒甘草一兩炒半夏半兩生為末生薑自然汁為餅再碎炒草果去皮膜半兩淨洗炒黃上為粗散和勻以碗盛就飯甑上蒸一伏時傾出攤令冷收之每服二錢紫蘇三葉姜錢三片水一盞同煎七分食後通口服痰嗽加半夏曲煎心肺虛加人參茯苓煎上膈熱加北黃芩煎下部大假虛加少許炮附子煎如使附子多加生薑婦人血虛加當歸煎五膈寬中散治七氣留滯飲食不下谷脹氣脹通用白豆蔻仁丁香木香縮砂仁甘草炙青皮陳皮各二兩川厚朴薑汁炙焙香附淨各四兩上粗末每三錢姜三片鹽一點煎服紅丸子治丈夫脾積氣滯胸膈滿悶酒積不食婦人脾血積氣諸般血症氣塊方見痎瘧門異香散治腹脅膨脹痞悶噎塞噫氣吞酸一切氣痞腹中刺痛蓬莪朮煨益智仁甘草爁京三稜煨各六兩青皮去白陳皮去白各三兩石蓮肉一兩厚朴去粗皮薑汁浸二兩上為細末每服二錢水一盞姜三片棗一枚鹽一捻煎七分通口服不計時或鹽湯點或鹽酒調皆可服調氣散治氣滯不勻宿食不消白豆蔻用仁丁香檀香銼木香各二十兩藿香葉甘草爁各五斤縮砂仁二斤半上為細末每服一錢入鹽一捻沸湯點服不計時或用薑棗略煎服神保丸木香胡椒各一分巴豆十枚去皮心研乾蠍七枚上件湯釋蒸餅丸如麻子大硃砂為衣每服三粒心膈痛柿蒂燈心湯下腹痛柿蒂煨姜煎湯下血痛炒薑酸湯下肺氣盛者白礬蛤粉各三分黃丹一分同研為散煎桑根白皮糯米飲調三錢下小喘止用桑皮糯米飲下腎氣脅下痛炒茴香酒下大便不通蜜湯調檳榔末一錢下氣噎木香湯下宿食不消茶酒漿飲任下諸氣惟膀胱氣脅下痛最難治獨此藥輒能去之有人病人項筋痛諸醫皆以為風治之數月不瘥乃流入背膂久之又注右脅攣痛甚苦乃合服之一投而瘥後嘗再發又一投瘥蓬煎丸利大腑去積氣舶上茴香炒附子炮去皮臍枳殼浸一宿去瓤麩炒川楝子去核檳榔山藥各二兩硇砂半兩京三稜蓬莪朮二味各四兩醋煮令透切焙為末豬胰一具入硇砂並三稜莪朮末同熬膏上為末入膏內同醋麵糊為丸如梧桐子大每服十丸至十五丸生薑湯下婦人淡醋湯下不拘時候更量虛實加減常服順氣寬中消積滯化痰飲生料五苓散去水退腫澤瀉銼二十五兩豬苓去皮赤茯苓去皮白朮去蘆各一十五兩桂去粗皮一十兩上為細末每服二錢熱湯調下不拘時又治淤熱在裡身發黃疸濃煎茵陳蒿湯下食前服疸病發渴及中暑引飲亦可用水調服小兒加白朮末少許如發虛熱加綿黃耆人參末少許俞山人降氣湯治氣不升降痰實喘滿紫蘇子微炒前胡去蘆厚朴薑汁浸一宿炒香半夏曲炙甘草炙橘皮去白五加皮薑汁塗炙當歸洗去蘆桂心不見火黃耆去蘆各一兩人參去蘆附子炮去皮尖桔梗炒羌活乾薑炮各半兩上粗末每服三錢水一盞半紫蘇三葉生薑三片棗子一枚同煎七分去滓食後服青娥丸治氣滯不散兼治腰痛破故紙酒浸炒八兩胡桃二十個去皮殼蒜四兩熬膏杜仲十六兩去皮薑汁浸炒上為細末蒜膏為丸每服三十丸空心溫酒下婦人淡醋湯下常服壯筋骨活血脈烏髭鬚益顏色感應丸治積冷傷胃腹脅脹痛方見脹滿門麻仁丸順三焦潤五臟治大便秘塞不通年高人尤宜服之白檳榔半煨半生羌活去蘆木香各一兩肉桂去粗皮菟絲子酒浸一宿另研為末山茱萸車前子枳殼去瓤麩炒防風去蘆頭及叉枝山芋各一兩半麻仁別搗研大黃半蒸半生郁李仁去皮別搗碎各四兩上為細末入另研藥勻煉蜜和丸如梧桐子大每服十五丸至二十丸溫水吞下臨臥服撞氣阿魏丸治五種噎疾九般心痛痃癖氣塊冷氣攻刺茴香炒香陳橘皮洗青橘皮洗川芎丁香皮炒蓬莪朮炮甘草炒各一兩縮砂仁肉桂去粗皮白芷炒各半兩生薑四兩切作片子用鹽半兩醃一宿炒黑色胡椒二錢半阿魏二錢半醋浸一宿以面同為糊上為末用阿魏糊和丸如雞頭大每藥丸一斤用硃砂七錢為衣丈夫氣痛炒薑鹽湯下一粒至二粒婦人血氣醋湯下常服一粒爛嚼茶酒任下三稜煎丸治中脘氣痞心腹堅脹胸中痞塞喘滿短氣大便不調或泄或秘京三稜生細銼半斤搗羅為末以好酒三升石器內熬成膏青橘皮去白杏仁湯浸去皮麩炒令黃蘿蔔子微炒乾漆炒各二兩神麯淬炒麥糵炒各三兩硇砂研飛一兩上為末以三稜膏搜和丸如梧桐子大每服十五丸至二十丸溫米飲下食後服二姜丸養脾溫胃去冷消痰大治心脾疼痛寬胸下氣一切冷物所傷良薑去蘆乾薑炮上件等分為細末麵糊為丸如梧桐子大每服十五至二十丸食後橘皮湯下孕婦不宜服香橘湯治七情所傷中脘不快腹脅脹滿香附炒半夏制橘紅各二兩甘草炒三分上銼散每三錢姜五片棗二枚煎服桔梗枳殼湯治諸氣痞結滿悶枳殼制桔梗各二兩甘草炒半兩上銼散每四錢水盞半姜五片煎至中盞溫服薑桂散治心中猝痛腹脅氣滯辣桂川白姜不炒各一兩蓬莪朮半兩上末每一錢溫酒調下沉香開膈散治五膈五噎痞滿嘔吐心腹刺痛脅肋脹拒沉香荊三稜蓬莪朮白豆蔻仁蓽澄茄縮砂仁草果仁益智仁川白姜丁香人參丁皮各半兩木香白茯苓香附炒藿香葉半夏曲青皮陳皮各一兩甘草炒一兩一分上粗末每三錢水盞半姜五片棗二枚煎至中盞食前服良薑湯治冷氣腹痛良薑辣桂各一兩半夏制三分木香當歸厚朴制各半兩甘草炒一分上粗散每三錢姜四片水大盞煎六分食前服白豆蔻散治七氣所傷滯於胸膈窒於咽喉脹痛於心下噫氣吞酸不能飲食白豆蔻仁縮砂蓽澄茄丁香木香甘草炒各一分青皮陳皮辣桂各二分厚朴制香附炒各三分上末每三錢水一盞姜三片鹽一捻煎七分不時服如意丸治積聚塊痛疝瘕症癖等疾沉香木香大丁香蓽澄茄使君子辣桂川白姜炒桃仁炒五靈脂炒硇砂醋浸半日雄黃沒藥大戟牽牛炒取末巴豆去油各一兩荊三稜蓬莪朮肉豆蔻炮各半兩上末研細水煮麵糊丸麻子大每服二丸加至三丸止溫酒送下頂珠丸治積氣塊痛久年脾積癖瘕之疾木香丁香淡豉硇砂醋浸半日並曬乾硃砂研細各一分巴豆去油一錢半上末陳米飯為丸桐子大輕者一丸重者二丸臨睡先嚼煨姜如指許嚥下次以冷熟水吞藥不得嚼破上項兩丸子請酌量用楊氏麝香丸治停宿積聚能尋諸處痛凡膀胱氣脅下痛最難治此藥主之麝香一錢木香胡椒各一兩全蠍去毒微炒巴豆去皮心各四錢上為末湯泡蒸餅糊丸麻子大硃砂衣每三丸常服熟水下心腹痛研煨姜泡湯下血痛炒姜醋泡湯下腎氣脅疼茴香酒下大便秘蜜湯下橘皮一物湯治諸氣攻刺及感受風寒暑濕初證通用凡酒食所傷中脘妨滿嘔吐吞酸悉療之陳橘皮洗淨新汲水煎服屢效氣塊石燕散治飲食傷冷心下結塊狀如伏梁又攻左脅車蛾殼蛤蜊殼並燒灰存性為末各一兩乾薑生官桂甘草炙各一分上為末每服二錢臨發時沸湯點服車蛾蛤蜊殼治塊分心氣飲真方治憂思鬱怒諸氣痞滿停滯通利大小便紫蘇莖葉三兩半夏制枳殼制各一兩半青皮去白陳橘皮大腹皮桑白皮炒木通去節赤茯苓南木香檳榔蓬莪朮煨麥門冬去心桔梗辣桂香附藿香各一兩甘草炙一兩三分上銼散每服三錢水大盞姜三片棗二枚燈心十莖煎七分不時服里人瘴瘧經年虛腫腹脹食不知飽以此藥吞溫白丸見浮腫門初則小便數次後則大便盡通其病頓愈附梅核氣梅核氣方論梅核氣者窒礙於咽喉之間咯之不出咽之不下如梅核之狀者是也始因恚怒太過積熱蘊隆乃成厲痰鬱結致有斯疾耳治宜導痰開鬱清熱順氣如半夏陳皮香附川芎山梔仁黃芩枳殼蘇子之類是也如老痰凝結不開以咸軟之堅海石是也加味二陳湯半夏陳皮茯苓甘草黃芩枳殼真蘇子桔梗白豆蔻仁山梔子仁各等分上㕮咀每服五錢加生薑一片水一盞煎六分食後漸漸服附積聚癥瘕痞塊積聚癥瘕痞塊方論內經云積者蓋厥氣生足悗悗生脛寒脛寒則血脈凝澀凝澀則寒氣上入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積猝然多飲食則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外有寒汁沫與血相搏則併合凝聚不得散而成積矣或外中於寒內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊裹不散津液澀滲著而不去而成積矣故曰肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆瘧瘧連歲不已心之積名曰伏梁起臍上大如臂上至心下久不愈令人煩心脾之積名曰痞氣在胃脘右側覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚肺之積名曰息奔在右脅下大如覆杯久不愈令人灑淅寒熱喘咳發肺壅腎之積名奔豚在小腹上至心下若豚狀或下或上無時久不愈令人喘逆骨痿少氣難經曰積者陰氣也聚者陽氣也故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成也積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚也矣原病式曰症者腹中堅硬按之應手然水體柔順而今反堅硬如地者亢則害承乃制也瘕者腹中雖硬而忽聚忽散無其常故其病未及症也經曰血不流而滯故血內凝而為瘕也小腸移熱於大腸乃為虛瘕大腸移熱於小腸謂兩熱相搏則血移而為伏瘕血澀不利月事沉滯而不行故云為必瘕為必與伏同傳寫誤爾陳無擇云癥瘕屬肝部積聚屬肺部失症者堅也瘕者假也假物而成形然七症八瘕之名經論亦不詳出雖有蛟蛇鱉肉發蝨米等七證初非定名偶因食物相感而致患爾若婦人癥瘕則由內外不內外因動傷五臟氣血而成古人謂為痼疾以蛟蛇等為生瘕然亦不必泥此並屬血病蛇發等事皆出偶然但飲食間誤中之留聚假血而成自有活性亦猶永徽中僧病噎者腹中有一物其狀如魚即生瘕也潔古云養生積自除譬如滿座皆君子縱有一小人自無容地而出令其真氣實胃氣強積自消矣潔古之言豈欺我哉內經曰大積大聚衰其大半而止滿實中有積氣大毒之劑尚不可過況虛中有積者乎此乃治積之一端也邪正虛實宜詳審焉丹溪云凡積病不可用下藥徒損真氣病亦不去當用消積藥使之融化則根除矣又云氣不能作塊成聚塊乃有形之物也痰與食積死血而成也在中為痰飲在右為食積在左為死血大法咸以軟之堅以削之行氣開痰為主用海石三稜蓬莪朮以上俱用醋煮香附桃仁紅花五靈脂之類為丸石鹼白朮湯送下凡婦人腹中有塊多屬死血丹溪方治一婦人死血食積痰飲成塊在兩脅動作雷鳴嘈雜眩暈身熱時作時止黃連一兩半一半以吳茱萸半兩同炒去茱萸一半以益智半兩同炒去益智萊菔子一兩半炒臺芎梔子三稜莪朮醋煮麥曲桃仁去皮尖各五錢香附童便浸焙乾山楂各一兩上為末蒸餅丸如梧桐子大每服五十丸薑湯下撞氣阿魏丸治五種噎疾九般心痛痃癖氣塊冷氣攻刺如意丸治積聚塊痛疝瘕症癖等疾頂珠丸治積氣塊痛久年脾積癖瘕之疾蓬煎丸利大腑去積氣調氣散治氣滯不勻宿食不消紅丸子治丈夫脾積氣滯胸膈滿悶酒積不食婦人脾血積氣諸般血症氣塊氣塊石燕飲治飲食傷冷心下結塊狀如伏梁又攻左脅楊氏麝香丸治停宿積聚能尋諸處痛凡膀胱氣脅下痛最難治此藥主之以上八方並見前諸氣門肥氣丸東垣方治肝之積在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲不已厚朴五錢黃連七錢柴胡二兩川烏頭炮去皮臍一錢一分巴豆霜五分椒四錢乾薑炮五分皂角去皮弦煨一錢五分白茯苓一錢半甘草三錢炙蓬莪朮炮人參昆布各二錢五分上件除茯苓皂角巴豆霜另末外為極細末和勻煉蜜為丸如桐子大初服二丸一日加一丸二日加二丸漸漸加至大便微溏再從二加服周則復始積減大半勿服伏梁丸治心之積起臍上大如臂上至心下久不愈令人煩心黃連一兩半厚朴制人參各五錢黃芩三錢桂一錢乾薑菖蒲巴豆霜紅豆川烏炮各五分茯神丹參炒各一錢上件除巴豆霜外為細末另研豆霜漸漸入末煉蜜為丸如桐子大服如上淡黃連湯下痞氣丸治脾之積在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚厚朴四錢半黃連八錢吳茱萸三錢黃芩二錢茯苓澤瀉人參各一錢川烏頭炮川椒炒各五分茵陳酒炒乾薑炮各一錢半砂仁一錢半白朮二錢巴豆霜桂各四分上件除豆霜另研茯苓另末漸入外同為細末煉蜜為丸如桐子大每服用淡甘草湯下服如上法息賁丸治肺之積在右脅下覆大如杯久不已令人灑淅寒熱喘咳發肺壅厚朴制八錢黃連炒一兩三錢乾薑炮白茯苓川椒炒紫菀各一錢半桂川烏頭炮桔梗白豆蔻陳皮京三稜各一錢天門冬人參各一錢青皮五分巴豆霜四分上件除茯苓巴豆霜漸入外為末煉蜜為丸如桐子大以淡薑湯下服如上法以上四方秋冬加厚朴減黃連四分之一奔豚丸治腎之積發於小腹上至心下若豚狀或下或上無時久不已令人喘逆骨痿少氣及治男子內結七疝女人瘕聚帶下厚朴制七錢黃連五錢白茯苓澤瀉菖蒲各二錢川烏頭五分丁香五分苦楝酒煮三錢玄胡索一錢半全蠍附子獨活各一錢桂二分巴豆霜四分上除巴豆霜茯苓另為末漸入外為細末煉蜜為丸如桐子大淡鹽湯下服如上法散聚湯三因方治久氣積聚狀如癥瘕隨氣上下發作有時心腹絞痛攻刺腰脅小腹䐜脹大小便不利半夏檳榔當歸各三分陳皮杏仁去皮尖炒桂各二兩茯苓甘草炙附子炮川芎枳殼炒厚朴制吳茱萸湯洗各一兩大黃大便利去之上㕮咀每服四錢水煎濟生大七氣湯治積聚狀如癥瘕隨氣上行發作者時心腹㽲痛上氣窒塞小腹脹滿益智陳皮京三稜蓬莪朮香附子各一兩半桔梗肉桂藿香葉甘草炙青皮各三分上㕮咀每服五錢水煎阿魏方丹溪方治肉積連翹半兩糖梂子一兩黃連六錢半阿魏一兩醋煮作糊上為末用阿魏糊為丸如桐子大每二三十丸白湯送下秘傳賽寶丹追蟲取積神效黑醜十兩取頭末四兩分二處木香末半兩錫灰醋炒末一兩檳榔取淨末二兩分二處雷丸取淨末二兩分二處陳皮取末半兩青皮取末半兩三稜醋炒莪朮醋炒各一兩上件各為細末再用使君子二兩鶴蝨皂角各一兩三味用水二碗煎至一盞用粟米一合布包在藥內煮將熟起手用黑醜末二兩法起次用檳榔末一兩再用雷丸末一兩盡再用木香錫灰三稜蓬莪朮陳皮青皮等末盡後再一用雷丸二用檳榔三用醜末蓋在外陰乾每服三錢四更時候用冷茶吞下復睡至天明不可洗手洗面吃湯物代取下或蟲或積惡毒滯氣並原藥下盡方可用冷水洗面其藥未下寧耐片時見其藥下再用藥食補之木香檳榔丸瑞竹方治一切氣滯心腹滿悶脅肋膨脹大小便結滯不快方見脾胃門丹溪治茶癖方石膏黃芩升麻各等分上為末砂糖水調下琥珀膏專貼積塊大黃朴硝各一兩上為末用大蒜搗膏和勻貼之保和丸治一切食積方見傷食門謹按丹溪曰氣不能成塊成聚塊乃有形之物痰與食積死血而成也在中為痰飲在右為食積在左為血塊誠然言也何以明之曰左關肝膽之位肝膽藏血液右關脾胃之位脾胃藏飲食所以左邊有積則為血塊右邊有食則為食積而其中間則為水穀出入之道路五志之火熏蒸水穀而為痰飲所以中間有積則為痰飲也其理昭矣治法調其氣而破其血消其食而豁其痰是已如木香檳榔去氣積三稜莪朮去血積麥芽神麯去酒積香附子枳實去食積牽牛甘遂去水積山楂阿魏去肉積海粉礞石去痰積雄黃白礬去涎積乾薑巴豆去寒積黃連大黃去熱積各從其類也若用群隊之藥分其藥勢則難取效雖要認得分明是何積聚兼見何證然後增減斟量使之不爾反有所損要在臨時通變也
