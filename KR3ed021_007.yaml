body:
  text: 卷之七痰涎痰涎方論惟氣與血能生諸病痰亦如之夫痰者津液之異名人之所恃以潤養肢體者也血氣和平關絡條暢則痰散而無氣脈閉塞脘竅凝滯則痰聚而有痰之所以發動者豈無自而然哉風搏寒凝暑煩濕滯以至諸熱蒸郁啖食生冷煎爆腥膻咸藏動風發氣等輩皆能致痰也是痰作恙為喘為嗽為壅為嘔為眩暈為風癇為狂迷為忪悸或吞酸或短氣或痞隔或腫脹或寒熱或疼痛痰實主之人知痛生於氣血孰知痰涎流注亦能纏滯而為痛乎如頭風證眉稜耳角俱痛投以風藥不效投以痰藥收功如患眼證赤腫羞明而痛與之涼劑弗瘳與之痰劑獲愈如酒家手臂痛重時或麻痹二陳湯加片子薑黃下白丸子消飲丸倍術丸輩每每就安如斗家胸骨撲傷刺痛無已散血之劑罔功續以自己溲便飲之須臾吐痰其痛立止此皆痰涎作痛之明證也然而頑痰滿胸上脘填塞其高者因而越之法當從權取吐或者津液不守所以痰多吐甚痰脫則精竭而斃矣療痰之法理氣為上和胃次之若風若寒若濕若熱如前數者亦當推尋所受之因和胃謂何涎者脾之液也脾胃一和痰涎自散故治痰多用半夏蓋半夏能利痰故也痰涎證治橘皮湯治胸膈停痰半夏制五兩茯苓陳皮各三兩細辛青皮桔梗枳殼甘草炒各二兩人參旋覆花去萼各一兩上銼散每服三錢姜五厚片煎服前胡半夏湯治痰盛北前胡半夏制茯苓各三分陳皮木香紫蘇枳殼制甘草炒各二分上銼散每服三錢姜五片烏梅少許煎服人參飲治痰亦治嗽人參桔梗半夏曲五味子細辛枳殼制赤茯苓各一分甘草炒半分上銼散每服三錢姜五片煎服痰嗽加紫菀添甘草星薑湯治痰去風丸白南星半兩者一個老生薑三錢半上各切片以水三盞磁器內煎取其半逐漸溫服二聖飲治風痰南星半夏各二兩切片上用生薑一斤搗取自然汁浸藥磁器盛之頓在鍋內隔湯熬烑令薑汁盡焙乾為末每挑二錢匕生薑甘草少許煎湯調下或用糕糊小丸薑湯下三十丸入煅白礬少許同丸亦得大半夏湯治痰飲半夏制茯苓生薑等分上銼碎每服三錢水二盞煎至一小盞溫服如熱痰加甘草少許胃不和去甘草加陳皮半夏丸消下痰涎圓白半夏老生薑等分如泥焙乾上為末煮薑汁為糊丸桐子大每三十丸薑湯下豁痰丸治頑痰壅盛南星三兩半夏二兩各銼作大片用濃皂角水浸一宿焙乾為末白附子川靈脂直殭蠶炒去絲華陰細辛白礬煅枯各一兩全蠍三錢半焙上為末皂角漿煮麵糊為丸桐子大每二三十丸薑湯下神術丸治痰飲妙茅山蒼朮一斤米泔浸一宿去皮切片焙乾為末生油麻半兩水二盞研細取漿大棗十五個煮取肉研旋入磨漿拌和藥上末為丸桐子大曬乾每五七十丸空心溫湯下辰砂化痰丸驅風化痰辰砂研細白礬煅枯各半兩半夏曲三兩南星炮一兩上為末薑汁調面煮糊丸桐子大別用硃砂衣每十丸薑湯下小兒風痰一二丸強中二姜丸溫脾胃消寒痰良薑乾薑青皮陳皮大半夏切開沸湯蕩浸七次焙乾各一兩南星炮半兩上為末薑汁調面煮糊丸桐子大每三十丸薑湯下養正丹治腎虛氣不歸元痰涎上壅亦治寒痰每服二十丸用降氣湯送下二陳湯吞白丸子方見小兒類治痰飲一證眉心眉梁骨痛狀如頭風二陳湯方見瘧類加蒼朮片子薑黃制枳殼各少許治酒面積毒釀熱生痰攻眼腫痛控痰良方喘嗽通用虢丹白礬各二兩上以錢王磚剜一大孔先入虢丹次以白礬蓋頂用炭一斤煅至火盡礬枯丹黑出火毒研細煮稀麵糊丸麻子大每服十五丸沸湯泡生薑汁送下諸頑痰迷塞關竅不通聲音不出以三十丸研末入全蠍少許用自然薑汁澄取清者調灌須臾吐痰立愈凡喘促胸膈澎湃寸脈急數須從權吐之中滿內實而喘者與解毒雄黃丸方見積熱門附諸賢論劉宗厚曰痰之為病仲景論四飲六證無擇敘內外三因俱為切當蓋四飲則敘因痰而顯諸證者三因則論其因有所傷而生痰者也惟王隱君論人之諸疾悉出於痰此發前人所未論可謂深識痰之情狀而得其奧者矣制滾痰丸一方絲治斯疾固為簡便較之仲景三因有表裡內外而分汗下溫利之法則疏闊矣況又有虛實寒熱之不同者哉夫痰病之原有因熱而生痰者亦有因痰而生熱者有因風寒暑濕而得者有因驚而得者有因氣而得者有因酒食而得者有因食積而得者有脾虛不能運化而生者有腎虛不能降火而生者若熱痰則多煩熱風痰多成癱瘓奇證冷痰多成骨痹濕痰多倦怠軟弱驚痰多成心痛癲疾飲痰多成脅痛臂痛食積痰多成癖塊痞滿其為病狀種種難名王隱君論中頗為詳盡學者但察其病形脈證則知所挾之邪隨其表裡上下虛實以治之若夫子和謂飲無補法必當去水故用吐汗下之三法治人常愈又論熱藥治痰之誤固為詳切亦有挾寒挾虛之證不可不論夫久痰凝結膠固不通狀若寒凝不用溫藥引導必有拒格之患況有風寒外來痰氣內郁者不出溫散亦何以開鬱行滯又有血氣虧乏之人痰客中焦閉塞清道以致四肢百骸發為諸病理宜導去痰滯必當補接兼行又難拘於子和之三法也大凡病久淹延卒不便死者多因食積痰飲所致何以然者蓋胃氣亦賴痰積所養飲食雖少胃氣卒不便虛故也亦有治痰用峻利過多則脾氣愈虛津液不運痰反生而愈盛法當補脾胃清中氣則痰自然運下此乃治本之法也謂醫中之王道者正此類也附諸方金沸草散治外感風寒痰氣內郁咳唾稠黏參蘇飲亦治外感風寒痰飲停積胸膈咳嗽氣促言語不能相續並見傷風門小青龍湯治外感風寒內生溢飲支飲倚怠喘滿方見咳嗽門蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛方見諸氣門中和丸治濕痰氣熱蒼朮黃芩半夏香附等分上為末粥丸如梧桐子大每服五七十丸薑湯下導痰湯南星炮橘紅去白赤茯苓去皮枳殼麩炒各一兩甘草炙半兩半夏四兩上㕮咀水煎生薑五片食前服茯苓丸出千金第一方半夏四兩茯苓二兩枳殼一兩風化硝半兩上為末蒸餅或神麯薑汁糊丸梧子大每服三十丸薑湯下此方治中脘停痰臂痛難舉手足不得轉有效清膈化痰丸黃連黃芩各一兩黃柏山梔半兩香附一兩半蒼朮二兩上為末蒸餅丸白湯下搜風化痰丸人參槐角子殭蠶白礬陳皮去白天麻荊芥各一兩半夏四兩薑汁炒辰砂半兩另研上為末薑汁浸蒸餅為丸辰砂為衣服四十丸薑湯下利膈化痰丸南星蛤粉研細一兩半夏栝蔞仁貝母去心治胸膈痰氣妙香附半兩童便浸上為末用豬牙皂角十四鋌敲碎水一碗半煮杏仁去皮尖一兩煮水將干去皂角擂杏仁如泥入前藥搜和再入薑汁泡蒸餅丸如緑豆大青黛為衣每服五六十丸薑湯下清痰丸專清中脘熱痰積烏梅枯礬黃芩蒼朮陳皮活石炒青皮枳實各半兩南星半夏神麯山楂乾生薑香附各一兩上為末湯浸蒸餅丸服王隱君滾痰丸括曰甑里翻身甲掛金於今頭戴草堂深相逢二八求斤正硝煅青礞倍若沉十七兩中零半兩水丸桐子意常斟千般怪證如神效水瀉雙身卻不任大黃酒蒸黃片芩酒洗淨各八兩沉香半兩礞石一兩捶碎焰硝一兩用入小砂罐內瓦片蓋之鐵線練定鹽泥固濟曬乾火煅紅候冷取出一方加硃砂二兩研為細末為衣上為細末水丸梧子大每服四五十丸量虛實加減服茶清溫水任下臨臥食後服六君子湯治脾虛不進飲食嘔吐痰水方見調理脾胃門清氣化痰丸清頭目涼膈化痰利氣半夏湯洗七次二兩陳皮去白茯苓去皮各一兩半薄荷葉荊芥穗各五錢黃芩酒浸炒連翹梔子仁炒桔梗去蘆甘草炙各一兩蒼朮泔浸銼焙乾炒香附子醋浸炒各一兩上為末薑汁煎水打糊為丸如梧子大每服五十丸食後臨臥各一服如腸胃燥實加酒炒大黃芒硝各一兩此方即二陳湯涼膈散加香附蒼朮相合是也蓋痰者因火而動氣者因鬱而成故作胸膈痞滿頭目昏眩今用二陳湯以豁痰涼膈散以降火而散風熱香附蒼朮開鬱順氣何疾之不愈哉節齊化痰丸論曰痰者病名也人之一身氣血清順則津液流通何痰之有惟夫氣血濁逆則津液不清熏蒸成聚而變為痰焉痰之本水也原於腎痰之動濕也主於脾古人用二陳湯為治痰通用者所實脾燥濕治其標也然以之而治濕痰寒痰痰飲痰涎則固是矣若夫痰因火上肺氣不清咳嗽時作及老痰郁痰結成黏塊凝滯喉間吐咯難出此等之痰皆因火邪炎上熏於上焦肺氣被郁故其津液之隨氣而升者為火熏蒸凝濁鬱結而成歲月積久根深蒂固故名老名郁而其源則火邪也病在上焦心肺之分咽喉之間非中焦脾胃溫痰冷痰痰飲痰涎之比也故湯藥難治亦非半夏茯苓蒼朮枳殼南星等藥所能治也惟在開其鬱降其火清潤肺金而消化凝結之痰緩以治之庶可取效今制一方於後天門冬去心黃芩酒炒海粉別研栝蔞仁別研橘紅各一兩桔梗去蘆連翹香附子槌研淺鹽水浸炒各五錢青黛別研二錢芒硝別研三錢上為細末煉蜜入生薑汁少許和藥末杵極勻丸如小龍眼大噙化一丸或嚼爛清湯細咽之或丸為細丸如黍米大淡薑湯送下五六十丸此等老痰大率飲酒之人多有之酒氣上升為火肺與胃脘皆受火邪故鬱滯而成此方用天門冬黃芩泄肺火也海粉芒硝咸以軟堅也栝蔞仁潤肺降痰香附米開鬱降氣連翹開結降火青黛解鬱火故皆不用辛燥之藥祕傳豁痰丸治食積痰熱陳皮去白四兩山楂神麯各二兩當歸黃芩白朮各四兩半夏薑汁浸七日黃連白茯苓甘草各一兩五錢枳實二兩五錢上為細末湯浸蒸餅為丸如梧桐子大每服四五十丸臨臥或食後淡薑湯送下祕傳滾痰丸降痰火神效大黃八兩銼片用皮硝三兩酒一碗水一碗和勻蒸乾用黃芩八兩銼碎用明礬三兩酒水各一碗蒸用沉香五錢礞石一兩用硝一兩入罐固濟煅紅取出用硃砂一兩研末為衣上為細末水丸如梧桐子大硃砂為衣每服四五十丸量虛實加減加味二陳湯半夏薑汁一錢五分白茯苓白朮各一錢香附一錢二分連翹黃芩枳實麩炒前胡甘草栝蔞仁桔梗麥牙神麯炒陳皮鹽水浸炒各一錢上㕮咀水二盞姜三片煎一盞五飲湯拔粹方一留飲心下二癖飲脅下三痰飲胃中四溢飲膈上五流飲腸間凡此五飲酒後傷寒飲冷過多故有此疾旋覆花人參陳皮枳實白朮茯苓厚朴半夏澤瀉豬苓前胡桂心芍藥甘草各等分上銼每兩分四服水二盞生薑十片同煎至六分取清溫服不拘時忌食肉生冷滋味等物因酒有飲加葛根葛花砂仁蠲飲枳實丸拔粹方逐飲消痰導滯清膈枳實炒半夏湯泡七次陳皮去白各二兩黑牽牛半斤取頭末三兩上為末水煮麵糊為丸如梧子大每服五十丸薑湯下食後辰砂祛痰丸聖惠方治酒食過多酸鹹作成痰飲聚於胸中凝則嘔逆噁心流則臂痛頭目昏眩腰腳疼痛深則左癱右瘓淺則蹶然倒地此藥神效硃砂一兩水飛一半入藥一半為衣半夏四兩槐角炒陳皮白礬生荊芥各一兩生薑四兩與半夏製作餅陰乾上為末薑汁打糊丸如梧桐子大每服五十丸生薑湯下八味丸治脾腎兩虛痰唾而不咳者方見諸虛門五虎湯治痰喘氣急方見喘門水飲水飲方論水之與飲同出而異名也人惟脾土有虧故平日所飲水漿不能傳化或停於心下或聚於脅間或注於經絡或溢於膀胱往往因此而致病矣孰謂血氣痰涎能生諸疾而水飲之不能為恙乎惟水與飲漉漉有聲為喘為咳為嘔為泄為痞隔為脹滿為眩暈為怔忪為寒熱為堅痛為浮腫為多唾為短氣為體重氣為飲隔痞滿腹鳴骨痛冷痹則曰氣分經脈不行血化為水四肢紅腫則曰血分凡此等類皆水氣之所由作也據病驗證可不究其所受之原乎然則療治之法將何先曰能以表裡虛實訂之斯得矣表有水者其身熱嗽喘怔忪乾嘔微利青龍湯汗之而愈里有水者其身涼嘔嗽痞滿引脅痛硬十棗湯下之而安虛者脈虛心腹滿而濡當以安腎丸為主加青木香丸少許以行之實者脈實心腹滿而硬當以青木香丸為主用五皮散加枳殼以導之尋常水氣心下怔忪大半夏湯小半夏茯苓湯五苓散輩通用可也然而瘧家多積黃水或於心下停瀦或於脅間結癖惟癖為能生寒熱所以瘧劑多用常山蓋水在上焦則吐之水不在於上焦則常山亦能破其癖而下其水也若夫水腫證候亦此種類詳見於後請旁參而互考焉水飲證治芎夏湯逐水利飲通用川芎半夏制茯苓各一兩青皮陳皮枳殼制各半兩白朮甘草炒各一分上銼散每服三錢姜五厚片煎服川芎半夏能逐水也喘加去節麻黃嗽加炒桑白皮嘔加生薑半夏泄加蒼朮白朮痞隔加枳殼桔梗脹滿加縮砂白豆蔻眩暈加半夏南星怔忪加白茯苓寒熱疼痛下其癖浮腫體重滲其濕余以類推大半夏湯方見痰涎門小半夏茯苓湯治諸水氣半夏制五兩茯苓三兩上銼散每服三錢水二盞半煎一盞稱生薑二錢半研取汁入藥煎沸溫服五苓散流行水飲方見氣門每二錢沸湯調下小便更不利加防己佐之桂術湯治氣分前證辣桂三兩白朮麻黃去節細辛去苗甘草炒各二兩枳殼制乾薑炮各一兩半上銼散每服三錢煎服桂苓湯治血分前證辣桂赤茯苓當歸川芎赤芍藥蓬莪朮京三稜檳榔蒼朮炒桑白皮炒大腹皮瞿麥穗青皮陳皮甘草炒各半兩葶藶大黃濕紙煨各一分上銼散每服三錢姜五片煎服平肺湯肺與腎皆以至陰積水喘嘈咳嗽蓋水乘之葶藶微炒桑白皮炒北梗枳殼制紫蘇莖葉半夏制各一兩麻黃去節三分甘草炒半兩上銼散每三錢姜五片煎服治腎水用青木香丸青龍湯治表不解有水氣發熱乾嘔怔松咳嗽微喘微利麻黃去節細辛芍藥乾薑炮甘草炒辣桂各三兩五味子二兩半夏制二兩半上銼散每服三錢水一盞半煎一盞溫服十棗湯治表解里有水身涼汗出乾嘔短氣微嗽微利胸下痞滿引脅硬痛芫花炒大戟甘遂等分上件異篩稱末合和入乳鉢研良久以肥棗十個擘開用水一碗煮爛取汁一盞調藥壯者服一錢重弱者服半錢重平旦溫服別用棗湯漱下通利即以糜粥自養未利明日再服半錢請酌量用安腎丸治腎氣不足膀胱虛冷川烏炮去皮臍辣桂各四兩茯苓白朮石斛酒炒白蒺藜炒去刺巴戟蓯蓉酒浸焙桃仁去皮尖微炒萆薢山藥破故紙炒各十二兩上末煉蜜丸如桐子大每五七十丸鹽湯空心服青木香丸行滯通水青木香五兩蓽澄茄補骨脂炒檳榔炒各十兩牽牛六十兩炒香搗取末三十兩上為末滴水丸緑豆大每二十丸熟水下五皮散治皮膚水氣方見諸氣類二和消和暢三焦治痞脹浮腫方見諸氣類消飲丸茯苓乾薑炮各三兩白朮八兩枳實炒半兩上末煉蜜丸桐子大每十五丸米飲下倍術丸白朮四兩辣桂乾薑炒各二兩上為末煉蜜丸桐子大每服二十丸米飲下此二藥可以溫中消水嘔吐嘔吐方論嘔吐出於胃氣之不和人所共知也然有胃寒有胃熱有痰水有宿食有膿血有氣攻又有所謂風邪入胃凡是數者可不究其所自來哉寒而嘔吐則喜熱惡寒四肢悽清法當以剛壯溫之熱而嘔吐則喜冷惡熱煩躁口乾法當以溫涼解之痰水證者唾沫怔忪先渴後嘔與之消痰逐水輩宿食證者胸腹脹滿醋悶吞酸與之消食去積輩腥氣燥氣熏炙噁心此膿血之聚經所謂嘔家有癰膿不須治膿儘自愈是爾七情內郁關格不平此氣攻之證經所謂諸郁干胃則嘔吐是爾若夫風邪入胃人多不審率用參朮助之攔住寒邪於此尤關利害其或惡聞食臭湯水不下粥藥不納此則翻胃之垂絶者也辨之不早其何以為對治乎雖然足陽明之經胃之絡脈也陽明之氣下行則順今逆而上行謹不可泄固也然嘔吐者每每大便祕結上下壅遏氣不流行盍思所以區劃而利導之他如汗後水藥不入口者逆嘔而脈弱小便復利身微熱而手足厥者虛寒之極也識者憂焉嘔吐證治附子理中湯治寒證嘔吐方見寒類二薑湯治寒證嘔吐良薑生白姜各半兩木香丁香各二錢半甘草炙一錢半上銼散每服三錢水盞半煎半食前服吳茱萸湯治冷涎嘔吐陰證乾嘔通用吳茱萸沸湯泡洗三次焙炒生薑各一兩半人參三分大棗五個上銼細每服四錢水盞半煎半食前服小柴胡湯多加生薑治熱證嘔吐方見血類人參鬚依分兩用或加烏梅亦得大半夏湯治痰證嘔吐半夏制銼二兩人參四錢切片上每四錢姜七片蜜少許熟煎服小半夏茯苓湯治水氣嘔吐方見水飲門金匱云嘔家用半夏以去其水水去則嘔止治中湯治食證嘔吐人參白朮乾薑炒甘草炙青皮橘紅等分上銼每服三錢棗一枚煎服積聚大便祕者加大黃二棋子許二陳湯方見瘧門加縮砂丁香治宿食嘔吐地黃湯治膿血嘔吐生地黃洗焙川芎各一兩半夏制甘草炙各三分南星蕩洗七次芍藥白芷茯苓北梗前胡知母人參各半兩上銼每服三錢半姜五片烏梅一個煎服加減七氣湯治氣鬱嘔吐半夏制二兩半人參辣桂厚朴制各一兩茯苓一兩半甘草炙半兩上銼散每三錢半姜七片棗一枚煎服加木香亦得藿香正氣散治風邪入胃嘔吐半夏曲川厚朴制各三兩藿香葉橘紅各一兩甘草炙七錢上銼散每三錢姜七片棗一枚食前煎服又養胃湯方見寒類通用木香豆蔻散治翻胃嘔吐人參木香肉豆蔻麵裹煨各半兩白豆蔻仁一分甘草炒一錢半上粗末每三錢薑棗煎服參橘湯治翻胃人參真橘紅石蓮肉各半兩透明乳香一錢半上末每一錢薑湯點服丁香煮散治翻胃嘔逆丁香石蓮肉各十四枚北棗七枚截碎生薑七片黃秫米半合洗上水碗半煮稀粥去藥取粥食之附子散治弱證翻胃大附子一枚作兩截中心各剜小孔入丁香四十九粒塞滿以竹針插合置磚上炭火燲四圍淬薑汁半碗再淬再淬以盡為度去皮切焙上並末每一錢半粟米一捻北棗二個煎食前服養正丹大治停寒留飲聚涎翻胃嘔吐方見痼冷門添姜煎二陳湯下嘔吐家多大便祕結虛冷者用靈砂或養正丹溫而利之又蘇合香丸方見嗽門用四分感應丸方見脹滿門用六分夾研作細丸薑汁泡沸湯下此亦溫利若大便熱結用蜜煮凝捻作指錠納後部導之或用獖豬膽一枚取汁入法醋少許以筆蘸滴灌於後部或燒皂角於桶內熏穀道或用連根蔥白一握漢椒五十粒搗細作餅焙熱和輕粉掩臍續以蔥椒煎湯熏蕩身下翻胃方橘皮湯治翻胃嘔吐真橘皮用日照西方壁土炒香取橘皮為末上每二錢薑棗略煎服蓮子散治翻胃石蓮子肉為末入些肉豆蔻末米湯乘熱調服二方患痢噤口通用溫胃散治久冷翻胃真附子一個生去皮臍分作四塊生薑半斤水一大碗慢火同煮至半盞取附子切焙上為末每一錢空心溫米湯調下附諸方加味二陳湯治停痰氣結而嘔半夏泡陳皮各五兩白茯苓三兩甘草炙一兩半砂仁一兩丁香五錢生薑三兩上㕮咀每服一兩水煎服附膈噎膈噎方論能飲食而能便下無斯病矣飲食不下而便稍祕則膈噎成焉皆由恚憂氣結思慮傷脾以致津液枯澀而飲食不能下下則便祕不通復而上行也內經曰三陽結謂之膈子和云三陽者大小腸膀胱也結謂熱結也小腸熱結則血脈燥大腸熱結則不能圊膀胱熱結則津液涸三陽既結則前後閉澀不通必反而上行所以噎食不下縱下而復出也此陽火不下推而上行也故經又曰少陽所致為嘔湧溢食不下此理明矣嚴氏曰五噎五膈者由喜怒不常七情傷於脾胃鬱而生痰痰與氣搏升而不降飲食不下蓋氣留於咽嗌者則成五噎結於胸膈者為五膈五噎之名憂思勞食氣也五膈之名憂恚寒熱氣也其病令人胸膈痞悶嘔逆噎塞妨礙飲食夫喜怒憂鬱內傷脾肺肝氣愈盛痰火上升血液俱耗胃脘干槅其槅在上近咽之下水飲可行食物難入間或可入入亦不多名之曰噎其槅在下與胃為近食雖可入難盡入胃良久復出名之曰膈又曰翻胃所因不同病出一體其病始有吞酸吐酸吐痰出沫痞塞嘈雜等證醫者不察病原妄投峻劑愈耗真元久則脾胃漸虛血液枯澀以致傳道失常便祕不通治尤難矣良可嘆哉治法宜養血生津清痰降火潤氣補脾抑肝開鬱治宜枳朮二陳湯降火以炒黃芩黃連清痰以竹瀝薑汁開鬱以神麯香附潤氣以杏子麻仁燥以白蜜乳汁血虛以當歸地黃之類其間倘服燥熱過多津液枯澀腸胃燥結屎如羊矢者不治丹溪云年高者不治無血故也不守戒忌厚味房勞之人亦不可治張雞峰曰噎是神思間病惟內觀自養可治此一言深中病情可不信哉祕傳枳朮二陳湯治痰氣食膈嘔吐痰涎翻胃嘈雜白朮泔洗銼土炒一錢黑枳實麩炒陳皮去白各八分茯苓去粗皮香附子童便浸炒半夏湯泡七次各一錢黃連薑汁炒檳榔雞心者白豆蔻各五分青皮麩炒吳茱萸生甘草各三分上㕮咀用水一鍾姜三片棗一枚煎八分食遠服氣虛者加人參黃耆血虛者加當歸地黃郁加神麯撫芎祕傳半夏朴湯治翻胃吐痰胸滿肋痛嘈雜吐涎半夏湯泡七次厚朴薑汁製山梔去皮炒黑川黃連薑汁炒各一錢廣陳皮去白八分茯苓去粗皮八分甘草生用三分黑枳實麩炒一錢蒼朮泔浸炒八分澤瀉香附子青皮各五分當歸白豆蔻各六分上㕮咀用水一鍾半姜三片煎八分不拘時服栝蔞實丸和劑方治膈噎胸膈痞痛徹背脅喘急妨悶栝蔞實去殼別研枳殼去瓤麩炒半夏湯泡七次桔梗炒各一兩上為細末薑汁米糊為丸如梧桐子大每服五十丸生薑湯送下人參利膈丸東垣方治膈噎胸中不利大便結燥痰嗽喘滿脾胃壅滯推陳致新治膈氣之聖藥也木香檳榔各七錢半人參當歸藿香甘草枳實麩炒黃各一兩大黃酒浸蒸熟厚朴薑製各二兩上為細末滴水為丸如梧桐子大每服五十丸溫水下五膈寬中散治七氣留滯飲食不下谷脹氣脹通用撞氣阿魏丸治五種噎疾九般心痛痃癖氣塊冷氣攻刺並見諸氣門參苓白朮散治脾胃虛弱不能運化白朮和胃丸八珍湯治證同前寬中進食丸滋形氣美飲食以上並見調理脾胃門保和丸消食開胃方見積聚門橘杏麻仁丸治噎膈大便燥結橘皮炙杏仁去皮尖麻仁去殼各三兩郁李仁去殼五錢下除陳皮為末三仁俱搗成膏用棗仁去核以石臼內三味搗和丸如梧桐子大每服五六十丸煎枳實湯送下食前服謹按膈噎翻胃之證皆由七情太過而動五臟之火熏蒸津液而痰火益盛脾胃漸衰飲食不得流利為膈為噎為翻胃也矣丹溪云年高者不治蓋年少之人氣血未虛用藥劫去痰火調其脾胃病不復矣年老之人氣血已虛用藥劫去痰火雖得暫愈其病立復所以然者氣虛則不能運化而生痰血虛則不能滋潤而生火也又云此證切不可用香燥之藥而厚滋味蓋證屬熱燥固不用香燥之藥香能散氣燥能耗血而滋味助火而生痰也有等庸工但見斯疾不察病因便以峻劑投入而取刻效圖以厚賄不思病危復而不救可不嘆哉附痞滿痞滿方論丹溪云痞者有食積兼濕東垣有法有方心下痞須用枳實炒黃連如稟受充實面蒼骨露氣實之人而心下痞者枳實黃連青皮陳皮枳殼如稟受素弱轉運不調飲食不化而心下痞者宜白朮山楂神麯麥芽陳皮如肥人心下痞者乃有實痰宜蒼朮半夏砂仁茯苓滑石瘦人心下痞乃是鬱熱在中焦宜枳實黃連葛根升麻如食後感寒飲食不化心下痞宜藿香草豆蔻吳茱萸砂仁痞挾血成巢囊用桃仁紅花香附大黃之類難知云傷寒痞者從血中來從外之內從無形雜病痞者亦從血中來從內之外從有形故無形以苦泄之有形以辛散之又有虛實之殊如實痞大便祕厚朴枳實主之虛痞大便利芍藥陳皮主之飲食所傷而為痞滿者當用藥消導其胸中窒塞欲吐者則宜吐之之有氣不運化及陰虛損血者以補虛之劑調之但世俗不明此理往往例用峻快藥下之復痞或致危篤者多矣活人桔梗枳殼湯治傷寒痞氣胸滿欲絶桔梗枳殼去瓤炒各三兩上銼水二盞煎至一盞去滓分作二服半夏瀉心湯治汗下後身寒痞滿而嘔飲食不下半夏半升洗黃芩乾薑人參各三兩黃連一兩大棗十二枚甘草三兩炙上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服仲景大黃黃連瀉心湯治心下痞大黃二兩黃連一兩上銼以麻沸湯二升漬之須臾絞去滓分溫再服黃連消痞丸拔粹方黃連炒一兩半黃芩炒三兩枳實一兩一錢乾生薑三錢茯苓白朮炒甘草炙各五錢片薑黃一錢半陳皮七錢半澤瀉一錢半夏泡一兩三錢半豬苓五錢砂仁三錢半厚朴制五錢上為末蒸餅丸如梧子大每服一百丸溫白湯送下消痞丸拔粹方黃連六錢炒神麯炒五錢黃芩刮黃色六錢薑黃白朮各一兩人參四錢甘草炙二錢縮砂仁三錢橘皮四錢乾生薑二錢枳實麩炒黃色五錢豬苓二錢半一方加澤瀉厚朴各三錢半夏湯泡七次五錢上為細末湯浸蒸餅為丸如梧子大每服五七十丸白湯下枳實消痞丸枳實黃連各五錢乾生薑二錢半夏曲三錢厚朴四錢人參三錢甘草炙二錢白朮三錢茯苓麥芽各二錢上為末水浸蒸餅丸如梧子大每服三十五丸溫水下橘連枳朮丸白朮三兩去梗枳實一兩去瓤麩炒陳皮黃連酒浸炒各一兩上為末荷葉煮湯打米糊為丸如梧子大每服五十丸食後服橘皮枳朮丸脾胃論治老幼元氣虛弱飲食不消臟腑不調心下痞悶枳朮丸脾胃論治痞消食強胃並見內傷門栝蔞實丸濟生方治胸痞痛徹背脅喘急妨悶方見膈噎門加味補中益氣湯治內傷心下痞方見內傷門有痰而痞加半夏黃連四肢滿閉便艱而心下痞加柴胡黃連甘草大便祕燥加黃連桃仁少加大黃當歸心下痞腹脹加五味子砂仁芍藥嘔逆者加黃連生薑陳皮冬月加黃連丁香藿香食已心下痞別服橘皮枳朮丸如不能食心下痞者勿加止服本方主之附嘈雜嘈雜方論丹溪云嘈雜是痰因火動治痰為先薑汁炒黃連入痰藥用炒山梔黃芩為君南星半夏陳皮為佐熱多加青黛嘈雜此乃食鬱有熱炒山梔姜炒黃連不可無肥人嘈雜二陳湯少加撫芎蒼朮白朮炒山梔子嘈雜若濕痰氣鬱不喜食三補丸加蒼朮倍香附子醫按蔣氏子條云心嘈索食白朮黃連陳皮作丸白湯下七八十丸數服而止又云眩暈嘈雜是火動其痰二陳湯加梔子芩連之類戴云此則俗謂之心嘈也二陳湯方見痰類三補丸方見補損門附吞酸吞酸方論內經云諸嘔吐酸皆屬於熱又云少陽之勝嘔酸原病式云酸者肝木之味也由火勝制金不能平木則肝木自甚故為酸也如飲食熱則易於酸矣是以肝熱則口酸也或言為寒者但謂傷生冷硬物而喜噫醋吞酸故俗醫主於溫和脾胃豈知人之傷於寒也則為病熱蓋傷寒皮毛則腠理閉密陽氣怫鬱而為熱故傷寒熱在表以麻黃湯熱藥發表使腠理開通汗泄熱退而愈也凡內傷冷物者或即陰勝陽而為病寒或寒熱相搏而致腸胃陽氣怫鬱而為熱亦有內傷冷物反病熱得汗泄身涼而愈也或微而吐為中酸俗謂醋心法宜溫藥散之亦猶解表之義若久喜酸不已則不宜溫之宜以寒藥下之後以涼藥調之結散熱去則氣和也所以中酸不宜食黏滑油膩者謂能令氣鬱不通暢也宜食糲食菜蔬能令氣通利也丹溪云或曰吐酸素問明以為熱東垣又言為寒何也豫曰吐酸與吞酸不同吐酸是吐出酸水如醋平時津液隨上升之氣鬱積而成鬱積之久濕中生熱故從火化遂作酸味非熱而何其有鬱積之久不能自湧而出伏於肺胃之間咯不得上咽不得下肌表得風寒則內熱愈郁而酸味刺心肌表溫暖腠理開發或得香熱湯丸津液得行亦可暫解非寒而何素問言熱者言其本也東垣言寒者言其末也但東垣不言外得風寒而作收氣立說欲瀉肺金之實又謂寒藥不可治酸而用安胃湯加減二陳湯俱犯丁香且無治濕熱鬱結之法為未合經意豫嘗治吞酸用黃連茱萸炒隨時令選其佐使蒼朮茯苓為輔各佐湯浸炊餅為小丸吞之仍告以糲食蔬菜自養則病易安藿香安胃散方見脾胃門加減二陳湯治痰飲為患嘔吐頭眩心悸或因食生冷脾胃不和丁香一兩半夏陳皮各五兩茯苓三兩甘草一兩半上㕮咀每服四錢水煎入生薑三片煎服曲術丸治中脘宿食留飲酸蜇心痛或口吐清水神麯炒三兩蒼朮泔浸炒一兩半陳皮一兩上為末生薑汁煮神麯為丸每七十丸薑湯下黃連清化丸黃連一兩吳茱萸浸炒一錢桃仁二十四個研陳皮半兩半夏一兩半上為末神麯糊丸緑豆大每服百丸薑湯下丹溪經驗方茱萸一兩去枝梗煮少時頃半日曬乾陳皮蒼朮米泔浸黃連陳壁土炒去土稱黃芩如上土炒桔梗茯苓各一兩上為末神麯糊丸緑豆大每服二三十丸時時津液下食後服附六郁六郁方論郁者六氣血食痰濕熱結聚不得發越當升不得升當降不得降者是也丹溪云血氣衝和百病不生一有怫鬱諸病生焉故人身諸病多生於郁或久病而生郁矣戴氏曰氣鬱者胸脅疼痛脈沉而澀血鬱者四肢無力能食便紅脈沉芤結食鬱者噯酸腹飽不喜飲食人迎脈平氣口緊盛痰鬱者動則喘息寸脈沉滑濕鬱者周身走痛或關節疼痛遇陰寒而發脈沉細緩熱鬱者瞀悶尿赤脈沉而數內經曰五郁者金鬱泄之謂滲泄解表於小便也木鬱達之謂吐之令其條達也水鬱折之謂抑之制其沖逆也火鬱發之謂汗之令其疏散也土鬱奪之謂下之無壅礙也此所謂六郁者或七情之郁遏或寒熱之交侵故為九氣怫鬱之候或雨濕之侵凌或酒漿之積聚故謂留飲濕鬱之疾熱鬱而成痰痰鬱而成癖血鬱而成症食鬱而成痞滿此必然之理也丹溪治六郁方法氣鬱香附童便浸蒼朮米泔浸撫芎濕鬱白芷蒼朮川芎茯苓痰鬱海石香附南星薑製栝蔞一本無南星栝蔞有蒼朮川芎梔子熱鬱山梔炒青黛香附蒼朮撫芎血鬱桃仁去皮紅花青黛川芎撫芎亦可香附食鬱蒼朮香附山楂神麯炒針砂醋炒七次研極細諸郁春加芎夏加苦參秋冬加吳茱萸凡藥在中焦以蒼朮撫芎開提其氣以升之假令食在氣上氣升則食降余仿此越鞠丸神麯炒香附童便浸一宿蒼朮川芎梔子炒各等分上為細末水丸緑豆大每服五七十丸溫水下六郁湯解諸郁陳皮去白一錢半夏湯泡七次蒼朮米泔浸撫芎各一錢赤茯苓梔子炒各七分香附二錢甘草炙半錢砂仁研細五分上細切作一服加生薑三片水二盞煎至一盞溫服如氣鬱加烏藥木香檳榔紫蘇乾薑倍香附砂仁如濕郁加白朮倍蒼朮如熱鬱加黃連倍梔子如痰鬱加南星枳殼小皂莢如血鬱加桃仁紅花牡丹皮如食鬱加山楂神麯麥糵曲升發二陳湯治痰鬱火邪在下焦大小便不利此藥能使大便潤而小便長陳皮去白撫芎茯苓各一錢半夏一錢半升麻防風甘草柴胡各五分上細切作一服加生薑三斤水一盞半煎至一盞溫服升陽散火湯治熱鬱方見火門火鬱湯方見積熱門
