body:
  text: 卷之二十眼目眼目方論眼者五臟六腑之精華如日月麗天著明而不可掩者也其首尾赤眥屬心其滿眼白睛屬肺其烏睛圓大屬肝其上下肉胞屬脾而中間黑瞳一點如漆者腎實主之是雖五臟各有證應然論其所主則瞳子之關係重焉何以言之目者肝之外候也肝取木腎取水水能生木子肝母腎焉有子母而能相離者哉故肝腎之氣充則精彩光明肝腎之氣乏則昏蒙暈眩烏輪赤暈刺痛浮漿此肝熱也膽生清淚枯黃繞睛此肝虛也瞳仁開大淡白褊斜此腎虛也瞳仁焦小或帶微黃此腎熱也一虛一實以此驗之然人知肝腎之氣相依而行孰知心者神之舍又所以為肝腎之副焉所謂一而二二而三者也何則心主血肝藏血血能生熱凡熱沖發於眼皆當清心涼肝又不可固執水生木之説特眼者輕膜裹水照徹四方溯源反本非天一之水又果孰為之主宰乎析而論之則拘急牽颼瞳青胞白癢而清淚不赤不疼是之謂風眼烏輪突起胞硬腫紅眵淚濕漿裡熱刺痛是之謂熱眼眼渾而淚胞腫而軟上壅朦朧酸澀微赤是之謂氣眼其或風與熱並則癢而浮赤風與氣搏則癢澀昏沉血熱交聚故生淫膚粟肉紅縷偷針之類氣血不至故有眇視胞垂雀眼盲障之形淡紫而隱紅者為虛熱鮮紅而妒赤者為實熱兩眥呈露生翳肉者此心熱血旺白睛紅膜如紙傘者此氣滯血凝熱證瞳仁內湧白睛帶濕色浮而赤也冷證瞳仁青緑白睛枯稿氣沉而濁也眼熱經久復為風冷所乘則赤爛眼中不赤但為痰飲所注則作疼肝氣不順而挾熱所以羞明熱氣蓄聚而傷飽所以胞合籲此外證之大概然爾五臟不可缺一脾與肺獨無預何耶曰白睛帶赤或紅筋者其熱在肺上胞下胞或目唇間如疥點者其熱在脾脾主味也五味之秀養諸中則精華髮見於外肺主氣也水火升降營衛流轉非氣孰能使之前所謂五臟各有證應者於此又可推矣雖然眼之為患多生於熱其間用藥大抵以清心涼肝調血順氣為先有如腎家惡燥設遇虛證亦不過以當歸地黃輩潤養之輕用溫藥不可也況夫肺能發燥肝亦好潤古方率用杏仁柿干飴糖砂蜜為佐果非潤益之意乎至於退翳一節尤關利害凡翳起於肺家受熱輕則朦朧重則生翳真珠翳狀如碎米者易散梅花翳狀如梅花葉者難消雖翳自熱生然治法先退翳而後退熱者謂熱極生翳若先去赤熱則血為之水而翳不能去其有赤眼與之涼藥過多又且滌之以水不反掌而冰凝眼特一團水耳水性清澄尤不可規規於點洗喜怒失節嗜欲無度窮役眼力泣涕過傷凌寒衝風當暑冒日不避煙火飲啖熱多此皆患生於腑臟者也專事點洗可乎哉有能靜坐澄神愛護目力放懷息慮心逸日休調和飲食以養之斟酌藥餌以平之明察秋毫斷可必矣諺曰眼不點不瞎耳不斡不聾請以為戒風眼腫則軟熱眼腫則硬眼目證治人參羌活散治風眼熱眼澀癢昏蒙羌活獨活柴胡人參川芎枳殼麩炒茯苓各半兩前胡北梗天麻地骨皮甘草炙各二錢半上末每服一錢半荊芥煎湯調下菊花散方在後夾和亦得敗毒散方見傷寒類加荊芥性效同消風散方見頭風門治眼風癢昏澀荊芥煎湯下治眼壅熱赤腫方山茵陳車前子上煎湯下本門川芎茶調散通用食後臨臥服磨光散治諸風攻眼消磨翳膜沙苑蒺藜形如羊腎慢火略炒杵去刺防風羌活甘草鹽水炙石決明搗碎研水飛過草決明蟬蛻去足蛇皮剪碎和麻油新瓦炒川芎各半兩甘菊上末每一錢半用麥門冬去心煎湯下食後臨臥服菩薩散治風毒攻眼昏淚颼癢蒼朮日換童尿浸二宿銼曬防風白蒺藜炒搗去刺各二兩荊芥穗一兩半甘草鹽水炙七錢半上末每服一錢入鹽少許沸湯點下或用消風散夾和尤佳羌活散治風氣攻眼昏澀淚花羌活川芎天麻旋覆花甘菊藁本防風蟬殼洗曬細辛杏仁浸去皮各一兩甘草半兩炙上為末每二錢新水略煎服菊花散治肝受風毒眼目昏蒙漸生翳膜蟬殼去足木賊去節童尿浸一宿曬白蒺藜炒搗去刺羌活各三兩甘菊去萼四兩荊芥穗甘草炙各二兩上末每服二錢食後茶清下白蒺藜散治腎經風毒攻眼昏淚澀癢白蒺藜炒搗去刺防風甘草生直殭蠶炒去絲嘴各一兩白南星一兩半用黑豆二合青鹽半兩水煮透焙去鹽豆甘菊去萼一兩半上末每二錢沸湯少鹽點下開明散風毒氣眼蒙澀障膜通用蒺藜炒去刺防風羌活川芎天麻茯苓蟬殼去足蒼朮童尿浸一宿焙各半兩華陰細辛荊芥茺蔚子甘草炙各一分甘菊去萼二兩上末每二錢鹽一點食後沸湯調下海明散治風眼昏淚翳膜川芎一兩蒼朮童尿浸一宿去皮焙木賊去節童尿浸曬蟬殼洗曬蛇皮皂角水洗新瓦焙羌活防風茺蔚子楮實地骨皮荊芥穗旋覆花白蒺藜炒去刺爛石膏細辛杏仁浸去皮曬甘草鹽水炙各半兩全蠍五枚上細末每服一錢半食後臨臥服或秦皮煎湯下蟬花無比散治風眼氣眼昏淚癢翳膜或頭風牽引眼小胞爛石決明用東流水入鹽煮一伏時搗研如粉當歸防風羌活各三兩蟬殼洗曬甘草炙各二兩蛇皮皂角水洗新瓦焙荊芥細辛各一兩茯苓四兩蒺藜炒去刺八兩芍藥蒼朮童尿浸二宿去皮切曬各十兩上細末每二錢食後米泔茶清任下蟬花散治風眼熱眼昏澀腫疼漸生翳膜蟬殼洗曬甘菊川芎防風羌活山梔仁白蒺藜炒去刺草決明炒荊芥穗蔓荊子穀精草洗曬密蒙花木賊去節童尿浸曬蒼朮米泔浸焙甘草炙等分上末每服二錢食後米泔茶清任下治眼流氣飲治風熱攻眼赤腫荊芥穗梔子仁牛蒡子炒蔓荊子甘菊細辛甘草炙防風白蒺藜炒去刺玄參川芎大黃黃芩木賊去節童尿浸曬草決明各一兩蒼朮米泔浸一宿焙二兩上末每服二錢食後臨臥紫蘇煎湯調下或蜜湯下千金漏蘆湯治熱眼赤腫濛霧白芨漏蘆黃芩麻黃去節川升麻芍藥白薇枳殼麵炒大黃甘草炙等分上粗末每三錢新水煎熱服以通利為度八珍飲治熱眼腫痛車前子龍膽草穀精草仙靈脾威靈仙藁本各半兩荊芥穗秦皮甘草炙各二錢半上細銼每服二錢食後煎服黃連解毒湯治諸熱眼赤腫羞明冒暑飲酒患眼通用黃連去須搗碎色紅者隨意新水浸半日上以瓷碗盛重湯烑食後服滓再烑瀉肝散治肝熱赤眼腫痛梔子仁荊芥大黃甘草等分上銼每服二錢水煎食後服洗肝散肝盛風熱攻眼赤腫眵淚浮霧蔽明當歸川芎防風羌活山梔仁薄荷葉大黃焙甘草炙等分上末每服二錢食後荊芥泡湯調下治眼痛方當歸鬚木賊蓽茇上末茶水調舌浸出涎消毒麻仁丸治肝熱風毒攻眼赤痛大黃生五錢山梔仁十兩杏仁去皮曬二兩上末煉蜜丸桐子大每服三四十丸臨臥溫湯下龍膽散治肝熱烏睛浮腫赤暈昏疼龍膽草梔子仁各二錢防風川芎玄參荊芥山茵陳甘菊去萼楮實甘草各一錢上末每服一錢半食後茶清調下和劑流氣飲加川芎治氣眼浮軟上壅朦朧加蒺藜治風眼牽颼昏淚澀癢方見脹滿類調消風散尤佳方見頭風門楮實散治肝熱生翳亦治氣翳細點者楮實子研細上以蜜湯調下食後服亦治小兒翳眼遠志丸清心益肝明目退翳人參茯神去木蘆薈研琥珀蔓荊子各半兩川芎生地黃熟地黃洗焙茺蔚子蟬殼洗曬各一兩車前子細辛白蒺藜炒去刺遠志水浸去心曬乾薑汁蘸焙各七錢半全蠍五枚上細末煉蜜丸桐子大每五十丸空心粥飲下臨臥石菖蒲湯下麥黃湯治熱眼赤痛車前子麥門冬去心生地黃洗曬等分上銼每服三錢新水入蜜同煎食後服加川芎尤好生地黃丸明目活血消去瘀肉人參防風各半兩當歸川芎生地黃乾白蒺藜炒去刺各一兩全蠍五尾上銼為末煉蜜丸桐子大每五十丸食後薄茶下加羚羊角半兩尤佳朱僧熱翳方蟬殼洗曬半兩蒺藜炒搗去刺半兩防風羌活木賊去節童尿浸一宿曬川芎細辛秦皮楮實荊芥藁本甘菊甘草各二錢半上末每服一錢薄茶調下道人開障散治諸障翳蛇蛻洗焙剪細蟬蛻洗焙黃連去須各半兩緑豆一兩甘草生二錢上銼細每服二錢食後臨臥新水煎服杏仁方治肝腎風虛人帶青潤澤臟腑洗垢開光能驅風明目真杏仁水浸五枚去皮尖上五更初就床端坐勿言勿睡息慮澄神嚼杏仁一粒勿咽逐一細嚼至五粒俟津液滿口分為三咽直入肝腎惟在久而成功花草膏治患眼腫痛澀癢昏淚羞明羯羊膽一枚飯上蒸熟上以冬蜜研和入硃砂末少許頻研成膏食後臨臥匙抄少許含咽亦可點目夏枯草散治眼痛癢翳膜夏枯草大香附杵淨童尿浸一宿曬木賊去節童尿浸曬蠶蛻紙炒焦存性細辛連翹川芎當歸鬚赤芍藥蟬殼洗曬各半兩甘草微炙腦荷各二錢半上末每服二錢茶清米泔任下無蠶紙以夜明砂代用神授錢太師方治一切眼疾昏翳通用木賊去節童尿浸一宿曬甘草生川芎穀精草蒺藜炒杵去刺蟬殼洗曬荊芥羌活防風旋覆花密蒙花等分上末每二錢秦皮煎湯調下鹽術散治內外障蒼朮四兩日換米泔浸七日刮去皮細切入青鹽一兩同炒黃去鹽不用木賊去節二兩童尿浸一宿曬上搗為末每一錢溫米泔調下或滲入飲食中任服仙術飲治眼中翳膜蒼朮童尿換浸二宿洗淨曬乾一兩一分木賊去節童尿浸一宿曬蟬殼去足白蛇皮皂角水洗焙白蒺藜炒去刺穀精草防風羌活川芎杏仁去皮甘草生焙各一分上末每一錢食後蜜湯調下觀音丸治內外障失明或欲結青光內障或赤脈疼痛悉療之血竭熊膽研各二錢人參蛇蛻皂角水洗新瓦焙各半兩木賊去節童尿浸曬蒼朮童尿浸二宿曬威靈仙鷹爪黃連去須地骨皮洗曬蔓荊子茺蔚子車前子川芎當歸羌活蟬蛻洗曬石決明煅存半生各一兩蠶蛻紙二十幅炒焦上細末用羯羊肝一具去筋膜慢火煮半生熟帶血性和藥同搗以粟米粉用肝汁煮糊丸桐子大每七八十丸溫米泔下或石菖蒲煎湯下食後常服羊肝丸解熱消血明目黃連淨為末二兩杏仁去皮半兩白羊子肝一具去筋膜上件臼內搗細衆手丸桐子大每七十粒食後臨臥溫米泔下日三服大仙飲治內外障翳目睛疼痛石決明煅存半生明爛石膏生川芎木賊去節童尿浸一夜曬各一兩杏仁浸去皮半兩甘草炙二錢上細末每二錢燈心薄荷少許煎服食後臨臥前麓開翳散治眼生翳障神效白蒺藜炒搗去刺蒼朮洗童尿換浸二宿曬各一兩蟬殼洗曬蛇蛻去頭尾及脊上一線皮不堪用皂角水洗新瓦焙菜花蛇皮好川芎杏仁水浸去皮防風羌活白芷各半兩華陰細辛獨活各四錢白附子生明爛石膏荊芥穗真蚌粉各三錢上細末每服一錢半沸湯點茶清調以舌浸於藥中良久毒涎自出又別換藥食後臨臥服仍用點翳膏真珠退翳散白澤石膏烏賊骨真蚌粉等分小珠少許上細末每一錢第二米泔調食後臨臥常服退翳散治眼中翳膜瘡豆翳眼通用真蛤粉研一兩細穀精草曬乾細末一兩上夾和每服二錢生豬肝三指大竹刀切開藏藥卷束麻繩扎米泔一碗煮肝熟食後臨臥細嚼以汁下五蛻散治內障眼蟬蛻蛇蛻蠶紙烏雞卵殼男子發等分上夾燒存性研細末每一錢和羊肝湯吃不時常服還睛丸治眼目昏翳蟬殼洗曬蒼朮童尿換浸二宿焙熟地黃洗焙川芎白蒺藜炒杵去刺各一兩茺蔚子羌活防風木賊去節童尿浸一宿曬甘菊荊芥蔓荊子杏仁浸去皮焙菟絲子研酒浸石決明煅存半生蛇皮酒浸洗淨焙各半兩上細末煉蜜丸彈子大每一丸食後細嚼茶下明眼生熟地黃丸治腎氣衰弱肝受虛熱眼生黑花生地黃熟地黃各一斤半淨石斛炒枳殼麩炒各六兩羌活防風牛膝各四兩甘菊去萼一斤杏仁去皮焙十兩上末煉蜜丸桐子大每五十粒空心食前鹽湯下或蒺藜煎湯下駐景丸治肝腎俱虛眼目昏翳菟絲子酒浸研五兩熟地黃洗曬車前子各三兩上末煉蜜丸桐子大每五十粒食前鹽湯下或白茯苓石菖蒲煎湯下本方加枸杞子一兩半尤佳山藥丸見漏濁門駐景丸明眼地黃丸菊晴丸見本門上四藥夾和每服百粒食前鹽湯下或大流氣飲下治腎虛瞳仁開大淡白昏蒙凡人五更初腎氣開才一言語咳唾腎氣即合當腎開時靜默進前藥百粒功效勝常菊晴丸治肝腎氣虛目暗黑花蓯蓉酒浸洗焙二兩枸杞子三兩甘菊去萼四兩焙川巴戟去心酒浸曬一兩上細末煉蜜丸桐子大每五七十粒食前鹽湯下余太宰方加熟地黃二兩淨或用駐景丸對交服千金神麯丸升降水火明眼目血心腎磁石燒紅淬法醋以碎為度研細無聲二兩硃砂一兩研細神麯炒二兩加沉香半兩上細末別用神麯水調濃煮糊丸桐子大每服三十粒空心鹽湯下磁石法水入腎硃砂法火入心濟以沉香是則升降水火湯泡散治肝虛風熱攻眼赤腫羞明漸形翳膜當歸赤芍藥黃連去須等分上末每用二錢極沸湯泡乘熱先熏後洗冷則再暖用日二三次又方沸湯入白鹽少許閉目沃洗鹽亦散血水淋法治眼腫脹突出新汲水沃眼中頻數換水眼睛自入仍以麥門冬桑白皮山梔仁煎湯通口服之黃連滴眼方治熱眼赤腫疼痛鷹爪黃連淨二錢干艾葉少許真杏仁一個去皮上同搗碎新汲水浸一日夜濾清汁仰臥以帛蘸滴入眼中鼻內見苦味即藥透也或新水浸黃連瓷器盛重湯烑濃汁以熟艾燒存性入藥用滌風散治風毒攻眼赤腫癢疼黃連去須蔓荊子各半兩五倍子三錢上銼細分三次新水煎濾清汁以手沃洗效立消膏治浮翳粟翳霧膜遮睛雪白鹽淨器中生研少許上以大燈草蘸輕手指定浮翳就點凡三次不疼痛勿驚恐屢效薑液膏治眼風癢冷淚爛眩有蟲生薑母一塊以銀簪插入即拔出點眼頭尾效南硼砂散治胬肉瘀突南硼砂黃色腦子少許研細上以燈草蘸點其上玄參麥門冬煎湯調洗心散服爛眩方治爛眩風緑色爐甘石燒紅淬童尿凡三次出火毒一日夜研細末夾黃連末用童尿浸取清汁點眼胞仍取覆盆子軟葉入男兒乳汁研為丸置眼眥頭引蟲自出甘石散治風眼流淚不止緑爐甘石烏賊骨等分上細末入腦少許點目井口淚自收二藥燥腦和之前麓點翳膏硃砂二錢南硼砂一錢半蕤仁二十一粒用抄紙去油干為度真珠爛石膏各半錢熊膽一字麝少許上細末用冬蜜研和於銚內蒸得黏入角罐收用時煎秦皮汁調銅箸點於眼眥頭淚出為效敷眼方治患眼赤腫閉合土朱二分爛石膏一分上末新水入蜜調敷眼頭尾及太陽處仍以山梔煎湯調治眼流氣飲服一泄而愈方見前雀盲散治遇夜目不能視建昌軍螺兒蚌粉三錢為末雄豬肝一葉竹刀披開納蚌粉於中麻線扎第二米泔煮七分熟又別蘸蚌粉細嚼以汁送下無蚌粉以夜明砂代用夜明砂治內外障納入豬肝煮帶生和汁細嚼效治偷針方脾間積熱兼宿食不消則偷針秦皮銼細夾砂糖水煎調大黃末少許利之鱔血方治小兒豆瘡入眼生翳鱔魚系其尾而垂之從項下割破些少取生血點翳白鱔尤佳若翳已凝即用南硼砂以燈心蘸點仍用威靈仙仙靈脾洗曬等為末每一錢第二米泔調服通關散細辛川芎腦荷蔓荊子等分上為末每半錢搐入鼻又頭風門消風散加細辛皆可通關小兒疳眼不開諸疳方論在後附諸方石膏羌活散宣明方治久患雙目不睹光明遠年近日內外氣障風昏暗拳毛倒睫一切眼疾羌活治腦熱頭風密蒙花治羞明怕日木賊退翳障香白芷清利頭目乾菜子荊芥穗治目中生瘡細辛二味起倒睫麻子起拳毛川芎治頭風蒼朮閉郁行氣甘菊花明目去風石膏黃芩二味洗心退熱藁本治偏正頭風甘草和諸藥各等分上為末每服一錢至二錢食後臨臥用蜜水一盞調下或茶清亦可日進三服至十日漸明至二十日大驗此方醫數十餘人矣後人加當歸枸杞子梔子仁連翹柴胡薄荷葉防風天麻桔梗各等分為小丸服上清丸祕方治風熱上壅眼目昏花迎風流淚羞明赤爛羚羊角犀角黃連厚朴各一兩牛黃黃芩川芎羌活蟬蛻白芷菊花大黃防風草決明地膚子滑石各五錢生地黃熟地黃各七錢牽牛八錢半上為末煉蜜丸如梧桐子大清神益氣湯東垣方治因脾胃虛損黃證之人誤服瀉肝散致目疾茯苓升麻陳皮生甘草芍藥白朮各二分五味子麥門冬澤瀉蒼朮防風各三分黃柏青皮各一分人參生薑五分上銼水煎服救苦湯治赤腫苦痛桂枝連翹紅花細辛歸身甘草各五分蒼朮草龍膽各七分羌活黃芩麻黃柴胡防風藁本黃連黃柏生地黃知母各一錢芍藥二錢上銼水煎服經驗神仙退云丸治一切翳暈內外障昏無睛屢效川歸川芎木賊各一兩半去節犀角枳實黃連蟬蛻薄荷各半兩栝蔞根六錢甘菊蛇蛻密蒙花荊芥地骨皮各三兩白蒺藜乾地黃二兩上蜜為丸飲下婦人當歸湯下有氣木香湯下羊肝丸治一切目病不問障盲黃連一兩白乳羊肝甘菊防風薄荷荊芥羌活川芎川歸各二錢上為末羊肝杵丸水下助陽和血補氣湯衛生寶鑑治眼發後上熱白睛紅多眼淚無疼痛而隱澀難開此服苦寒藥太過而真氣不能通九竅故眼昏花不明宜助陽和血補氣防風七分黃耆二錢甘草炙蔓荊子各一錢當歸身白芷升麻柴胡各五分上㕮咀作一服水一鍾半煎一鍾臨臥通口服忌風寒及食冷物蔓荊湯聖惠方治勞役飲食不節內障眼疾此方立效黃耆人參各一兩蔓荊子二錢半甘草炙八錢白芍藥二錢黃柏三錢酒浸曬四次上㕮咀每服五錢水二盞食後臨臥溫服車前散曾氏家傳肝經積熱上攻眼目逆順生翳血灌瞳仁羞明多淚密蒙花去枝甘菊花去枝葉白蒺藜炒去刺羌活粉草草決明車前子各炒黃芩龍膽草洗各等分上為末每服二錢食後飯湯調下四物龍膽湯拔粹方治目赤暴發作雲翳疼痛不可忍者當歸川芎芍藥地黃各五錢羌活三錢草龍膽二錢防風三錢防己二錢上㕮咀每服八錢水一鍾半煎八分食後通口服東垣熟乾地黃丸治血少神勞腎虛眼目昏黑熟地黃一兩生地黃一兩五錢柴胡八錢天門冬甘草炙枳殼地骨皮黃連五味子各三錢人參三錢當歸身酒蒸焙乾黃芩各五錢上為末煉蜜丸如緑豆大每服百丸茶清下決明散治眼青盲內障方桔梗羚羊角大黃紫決明當歸川芎瞿麥用花生地黃木賊羌活防風赤芍藥石決明火煅青葙子車前子蟬蛻白芷細辛蔓荊子蒺藜炒香附子玄參瞿麥各半兩上㕮咀每服四錢水一鍾半煎至一鍾通口服立效加黃連豬苓杏仁犀角蛇蛻菊花旋覆花木通山梔子丹砂空清殼水甘草養肝丸治肝血不足眼目昏花或生眵淚久視無力當歸酒浸車前子酒蒸防風白芍藥葳蕤仁湯泡去皮熟地黃酒蒸焙川芎楮實子各等分上為細末煉蜜為丸如桐子大每服七十丸食後白湯下又婦人血虛目疾日宜服益陰腎氣丸東垣方此壯水之主以鎮陽光熟地黃三兩牡丹皮五錢生地黃四兩酒製炒澤瀉二錢半當歸尾去上酒製山茱萸各半兩茯苓二錢半柴胡五味子乾山藥各五錢上件為細末煉蜜為丸如桐子大硃砂為衣每服五七十丸空心鹽湯下地芝丸治目不能遠視能近視或亦妨近視生地黃焙乾稱天門冬去心稱各四兩枳殼麩炒去瓤稱甘菊花去枝稱各二兩上為細末煉蜜為丸如桐子大茶清送下百丸溫酒亦可定志丸治眼不能近視反能遠視者方見驚悸門祕傳程東陽光明散屢用神效水銀五錢鉛錫三錢一方五錢枯礬炒鹽炒硝各五錢治翳膜加硼砂硇砂各一錢上五味共研為末入於陽城罐內用鐵燈盞蓋之再用鐵線扎定外用舊草鞋燒灰和鹽泥固濟用文武火升之勿令泄氣鐵燈盞上常常用水漬之依法三炷官香時退火候冷輕手開罐取下靈氣雪白重五錢者為佳用瓷罐收貯入後爐甘石煅煉聽用羊腦爐甘石一兩用捶熟地黃泥包封甘石在內再將前靈氣五分摻於泥上再用青鹽合黃泥捶熟又裹於外固密曬乾用髻條鐵線團圍縛定用炭火煅紅用童便漬之依法七次取出去土將爐甘石研為極細末點之立效或加冰片少許又方治赤眼爛眩風神效防風連翹荊芥黃芩黃柏生地黃海螵蛸羌活黃連當歸各一兩上㕮咀用水五碗煎熟去滓再熬成膏入麵粉一兩銅緑三錢前靈氣五分氣腳三分共為細末入膏和成條子每用二三錢井水磨化重湯煅溫淋洗三次立愈神效祕傳神仙撥雲散點開翳膜如神真珠硼砂石燕子炒過各一分冰片三釐硇砂升過牙硝炒過石蟹牛黃各半分上為極細末點開再用後方末藥點之神效又方乳香制過沒藥制各五分輕粉五釐石燕子一個醋浸九次青鹽濕紙包燒一分珍珠濕紙包燒過琥珀放豆腐內煮五次用血竭各三分雄黃雄膽用箬焙乾硃砂各二分枯礬膽礬各五釐海螵蛸三釐白丁香三粒水洗過爐甘石火煅童便漬七次一錢上研極細末加冰片少許點之神效服藥方密蒙花生地黃甘菊花梔子仁黃柏黃芩木賊知母木通川芎藁本甘草石決明黃連陳皮草決明龍膽草枳殼當歸白附子柴胡桔梗各等分上㕮咀用水二鍾煎食後服又末藥方服之神效防風木香川芎黃連黃芩白豆蔻菊花川椒栝蔞仁秦皮密蒙花羚羊角犀角枸杞子蟬蛻枳殼各等分上為末每服一錢茶清調下祕傳授仙方復明膏黃連一斤淨細銼碎赤芍藥半兩洗淨當歸一兩洗淨杏仁三七粒黃柏皮一兩去粗上銼碎安銅銚內用水滿浸文武火熬至茶鍾鍾半一次二次三次熬至一茶鍾熬至九次次用瓷器盛藥水於內攪動取大半碗藥水煅紅爐甘石九次吃將干為度爐甘石唯用茶褐色者土十分輕者為佳用乳鉢細研為末用密絹羅羅之再研二十分細用制了淨朴硝三錢重除用三分制了爐甘石末一兩半重硃砂一錢重片腦二錢重前五味用信白紙好綿濾過洗銅銚淨入內慢火熬不可吹灰塵在內切忌諸般厭穢之事用竹篾子不住手攪之休令銚底焦了再刮下乳鉢中乳得十分均上殼如常法之效補陰丸治腎虛眼目昏暗方見虛勞門防風通聖散治風熱眼痛頭目昏眩方見中風門明目流氣飲治一切眼疾疼痛神效大黃炮牛蒡子炒川芎菊花去枝細辛去苗白蒺藜炒去刺防風去蘆玄參去蘆山梔去殼黃芩甘草炙蔓荊子荊芥去梗木賊去節各一兩草決明一兩五錢蒼朮米泔浸二兩上為細末臨睡酒服二錢祕傳神應眼藥制爐甘石十兩黃連黃柏薄荷各三兩甘草一兩朴硝二兩上五味㕮咀用水數碗煎熟濾去滓用鉢頭盛之將爐甘石研細入銀窩內火煅深紅傾入藥水內就研飛過淨末聽用水銀一兩黑鉛一錢以上二味配作一塊白硼砂一錢硇砂五分食鹽一兩用白水煮炒乾枯白礬一兩皂礬二錢火硝蘿蔔汁提過七錢五分上八味同一處入陽城罐內用鹽泥固濟於密升打一炷官香候冷取出聽用將前制爐甘石研細再入五兩在陽城罐底次將前靈氣七錢五分亦研細上又安甘石五兩蓋定亦嚴封固打一炷官香冷定出火毒研極細紙羅過如點翳膜加白硼砂五錢硇一錢五分火硝一錢五分照前制過名曰捲簾散如點昏蒙加冰片名曰光明散至寶琥珀錠子爐甘石童便煅七次府丹各四兩水飛過硼砂四錢琥珀硇砂珍珠硃砂明礬熊膽輕粉海螵蛸淨皮硝雄黃乳香沒藥各四錢冰片五分麝香四分上為極細末又黃連黃柏黃芩白蒺藜梔子仁穀精草菊花各一兩五錢訶子三個共味㕮咀滾水浸一晝夜銅器熬成老膏又蜜一斤六兩熬成老膏滴水成珠去火為度同煎成膏和勻下前末藥令勻梨子三個取汁通和前藥成錠子用乳汁銀簪蘸點一切眼疾如神倒睫拳毛因邪風攻入脾經致使兩皮風癢不住雙手背揉目久赤爛拳毛入眼內將木鱉子去殼槌爛用絲綿包捻成條左患塞右鼻右患塞左其毛自分上下次服五蛻散五蛻散蟬蛻二錢豬蛻四錢蠶蛻三錢穿山甲炙焦五錢防風二兩去蘆荊芥一兩半石決明川烏炮去皮臍草決明炒各五錢甘草三錢蛇蛻醋煮竹筒盛焙乾一錢五分上為末每服二錢鹽湯送下針法攢竹二穴在兩眉頭內尖陷中是穴宜以細三稜針刺之宣泄熱氣三度刺目大明絲竹空二穴在兩眉後尖髮際陷中針三分宜瀉不宜補禁灸灸法三里二穴穴法見前治眼目昏暗風翳在左灸右手中指本節頭骨上灸五壯炷如小麥大右患灸左
