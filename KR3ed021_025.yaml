body:
  text: 卷之二十五諸蟲諸蟲方論經云人身中有八萬尸蟲若無即人身不成不立尸蟲與人俱生狀如馬尾或如薄筋出則在脾入則五臟之俞居之然人亦不必盡有有亦不必盡多也古人論臟腑九蟲多寡有無固未可必亦當備識其名目九蟲者何一曰伏蟲二曰白蟲三曰肉蟲四曰肺蟲五曰胃蟲六曰弱蟲七曰赤蟲八曰蟯蟲九曰蛔蟲蛔蟲俗謂之食蟲固不待辨而知矣其他皆由臟腑不實脾胃俱虛雜食生冷甘肥油膩咸藏等物節宣不時腐敗停滯所以發動蟲之為候嘔惡吐涎口出清沫痛有去來乍作乍止寸白蟲色白形褊損人精氣力乏腰痛蟯蟲細如菜蟲能為痔瘻瘡癩疥癬癰疽等患寸白蟯蛔是三者皆九蟲數中之一物也外此又有兒童疳䘌昏睡煩躁鼻爛汁臭齒齦生瘡下利黑血支集疳論附之其傷寒濕䘌證候蟲食下部為狐下唇有瘡蟲食其臟為惑上唇有瘡活人總括言之詳矣諸蟲證治蕪荑散取諸蟲雞心檳榔三錢蕪荑二錢木香一錢上末為一服當晚先煎酸石榴根湯至五更吃炙肉一片嚼細引蟲上至喉以石榴根湯暖溫調藥服蟲自軟而下木香檳榔丸殺下諸蟲雞心檳榔一兩木香鶴蝨貫衆錫灰乾漆燒煙盡使君子肉各半兩輕粉二錢雷丸巴豆肉各二錢半上細末飛白麵糊丸麻子大每服二十粒五更粥飲下或菖蒲石榴根煎湯下錫灰丸取寸白諸蟲錫灰研細末一兩雞心檳榔貫衆各半兩木香二錢半輕粉黃丹為衣各二錢上細末酒醋煮麵糊丸荔枝幹大每一丸米泔浸軟日衙先吃飯了至黃昏不飢飽時吃肉脯一片引蟲俟少刻溫酒嚼下天明蟲出又專吃韭菜治寸白蟲蝦蟆丸殺蟲大蝦蟆干一個炙令焦木香雞心檳榔桃仁水浸去皮曬苦楝根酸石榴根皮貫衆各三錢蕪荑鶴蝨各二錢巴豆肉二錢半上末粳米粉糊研丸麻子大每服十丸五更石菖蒲煎湯下雄砂丸殺諸蟲鶴蝨蕪荑乾漆炒令煙盡直殭蠶炒各三錢貫衆酸石榴根皮曬乾各半兩硃砂雄黃雷丸甘遂各一錢半上細末粳米粉糊丸麻子大每十丸五更粥飲下化蟲散雷丸二個雞心檳榔二個鶴蝨一錢大使君子七個去殼上細末入輕粉少許分作二服當晚用精豬肉一兩切成片以皂角漿浸一宿至五更微火炙熟又用些麻油拭肉候溫取一服藥末摻於肉上略烘過空腹食之至巳刻蟲自下乃飲食貫衆酒取寸白諸蟲五更嚼炙肉一片莫吞俟蟲尋肉其頭向上卻吐出肉嚼使君子三個並輕粉一字吞下少頃以當晚所煎貫衆酒吞解毒雄黃丸七粒瀉下皆蟲也酒蠟膏殺諸蟲醇酒一盞蜜一合蠟三錢蜀漆一兩上銅銚內慢火同熬可丸即丸彈子大每服一丸溫酒化開拂曉服之蟲自下附諸方萬應丸下諸蟲檳榔五錢末大黃八兩末黑牽牛四兩末皂角十錠用不蛀者苦楝根皮一斤上件將皂角苦楝根皮二味用水一大碗熬成膏子一處搜和前藥二味研細末為衣先用沉香衣後用雷丸木香衣每服三丸四更時分用沙糖水送下一方取寸白蟲紫檳榔十個向陽石榴皮十七片上水煎露一宿以下蟲為度一方治吐蟲有積黑錫灰檳榔上為末米飲調下木香三稜散瑞竹治腹中有蟲面色痿黃一切積滯黑牽牛半生半炒取末五錢大腹子二錢檳榔雷丸錫灰醋炒三稜煨莪朮煨木香二錢大黃二錢上為末每服五錢用砂糖水調服先將燒肉一片口中細嚼吐出然後服藥一方加阿魏一錢蕪荑仁三錢一方消化蟲毒在腹作痛檳榔酸榴根皮焙乾各一兩紅丹煅雷丸貫衆如雞頭者君子肉各二錢甘草炙枳殼制大黃各五錢上為末清油打薄雞子餅抄藥一錢於上空心卷而食之小兒糯米糊丸粟米大每服二三十丸以淡豬肉汁或雞汁吞下空心亦佳烏梅丸治胃冷蛔蟲攻心痛嘔吐四肢冷祕傳檳榔散治男婦心脾痛蟲痛方並見脾疼門蠱毒蠱毒方論害人利己識者不為昧者競趨之而況傷人性命以圖家道之溫燠此為富不仁之甚者也夫蠱毒有數種皆妖魅變惑之氣其怪使然人有造作而得之者多取蟲蛇之類以盆盎盛之任其自相啖食其間一物獨存則以之為蠱即能變惑隨酒食以毒害於人他人受殃則蓄事之家日益富盛又有一種飛蠱倏爾去來狀如鬼氣得之猝重籲毋怪乎變現惑人之不可曉也凡中蠱毒不論年月遠近但煮一雞卵去殼以小銀叉插入其中並含入口一飯之頃取視叉卵俱黑即為中毒又法以水一碗唾津液入水其唾沉則為蠱浮則非蠱又法口含大豆中蠱者豆脹爛而皮脫非蠱則豆不脫爛其候面目青黃力乏身痛唇口乾焦煩躁而悶胸脅妨滿肚脹皮堅腹中𩊅𩊅切痛如蟲齧又如蟲行唾吐鮮血小便淋瀝大便膿血雜下病人所食之物皆變化而為蟲侵蝕臟腑蝕盡則死矣死則病氣流注復染著於旁人夫是之謂蠱疰凡中蠱人用藥已瘥自後飲食永不得吃冷若飲食帶冷鬼氣乘之毒蟲復生竟不能救蠱毒證治治蠱毒挑生毒神咒出大藏經典保靈丹治蠱毒諸毒一切藥毒神妙出劉涓子神仙遺論雞峰普濟方一卷凡三處刊硃砂淨細研一兩大山豆根半兩雄黃黃丹麝香黃藥子續隨子生杵末各二錢半川巴豆肥者二錢半取肉不去油斑蝥二錢半去頭翅足糯米半炒半生用赤蜈蚣二條一炙一生上十味各修治入乳鉢研和於端午重陽臘日修合不令雞犬婦人見用糯米稀糊丸如圓眼核大陰乾瓷盒收每服一丸好茶清吞下不得嚼破須臾病人自覺心頭如拽斷皮條聲將次毒物下或自口出或大便出嫩則是血老則成鱉或蜣螂諸雜帶命之物藥丸凝血並下以水洗淨收之可救三人如中毒口噤即挑開下藥或蛇蠍馬汗諸毒以好醋磨敷患處立解服藥已效如知毒害之家不必研究若訴之其毒再發不救瘥後更忌酒肉毒食一月惟軟飯可也或急用但擇吉日精潔修合聖惠丸治蠱毒心腹堅痛羸瘁骨立硃砂研雄黃研細各七錢半藜蘆去蘆頭莽草微炙鬼臼去須各半兩肥巴豆肉十五個去油麝香一錢青色大蝦蟆一個燒存性斑蝥去翅足三錢糯米炒黃上細末煉蜜和搗五百杵丸如小豆大每五丸空心溫酒下少刻更吃粥飲一盞利出蟲蛇惡物若不吐利更服二丸必效萬病解毒丸治蠱毒挑生毒藥毒草毒畜獸毒方見癰疽門夷堅志治蠱毒方五倍子一兩硫黃末二錢甘草三寸半生半炙透丁香木香各一錢輕粉半錢麝香少許糯米二十一粒上八味銼細入瓷瓶內用水滿十分煎取七分候藥面帶皺皮為熟生絹濾去滓空腹通口服卻令病人平正仰睡高起頭覺腹中有物衝心者三即不得動若吐出以桶盛之如魚鰾爛肉之類乃是惡物吐罷吃茶一盞瀉亦不妨少進白粥為補忌生冷油膩酢脯咸藏五日後服萬病解毒丸二粒旬日又服二粒自然平復生漆丸治蠱毒正料平胃散上用好生漆和丸桐子大每七十粒空腹溫酒下加至百粒東坡雄黃丸治蠱毒及蟲蛇畜獸毒雄黃明白礬生研等分上端午日研細溶黃蠟為丸桐子大每七丸念藥王菩薩藥上菩薩七遍熟水送下黃南衛生治蠱毒單方破鼓皮燒存性為末新水調二錢服之中蠱者雖昏睡口中言蠱主姓名又方蠶蛻紙不拘多少以麻油紙拈燒存性上為末研細新水調一錢頻服諸中毒面青脈絶昏迷如醉口噤吐血服之即蘇七寶丸治蠱毒破鼓皮蠶蛻紙各燒存性刺蝟皮五倍子續隨子硃砂研雄黃研上等分為細末糯米稀糊丸桐子大每七丸空心熟水下又方治蠱毒亦治挑生毒川升麻細銼一兩作一服水煎常服又方明礬生末夾好茶水調解百毒挑生挑生方論人苟愛身不可輕於濯水江南有射工毒蟲其色黑形如肉臠口中橫骨如角弓生溪澗內或因雨潦逐水而入人家含沙射人之影得之寒熱悶亂頭目俱痛亦如中尸猝不能語又水毒蟲一名溪溫得之病狀與射工相若但有爛瘡為射工無瘡為溪溫特少異耳又沙蝨蟲細如疥蟲視不得見遇陰雨則行出草間著人身則鑽入皮里刺如針芒是三者為病朝輕暮劇皆能殺人以方術灸法麝犀輩治之治之不早變生飛蠱倏入患軀啖食五臟而死矣挑生之毒其類是乎挑生多於飲食過度凡魚肉果菜茶湯酒醋之中皆可挑毒以中人自嶺以南率多有此其候初覺胸腹作痛次則漸漸攪刺十日生於腹中生則能動矣治法胸痛則為生在上膈腹痛則為生在下焦在上膈者用膽礬半錢投入一盞熱茶之內候礬溶化通口服之少頃以雞翎攪刺喉中取吐在下焦者用川鬱金二錢末之米湯調下即瀉出惡物吐瀉以後以人參一分白朮茯苓倍之碎為粗末新汲水和入瓷瓶中慢火煨至半日每一盞通口服日二三劑前蠱毒挑生咒常須誦之抑有聞焉二廣山谷間有草曰胡蔓草亦曰斷腸草或以藥人急水吞之急死緩水吞之緩死又有取毒蛇殺之以草覆蛇以水灑草數日菌生採取為末入酒毒人始亦無患後再飲酒毒發立死其俗淫婦多偶合北人情好雖稠不肯歸北陰以藥置食中與之還即叩之曰子某年來若從其說復以藥解之若過期不來則斃矣戒之哉戒之哉挑生證治萬病解毒丸治挑生毒蠱毒藥毒草毒金石毒百蟲毒蛇畜獸惡毒鬼胎鬼氣癰疽諸病一切毒出入可以此藥隨身若覺意思不快四大不和即磨服之方見癰疽門治挑生方好茶生明白礬各一錢沸湯調服即吐毒中諸毒證治立勝散治蟲蛇蜂蠍蚖蛇蜘蛛沙蟲等傷毒大紅川椒去核十五粒豆鼓十粒上同入口嚼爛唾在手心次將南星末調和得所敷傷處毒水自出續又再敷神效又方貝母為末上每服半兩令病人盡其酒量劇飲良久酒化為水從傷處出俟出盡又以貝母末塞瘡口妙不可言蠼螋方蠼螋妖蟲也隱於牆壁間尿射人之影令人遍體瘡如湯火所傷治法以雞羽燒存性上麻油調敷雞食百蟲故能治之或用燕糞水調敷或南向燕窠自東取土末之新水調敷天蛇毒方秦皮濃煎服蚌粉滑石貝母末敷闢妖魅瘟瘵硃砂雄黃等分為末法醋調入口鼻治挑生毒蠱毒野葛毒方川升麻多煎頻服解諸藥毒殺腹內毒蟲方藍青葉多研水調服五絶欲死方半夏末水丸風乾入鼻氣回即活頭蝨方藜蘆末摻發又方麻油調輕粉塗發身蝨方水銀和鶴蝨末帛揉之為索系衣自落獨勝散解藥毒蠱毒蟲蛇諸毒大甘草節以真麻油浸年歲愈多愈妙上取甘草嚼或水煎服神效附跌撲損傷跌撲損傷方論袖珍方云折傷者謂其有所傷於身體者也或為刀斧所刃或墜墮險地打撲身體皆能使血出不止又恐淤血停積於臟腑結而不散去之不早恐有入腹攻心之患治療之法須外用敷貼之藥散其血止其痛內則用花蕊石散之類化利淤血然後款款調理生肌或因折傷而停郁其氣又當順之子和云諸落馬墜井打撲傷損閃肭損折杖瘡腫發焮痛不止者可峻下二三十行痛止腫消宜以通經散導水丸等藥或加湯劑瀉之後服和血消腫散毒之藥花蕊石散和劑方治一切金刃所傷打撲傷損身體血出者急於傷處摻藥其血自化為黃水如有內損血入臟腑熱煎童子小便入酒少許調一錢服之立效若牛抵腸出不損者急送入用細絲桑白皮尖茸為線縫合肚皮縫上摻藥血止立活如無桑白皮用生麻縷亦得並不得封裹瘡口恐作膿血如瘡干以津液潤之然後摻藥婦人産後敗血不盡惡血奔心胎死腹中胎衣不下並用童子小便調下硫黃上色明淨者四兩搗為細末花蕊石一兩搗為粗末上二味相拌和勻先用紙筋和鹽泥固濟瓦罐子一個候泥干入藥於內再用泥封口候乾安在四方磚堶書八卦五行用炭一稱籠迭周匝自巳午時從下著火令漸漸上徹直至經宿火冷炭消又放經宿罐冷取出細研以絹羅子羅至細瓷盒內盛依前法服金匱治馬墜及一切筋骨損方大黃一兩切浸成湯下緋帛如手大燒灰亂髮如雞子大燒灰炊單布一尺燒灰敗蒲一把二寸桃仁四十九個去皮尖甘草如中指節炙銼上七味以童子小便量多少煎湯成納酒一大盞次下大黃去滓分溫三服先銼敗蒲席半領煎湯浴衣被處斯須通利數行痛楚立瘥復元活血湯發明方治從高墮下惡血留於脅下疼痛實不可忍柴胡半兩當歸六錢甘草穿山甲炮各二錢大黃酒浸一兩桃仁去皮尖五十個紅花栝蔞根各二錢上件桃仁研爛余藥銼如麻豆大每服一兩水二盞半酒半盞煎至七分去滓食前大溫服以利為度得利後痛或不盡服乳香神應散靈樞云墜墮惡血留於脅下則傷肝肝膽之經行於脅下屬厥陰少陽宜以柴胡為引用為君以當歸活血脈又急者痛也以甘草緩其急亦能生新血陽生陰長故也為臣穿山甲栝蔞根桃仁紅花破血潤血為之佐大黃酒製以蕩滌敗血為之使地龍散治腰脊痛或打撲損傷從高墮下惡血留在太陽經中令人腰脊或脛腨臂腰中痛不可忍中桂地龍各四分羌活二錢黃柏甘草各一錢蘇木六分麻黃五分桃仁六個歸梢一分上㕮咀每服半兩水二盞煎至一盞去滓溫服補損當歸散療墜馬落車傷腕折臂疼痛服此藥疼痛即止筋骨即當相連澤蘭炒附子炮各一錢當歸炒蜀椒炒甘草炙桂心各三分芎藭炒六分上為細末每服二錢溫酒調服日三忌生蔥豬肉冷水生果接骨丹沒藥乳香當歸川椒自然銅醋淬赤芍藥敗龜炙虎骨白芷骨碎補炙千金藤郁李仁是也各等分又方加龍骨川芎上為細末化臘半兩丸如彈子大每服一丸好酒半升化開煎用東南柳枝攪散熱服祕傳止血定痛生肌散專治跌打損傷牙咬刀傷出血諸般腫毒出膿後肌肉不生痛不止者並皆治之方見破傷風門一方治刀傷斧斫五倍子一味為末干貼神效桑葉陰乾為末干貼如無旋尉乾末貼之妙湯火瘡用臘月豬膽塗黃柏炙乾為末敷之一方治火燒桐油水各二錢上二件以桃柳枝不住手攪成膏再入少水溶外用貓兒肚底毛細剪摻上一方治湯火傷未成瘡者用小麥炒黑為度研為末膩粉減半油調塗之四黃散淡寮方治湯蕩火燒熱瘡連痛大黃黃連黃柏黃芩白芨各等分上為末水調成膏以雞翎時塗瘡上治湯火瘡淡寮方用螺螄殼多年乾白者火煅為末如瘡破用乾摻之如不破輕粉清油調敷之
