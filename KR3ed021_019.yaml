body:
  text: 卷之十九腎臟風癢腎癢方論實則為痛虛則為癢癢之出於骨虛也明矣腎屬足少陰之經囊間濕癢謂之腎臟風世所共知也孰知宗筋聚於陰器足厥陰之肝系焉惟腎主虛惟肝主風人之精血不充內為嗜欲所耗外為風冷所乘風毒濕氣皆從虛入囊間其有不濕癢者乎腳下其有不瘡瘍者乎治療之法先當疏散風邪流行濕毒夫然後以芎歸活血與細辛蒺藜驅風數輩潤養而平治之若欲遽用川烏故紙燥烈之劑吾恐攔住內邪病無由愈間有患者為酒面炙爆所傷腎虛而挾熱如豬肚黃連蒸為丸子又不可無其或不施藥餌一切從事於熱湯雖沃之暫止然真氣愈泄肝腎愈虛或者未知攸濟腎癢證治宣風散疏肝腎風大雞心檳榔二個橘皮半兩牽牛生取末一兩炒取末一兩甘草焙三錢上末每服二錢蜜湯調下不換金正氣散去肝腎濕氣方見傷寒類青木香丸疏導腎經風水方見水飲門病人腎虛挾邪浮腫多用安腎丸少用青木香丸夾和鹽湯下屢效安腎丸方見水飲門活血驅風散治肝腎風毒腎囊濕癢腳下瘡癬當歸川芎白芷華陰細辛白蒺藜炒去剌桃仁浸去皮焙白芍藥半夏制塊潤五靈脂甘草生各三錢蒼朮炒杜仲薑汁炙炒去絲辣桂天麻意苡橘紅檳榔厚朴制枳殼制上細銼每服三錢水盞半薑錢五片棗二枚煎七分濾清暖熱入乳香末少許食前服乳香以佐心氣使心腎相交或有熱證去乳香加黑豆煎蒺藜散治㿗風上攻耳鳴目眩下注陰濕瘡癢蒺藜炒杵去剌草烏頭水浸三日逐日換水去皮曬各半兩白芷白附生蒼朮炒荊芥穗各二錢半上曬末米糊丸桐子大每三十丸上則茶清下則鹽酒服烏荊丸治肝腎風癢方見腸風門神授丸治外腎濕癢方見虛勞門莖物腫爛淫汁方大腹皮一斤上夾苦參荊芥煎湯溫洗拭以津唾塗次用油發燒存性入些白芨末敷逐日煎湯密室洗換藥或用乳香龍骨散仍服蠟礬丸併發灰用米飲調下莖頭三五孔小漏瘡出血微膿妙方油發燒存性灰敷干則津唾調仍以米湯調發灰食前服乳香龍骨散治外腎溫癢淫爛如㿐龍骨石膏生五倍子各一分白芨乳香黃虢丹各半分麝少許上細末先以苦參大腹皮紫蘇莖葉煎湯溫洗後敷陰汗溫癢方爐甘石緑者一分真蚌粉黃連五倍子各半分上細末摻先以蜂房大腹皮煎湯溫洗又爐甘石方見諸瘡門妒精瘡陰蝕瘡方油發灰青黛干等分上為末入些麝或摻或津唾調敷又青紙方見妒精瘡中大學治腎臟風發瘡疥方雞心檳榔一大個破開以黃虢丹一錢合在內濕紙裹煨明硫黃研二錢生虢丹一錢全蠍三枚焙上同末入輕粉半錢麝少許於瓷器收每用少許麻油調抹兩掌先以鼻嗅男以兩掌掩外腎女以兩掌掩兩乳各睡至醒次日又如此用藥屢效又方用大紅川椒去目水蘸濕半日夾生杏仁研膏擦手如上法亦驗附諸方龍膽瀉肝湯治陰部時復濕癢及臊臭柴胡澤瀉各一錢車前子木通各五分生地黃當歸尾草龍膽各三分上件㕮咀如麻豆大都作一服水三大盞煎至一盞去滓稍熱空心宿食消盡服之更以美膳壓之柴胡勝濕湯治兩外腎冷兩脾樞陰汗前陰痿陰囊濕癢臊氣生甘草酒黃柏各二錢柴胡當歸尾各一錢紅花少許草龍膽麻黃根羌活漢防己各一錢五味子三個升麻澤瀉各一錢半茯苓一錢上件銼如麻豆大都作一服水三大盞煎至一盞去滓溫服食前忌酒濕面房事補肝湯東垣方前陰如冰冷並陰汗兩腳痿弱無力黃耆七分人參葛根白茯苓各三分升麻四分柴胡羌活當歸身連翹炒黃柏澤瀉蒼朮曲末知母防風陳皮各二分炙甘草五分豬苓四分上件銼如麻豆大都作一服水二盞煎至一盞去滓稍熱服空心食前忌酒濕面一方治腎囊濕瘡密陀僧乾薑滑石上為末擦上又方先用吳茱萸煎湯洗吳茱萸半兩寒水石三錢黃柏二錢樟腦蛇床子各半兩輕粉硫黃各二錢白礬檳榔白芷各三錢上為末麻油調搽頭風頭風方論足太陽者頭之經也六經傷寒惟太陽受病最多蓋頭居其上當風寒之沖一有間隙則若頃若腦若耳若鼻風邪乘虛皆得而入之矣況復櫛沐取涼飽食抑臥之不謹乎頭風為病不必須有偏正頭疼之證但自頸項以上耳目口鼻眉稜之間或有一處不若吾之體焉皆其漸也有頭疼有頭暈有頭皮頑厚不自覺知有口舌不仁莫知滋味或耳聾或頭汗或目痛或眉稜上下掣痛或鼻中聞香極香聞臭極臭或只呵欠而作冒眩之狀凡此皆頭風證也治法大要有熱證者消風散用防風荊芥煎湯下無熱證者追風散用薄茶清下又有素患頭風之人或因傷風寒暑濕依證調理已獲輕安未幾頭風發作則不必拘泥前藥當以頭風和平之劑療之其或病軀老弱先患頭風復感寒邪自汗不止此等用藥無附子又不可也若夫太陽項強一證無汗惡風則為表實合用葛根湯汗出惡風則為表虛合用桂枝葛根湯是又感受風邪在頭風界限之內者也入水捕魚入林捕兔要必知其所在斯可矣婦人月候適行輒敢梳篦多成頭風癢痛滿頭如水泡之狀頭風證治消風散治頭目昏痛鼻塞冒運人參羌活川芎白茯苓白殭蠶炒藿香葉荊芥穗防風甘草炒蟬殼各二兩厚朴制陳皮各半兩上末每服二錢防風荊芥煎湯調下追風散治偏正頭風痛面上遊風狀若蟲行川烏炮去皮尖軟石膏煅白殭蠶炒去嘴絲川芎防風荊芥甘草炙各一兩南星炮白附子炮羌活天麻全蠍地龍去土白芷各半兩草烏炮去皮尖沒藥乳香雄黃並研各一分上有末每服半錢入好茶少許沸湯調食後臨睡服川芎茶調散治諸風上攻偏正頭疼川芎荊芥穗各二兩香附去毛薄荷各四兩白芷羌活細辛甘草炙各一兩防風三分上末每服二錢食後茶清調下究原抽刀散治頭風掣痛川烏切片薑汁浸曬雄黃蟬蛻去頭足各半兩川芎細辛各一兩上末每服半錢食後臨臥茶清調下芎芷散治頭風風壅川芎白芷荊芥穗軟石膏煅等分上末每服一錢食後沸湯調下香芷散治頭面諸風新白芷銼以蘿蔔汁浸曬乾上末沸湯調食後服或以些子搐入鼻左用右右用左屢效又方新白芷洗曬上為末煉蜜丸彈子大每一丸食後荊芥湯嚼下妙二陳湯方見瘧門加荊芥治頭風兼治痰壅酒壅如聖餅子治偏正頭疼痛連腦項吐逆噁心耳聾目暗川烏炮去皮尖南星川白薑各一兩川芎甘草各二兩天麻防風半夏重洗去滑生各半兩上末蒸餅糊丸雞頭大捻作餅曬乾每服五餅同荊芥二穗細嚼薑湯下細辛湯治諸頭疼及痰厥飲厥腎厥氣厥等證但發熱者不可服附子生烏頭生南星乾薑川芎細辛各一兩甘草三分上銼散每服三錢薑五片茶芽少許熟煎空心服活人書葛根湯治太陽病頸項強無汗惡風為表實葛根一兩麻黃去節三分官桂芍藥甘草炙各半兩上銼散每服四錢薑五片大棗一枚煎服桂枝葛根湯治太陽病頸項強汗出惡風為表虛桂枝芍藥甘草各七錢葛根一兩三錢上銼散每服四錢薑五片大棗一枚煎服頭風方川芎天麻各半兩細辛華陰者去苗土爛石膏荊芥穗白芷梢甘草微炙各二錢全蠍炙五個上末白湯或茶清調食後臨臥服消風散加蟬殼白丸子加硃砂薑汁湯下皆要藥附諸方川芎散拔粹方治偏頭痛頭風神效甘菊花石膏川芎各三錢上為末每服一錢茶清調下一方有白殭蠶六錢生用菊花茶調散治諸風頭目昏重偏正頭痛頭風鼻塞菊花川芎荊芥穗羌活甘草白芷各二兩細辛一兩洗淨防風去蘆一兩半蟬蛻殭蠶薄荷各五錢上為末每服二錢食後用茶清調下又方片芩酒炒五錢蒼朮二錢半羌活蒼耳川芎生甘草酒黃連各一錢半半夏曲炒三錢半上為末服法同前附東垣頭痛論金匱真言論云東風生於春病在肝俞在頸項故春氣者病在頭又諸陽會於頭面如足太陽膀胱之脈起於目內眥上額交巔上入絡腦還出別下項病沖頭痛又足少陽膽之脈起於目鋭眥上抵頭角病則頭角額痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也心煩頭痛者病在膈中過在手太陽少陰乃濕熱頭痛也如氣上不下頭痛癲疾者下虛上實也過在足少陰太陽甚則入腎寒濕頭痛也如頭半邊痛者先取手少陽陽明後取足少陽陽明此偏頭痛也有真頭痛者甚則腦盡痛手足寒至節死不治有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛凡頭痛皆以風藥治之者總其大體而言之也高巔之上惟風可到故味之薄者陰中之陽乃自地升天者也然亦有三陰三陽之異故太陽頭痛惡風脈浮緊川芎羌活獨活麻黃之類為主少陽經頭痛脈弦細往來寒熱柴胡為主陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根石膏白芷為主太陰頭痛必有痰體重或腹痛為痰癖其脈沉緩蒼朮半夏南星為主少陰經頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛為主厥陰頭痛項痛或痰吐涎沫厥冷其脈浮緩吳茱萸湯主之諸血虛頭痛當歸川芎為主諸氣虛頭痛人參黃耆為主為主者主治也兼見何證以佐使藥治之此立方之大法也氣血俱虛頭痛者於調中益氣湯中少加川芎蔓荊子細辛其效如神半夏白朮天麻湯治痰厥頭痛藥也青空膏乃風濕熱頭痛藥也羌活附子湯治厥陰頭痛藥也如濕氣在頭者以苦吐之不可執方而治加減三五七散和劑方治八風五痹肢體不仁又治風寒入腦陽虛頭痛畏聞人聲目旋暈轉耳內蟬鳴應風寒濕痹腳氣緩弱並皆治之山茱萸去核乾薑炮茯苓去皮各三兩細辛一兩半防風去蘆四兩附子三個半炮去皮臍上為細末每服二錢溫酒食前調服仲景麻黃湯治太陽傷寒頭痛無汗桂枝湯治太陽傷風頭痛有汗方見傷寒門定風餅子祕方治偏正頭痛方見傷風門川芎散聖惠方治頭風偏正頭痛羌活細辛川芎香附子槐花甘草炙石膏荊芥穗薄荷菊花茵陳防風上為末每服二錢茶清調食後服忌動風物清空膏治偏正頭痛年深不愈者又治風溫熱氣上壅及腦痛除血虛頭痛不治余皆治之川芎五錢柴胡七錢黃連酒炒防風羌活各一兩炙甘草一兩五錢細挺子黃芩三兩去皮一半酒製一半炒上為末每服二錢於盞內入茶少許湯調如膏抹在口內少用白湯送下臨臥如苦頭痛每服加細辛二分痰厥頭痛脈緩減羌活防風川芎甘草加半夏一兩五錢如偏正頭痛服之不愈減羌活防風川芎一半加柴胡一倍如發熱惡寒口渴此陽明頭痛只與白虎湯加吳白芷白虎湯方見暑門一方治傷風感風一切頭痛甘菊一兩細辛半兩甘草七錢半白芷香附子羌活薄荷各二兩荊芥二十枚茵陳半兩蒼朮泔浸川芎各一兩上為末每服二錢茶清調下婦人産後當歸石膏末調下寶鑑石膏散治頭疼川芎石膏白芷各等分上為末每服四錢熱茶清調下豆粉丸聖惠方治風熱頭疼川芎細辛甘草白芷豆粉各二錢半薄荷石膏各半兩朴硝二錢上為細末煉蜜和丸如彈子大石膏末為衣每服一丸細嚼茶清下徹清膏蔓荊子細辛各一分薄荷葉川芎各二分生甘草炙甘草各五分藁本一錢上為末茶清調二錢下半夏白朮天麻湯治脾胃證已經服疏風丸下二三次原證不瘳增以吐逆痰唾稠黏眼黑頭旋目不敢開頭苦痛如裂四肢厥冷不得安臥此氣虛頭痛也黃柏二分酒洗乾薑三分澤瀉白茯苓天麻黃耆人參蒼朮各五分炒神麯白朮各一錢麥芽半夏湯洗陳皮各一錢半上每服五錢水煎熱服順氣和中湯治氣虛頭痛此藥升陽補氣頭痛自愈黃耆一錢半人參一錢甘草炙七分白朮陳皮當歸芍藥各二分升麻柴胡各三分細辛蔓荊子川芎各二分上作一服水煎食後服亦治氣血俱虛頭痛安神湯治頭旋眼黑頭痛羌活一兩防風二錢半柴胡升麻各半兩黃柏酒製一兩知母酒製一兩生地黃半兩黃耆二兩炙甘草生甘草各二錢上件每服稱半兩水二盞煎至一盞半加蔓荊子半錢川芎三分再煎至一盞去滓臨臥熱服芎歸湯治血虛頭痛川芎當歸各等分上每服五錢水煎服調中益氣湯治氣血俱虛頭痛方見脾胃門內加川芎三分蔓荊子三分細辛二分眉眶痛丹溪云眉眶痛者屬風熱與痰作風痰治類痛風一方黃芩酒浸炒白芷上為末茶清調二錢選奇湯治眉骨痛不可忍大有效羌活防風甘草各二錢酒黃芩一錢冬月不用上每服三錢水一鍾煎七分食後溫服一方治頭痛連眼痛此風痰上攻須用白芷開雨前茶川芎白芷防風藁本細辛當歸上用水煎服
