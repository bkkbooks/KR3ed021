body:
  text: 卷之六心氣心疼方論紫之奪朱相去一間耳而毫釐疑似實霄壤焉夫心為五官之主百骸之所以聽命者也心之正經果為風冷邪氣所幹果為氣血痰水所犯則其痛掣背脹脅胸煩咽乾兩目赤黃手足俱青至節朝發而暮殂矣然心之包絡與胃口相應往往脾痛連心或陽虛陰厥亦令心下急痛或他臟之邪亦有客乘於心者是則心之別脈受焉如所謂九種心痛一蟲二疰三風四悸五食六飲七冷八熱九去來者皆是也真心果痛不知能愈否乎然則治劑之法將何如曰熱者涼之寒者溫之感受風邪者散之順氣調血逐水豁痰此其要略耳蘇沈內翰有方目曰沉麝丸凡心脾疼痛隨試輒效他如玄胡索五靈脂官桂當歸乳香沒藥沉香木香等輩皆的對藥也臨機應變學者亦當察其微心疼證治沉麝丸治心脾氣血諸痛方見血類和劑七氣湯治七氣相干心下疼痛方見氣類沉香降氣湯治陰陽不和心腹刺痛方見氣類加些乳香為佐大沉香丸治冷氣攻衝心腹刺痛亦治猝暴心痛沉香乾薑炮薑黃辣桂檀香各四兩白豆蔻仁二兩白芷甘草爁甘松洗焙天台烏藥各半斤香附淨爁一斤上末煉蜜丸如大彈子每一丸食前薑湯嚼下或姜三片略煎服蘇合香丸治猝心痛方見嗽門用生薑橘皮湯調下桂枝四七湯治風冷寒邪客搏心腹作痛桂枝白芍藥半夏制各一兩白茯苓厚朴制枳殼制甘草炙各半兩人參紫蘇各一分上銼每服四錢姜七片棗二枚食前煎服勝金散治心下痛桂枝延胡索炒五靈脂當歸等分上為末每服三錢水一盞酒三分同煎食前服靈脂酒治心腹猝痛川五靈脂去砂石略炒上為末每二錢溫酒調下加延胡索沒藥尤妙生地黃膏治熱氣乘心作痛石菖蒲一兩半北前胡赤茯苓各三分上為末蜜一盞生地黃汁一盞夾研為膏每服彈子大紫蘇煎湯食後調下靈砂丹治冷氣乘心作痛好靈砂三分川五靈脂二分上研極細稀糕糊丸麻子大每服二十丸食前石菖蒲生薑煎湯下或用五丹丸方見血類或用養正丹方見痼冷門須審其脈證虛冷乃可用脾家冷痛亦可擇用薑桂飲治心腹刺痛良薑辣桂等分上為末每服二錢米湯乘熱調下生薑枳殼湯治中脘氣滯心下引痛辣桂一兩生薑母一兩半枳殼制三分上粗末每服三錢新水煎服拈痛丸治九種心痛五靈脂木香當歸蓬莪朮煨各半兩生乾薑三分上為末煉蜜丸桐子大每二十丸食前橘皮煎湯下心腹痛方草果延胡索靈脂沒藥上末酒調一二錢腹痛手拈卻附諸方家祕祛痛散治諸般心氣疼痛氣滯不行攻刺心腹痛連胸脅小腸吊疝及婦人血氣刺痛立有神效青皮去瓤五靈脂研飛去砂淨川楝子穿山甲各二錢良薑香油炒玄胡索沒藥各一錢五分沉香一錢八角茴香二錢檳榔一錢五分木香一錢二分砂仁少許上件㕮咀為粗末用木鱉子去殼一錢二分銼片同前藥炒令焦香去木鱉子不用共為末每服一錢加鹽一星用酒或滾水送下此方纍用無不應驗故附於後與好生君子共之落盞湯治急心痛陳皮香附子良薑吳茱萸石菖蒲各等分上末水煎先用碗一個用香油三五點在內小盞蓋之將藥淋下熱服玄桂丸丹溪方治死血留胃脘當心作痛玄胡索一兩半滑石紅花官桂紅曲各五錢桃仁三十個上為細末湯浸蒸餅為丸緑豆大每服四十丸薑湯下螺螄殼丸丹溪方治痰飲積胃脘當心而痛螺螄殼牆頭年久者佳滑石炒蒼朮山梔香附南星各二兩枳殼去瓤炒青皮木香半夏砂仁各半兩上為末生薑汁浸蒸餅為丸如緑豆大每服三四十丸薑湯下春加川芎夏加黃連冬加吳茱萸各半兩安痛散治心胃急痛五靈脂去砂石玄胡索炒去皮蒼朮良薑炒當歸洗各等分上為細末每服二錢不拘時熱酒醋湯調下脾胃脾疼方論氣血痰水皆能作痛而食積傷脾風冷入脾與夫脾間蟲動其為痛也居多氣血痰水食積風冷諸證之痛每每停聚而不散惟蟲痛則乍作乍止來去無定又有嘔吐清沫之為可驗焉俗謂脾家疼痛出於胃虛大率用養脾之劑而不知受病各有自來苟不能推究其原則和養等劑掩護邪氣非徒無益而又害之況夫風冷入脾尤念慮之所不到至有荏苒歲月而不可揣度者有一田夫醉飽之餘露星取快一枕天明自此脾疼攻刺百藥罔功淹淹數載後遇至人授以和劑抽刀散溫酒調下數服頓愈則知風露之根入胃良薑菖蒲為能散其邪巴蝥借氣為能伐其根觀此可以通一畢萬矣然而痛不復作養脾之劑獨不可繼是調理之乎療病如濯衣必去其垢汙而後可以加漿飾醫言意也請借是以為喻脾疼證治良薑拈痛散治脾疼妙甚良薑切作大片先用吳茱萸慢火炒少頃次用東畔當日壁土須無雨處者同炒次以米醋酒同炒至茱萸黑上只用良薑為末每服一錢重溫米飲調空心服和劑抽刀散治脾胃積冷中滿疼痛川白姜五兩銼入巴豆肉一錢一字同炒至巴黑去巴石菖蒲五兩半不炒良薑銼五兩入斑蝥二十五個同炒至蝥黑去斑蝥不用糯米六兩一分炒黃上為末每服二錢空心溫酒調下調痛散治脾疼氣隔木香丁香檀香大香附天台烏藥蓬莪朮煨辣桂片薑黃生白姜白豆蔻仁縮砂仁甘草炙各等分上銼每服二錢半紫蘇四葉煎服桂花散治脾積氣痛香附五兩炒赤去毛蓬莪朮醋煮焙乾良薑甘草炙各三兩桂花一兩上末每二錢鹽一點沸湯熱調食前服穢跡脾疼方香附淨良薑等分上為末每服二錢空心陳米湯熱調服沉麝丸靈脂酒治氣血攻刺脾疼方見心疼類和劑七氣湯治痰水攻脾作痛方見氣門夾和劑流氣飲煎亦得方見脹滿門蘇合香丸方見嗽門夾感應丸方見脹滿門等分用沉香降氣湯下方見諸氣門治食積脾痛獨桂湯治風冷入脾逆氣上攻作痛辣桂去粗皮上細銼每二錢食前煎服或為末紫蘇煎湯乘熱調下腹痛通用薑桂飲治風冷入脾作痛方見心疼類薑桂散治心腹痛方見氣類檳榔散治蟲動脾痛乍去乍來嘔吐清沫雞心大檳榔貫衆各二分石菖蒲木香各一分甘草炙一錢上銼每三錢水煎空心吞靈砂十丸或金液丹蓋靈砂金液有硫黃水銀能殺蟲也金液丹壯陽道建胃氣除冷癖殺諸蟲好硫黃十兩飛煉去砂石研細末入磁盒水調赤石脂封口鹽泥固濟曬乾於地內埋小罐子盛滿水安磁盒在上再用泥固濟慢火養七日七夜續加頂火一通候冷取出研末上藥一兩用蒸餅一兩湯浸握去水為丸桐子大每三十丸空心米飲下二物湯治脾痛雞心大檳榔良薑等分上細銼每服三錢陳米百粒煎服乾薑甘草湯治脾中冷痛嘔吐不食川白姜微炒一兩甘草炙二錢上銼散每服二錢大棗一枚同煎食前溫服脾痛方治脾痛脹滿大草果二個去殼上銼用酒煎痛時服酒能飲一盞以兩盞煎一盞能飲兩盞以三盞煎兩盞欲其中節也脾痛氣痛方良薑陳皮各半兩丁香石菖蒲甘草炙各一分上銼散每服三錢水大盞煎八分入雞舌香散二錢再煎少頃濾清汁服和胃證治治中湯方見嘔吐門加肉豆蔻縮砂溫脾止痛沉香磨脾散治脾胃虛寒腹中脹痛人參沉香各一分丁香檀香木香白豆蔻縮砂仁半夏曲辣桂烏藥各半兩藿香葉三分甘草炙三錢半上細銼每二錢姜五片棗二枚煎服安胃散開胃和中止嘔進食人參白朮木香檳榔丁香半夏曲肉豆蔻濕紙煨橘紅藿香白茯苓青皮甘草炙等分上銼散每三錢姜四片煎服人參開胃湯助胃進食人參橘紅丁香木香藿香神麯炒麥糵炒白朮茯苓縮砂仁蓮子肉厚朴制半夏曲甘草炙等分上銼散每三錢姜四片煎服助胃膏治嘔吐不食人參白朮白茯苓橘紅縮砂仁各一分木香丁香肉豆蔻微煨草果仁各一兩半白豆蔻仁一錢上末煉蜜丸彈子大每一丸姜三片煎湯下宮方七香丸消食快膈和胃止痛木香丁香檀香甘松淨丁皮橘紅縮砂仁白豆蔻仁三稜醋煮蓬莪朮醋煮焙乾各半兩大香附炒去毛二兩半上為末研米糊丸緑豆大每三四十丸薑湯下丁香半夏丸治脾胃宿冷嘔吐痰水噫悶吞酸人參丁香木香肉豆蔻陳橘紅各一分藿香葉半兩半夏湯洗七次用薑汁醃炒黃用三兩上細末薑汁煮麵糊丸小豆大每二十丸薑湯下千金五套丸治胃虛膈滿宿滯不消停痰留飲頭眩臂疼闢霧露風冷嵐瘴之氣南星每個切十餘塊半夏切破各二兩以水同浸三日逐日換水次用白礬二兩研調水再浸三日洗焙良薑乾薑炮白朮茯苓各一兩丁香木香青皮橘紅各半兩上末用神麯一兩大麥糵二兩同末為糊丸桐子大每五七十丸米湯下附諸方燒脾散濟生方治飲啖生冷果菜停留中焦心脾冷痛乾薑炮厚朴薑汁炒草果縮砂仁甘草炙神麯炒麥糵陳皮高良薑炒各等分上為末每服三錢熱鹽湯點服不拘時草豆蔻丸治客寒犯胃痛者宜此丸方見內傷門二姜丸治心脾冷痛方見諸氣門家祕祛痛散治諸般心氣疼痛氣滯不行攻刺心腹痛連胸脅小腸吊疝及婦人血氣刺痛立有神效方見心痛門感應丸治積冷傷胃腹脅脹痛方見諸氣門溫胃湯拔粹方治服寒藥多致脾胃虛弱胃脘疼益智五錢砂仁甘草各二分薑黃三分白豆蔻三分陳皮一分澤瀉乾薑各三分黃耆七分厚朴二分人參二分上㕮咀每服八錢水二盞煎至八分食前服蟠蔥散和劑方治男子婦人脾胃虛冷氣滯不行攻刺心腹痛連胸脅膀胱小腸疝氣及婦人血氣刺痛玄胡索肉桂乾薑炮各二兩甘草炙縮砂去皮蒼朮制各半兩丁皮檳榔各四兩蓬莪朮三稜煨茯苓青皮去白各六兩上為末每服二錢水一盞蔥白一莖煎七分空心熱服烏梅丸治胃冷蛔蟲攻心痛嘔吐四肢冷烏梅三百個黃柏炙細辛肉桂附子炮各六兩黃連六兩十人參六兩蜀椒炒去閉口者及目當歸各四兩乾薑炮十兩上為末取烏梅肉和蜜丸梧子大每服五十祕傳檳榔散治男婦心脾痛五靈脂檳榔上為末煎菖蒲湯調三錢服隔夜先將豬肉鹽醬煮熟令患人細嚼休吞了吐出卻服前藥空心食前服謹按用肉味所以引蟲頭向上用藥所以殺蟲也螺螄殼丸丹溪方治痰飲積胃脘當心而痛方見心氣門玄桂丸丹溪方治死血留胃脘當心作痛方見心氣門謹按痛則不通通則不痛夫胃脘心脾痛者或因身受寒邪口食冷物內有鬱熱素有頑痰死血或因惱怒氣滯蟲動作痛種種不同若不分而治之何能愈乎豫曰是寒則溫之是熱則清之是痰則化之是血則散之是氣則順之是蟲則殺之庶乎臨證不眩惑也夫附腹痛脅痛新增腹痛方論內經曰寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故猝然而痛按內經舉痛論言寒邪外客而痛者甚為詳悉未能盡述學者自宜檢閲外有因虛因實因傷寒因痰火因食積因死血者種種不同原病式曰熱鬱於內而腹滿堅結而痛者不可言為寒也東垣曰腹中諸痛皆因勞役過甚飲食失節中氣不足寒邪乘虛而入客之故猝然而作大痛經言得炅則止炅者熱也以熱治寒治之正也此事難知集論曰傷寒中脘痛太陰也理中湯黃耆建中湯之類臍腹痛者少陰也四物湯真武湯附子湯之類小腹痛厥陰也重則正陽散回陽丹輕則當歸四逆湯之類若夫雜證腹痛四物苦楝湯酒煮當歸丸之類夏月腹痛肌熱惡熱脈洪數屬手太陰足陽明黃芩芍藥湯主之秋月腹痛肌寒惡寒脈沉疾屬足太陰足少陰桂枝芍藥湯主之四時腹痛芍藥甘草湯主之丹溪曰腹痛有積熱有食積有痰有死血脈弦者多屬食積宜溫散之如乾薑炒蒼朮川芎白芷香附薑汁之類是也不可用峻利藥攻下之蓋食得寒則凝熱則化更兼行氣快氣藥助之無不可者脈滑者是痰痰因氣滯宜導痰解鬱二陳湯加臺芎蒼朮香附之類是也臍下忽大痛人中黑色者多死腹中水鳴乃火擊動其水也凡腹痛以手不可按者屬實宜大黃芒硝下之實痛不可用參耆白朮蓋補其氣氣旺不通而痛愈甚也草豆蔻湯東垣方治臍腹虛脹疼痛澤瀉一錢木香三分神麯四分半夏芡實麩炒黃色草豆仁黃耆春夏勿用益智仁甘草炙各半錢青皮陳皮各六分川歸七分茯苓七分上細切作一服加生薑三片水一盞半煎至一盞溫服小建中湯治傷寒陽脈澀陰脈弦腹中急痛者方見虛勞門真武湯治腹痛下痢四肢沉重方見咳嗽門理中湯治霍亂頭疼身寒腹痛四逆湯治傷寒下痢腹痛四肢逆冷附子湯方並見中寒類四物苦楝湯治臍下虛冷腹痛方見疝門芍藥甘草湯治四時腹疼芍藥甘草炙上等分每服五錢生薑三片水一盞半煎至一盞溫服元戎云腹痛脈弦傷氣用本藥脈洪傷金加黃芩脈緩傷水加桂枝脈澀傷血加當歸脈遲傷寒加乾薑酒煮當歸丸治小腹下痛茴香五錢良薑附子各七錢當歸一兩上四味細切以無灰酒一碗半煮乾再焙乾入後藥炙甘草苦楝生用丁香各五錢木香升麻各一錢柴胡二錢炒黃鹽全蠍各三錢玄胡索四錢上為細末酒煮糊為丸如梧子大每服二三丸空心白湯下桃仁承氣湯治因跌撲損傷淤血作腹痛者內加當歸蘇木紅花入酒童便煎服下之方見血氣門二陳湯養胃湯俱見瘧門黃芩芍藥湯治腹痛脈洪方見痢門備急大黃丸治心腹諸猝疼痛百病方見內傷門絞腸沙作痛以樟木煎湯大吐或白礬調湯吐之鹽亦可探吐宜刺委中出血脅痛新增脅痛方論內經曰肝病者兩脅下痛引小腹令人善怒虛則目𥅻𥅻無所見耳無所聞善恐如人將捕之又曰怒則氣逆虛則嘔血及飧泄故氣上矣蓋心主血肝納血因大怒而血不歸經或隨氣而上出於口鼻或留於本經而為脅痛又或歲木太過而木氣自甚或歲經有餘而木氣被郁皆能令人脅痛經曰病脅下滿氣逆二三歲不已病名曰息積是亦肝木有餘之證也外有傷寒發寒熱而脅痛者足少陽膽足厥陰肝二經病也治以小柴胡湯無有不效者丹溪曰脅痛者肝火盛木氣實有死血有痰流注肝急木氣實用蒼朮川芎青皮當歸之類痛甚者肝火盛以當歸龍薈丸薑汁下是瀉火之要藥死血用桃仁紅花川芎痰流注以二陳湯加南星蒼朮川芎肝苦急急食辛以散之用撫芎川芎蒼朮血病入血藥中行血故也去滯氣須用青皮青皮乃肝膽兩經之藥也左金丸瀉肝火行溫為熱甚之反佐黃連六錢吳茱萸一錢上為細末湯浸蒸餅為丸如緑豆大每服三五十丸淡薑湯下當歸龍薈丸治內有濕熱兩脅痛先以琥珀膏貼痛處卻以生薑汁吞此丸痛甚者須炒令熱服龍膽草當歸大梔子黃連黃芩各一兩大黃蘆薈各半兩木香一錢半黃柏一兩麝香半錢上十味為末麵糊丸一方加柴胡川芎各半兩又方加青黛半兩蜜丸治脅痛面丸降肝火推氣散治右脅疼痛脹滿不食枳殼桂心片子薑黃各半兩一本作殭蠶甘草炙一錢半上為末每服二錢薑棗湯調下酒亦可枳芎散治左脅痛刺不可忍者枳實炒川芎各半兩粉草炙一錢半上為末每服二錢薑棗湯下酒亦可鹽煎散和劑方治男婦人一切冷氣攻上胸脅刺痛不能已及脾胃虛冷嘔吐泄瀉膀胱小腸氣婦人血氣砂仁甘草炙茯苓草果仁去皮煨肉豆蔻川芎洗茴香炒蓽澄茄大麥芽檳榔良薑枳殼蒼朮陳皮去白羌活厚朴上㕮咀每且三錢水一盞入鹽少許煎七分去渣空心溫服小柴胡湯見痎瘧門二陳湯見痰飲門琥珀膏見積聚門謹按丹溪曰脅痛肝火盛木氣實有死血有痰流注豫每度之凡左脅痛甚者即是肝盛木氣實也宜用龍薈丸左金丸辛涼之劑以治之凡右脅痛即是痰流注並食積宜用鹽煎散順氣丸等藥辛溫之劑以治是也又嘗論曰左脅痛胃脘痛婦人多有之以憂思忿怒之氣素蓄於中發則上衝被濕痰死血阻滯其氣不得條達故治婦人諸痛諸疾必以行氣開鬱為主而破血散火兼之庶乎得法矣諺云香附縮砂婦人之至寶此之謂也附內傷新增傷食調理脾胃辨脈法古人以脈上辨內外傷於人迎氣口人迎脈大於氣口為外傷氣口脈大於人迎為內傷此辨固是但其說有所未盡耳外感風寒皆有餘之證是從前客邪耒也其病必見於左手左手主表乃行陽二十五度內傷飲食及飲食不節勞役所傷皆不足之病也必見於右手右手主裡乃行陰二十五度故外感寒邪則獨左寸人迎脈浮緊按之洪大緊者急甚於弦是足太陽寒水之脈按之洪大而有力中見手少陰心火之脈丁與壬合內顯洪大乃傷寒脈也若外感風邪則人迎脈緩而大於氣口一倍或兩倍三倍內傷飲食則右寸氣口脈大於人迎一倍傷之重者過在少陰則兩倍太陰則三倍此內傷飲食之脈若飲食不節勞役過甚則心脈變見於氣口是心火刑肺其肝木挾心火之勢亦來薄肺經云侮所不勝寡於畏者是也故氣口脈急大而澀數時一代而澀也澀者肺之本脈代者元氣不相接脾胃不及之脈洪大而數者心脈刑肺也急者肝木挾心火而反克肺金也若不甚勞役惟右關脾脈大而數謂獨大於五脈數中顯緩時一代也如飲食不節寒溫失所則先右關胃脈損弱甚則隱而不見惟內顯脾脈之大數微緩時一代也宿食不消則獨右關脈沉而滑經云脈滑者有宿食也以此辨之豈不明白易見乎但恐山野間卒無醫者何以診候故復說病證以辨之辨陰證陽證甚哉陰陽之證不可不詳也遍觀內經中所說變化百病其源皆由喜怒過度飲食失節寒溫不適勞役所傷而然夫元氣穀氣營氣清氣衛氣生髮諸陽上升之氣此六者皆飲食入胃穀氣上行胃氣之異名其實一也既脾胃有傷則中氣不足中氣不足則六腑陽氣皆絶於外故經言五臟之氣已絶於外者是六腑之元氣病也氣傷臟乃病臟病則形乃應是五臟六腑真氣皆不足也惟陰火獨旺上乘陽分故營衛失守諸病生焉其中變化皆由中氣不足乃能生髮耳後有脾胃以受勞役之疾飲食又復失節耽病日久事息心安飽食太甚病乃大作概其外傷風寒六淫客邪皆有餘之病當瀉不當補飲食失節中氣不足之病當補不當瀉舉世醫者皆以飲食失節勞役所傷中氣不足當補之證認作外感風寒有餘客邪之病重瀉其表使營衛之氣外絶其死只在旬日之間所謂差之毫釐謬之千里可不詳辨乎按陰陽應象論云天之邪氣感則害人五臟是八益之邪乃風邪傷人筋骨風從上受之風傷筋寒傷骨蓋有形質之物受病也系在下焦肝腎是也肝腎者地之氣難經解云肝腎之氣已絶於內以其肝主筋腎主骨故風邪感則筋骨疼痛筋骨之絶則肝腎之本亦絶矣乃有餘之證也及云水穀之寒熱感則害人六腑是七損之病乃內傷飲食也黃帝針經解云適飲食不節勞役所傷濕從下受之謂脾胃之氣不足而反下行極則衝脈之火逆而上是無形質之元氣受病也系在上焦心肺是也心肺者天之氣故難經解云心肺之氣已絶於外以其心主營肺主衛營者血也脈者血之府神之所居也衛者元氣七神之別名衛護周身在於皮毛之間也肺絶故皮毛失絶神無所依故內傷飲食則亦惡風寒是營衛失守皮膚間無陽以滋養不能任風寒也皮毛之絶則心肺之本亦絶矣蓋胃氣不升元氣不生無以滋養心肺乃不足之證也計受病之人飲食失節勞役所傷因而飽食內傷者甚多外傷者間而有之世俗不知往往將元氣不足之證便作外傷風寒表實之證而反傷心肺是重絶其表也安得不死乎古人所謂實實虛虛醫殺之耳若曰不然請以衆人之耳聞目見者證之嚮者壬辰改元京師戒嚴逮三月下旬受敵者凡半月解圍之後都人不受病者萬無一二既病而死者繼踵而不絶都門十有二所每日各門所送多者二千少者不下一千似此者幾三月此百萬人豈俱感風寒外傷者耶大抵人在圍城中飲食失節乃勞役所傷不待言而知由其朝飢暮飽起居不時寒溫失所動經三兩月胃氣虧之久矣一旦飽食太過感而傷人而又調治失宜其死也無疑矣非惟大梁為然遠在真祐興定間如東平如太原如鳳翔解圍之後病傷而死無不然者余在大梁凡所親見有表發者有以巴豆推之者有以承氣湯下之者俄而變結胸發黃又以陷胸湯丸及茵陳湯下之無不死者蓋初非傷寒以調治差誤變而似真傷寒之證皆藥之罪也往者不可追來者猶可及輒以平生已試之效著內外傷辨論一篇推前哲之餘論歷舉近世之變故庶幾同志者審其或中觸類而長之免後人之橫夭耳僭易之罪將何所逃乎辨寒熱外傷寒邪之證與飲食失節勞役形質之病及內傷飲食俱有寒熱舉世盡將內傷飲食失節勞役不足之病作外傷寒邪表實有餘之證反瀉其表枉死者豈勝言哉皆由不別其寒熱耳今細為分解之外傷寒邪發熱惡寒寒熱並作其熱也翕翕發熱又為之拂拂發熱發於皮毛之上如羽毛之拂明其熱在表也是寒邪犯高之高者也皮膚毛腠者陽之分也是衛之元氣所滋養之分也以寒邪乘之郁遏陽分陽不得伸故發熱也其面赤鼻氣壅塞不通心中煩悶稍似袒裸露其皮膚已不能禁其寒矣其表上虛熱止此而已其惡寒也雖重衣下幕逼近烈火終不能御其寒一時一日增加愈甚必待傳入里作下證乃罷其寒熱齊作無有間斷也其內傷飲食不節或勞役所傷亦有頭痛項強腰痛與太陽表證微有相似余皆不同論中辨之矣內傷不足之病表上無陽不能禁風寒也此則常常有之其躁熱發於腎間者間而有之與外中寒邪略不相似其惡風寒也蓋脾胃不足營氣下流而乘腎肝此痰厥氣逆之漸也若胃氣平常飲食入胃其營氣上行以舒於心肺以滋養上焦之皮膚腠理之元氣也既下流其心肺無所稟受皮膚間無陽失其營衛之外護故陽分皮毛之間虛弱但見風見寒或居陰寒處無日陽處便惡之也此常常有之無間斷者也但避風寒及溫暖處或添衣蓋溫養其皮膚所惡寒便不見矣是熱也非表傷寒邪皮毛間發熱也乃腎間受脾胃下流之濕氣閉塞其下致陰火上衝作蒸蒸而躁熱上徹頭頂傍徹皮膚渾身躁熱作須待袒衣露居近寒涼處即已或熱極而汗出亦解彼外傷惡寒發熱豈有汗出者乎若得汗則病愈矣以此辨之豈不如黑白之易見乎當內虛而傷之者躁熱也或因口吸風寒之氣郁其陰火使咽膈不通其吸入之氣欲入為膈上衝脈之火所拒使陰氣不得入其胸中之氣為外風寒所遏而不得伸令人口開目瞪極則聲發於外氣不能上下塞於咽中而氣欲絶又或因噦因嘔因吐而躁熱發必有所因方有此證其表虛惡風寒之證復見矣表虛之弱為陰火所乘躁發須臾而過其表虛無陽不任風寒復見矣是表虛無陽常常有之其躁熱則間而有之此二者不齊躁作寒已寒作躁已非如外傷之寒熱齊作無有間斷也百病俱有身熱又為之肌熱又為之皮膚間熱以手捫之方知者是也乃肌體有形之熱也亦須皆待陰陽既和汗出則愈矣慎不可於此上辨之以其虛實內外病皆有之故難辨耳只依此說病人自覺發熱惡寒之熱及躁作之熱上辨之為準則矣辨外感八風之邪辨外感八風之邪或有飲食勞役所傷之重者三二日間特與外傷者相似其餘證有特異者若不將兩證重別分解猶恐將內傷不足之證誤作有餘外感風邪雖辭理有重復處但欲病者易辨醫者易治耳外感八風之邪乃有餘證也內傷飲食不節勞役所傷皆不足之病也其內傷亦惡風自汗若在濕暖無風處則不惡矣與外傷鼻流清涕頭痛自汗頗相似分之特異耳外感風邪其惡風自汗頭痛鼻流清涕常常有之一日一時增加愈甚直至傳入里作下證乃罷語聲重濁高厲有力鼻息壅塞不通能食腹中和口知味大小便如常筋骨疼痛不能轉搖便著床枕非扶不起其內傷與飲食不節勞役所傷然亦惡風居露地中遇大漫風起卻不惡也惟門窗隙中些小賊風來必大惡也與傷風傷寒俱不同矣況鼻流清涕頭痛自汗間而有之鼻中氣短少氣不足以息語則氣短而怯弱妨食或食不下或不欲食三者互有之腹中不和或腹中急而不能伸口不知五穀之味小便頻數而不渴初勞役得病食少小便赤黃大便常難或祕或結或虛坐只見些小白膿時有下氣或瀉黃如糜或溏泄色白或結而不通若心下痞氣或胸中閉塞如刀劙之痛二者亦互作不並出也有時胃脘當心而痛上支兩脅痛必臍下相火之勢如巨川之水不可遏而上行使陽明之經逆行亂於胸中其氣無止息甚則高喘熱傷元氣令四肢不收無氣以動而懶倦嗜臥以其外感風寒俱無此證故易分別耳辨手背手心內傷及勞役飲食不節病手心熱手背不熱外傷風寒則手背熱手心不熱此辨至甚皎然辨口鼻若飲食勞役所傷其外證必顯在口必口失穀味必腹中不和必不欲言縱勉強對答聲必怯弱口沃沫多唾鼻中清涕或有或無即陰證也外傷風寒則其外證必顯在鼻鼻氣不利聲重濁不清利其言壅塞盛有力而口中必和傷寒則面赤鼻壅塞而干傷風則鼻流清涕而已內經云鼻者肺之候肺氣通於天外傷風寒則鼻為之不利口者坤土也脾氣通於口飲食失節勞役所傷口不知穀味亦不知五味又云傷食惡食傷食明矣辨氣少氣盛外傷風寒者故其氣壅盛而有餘內傷飲食勞役者其口鼻中皆氣短促不足以息何以分之蓋外傷風寒者心肺元氣初無減損又添邪氣助之使鼻氣壅塞不利面赤不通其鼻中氣不能出並從口出但發一言必前輕而後重其言高其聲壯厲而有力是傷寒則鼻乾無涕面壅色赤其言前輕後重其聲壯厲而有力者乃有餘之驗也傷風則決然鼻流清涕其聲嗄其言響如從甕中出亦前輕而後重高揭而有力皆氣盛有餘之驗也內傷飲食勞役者心肺之氣先損為熱所傷熱既傷氣四肢無力以動故口鼻中皆短氣少氣上喘懶語人有所問十不欲對其一縱勉強答之其氣亦怯其聲亦低是其氣短少不足之驗也明白如此雖婦人女子亦能辨之豈有醫者反不能辨之乎辨頭痛內證頭痛有時而作有時而止外證頭痛常常有之直須傳入裡實方罷此又內外證之不同者也辨筋骨四肢內傷等病是心肺之氣已絶於外必怠惰嗜臥四肢沉困不收此乃熱傷元氣脾主四肢既為熱所乘無氣以動經云熱傷氣又云熱則骨消筋緩此之謂也若外傷風寒是腎肝之氣已絶於內腎主骨為寒肝主筋為風自古腎肝之病同一治以其遞相維持也故經言膽主筋膀胱主骨是也或中風或傷寒得病之日便著床枕非扶不起筋骨為之疼痛不能動搖乃形質之傷經云寒傷形又云寒則筋攣骨痛此之謂也辨外傷不惡食若勞役飲食失節寒溫不適此三者皆惡食仲景傷寒論云中風能食傷寒不能食二者皆口中和而不惡食若勞役所傷及飲食失節寒溫不適三者俱惡食口不知五味亦不知五穀之味只此一辨足以分內外有餘不足二證也傷寒證雖不能食而不惡食口中和知五味亦知穀味蓋無內證則心氣和脾氣通知五穀之味矣辨渴與不渴外感風寒之邪三日以外谷消水去邪氣傳裡始有渴也內傷飲食失節勞役久病者必不渴是邪氣在血脈中有餘故也初勞役形質飲食失節傷之重者必有渴以其心火熾上克於肺金故渴也又當以此辨之雖渴欲飲冷水者當漸漸少與之不可縱意而飲恐水多峻下則胃氣愈弱輕則為脹重則傳變諸疾必反復悶亂百脈不安夜間增劇不得安臥不可不預度也辨勞役受病表虛不作表實治之或因勞役動作腎間陰火沸騰事閒之際或於陰涼處解脫衣裳更有新沐浴於背陰處坐臥其陰火下行還歸腎間皮膚腠理極虛無陽但風來為寒涼所遏表虛不任其風寒自認外感風寒求醫解表以重絶元氣取禍如反掌苟幸而免者致虛勞氣血皆弱不能完復且表虛之人為風寒所遏亦是虛邪犯表始病一二日之間特與外中賊邪有餘之證頗相似處故致疑惑請醫者只於氣少氣盛上辨之其外傷賊邪必語聲前輕後重高厲而有力若是勞役所傷飲食不節表虛不足之病必短氣氣促上氣高喘懶語其聲困弱而無力至易見也若毫釐之誤則千里之謬以上者辨證別有治法用藥正論故作此說分解於後辨證與中熱頗相似復有一節乘天氣大熱之時在於路途中勞役得之或在田野間勞形得之更或有身體薄弱食少勞役過甚又有修善常齊之人胃氣久虛而因勞役得之者皆與陽明中熱白虎湯證相似必肌體捫摸之壯熱必躁熱悶亂大惡熱渴而飲水以勞役過甚之故亦身疼痛始受病之時特與中熱外得有餘之證相似若誤與白虎湯旬日必死此證脾胃大虛元氣不足口鼻中氣皆短促而上喘至日轉以後是陽明得時之際病必少減若是外中熱之病必到日晡之際大作譫語其熱增加大渴飲水煩悶不止其勞役不足者皆無此證尤易為分解若有難決疑似之證必當待一二日而求醫治療必不至錯誤矣飲食不節勞役形體所受病皆脾虛腠理元氣已絶於往往病人將自己表虛不任風寒但有風來寒至招認作傷風召醫以瀉其表反重虛其虛輕則致危困虛勞重則必死深可哀憫故時一說以祛醫者之惑論天地陰陽生殺之理在升降浮沉之間陰陽應象論云天以陽生陰長地以陽殺陰藏然歲以春為首正正也寅引也少陽之氣始於泉下引陰升而在天地人之上即天之分百穀草木皆甲坼於此時也至立夏少陰之火熾於太虛則草木盛茂垂枝布葉乃陽之用陰之體此所謂天以陽生陰長經言歲半以前天氣主之在乎升浮也至秋而太陰之運初自天而下逐陰降而徹地則金振燥令風厲霜飛品物咸殞其枝獨在若乎毫毛至冬則少陰之氣復服於泉下水冰地拆萬類周密陰之用陽之體也此所謂地以陽殺陰藏經言歲半以後地氣主之在乎降沉也至於春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則正氣之序也故曰履端於始序則不愆升已而降降已而升如環無端運化萬物其實一氣也設或陰陽錯綜勝復之變自此而起萬物之中人一也呼吸升降效象天地準繩陰陽蓋胃為水穀之海飲食入胃而精氣先輸脾歸肺上行春夏之令以滋養周身乃清氣為天者也升已而下輸膀胱行秋冬之令為傳化糟粕轉味而出乃濁陰為地者也若夫順四時之氣起居有時以避寒暑飲食有節及不暴喜怒以頤神志常欲四時均平而無偏勝則安不然損傷脾真氣下溜或下泄而久不能升是有秋冬而無春夏乃生長之用陷於殞殺之氣而百病皆起或久升而不降亦病焉於此求之則知履端之義矣勞倦所傷論調經篇云陰虛生內熱岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃氣熱熱氣熏胸中故內熱舉痛論云勞則氣耗勞則喘且汗出內外皆越故氣耗矣夫喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困熱無氣以動懶於語言動作喘乏表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其熱火以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之者是也金匱要略云平人脈大為勞脈極虛亦為勞矣夫勞之為病其脈浮大手足煩熱春夏劇秋冬瘥脈大者熱邪也極實者氣損也春夏劇者時助邪也秋冬瘥者時勝邪也以黃耆建中湯治之此亦溫之之意也夫上古聖人飲食有節起居有常不妄作勞形與神俱百歲乃去此謂治未病也今時之人去聖人久遠則不然飲食失節起居失宜妄作勞役形氣俱傷故病而後藥之是治其已病也推其百病之源皆因飲食勞倦而胃氣元氣散解不能滋榮百脈灌溉臟腑衛護周身之所致也故蒼天之氣貴清淨陽氣惡煩勞噫飲食喜怒之間寒暑起居之際可不慎歟飲食勞倦論古之至人窮於陰陽之化究乎生死之際所著內經悉言人以胃氣為本蓋人受水穀之氣以生所謂清氣營氣衛氣春升之氣皆胃氣之別稱也夫胃為水穀之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也苟飲食失節寒溫不適則脾胃乃傷喜怒憂恐勞役過度而損耗元氣既脾胃虛衰元氣不足而心火獨盛心火者陰火也起於下焦其繫系於心心不主令相火代之相火下焦包絡之火元氣之賊也火與元氣不能兩立一勝則一負脾胃氣虛則下流於腎肝陰火得以乘其土位故脾胃之證始得之則氣高而喘身熱而煩其脈洪大而頭痛或渴不止皮膚不任風寒而生寒熱蓋陰火上衝則氣高而喘身煩熱為頭痛為渴而脈洪大脾胃之氣下流使穀氣不得升浮是生長之令不行則無陽以護其營衛不任風寒乃生寒熱皆脾胃之氣不足所致也然而與外感風寒所得之證頗同而理異內傷脾胃乃傷其氣外感風寒乃傷其形傷外為有餘有餘者瀉之傷內為不足不足者補之汗之下之吐之克之皆瀉也溫之和之調之養之皆補也內傷不足之病苟誤認作外感有餘之病而反瀉之則虛其虛也難經云實實虛虛損不足而益有餘如此死者醫殺之耳然則奈何曰惟當以甘溫之劑補其中升其陽甘寒以瀉其火則愈內經曰勞者溫之損者溫之蓋溫能除大熱大忌苦寒之藥瀉胃土耳今立補中益氣湯補中益氣湯黃耆勞役熱甚一錢甘草炙以上各五分人參去蘆升麻柴胡橘皮當歸身酒洗白朮以上各三分上件㕮咀都作一服水二盞煎至一盞去滓早飯後溫服如傷之重者二服而愈量輕重治之立方本指夫脾胃虛者因飲食勞倦心火亢甚而乘其土位其次肺氣受邪須用黃耆最多人參甘草次之脾胃一虛肺氣先絶故用黃耆以益皮毛而閉腠理不令自汗損其元氣上喘氣短人參以補之心火乘脾須炙甘草之甘以瀉火熱而補脾胃中元氣若脾胃急痛並大虛腹中急縮者宜多用之經云急者緩之白朮苦甘溫除胃中熱利腰臍間血胃中清氣在下必加升麻柴胡以引之引黃耆甘草甘溫之氣味上升能補衛氣之散解而實其表也又緩帶脈之縮急二味苦平物之薄者陰中之陽引清氣上升也氣亂於胸中為清濁相干用去白陳皮以理之又能助陽氣上升以散滯氣助諸甘辛為用也口乾嗌乾加乾葛脾胃氣虛不能升浮為陰火傷其生髮之氣營血大虧營氣不營陰火熾盛是血中伏火日漸煎熬血氣日減心包與心主血血減則心無所養致使心亂而煩病名日悗悗者心惑而煩悶不安也故加辛甘微溫之劑生陽氣陽生則陰長或曰甘溫何能生血曰仲景之法血虛以人參補之陽旺則能生陰血更以當歸和之少加黃柏以救腎水能瀉陰中之伏火如煩猶不止少加生地黃補腎水水旺而心火自降如氣浮心亂以硃砂安神丸鎮固之則愈四時用藥加減法內經曰胃為水穀之海又云腸胃為市無物不包無物不入寒熱溫涼皆有之其為病也不一故隨時證於補中益氣湯中權立四時加減法於後以手捫之而肌表熱者表熱也只服補中益氣湯一二服得微汗則已非正發汗乃陰陽氣和自然汗出也若更煩亂如腹中或周身有刺痛皆血澀不足加當歸身五分或一錢如精神短少加人參五分五味子二十個頭痛加蔓荊子三分痛甚加川芎五分頂痛腦痛加藁本五分細辛三分諸頭痛並用此四味足矣如頭痛有痰沉重懶倦者乃太陰痰厥頭痛加半夏五分生薑三分耳鳴目黃頰頷腫頸肩臑肘臂外後廉痛面赤脈洪大者以羌活一錢防風藁本以上各七分甘草五分通其經血加黃芩黃連以上各三分消其腫人參五分黃耆七分益元氣而瀉火邪另作一服與之嗌痛頷腫脈洪大面赤者加黃芩甘草以上各三分桔梗七分口乾嗌乾者加葛根五分升引胃氣上行以潤之如夏月咳嗽者加五味子二十五個麥門冬去心五分如冬月咳嗽加不去根節麻黃五分如秋涼亦加如春月天溫只加佛耳草款冬花以上各五分若久病痰嗽肺中伏火去人參以防痰嗽增益耳食不下乃胸中胃上有寒或氣澀滯加青皮木香以上各三分陳皮五分此三味為定法如冬月加益智仁草豆蔻仁以上各五分如夏月少加黃芩黃連以上各五分如秋月加檳榔草豆蔻仁縮砂仁白豆蔻仁以上各五分如春初猶寒少加辛熱之劑以補春氣之不足為風藥之佐益智草豆蔻可也心下痞夯悶者加芍藥黃連以上各一錢如痞腹脹加枳實木香縮砂仁以上各三分厚朴七分如天寒少加乾薑或中桂桂心也心下痞覺中寒加附子黃連以上各一錢不能食而心下痞加生薑陳皮以上各一錢能食而心下痞加黃連五分枳實三分脈緩有痰而痞加半夏黃連以上各一錢脈弦四肢滿便難而心下痞加黃連五分柴胡七分甘草三分腹中痛者加白芍藥五分甘草三分如惡寒覺冷痛加中桂五分如夏月腹中痛不惡寒不惡熱者加黃芩甘草以上各五分芍藥一錢以治時熱也腹痛在寒涼時加半夏益智草豆蔻之類如腹中痛惡寒而脈弦者是木來剋土也小建中湯主之蓋芍藥味酸於土中瀉木為君如脈沉細腹中痛是水來侮土以理中湯主之乾薑辛熱於土中瀉水以為主也如脈緩體重節痛腹脹自利米穀不化是濕勝以平胃散主之蒼朮苦辛溫瀉濕為主也脅下痛或脅下縮急俱加柴胡三分甚則五分甘草三分臍下痛者加真熟地黃五分如不已者乃大寒也加肉桂五分硃砂安神丸硃砂五錢別研水飛為衣甘草五錢五分黃連去須淨酒洗六錢當歸去蘆二錢五分生地黃一錢五分內經曰熱淫所勝治以甘寒以苦瀉之以黃連之苦寒去心煩除濕熱為君以甘草生地黃之甘寒瀉火補氣滋生陰血為臣以當歸身補其血不足硃砂納浮溜之火而安神明也上件除硃砂外四味共為細末湯浸蒸餅為丸如黍米大以硃砂為衣每服十五丸或二十丸津唾咽下食後或溫水涼水少許送下亦得此近而奇偶制之緩也參朮調中湯瀉熱補氣止嗽定喘和脾胃進飲食白朮五分黃耆四分桑白皮甘草炙人參以上各三分麥門冬去心青皮去白陳皮去白地骨皮白茯苓以上各二分五味子二十個上件㕮咀如麻豆大都作一服水二盞煎至一盞去滓大溫服早飯後忌多語言勞役升陽補氣湯治飲食不時飢飽勞役胃氣不足脾氣下溜氣短無力不能寒熱早飯後轉增昏悶須要眠睡怠惰四肢不收懶倦動作及五心煩熱厚朴薑製五分升麻羌活白芍藥獨活防風甘草炙澤瀉以上各一錢生地黃一錢五分柴胡二錢五分上件為粗末每服五錢水二盞生薑三片棗二枚煎至一盞去滓大溫服食前如腹脹及窄狹加厚朴如腹中似硬加砂仁以上各三分雙和散治虛勞少氣補血益氣白芍藥二兩五錢黃耆熟地黃川芎當歸以上各一兩甘草炙官桂以上各七錢五分上為粗末每服四錢水一盞半生薑三片棗二枚煎至七分去滓溫服如大病之後虛勞氣乏者以此調治不熱不冷溫而有補升陽順氣湯治因飲食不節勞役所傷腹脅滿悶短氣遇春則口淡無味遇夏雖熱猶有惡寒飢則常如飽不喜食冷物黃耆一兩半夏三錢湯洗七次草豆蔻二錢神麯一錢五分炒升麻柴胡當歸身陳皮以上各一錢甘草炙黃柏以上各五分人參去蘆三分上件㕮咀每服三錢水二盞生薑三片煎至一盞去滓溫服升陽益胃湯治脾胃虛則怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口乾舌乾飲食無味大便不調小便頻數不欲食食不消兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也當升陽益氣也黃耆二兩半夏洗此一味脈澀者用人參去蘆甘草炙以上各一兩黃連一錢白芍何故秋旺用人參白朮芍藥之類反補肺為脾胃虛則肺最受邪故因時而補也獨活防風以秋旺故以辛溫瀉之羌活以上各五錢橘皮四錢茯苓小便利不渴者勿用柴胡澤瀉不淋勿用白朮以上各三錢上㕮咀每服稱三錢水三盞生薑五片棗二枚煎至一盞去渣溫服早飯後或加至五錢門冬清肺飲治脾胃虛弱氣促氣弱精神短少衄血吐血紫菀茸一錢五分黃耆白芍藥甘草以上各一錢人參去蘆麥門冬以上各五分當歸身三分五味子三個上㕮咀分作二服每服水二盞煎至一盞去渣溫服食後局方中大阿膠丸亦宜用升陽散火湯方見火門當歸補血湯方見熱門飲食所傷論陰陽應象論云水穀之寒熱感則害人六腑痹論云陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷此乃混言之也分之為二飲也食也飲者水也無形之氣也因而大飲則氣逆形寒飲冷則傷肺病則為喘咳為腫滿為水瀉輕則當發汗利小便使上下分消其濕解醒湯五苓散生薑半夏枳實白朮之類是也如重而蓄積為滿者芫花大戟甘遂牽牛之屬利下之此其治也食者物也有形之血也如生氣通天論云因而飽食筋脈橫解腸澼為痔又云食傷太陰厥陰寸口大於人迎兩倍三倍者或嘔吐或痞滿或下利腸澼當分寒熱輕重而治之輕則內消重則除下如傷寒物者半夏神麯乾薑三稜廣朮巴豆之類主之如傷熱物者枳實白朮青皮陳皮麥糵黃連大黃之類主之亦有宜吐者陰陽應象大論云在上者因而越之瓜蒂散之屬主之然而不可過劑過劑則反傷腸胃蓋先因飲食自傷又加之以藥過故腸胃復傷而氣不能化食愈難消矣漸至羸困故五常政大論云大毒治病十去其六小毒治病十去其七凡毒治病不可過之此聖人之深戒也論飲食自倍腸胃乃傷分而治之痹論云陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷此混言之也分之為二飲也食也又經云因而大飲則氣逆因而飽食筋脈橫解則腸澼為痔飲者無形之氣傷之則宜發汗利小便使上下分消其濕解醒湯五苓散之類主之食者有形之物傷之則宜損其谷其次莫若消導丁香爛飯丸枳朮丸之類主之稍重則攻化三稜消積丸木香見睍丸之類主之尤重者則或吐或下瓜蒂散備急丸之類主之以平為期蓋脾已傷又以藥傷使營運之氣減削食愈難消故五常政論云大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也不盡行復如法聖人垂此嚴戒是為萬世福也如能慎言語節飲食所謂治未病也辨內傷飲食用藥所宜所禁內傷飲食付藥者受藥者皆以為鎖未細事是以所當重者為輕利害非細殊不思胃氣者營氣也衛氣也穀氣也清氣也資少陽生髮之氣也人之真氣衰旺皆在飲食入胃胃和則穀氣上升穀氣者升騰之氣也乃足少陽膽手少陽元氣始發生長萬化之別名也飲食一傷若消導藥的對其所傷之物則胃氣愈旺五穀之精華上騰乃清氣為天者也精氣神氣皆強盛七神衛護生氣不乏增益大旺氣血周流則百病不能侵雖有大風苛毒弗能害也此一藥之用其利溥哉易水張先生嘗戒不可用峻利食藥食藥下咽未至藥丸施化其標皮之力始開便言空快也所傷之物已去若更待一二時辰許藥盡化開其峻利藥必有性情病去之後脾胃安得不損乎脾胃既損是真氣元氣敗壞促人之壽當時說下一藥枳實一兩麩炒黃色為度白朮二兩只此二味荷葉裹燒飯為丸以白朮苦甘溫其甘溫補脾胃之元氣其苦味除胃中之濕熱利腰膝間血故先補脾胃之弱過於枳實克化之藥一倍枳實味苦寒泄心下痞悶消化胃中所傷此一藥下胃其所傷不能即去須待一二時辰許食則消化是先補其虛而後化其所傷則不峻利矣當是之時未悟用荷葉燒飯為丸之理老年味之始得可謂神奇矣荷葉之一物中央空虛象震卦之體震者動也人感之生足少陽甲膽也甲膽者風也生化萬物之根蒂也左傳云履端於始序則不愆人之飲食入胃營氣上行即少陽甲膽之氣也其手少陽三焦經人之元氣也手足經同法便是少陽元氣生髮也胃氣穀氣元氣甲膽上升之氣一也異名雖多止是胃氣上升者也荷葉之體生於水土之下出於穢汙之中而不為穢汙所染挺然獨立其色青形乃空清而象風木者也食藥感此氣之化胃氣何由不上升乎其主意用此一味為引用可謂遠識深慮合於道者也更以燒飯和藥與白朮協力滋養穀氣而補令胃厚再不至內傷其利廣矣大矣若內傷脾胃以辛熱之物酒肉之類自覺不快覓藥於醫者此風習以為常醫者亦不問所傷即付之以集香丸巴豆大熱藥之類下之大便下則物去遺留食之熱性藥之熱性重傷元氣七神不熾經云熱傷氣正謂此也其人必無氣以動而熱困四肢不舉傳變諸疾不可勝數使人真氣自此衰矣若傷生冷硬物世醫或用大黃牽牛二味大寒藥投之物隨藥下所傷去矣遺留食之寒性藥之寒性重瀉其陽陽去則皮膚筋骨肉血脈無所依倚便為虛損之證論言及此令人寒心夫辛辣氣薄之藥無故不可亂服非止牽牛而已至真要大論云五味入胃各先逐其所喜攻攻者克伐瀉也辛味下咽先攻瀉肺之五氣氣者真氣元氣也其牽牛之辛辣猛烈奪人尤甚飲食所傷腸胃受邪當以苦味泄其腸胃可也肺與元氣何罪之有夫牽牛不可用者有五此其一也況胃主血為物所傷物者有形之物也皆是血病血病瀉氣此其二也且飲食傷於中焦止合克化消導其食重瀉上焦肺中已虛之氣此其三也食傷腸胃當塞因塞用又寒因寒用枳實大黃苦寒之物以泄有形是也反以辛辣牽牛散瀉真氣犯大禁四也殊不知針經第一卷第一篇有云外來客邪風寒傷人五臟若誤瀉胃氣必死誤補亦死其死也無氣以動故靜若內傷腸胃而反瀉五臟必死誤補亦死其死也陰氣有餘故躁今內傷腸胃是謂六腑不足之病反瀉上焦虛無肺氣肺者五臟之一數也為牽牛之類朝損暮損其元氣消耗此仍暗裡折人壽數犯大禁五也良可哀嘆故特著此論並方庶令四海聞而行之不至夭橫耳此老夫之用心也胃氣豈可不養復明養胃之理故經曰安穀則昌絶谷則亡水去則營散谷消則衛亡營散衛亡神無所依仲景云水入於經其血乃成谷入於胃脈道乃行故血不可不養胃不可不溫血溫胃和營衛將行常有天命谷者身之大柄也書與周禮皆云金木水火土谷惟修以奉養五臟者也內傷飲食固非細事苟妄服食藥而輕生損命其可乎哉黃帝針經有說胃惡熱而喜清大腸惡清冷而喜熱兩者不和何以調之岐伯曰調此者飲食衣服亦欲適寒溫寒無悽愴暑無汗出飲食者熱無灼灼寒無滄滄寒溫中適故氣將持不致邪僻也詳說見於本經條下是必有因用豈可用俱寒俱熱之食藥致損者與內經云內傷者其氣口脈反大於人迎一倍二倍三倍分經用藥又曰上部有脈下部無脈其人當吐不吐者死如但食不納噁心欲吐者不問一倍二倍不當止與瓜蒂散吐之但以指或以物探去之若所傷之物去不盡者更診其脈問其所傷以食藥去之以應塞因塞用又謂之寒因寒用泄而下降乃應太陰之用其中更加生髮之藥令其元氣上升塞因塞用因曲而為之直何為曲內傷胃氣是也何為直而升發胃氣是也因治其飲食之內傷而使生氣增益胃氣完復此乃因曲而為之直也若依分經用藥其所傷之物寒熱溫涼生硬柔軟所傷不一難立定法只隨所傷之物不同各立治法臨時加減用之其用藥又當問病人從來稟氣盛衰所傷寒物熱物是喜食而食之耶不可服破氣藥若乘飢困而食之耶當益胃氣或為人所勉勸強食之宜損血而益氣也診其脈候傷在何臟方可與對病之藥豈可妄瀉天真生氣以輕喪身寶乎且如先食熱而不傷繼之以寒物因後食致前食亦不消化而傷者當問熱食寒食孰多孰少斟酌與藥無不當矣喻如傷熱物二分寒物一分則當用寒藥二分熱藥一分相合而與之則營衛之氣必得周流更有或先飲酒而後傷寒冷之食乃傷熱食冷水與冰如此不等皆當驗其節次所傷之物約量寒熱之劑分數各各對證而與之無不取驗自忖所定方藥未敢便為能盡藥性之理姑用指迷辨惑耳隨證立方備陳於後易水張先生枳朮丸治痞消食強胃白朮二兩枳實麩炒黃色去瓤一兩上為細末荷葉裹燒飯為丸如梧桐子大每服五十丸多用白湯下無時白朮者本意不取其食速化但令人胃氣強實不復傷也橘皮枳朮丸治老幼元氣虛弱飲食不消或臟腑不調心下痞悶橘皮枳實麩炒去瓤以上各一兩白朮二兩上為細末荷葉燒飯為丸如梧桐子大每服五十丸熟水送下食遠夫內傷用藥之大法所貴服之強人胃氣令胃氣益厚雖猛食多食重食而不傷此能用食藥者也此藥久久益胃氣令人不復致傷也曲糵枳朮丸治為人所勉勸強食之致心腹滿悶不快枳實麩炒去瓤大麥糵麵炒神麯炒以上各一兩白朮二兩上為細末荷葉燒飯為丸如梧桐子大每服五十丸用溫水下食遠木香枳朮丸破滯氣消飲食開胃進食木香枳實麩炒去瓤以上各一兩白朮二兩上為細末荷葉燒飯為丸如梧桐子大每服五十丸溫水送下食遠木香化滯湯治因憂氣食濕面結於中脘腹皮底微痛心下痞滿不思飲食食之不散常常痞氣半夏一兩草豆蔻仁甘草以上各五錢柴胡四錢木香橘皮以上各三錢枳實麩炒去瓤當歸梢以上各二錢紅花五分上件銼如麻豆大每服五錢水二大盞生薑五片煎至一盞去滓稍熱服食遠忌酒濕面半夏枳朮丸治因冷食內傷半夏湯洗七次枳實麩炒以上各一兩白朮二兩上為細末荷葉燒飯為丸如緑豆大每服五十丸溫水送下添服不妨熱湯浸蒸餅為丸亦可如食傷寒熱不調每服加上二黃丸十丸白湯送下丁香爛飯丸治飲食所傷丁香京三稜蓬莪朮炮木香以上各一錢甘草炙甘松去土縮砂仁丁香皮益智仁以上各三錢香附子五錢上為細末湯浸蒸餅為丸如緑豆大每服三十丸白湯送下或細嚼亦可不拘時候治猝心胃痛甚效草豆蔻丸治秋冬傷寒冷物胃脘當心而痛上支兩脅膈咽不通草豆蔻麵裹煨去皮取仁枳實麩炒黃色白朮以上各一兩大麥糵麩炒黃色半夏湯洗七次黃芩刮去皮生神麯炒黃色各五錢乾生薑橘皮青皮以上各二錢炒鹽五分上為細末湯浸蒸餅為丸如緑豆大每服五十丸白湯下量所傷多少加減服之如冬月用別作一藥不用黃芩歲火不及又傷冷物加以溫劑是其治也然有熱物傷者從權以寒藥治之隨時之宜不可不知也三黃枳朮丸治傷肉食濕面辛辣味厚之物填塞悶亂不快黃耆二兩黃連酒洗大黃濕紙裹煨神麯炒橘皮白朮以上各一兩枳實麩炒五錢上為細末湯浸蒸餅為丸如緑豆大一倍每服五十丸白湯送下量所傷服之除濕益氣丸治傷濕面心腹滿悶肢體沉重枳實麩炒黃色神麯炒黃色黃芩生用白朮以上各一兩蘿蔔子炒熟去穢氣五錢紅花三分是三錢分十也上為細末荷葉裹燒飯為丸如緑豆大每服五十丸白湯送下量所傷多少服之三稜消積丸治傷生冷硬物不能消化心腹滿悶京三稜炮術炒炒曲以上各七錢青橘皮巴豆和皮米炒黑焦去米陳皮以上各五錢丁皮益智以上各三錢茴香五錢炒上為細末醋打麵糊為丸如梧桐子大每服十丸加至二十丸溫生薑湯下食前量虛實加減如更衣止後服之備急大黃丸療心腹諸猝暴百病大黃巴豆去皮乾薑以上各一兩上須要精新好藥搗羅蜜和更搗一千杵丸如小豆大每服三丸老少量之益胃散治服寒藥過多或脾胃虛弱胃脘痛陳皮黃耆以上各七錢益智仁六錢白豆蔻仁澤瀉乾薑薑黃以上各三錢縮砂仁甘草厚朴人參以上各二錢上為細末每服三錢水一盞煎至七分溫服食前如脈弦惡寒腹痛乃中氣弱也以仲景小建中湯加黃耆錢氏異功散加芍藥選而用之如渴甚者以白朮散加葛根倍之論酒客病夫酒者大熱有毒氣味俱陽乃無形之物也若傷之止當發散汗出則愈矣此最妙法也其次莫如利小便二者乃上下分消其濕何酒病之有今之酒病者往往服酒症丸大熱之藥下之又有用牽牛大黃下之者是無形元氣受病反下有形陰血乖誤甚矣酒性大熱已傷元氣而復重瀉之況亦損腎水真陰及有形陰血俱為不足如此則陰血愈虛真水愈弱陽毒之熱大旺反增其陰火是謂元氣消亡七神無依折人長命不然則虛損之病成矣金匱要略云酒疸下之久久為黑疸慎不可犯此戒不若令上下分消其濕葛花解酲湯主之葛花解酲湯白豆蔻仁縮砂仁葛花以上各五錢乾薑神麯炒澤瀉白朮以上各二錢橘皮去白豬苓去皮人參去蘆白茯苓各一錢五分木香五分蓮花青皮去瓤三分上為細末稱和勻每服三錢匕白湯調下但得微汗酒病去矣此蓋不得已而用之豈可恃賴日日飲酒此藥氣味辛辣偶因酒病服之則不損元氣何者敵酒病故也若頻服之損人天年五苓散治傷寒溫熱病表裡未解頭痛發熱口燥咽乾煩渴飲水或水入即吐或小便不利及汗出表解煩渴不止者宜服之又治霍亂吐利燥渴引飲之證澤瀉二兩五錢豬苓茯苓白朮以上各一兩五錢桂一兩上為細末每服二錢熱湯調服不計時候服訖多飲熱湯有汗出即愈又治淤熱在裡身熱黃疸濃煎茵陳蒿湯調下食前服之如疸發渴及中暑引飲亦可用水調服之家祕加味枳朮丸治脾胃虛弱飲食減少胸膈膨悶酒傷食積氣滯腹滿常服則進食寬中和暢脾胃白朮泔浸土炒二兩枳實去瓤麩炒一兩神麯炒麥糵炒研取粉陳皮去白山楂肉香附炒以上各一兩縮砂仁炒五錢上為細末荷葉燒陳老米飯為丸如緑豆大每服五十丸用清米飲或滾水送下如胸膈膨悶枳殼湯送下如酒傷乾葛湯送下如脾胃虛弱者加人參五錢附傷食傷食方論病源曰宿食不消由臟氣虛弱寒氣在於脾胃之間故使穀不化也宿谷未消新谷又入脾氣既弱故不能磨之則經宿而不消也令人腹脹氣急噫氣醋臭時復憎寒壯熱是也或頭痛如瘧之狀寸口脈浮大按之反澀尺脈亦微而澀者則宿食不消也丹溪云傷食惡食者胸中有物宜導痰補脾用二陳湯加白朮山楂川芎蒼朮服之豆蔻橘紅散溫脾養胃升降陰陽和三焦化宿食丁香木香各一兩白豆蔻人參厚朴薑汁製神麯炒乾薑炮半夏曲橘紅去白甘草炙薷香去土白朮各半兩上㕮咀每三錢水一盞姜三片棗一枚煎七分去渣溫服保和丸專治一切食積山楂六兩神麯半夏茯苓各二兩陳皮連翹蘿蔔子各一兩上為末炊餅子如梧子大每服七八十丸食遠白湯下大枳殼丸御藥院方治一切酒食傷胸膈閉悶疼痛飲食不消兩脅刺痛嘔逆噁心並皆治之蓬莪朮煨香熱厚朴去皮薑製人參去蘆青皮黑牽牛炒枳殼麩炒去瓤茯苓去皮木香陳皮去白白朮各一兩檳榔大黃錦紋者各二兩半夏湯炮七次麥糵微炒神麯炒黃三稜各一兩一方有乾薑五錢上為末薑汁糊丸如梧子大每服三四十丸薑湯下常服美食木香檳榔丸治一切氣滯心腹痞滿脅肋脹悶大小便結滯不利者並亦服之木香檳榔青皮去白陳皮去白枳殼麩炒廣茂煨切黃連各一兩黃柏去粗皮一兩香附大黃炒各三兩黑牽牛生取頭末各三兩上為末滴水丸如豌豆大每服三五十丸食後生薑湯送下加至以利為度祕方化滯丸理一切氣化一切積奪造化有通塞之功調陰陽有補瀉之妙久堅沉痼磨之自消暴積留導之立去南木香堅實者不見火丁香去苞不見火青皮四花者去白紅橘皮水浸去白黃連大者各二錢半京三稜慢火煨莪朮慢火煨各五錢半夏曲三錢前八味曬乾共研為細末巴豆去殼滾湯泡逐一研開去心膜以瓦器盛用好醋浸過一指慢火熬至醋乾稱六錢重碾細將前藥末和再碾令勻入後烏梅肉膏巴豆若干止用四錢五分烏梅用肉厚者打研去核細銼火焙乾為細末稱五錢重用米醋調略清慢火熬成膏和入前藥上通和勻了用白麵八錢重水調得所慢火調糊為丸如粟米大每服五七丸人盛者十丸五更空心用橘皮湯下常服磨滯不欲通泄津液咽下停食飽悶枳殼湯下但有所積物取米汁冷下因食吐不止津液咽下即止食瀉不休及霍亂嘔吐俱用冷水下赤痢冷甘草湯下白痢冷乾薑湯下心動石菖蒲湯下赤白痢冷甘草乾薑湯下諸氣痛生薑橘皮湯下小腸氣痛茴香酒下婦人血氣當歸湯下若欲宣積滾薑湯下仍如丸數未利再服利多飲冷水一口補住小兒量歲數加減丸服疳積常服米飲下不拘時服孕婦勿服此藥得熱則行得冷則止丁香爛飯丸治食傷猝心痛三黃積術丸治傷肉食濕面辛辣味厚之物填塞悶亂不安葛花解酲湯治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足戰搖飲食減少小便不利方俱見內傷門大柴胡湯治內傷飲食鬱結在裡身熱煩躁日晡發熱如瘧脈實而滑數者用此微利柴胡四錢黃芩芍藥各二錢半半夏二錢大黃二錢枳實一錢五分上㕮咀作一服加生薑三片棗二枚水二鍾煎一鍾去渣溫服以利為度未利再投一服附調理脾胃新增調理脾胃方論內經曰胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟氣於胃胃者五臟之本六腑之大源也又曰胃為水穀之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也以此論之若夫飲食有節寒溫適宜脾胃壯實則外邪不能侵內邪不能起何恙之有哉苟因飲食失節寒溫不適則脾胃虛弱而百病生焉況脾胃屬土土為五行之本萬物藉土而生故古人以調理脾胃為醫中之王道厥有旨哉豫鄙見欲人知節飲食適寒溫以養脾胃之本倘有脾胃虛弱最易作疾故開諸方於後擇而用之苟得脾壯實固本澄源之事也矣調中益氣湯東垣方治因飢飽勞役損傷脾胃元氣不足其脈弦或洪緩而沉按之無力中之下時得一澀其證身體沉重四肢倦懶百節煩疼胸滿短氣膈咽不通心煩不安耳鳴耳聾目有淤肉熱壅如火視物昏花口中沃沫飲食失味怠惰嗜臥忽肥忽瘦溺色變或清利而數或上飲下便或夏月飧泄腹中虛痛不思飲食升麻柴胡橘皮各二分木香二分甘草炙人參蒼朮各五分黃耆一錢當歸五分芍藥三分五味子七個此後三味出東垣證效方有之上㕮咀作一處水煎食前熱服如時顯熱躁是下元陰火蒸蒸然發也加生地黃黃柏如大便虛坐不得或大便了而不了腹常逼迫血虛血澀也加歸身治中湯治脾胃不和嘔逆霍亂中滿虛痞或泄瀉參苓白朮散治脾胃虛弱飲食不進或嘔吐泄瀉及大病後調助脾胃此藥最好方並見虛勞門平胃散治脾胃不和嘔吐痰水胸膈痞滯不美飲食並皆治之方見泄瀉門枳朮丸治痞消食理脾強胃方見內傷門家祕加味枳朮丸治脾胃虛弱飲食減少胸膈膨悶酒傷食積氣滯腹滿常服則進食寬中和暢脾胃方見內傷門養胃湯三因方治脾胃虛寒嘔逆噁心腹脅脹痛腸鳴泄瀉或有外感寒熱如瘧骨節煩疼並皆治之方見痎瘧門白朮和胃丸治病久不能食而臟腑或結或溏此胃氣虛弱也常服則和中理氣消痰去濕和脾胃進飲食厚朴制半夏各一兩白朮一兩二錢陳皮八錢檳榔枳實各二錢半木香一錢人參七錢甘草炙三錢上為末生薑汁浸蒸餅為丸如梧桐子大每三十丸溫水食遠服補脾丸心法祕方有脾虛而惡湯藥者制此丸用湯吞省口苦而易於從也白朮半斤蒼朮茯苓陳皮各三兩芍藥半兩上為末粥糊丸加潤下丸可作催生用上熱甚者加清金丸尤妙與此藥必無産患養脾丸和劑方治脾胃虛冷心腹脹悶嘔逆噁心泄瀉大麥糵炒白茯苓去皮人參去蘆各一斤白朮半斤乾薑炮縮砂去皮各二斤甘草炙一斤半上為末煉蜜為丸每兩作八丸每服一丸細嚼薑湯下補脾湯三因方治脾胃虛寒泄瀉腹滿氣逆嘔吐飲食不消人參去蘆茯苓去皮草果去皮乾薑炮各一兩麥芽炒甘草炙各一兩半厚朴去皮薑製陳皮去白白朮各七錢半上㕮咀每服四錢水一盞煎七分去渣空心溫服溫脾散本事方開胃進食利氣散寒濕溫中青皮去白陳皮去白砂仁船上茴香炒良薑桔梗白芷厚朴各一兩木香麥芽香附白朮各半兩甘草一兩半紅豆乾葛各三錢上㕮咀每服三錢水一盞棗一枚煎七分去渣空心服八味理中丸百一選方治脾胃虛寒飲食不化胸膈痞悶或嘔吐痰水或腸鳴泄瀉砂仁川薑麥芽各二兩白茯苓神麯炒人參各一兩白朮四兩甘草炙一兩半上為末煉蜜丸每兩分作十丸空心用一丸薑湯嚼下或加半夏曲一兩為末入鹽點服亦可參苓平胃散御藥院方治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿短氣嘔噦噁心噫氣吞酸面色痿黃肌體瘦弱怠惰嗜臥體重節痛常多自利或發霍亂及五噎八痞膈氣反胃宜服厚朴制橘皮各五兩蒼朮米泔制半斤甘草炙茯苓各二兩人參二兩上㕮咀水二盞生薑三片棗一枚煎至一盞去渣溫服不拘時一方棗肉丸小豆大服五十丸薑湯下空心常服調氣暖胃化宿食消痰飲闢風寒涼溫四時非節之氣異功散拔粹方治脾胃虛冷腸鳴腹痛自利不思飲食人參茯苓白朮甘草炙橘皮各等分上㕮咀每服五錢生薑三片棗一枚水二盞煎八分溫服六君子湯聖惠方治脾臟不和不進飲食上燥下寒服熱藥不得者人參白朮各一兩橘紅半夏湯泡七次枳殼去白麩炒甘草炙各半兩上㕮咀每服一兩生薑七片棗一枚水二盞煎至一盞去渣溫服木香人參生薑枳朮丸拔粹方開胃進食木香三錢人參三錢半乾生薑一錢半枳實一兩炒白朮一兩半橘皮四錢上件為末用荷葉燒飯為丸如梧桐子大每服三五十丸溫水送下食前服藿香安胃散衛生寶鑑治脾胃虛弱不能飲食嘔吐不待腐熟藿香丁香人參各二錢半橘紅半兩上㕮咀水二盞生薑三片煎至一盞溫服不拘時寬中進食丸滋形氣美飲食神麯炒四錢木香五分草豆蔻仁五錢枳實炒四錢半夏七錢甘草炙一錢人參乾生薑青皮豬苓各一錢陳皮白朮白茯苓澤瀉各二錢砂仁一錢半大麥芽一兩上為末湯浸蒸餅丸如梧桐子大每服三四十丸溫米飯下食遠服之八珍湯御藥院方和血氣理脾胃當歸赤芍藥川芎熟地黃人參白茯苓甘草砂仁各等分上㕮咀每服三錢水一盞姜七片棗三枚煎至七分空心溫服凝神散病後收斂胃氣清涼肌表人參白朮茯苓山藥各一兩粳米扁豆炒知母生苄甘草炙各五錢淡竹葉地骨皮麥門冬各二錢半上㕮咀每服五錢水盞半姜三片棗一枚煎至一盞去渣溫服加減保和丸消痰利氣扶脾胃進飲食山楂神麯炒半夏湯泡七次茯苓去皮各三兩陳皮洗連翹蘿蔔子各二兩白朮五兩蒼朮米泔浸去粗皮枳實去白各一兩香附去皮酒浸厚朴薑製各二兩黃芩去腐酒浸炒黃連去須酒浸炒各一兩上為細末薑汁麵糊為丸如梧子大每服五十丸漸加至七八十丸食後茶湯任下加味枳朮丸明醫雜著論曰人之一身脾胃為主胃陽主氣脾陰主血胃司納受脾司運化一納一運化生精氣津液上升糟粕下降斯無病矣人惟飲食不節起居不時損傷脾胃脾損則不能納胃損則不能化脾胃俱損納化皆難元氣斯弱百邪易侵而飽悶痞積關格吐逆腹痛泄痢等證作矣況人於飲食豈能一一節調一或有傷脾胃便損飲食減常元氣漸憊矣故潔古制枳朮之丸東垣發脾胃之論使人常以調理脾胃為主後人稱為醫中王道厥有旨哉近世論治脾胃者不分陰陽氣血而率皆理胃所用之藥又皆辛溫燥熱助火消陰之劑遂致胃火益旺脾陰愈傷清純中和之氣變為燥熱胃脘乾枯大腸燥結脾臟漸絶而死期迫矣殊不知脾胃屬土屬濕位居長夏故濕熱之病十居七八況土旺四季寒熱溫涼各依其時豈可偏用辛熱之劑哉今舉枳朮丸方立加減法於後白朮二兩去梗枳實一兩麩炒上為細末荷葉包飯燒取出杵爛和藥杵勻丸如緑豆大每服五六十丸清米湯下此法一補一消取飲食緩化不令有傷東垣加陳皮一兩名橘皮枳朮丸治老幼元氣衰弱飲食少進久服令人多食而不傷若元氣素弱飲食難化食多即腹中不和疼痛泄瀉此虛寒也加人參白芍藥酒炒神麯炒大麥芽炒杵去皮各一兩縮砂木香各五錢若素有痰火胸膈鬱塞咽酸噎氣及素有吞酸吐酸之證或有酒積泄瀉結痛此皆濕熱也加黃連薑汁炒白芍藥酒炒陳皮各一兩石膏生甘草各五錢縮砂木香各二錢川芎四錢若傷食飽悶痞塞不消加神麯大麥芽山楂子各一兩如有食積痞塊在腹者再加黃連厚朴栝蔞制各五錢積堅者再加蓬莪朮醋煮昆布各三錢若傷冷食不消腹痛溏泄加半夏薑製一兩縮砂乾薑各炒神麯大麥芽各五錢若人性多氣惱夾氣傷食氣滯不通加川芎香附米各一兩木香黃連薑製各五錢若胸膈不利人過服辛香燥熱之藥以致上焦受傷胃脘乾燥嘔吐噎膈反胃加黃連姜炒山梔子炒各五錢白芍藥當歸各一兩桔梗生甘草石膏各五錢胸膈頑痰膠結及大便燥祕再加芒硝五錢若素有痰者加半夏姜炒橘紅白茯苓各一兩黃芩炒黃連姜炒各五錢若人能食好食但食後反飽難化此胃火旺脾陰虛也加白芍藥酒炒一兩半人參七錢石膏火煅一兩生甘草五錢黃連炒香附米炒木香各四錢若年高人脾虛血燥易飢易飽大便燥難加白芍藥當歸各一兩人參七錢升麻甘草炙各四錢山楂子大麥芽桃仁去皮尖各五錢此老人常服藥也
