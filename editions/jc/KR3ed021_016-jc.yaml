body:
  text: 卷之十六五疸五疸方論濕與熱鬱蒸於脾面目肢體為之發黃此即疸也疸之名有五發熱不渴身腫而汗汗如黃柏汁者曰黃汗此胃中蓄熱汗出浴水得之已食如飢但欲安臥小便如黃柏汁者曰黃疸此酒面炙爆蘊熱淤滯得之食則腹滿怫鬱眩暈心忪而不自安者曰谷疸此失飢大嚼遽飽沖脾得之其或飲酒常多進食常少醞熱入水大醉當風以致心中懊疼足脛腫滿是之謂酒疸大勞淫欲大熱交接衽席未幾遽就浴室以致發熱惡寒小腹滿急是之謂色疸五者雖不同其為黃則一自本自根未有非熱非濕而能致病者也濕也熱也又豈無輕重之別乎濕氣勝則如熏黃而晦熱氣勝則如橘黃而明蓋脾主肌肉土色尚黃濕熱內蒸或重或輕不容掩於外矣自其濕熱淤而傷血此又為血證發黃何以明之疸證之黃小便不利血證之黃則小便自利耳況夫脾受濕熱鬱而不行亦多有腹脹之候治法綱領大要疏導濕熱於大小便之中人徒見茵陳湯五苓散黃連丸三黃丸輩隨試輒效則目之以尋常不思單陽無陰病勢已極疸而不渴猶可用工疸而復渴其或腹膨全濟者鮮甚則寸口無脈鼻出冷氣與夫形如煙燻搖頭直視為心絕環口黧黑油汗發黃為脾絕此皆倉扁所望而驚者也孰謂黑疸之能有瘳乎脾與腎俱病為黑疸色疸一名女勞身黃額黑疸脈緩大順弦急而堅逆已食如飢胃熱消穀五疸證治姜蜜湯諸疸通用或小便出血或小便如血用之皆效蜜半盞姜錢十片新汲水一碗煎服逐日常進二服小便漸白而疸遂瘥桂枝黃耆湯治黃汗自出發熱身腫小便不利白芍藥一兩半辣桂甘草炙各一兩黃耆炙二兩黃芩半兩上銼散每服四錢水盞半姜五片棗三枚煎服覆取微汗未汗再服必效散黃疸通用葶藶子隔紙炒龍膽草山梔仁山茵陳黃芩等分上粗末每服三錢新水煎服一清飲疸證發熱諸熱通用柴胡三兩赤茯苓二兩桑白皮制川芎一兩甘草炙半兩上銼每服三錢薑棗煎服茵陳湯治濕熱淤而發黃小便秘澀頭汗而渴方見濕門五苓散疸證通用方見水飲門吞酒蒸黃連丸方在後治濕熱發疸或煎茵陳湯調下亦得山茵陳散治黃疸大小便秘澀梔子一兩茵陳一兩枳實制七枚赤茯苓葶藶甘草炙各一分上銼每服三錢姜三片煎服甘露飲見積熱門加山梔柴胡同煎吞黃連阿膠丸方見嗽門治鬱熱發疸小便秘澀柴胡甘草湯治熱疸柴胡一兩甘草一分銼細白茅根一握上件以水二碗煎七分時時服一日盡生髮方治疸生髮燒灰存性為末新汲水調方寸匕日三服紅丸子治谷疸腹滿眩暈怫鬱怔忪酒疸通用二陳湯加縮砂煎下並見瘧類辰砂妙香散治飲酒行事酒熱淤於心經致成黃疸茯苓茯神去木山藥炒遠志水浸去心酒炒黃耆炙各一兩人參甘草炙北梗各半兩木香辰砂別研各三錢麝香一錢重上細末每服二錢加辰砂少許用茵陳煎湯調下日三服酒蒸黃連丸治酒疸黃連去須淨四兩略碎以酒灑醃一宿曬乾為末粟米糊為丸桐子大每服三四十丸以二陳湯加乾葛茵陳入姜棗煎送下當歸白朮湯治酒疸發黃心下飲結妨滿茯苓一兩半當歸黃芩茵陳各半兩白朮枳殼制甘草炙杏仁去皮麩炒前胡乾葛各一兩半夏制三分上銼散每服三錢水盞半姜七片食前煎服凡酒疸熱疸大便秘者可三黃湯方見積熱門六物飲治酒疸肚脹蓽茇荊芥穗不蛀川楝子連皮核用生薑母軟烏梅甘草上件等分於石臼中搗細用磁器盛以自己滿腹小便去其首尾取中間小便浸藥兩重紗蓋露星一宿拂明飲其清汁續用車前子山茵陳竹園荽煎湯乘熱調五苓散服自覺黃水從小便出而肚不脹妙土瓜方治酒疸熱疸土瓜搗取汁恁服小菟絲子丸治色疸菟絲子五兩洗酒浸三宿研捏餅焙石蓮肉二兩白茯苓一兩山藥一兩留一半打糊上為末山藥糊丸桐子大每五十丸用芎藭湯多加茯苓煎湯下方見血類四君子湯加劑治色疸人參一兩白茯苓一兩白朮一兩甘草炙半兩加黃耆炙白芍藥白扁豆制各一兩上銼細每服三錢姜五片刺二枚煎服解熱方生車前草最治黃疸解諸熱淋研細井水調下又方車前子炒末之米飲調立止洞泄附諸賢論此事難知云色如重火黃乃濕病也一身盡痛色如橘子黃乃黃病也一身不痛干黃燥也小便自利四肢不沉重渴而引飲者梔子柏皮湯濕黃脾也小便不利四肢沉重似渴不欲飲者大茵陳湯若大便自利而黃者茵陳梔子黃連三物湯往來寒熱一身盡黃者小柴胡加山梔子湯略例云內感傷寒勞役形體飲食失節中州變寒之病生黃非傷壞之而得只用建中理中大建中足矣不必用茵陳也附諸方茵陳大黃湯治傷寒大熱發黃面目悉黃小便赤茵陳蒿梔子柴胡柏皮黃芩升麻大黃炒各一兩龍膽草半兩上為粗末每服五錢水煎服茵陳五苓散局方治傷寒或伏暑發黃小便不利煩渴方見濕門加減五苓散濟生方治飲食伏暑郁發為疸煩渴引飲小便不利茵陳赤茯苓去皮豬苓去皮白朮澤瀉各等分上㕮咀每服四錢水一盞姜五片煎八分溫服不拘時葛根湯濟生方治酒疸枳實去白梔子仁豆豉各一兩甘草炙半兩葛根二兩上㕮咀每服四錢水一盞煎八分溫服不拘時茯苓滲濕湯治黃疸寒熱嘔逆渴飲冷水身體面目俱黃小便不利白茯苓五分茵陳六分豬苓澤瀉黃連黃芩梔子漢防己白朮蒼朮陳皮青皮枳實麩炒各三分上㕮咀每服水二鍾煎至一鍾去滓食前溫服小溫中丸治疸又能去食積蒼朮川芎香附神麯針砂醋炒紅春加芎夏加苦參或黃連冬加吳茱萸或乾薑大溫中丸治食積與黃腫又可借為制肝燥脾之用脾虛者以參朮芍藥陳皮甘草作湯使陳皮蒼朮厚朴三稜莪朮青皮各五兩香附一斤甘草針砂醋炒紅各二兩上為末醋糊丸空心薑鹽湯下午後飲食可酒下忌大肉果菜搐藥瓜蒂散拔粹方治黃疸遍身如金色累效瓜蒂二錢母丁香一錢黍米四十九粒赤小豆五分上先將瓜蒂為末次入三味再碾至夜令病人先含水一口次將藥半字搐入鼻內待下或吐去水便睡至半夜或次日取下黃水直候利水止即服黃連散或茵陳五苓散病輕者五日病重者半月見效黃連散拔粹方治黃疸大小便秘澀臟腑壅熱黃連二兩川大黃好酒拌炒二兩黃芩去黑心炙甘草各一兩上為極細末每服二錢食後溫水調下日三服一方治黃腫及積滯浮腫皂礬半斤醋煮乾膠棗仁二斤煮去皮核平胃散四兩上用棗搗爛入礬丸如梧桐子大以平胃散為衣每服三五十丸臨臥以溫酒送下針砂丸治黃病助脾去濕用針砂不拘多少以水擂盡鏽淘洗白色為妙就用米醋於鐵銚內浸過一指深炒乾再炒三五次候銚內通紅方可取出又用陳粳米半升隔夜以水浸次日漉起於臼內搗為粉就作成塊如鴨蛋大入釜中煮如粉劑又以生熟相停再杵調黏為度卻入百草霜炒過一兩半針砂二兩半於粉內仍搗數百下為丸如梧桐子大每服五十丸用五加皮牛膝根木瓜浸酒吞下初服若泄瀉其病源去也腎疸湯東垣方治腎疸目黃甚至渾身黃小便赤遺方見秘澀門一方治遍身黃不浮腫手足怠倦針砂用水擂淨醋煮陳皮去白炒蒼朮米泔水淨焙乾青皮去白炒各四兩青礬炒令赤黑六兩飛羅面炒黃百草霜炒三稜煨莪朮煨各二兩上為末麵糊丸如梧桐子每服三十丸米湯溫酒任下綠礬丸治黃胖針砂二兩炒醋汁綠礬四兩薑汁煮五倍子神麯各半斤上為末大棗半斤取肉為丸此方神效但愈後宜忌食蕎麥母豬肉諸毒物若犯之即死余嘗見一人服此藥後二年下因食所犯忽無故而就死一方治黃胖用明亮綠礬一斤鍋內熔化次下多年黃陳米四升慢火煮炒約一時許煙盡為度攤於地上出火毒為末另用蒼朮一斤二兩米泔水浸一晝夜刮淨銼曬乾為末一斤和前藥以陳米醋為丸如梧桐子大每服七八十丸空心臨臥溫酒送下陳米湯亦可忌糯米面生冷一方用絲瓜全者燒灰為末病因面傷麵湯下因酒傷酒調下針灸法至陽一穴在第七椎下灸二七壯治渾身發黃谷疸酒疸黃汗心中痛女勞疸發熱脾俞二穴在十一椎下胃俞二穴在十二椎下膽俞在十椎下以上各開寸半百勞一穴在第一椎骨尖上中脘一穴三里二穴穴法見前諸淋諸淋方論諸淋所發皆腎虛而膀胱生熱也水火不交心腎氣鬱遂使陰陽乖舛清濁相干蓄在下焦故膀胱裡急膏血砂石從小便道出焉於是有欲出不出淋瀝不斷之狀甚者窒塞其間則令人悶絕矣大凡小腸有氣則小便脹小腸有血則小便澀小腸有熱則小便痛痛者為血淋不痛者為尿血敗精結者為砂精結散者為膏金石結者為石揣本揆原各從其類也執劑之法並用流行滯氣疏利小便清解邪熱其於調平心火又三者之綱領焉心清則小便自利心平則血不妄行最不可姑息用補氣得補而愈脹血得補而愈澀熱得補而愈盛水竇不行加之穀道閉遏未見其有能生者也雖然腎氣虛弱囊中受寒亦有挾冷而小便淋澀者其狀先寒戰而後溲便蓋冷氣與正氣交爭冷氣勝則寒戰而成淋正氣勝則寒戰解而得便溺也況又有胞系轉戾之不通者乎是不可以無辨胞轉證候臍下急痛小便不通凡強忍小便或尿急疾走或飽食忍尿飽食走馬忍尿入房使水氣上逆氣迫於胞故屈戾而不得舒張也胞落即殂諸淋證治硝石散治諸淋硝石白者為細末每服二錢血淋山梔仁煎湯調下熱淋小便赤而淋瀝臍下急痛新水調下或黃芩煎湯調下氣淋小腹脹滿尿後常有餘瀝木通煎湯下石淋莖內痛割尿不能出尿中有沙石令人悶絕此證將硝石用抄紙隔炒紙焦為度再研細蜀葵子三十粒打開煎湯調下二神散治諸淋急痛色黃海金砂七錢半滑石半兩上為細末每服二錢半多用燈心木通麥門冬草新水煎入蜜調下五淋散治諸淋赤茯苓赤芍藥山梔仁生甘草各三分當歸黃芩各二分上為細末每服二錢半水一盞煎至八分空腹服或以五苓散和之用竹園麥門冬草蔥頭燈心煎湯調下車前子散治諸淋小便痛不可忍車前子不炒半兩淡竹葉荊芥穗赤茯苓燈心各二錢半上件分作二劑多用新汲水煎恣意服荊芥通竅血餘散治諸血下見血類白茅花燈心各一握新汲水煎湯調下若血淋婦人發更好加海金沙佐之切不得用百草霜蓮蓬止澀之劑黃芩一物湯治血淋熱痛黃芩細銼新水煎通口服八正散治熱淋方見積熱門琥珀飲治尿血琥珀為細末每服二錢燈心一握腦荷少許煎湯調下增味導赤散血淋尿血通用生乾地黃洗曬木通黃芩生甘草車前子不炒山梔仁川芎赤芍藥以上等分上件為末每服三錢入竹葉十葉姜三片煎服車前草方治小腸有熱血淋急痛生車前草洗淨臼內搗細每服准一盞許井水調濾清汁食前服若沙石淋則以煅寒水石為末和之新水調下瞿麥湯血淋尿血通用爛滑石赤芍藥瞿麥穗車前子不炒赤茯苓石葦去毛桑白皮炒阿膠炒酥黃芩生乾地黃洗焙甘草炙白茅根以上並等分曬乾上為細末每服二錢入生髮燒灰一錢沸湯調下如無茅根止用茅花海金散治血淋沙淋小便澀痛黃爛浮石於草陰地為末每服二錢生甘草煎湯調下亦治小腸氣莖縮囊腫用木通燈心赤茯苓麥門冬煎湯調下五苓散治尿血方見水飲門內加辰砂少許用燈心一握新水煎湯調下茯苓調血湯治酒面過度房勞後小便下血半赤茯苓一兩赤芍藥川芎半夏曲各半兩前胡柴胡青皮枳殼北梗桑白皮炒白茅根燈心甘草炙各二錢半上銼細每服三錢姜五片蜜二匙新水煎服姜蜜湯治小便出血方見黃疸門加白茅根煎甘豆湯治血淋諸淋小便痛不可忍方見積熱門導赤丸治心腎氣鬱膀胱有熱小便淋痛及諸熱壅滯生乾地黃洗焙木通去節各二兩山梔仁三兩赤茯苓一兩半赤芍藥滑石各一兩大黃濕紙裹煨三兩半上為末煉蜜丸桐子大每服二十丸食後煎導赤散送下熟水亦得秋石丸治濁氣干清精散而成膏淋黃赤白黯如肥膏油蜜之狀白茯苓一兩桑螵蛸蜜炙鹿角膠搗碎炒黃焦末之秋石各半兩上末研和糕糊丸桐子大每服五十丸人參煎湯下滑石散治沙石淋痛割爛滑石爛石膏各半兩石葦去毛瞿麥穗木通去節蜀葵子各三錢上細末每服二錢半用蔥頭二片燈心一握新水一大盞蜜二匙煎湯調下硼砂散治沙石淋急痛硼砂細研琥珀赤茯苓蜀葵子陳橘皮不去白等分上末每服二錢半用蔥頭二片去心麥門冬二十一粒蜜二匙新水煎取清汁調下或綠豆水浸和皮研清汁調下木香湯治冷氣凝滯小便淋澀作痛身體冷清木香木通檳榔舶上茴香焙當歸赤芍藥青皮去白澤瀉辣桂橘紅甘草炙上銼散每服三錢姜五片煎服沙石淋方黑豆一百二十粒粉草一寸生銼上以新水煎乘熱入滑石末一錢調和空腹服附諸方琥珀散宣明方治五淋沙石淋滑石琥珀各一兩木通當歸木香鬱金萹竹各半兩上為末每服五錢以蘆葦葉煎湯空心調服如無蘆葦葉以竹葉煎湯送下參苓琥珀湯治淋莖中痛不可忍相引脅下痛人參五分茯苓四分川楝子炒一錢琥珀三分生甘草一錢玄胡索七分澤瀉柴胡當歸梢加青皮黃柏各三分上作一服水一鍾半煎至七分空心溫服石葦散治婦人小便卒淋澀石葦黃芩木通榆柏皮瞿子瞿麥穗甘草各等分上㕮咀每服八錢水一鍾半姜三片煎至八分去滓食前服五淋散治膀胱有熱水道不通淋瀝不宣臍腹急痛或尿如豆汁便如沙石淋膏尿血並宜服山茵陳二兩去梗淡竹葉四兩木通去節滑石甘草炙各六兩山梔仁炒十四兩赤茯苓去皮赤芍藥各半斤上㕮咀每服三錢水一鍾煎服一方加當歸除木通滑石地膚子散濟生方治諸病後體虛觸熱熱結下焦遂成淋病小便赤澀數起少出豬苓地膚子知母黃芩海藻通草瞿麥枳實炒升麻葵子上㕮咀每半兩水煎入姜丹溪方治氣虛而淋者八物湯加黃耆虎杖甘草煎湯服諸藥中可加牛膝老人虛寒者八味丸或六味地黃丸為要藥清心連子飲和劑方治上盛下虛心火炎上口苦咽乾煩渴微熱小便赤澀或欲成淋並皆治之方見漏濁門八味丸六味地黃丸並見虛勞門針灸法陰谷二穴在膝內轉骨後大筋下小筋上按之有動脈是穴灸二七壯治小便淋閉作痛陰囊腫癢三陰交二穴在踝上三寸按之有動脈是穴治小便淋閉不通七般疝氣
