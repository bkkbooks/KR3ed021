body:
  text: 卷之二十一耳耳論耳屬足少陰之經腎家之寄竅於耳也腎通乎耳所主者精精氣調和腎氣充足則耳聞而聰若勞傷氣血風邪襲虛使精脫腎憊則耳轉而聾又有氣厥而聾者有扶風而聾者有勞損而聾者蓋十二經脈上絡於耳其陰陽諸經適有交併則臟氣逆而為厥厥氣搏入於耳是為厥聾必有時乎眩暈之證耳者宗脈之所附脈虛而風邪乘之風入於耳之脈使經氣痞而不宣是為風聾必有時乎頭痛之證勞役傷於氣血淫欲耗其精元瘦悴力疲昏昏聵聵是為勞聾有能將適得所血氣和平則其聾暫輕其或日就勞傷風邪停滯則為久聾之證矣外此又有耳觸風邪與氣相擊其聲嘈嘈眼或見光謂之虛鳴熱氣乘虛隨脈入耳聚熱不散膿汁出焉謂之膿耳入耳間有津液輕則不能為害若風熱搏之津液結𩊅成核塞耳亦令暴聾謂之耵耳前是數者腎脈可推風則浮而盛熱則洪而實虛則澀而濡風為之疏散熱為之清利虛為之調養邪氣屏退然後以通耳調氣安腎之劑主之於此得耳中三昧耳病證治治厥聾方和劑流氣飲加石菖蒲每服三錢以生薑蔥白同煎食後服沉香降氣湯方見脹滿門或降氣湯方見腳氣門不換金正氣散方見寒門指迷七氣湯方見氣門通用輕者吞來復丹方見暑門重者吞養正丹方見痼冷門凡治耳聾皆當調氣桂星散治風虛耳聾辣桂川芎當歸細辛淨石菖蒲白蒺藜炒杵去刺木通木香麻黃去節甘草天南星煨裂白芷梢各四錢上件銼碎每服三錢水盞半蔥白二片紫蘇五葉姜五片食後煎服晚少食臨臥加些全蠍服排風湯亦可用方見風類加味宣風散通利腎臟風氣雞心檳榔三個橘皮桃仁浸去皮焙白芷枳殼制各半兩牽牛二兩重半炒半生上為末每服二錢蜜湯調下食前服地黃丸治勞損耳聾大熟地黃洗焙當歸川芎辣桂菟絲子酒浸三日曬乾搗末大川椒出汗故紙炒白蒺藜炒杵去刺葫蘆巴炒杜仲薑製炒去絲白芷石菖蒲各一分磁石火燒醋淬七次研細水飛一分半上為細末煉蜜為丸如桐子大每服五十丸以蔥白溫酒空心吞下晚飯前又服益腎散治腎虛耳聾磁石制度如前巴戟大川椒開口者各一兩沉香石菖蒲各半兩上為細末每服二錢用豬腎一隻細切和以蔥白少鹽並藥濕紙十重裹煨令香熟空心嚼以酒送下芎芷散治風入耳虛鳴白芷石菖蒲炒蒼朮陳皮細辛厚朴制半夏制辣桂木通紫蘇莖葉甘草灸各一分川芎二分上銼散每三錢姜五片蔥白二片水煎食後臨臥服耳鳴方草烏頭燒帶生石菖蒲上等分為末用綿裹塞耳一日三度耳鳴暴聾方川椒石菖蒲舊松脂各一分巴豆肉五分上為細末熔蠟丸如棗核大塞入耳蔓荊子散治內熱耳出膿汁川升麻木通赤芍藥桑白皮炒麥門冬去心生地黃前胡甘菊赤茯苓蔓荊子甘草灸等分上件銼散每服三錢薑棗煎食後臨臥服耳熱出汁方硝石爛石膏天花粉防風以上各一錢腦少許上件為末摻耳立止膿耳方真龍骨白礬煅赤小豆黃虢丹煅烏賊骨各一分胭脂半分上為細末摻耳又方爛石膏於新瓦上煅出火毒明礬煅黃虢丹煅真蚌粉真龍骨各等分麝少許上為細末用綿纏竹籤拭耳換綿蘸藥入耳耵耳方生豬脂生地龍釜下墨等分上件細研以蔥汁和捏如棗核薄綿包入耳令潤即挑出耳聾方明硫黃雄黃各研細遠志去心皂角肉等分上為細末蔥白搗黏入麝少許綿包入耳又方蓖麻子肉巴豆去膜油杏仁去皮滴乳香松脂各另研等分青鹽半分上件細研熔蠟丸如棗核大入耳又方以生鼠取膽汁盡入耳又以生鼠取腦髓綿包入耳生鯉魚腦通用雞峰方菖蒲一寸巴豆一個去心膜麝少許上為末合研作七丸綿包入耳日一丸久聾方蓖麻子二個一個去油用遠志去心乳香磁石燒如前各二錢皂角煨取肉半挺生地龍中者一條全蠍二個焙上為細末入蠟搗丸柱入耳耳痛方白鹽炒熱重帛包熨又方杏仁炒焦研細帛包塞蟲入耳方桃葉挼細塞其耳自出或以藍青研汁滴入耳又以川椒為末法醋浸一宿滴耳蟻入耳方豬脂一指許炙令香置耳孔邊其蟻自出蜈蚣入耳方用生薑取汁灌放耳中少時自出或以桑皮搗汁灌入耳即自出耳聾方用大蒜一瓣從一頭開孔以巴豆肉一粒慢火煨極熱入蒜孔中以新綿包塞耳逐日換又方用猛熁石半錢捶碎生研細入聾耳孔別用針砂末入不聾耳孔自然通透然後傾出大治耳聾通神散全蠍一枚土狗二枚中地龍二條雄黃明礬半生半煅各半錢麝一字上研細蔥白引藥入耳閉氣面壁坐一時三日一次膿耳方明白礬煅黃虢丹煅龍骨胭脂等分為末麝少許上件研為細末用綿杖纏干換綿杖蘸藥入耳入麝香輕粉各少許摻入耳又方蠍梢七個去毒焙胭脂半錢乳香麝香各少許上研為細末以斡子挑入耳耳鳴方論腎者宗脈所聚耳為之竅血氣不足宗脈乃虛風邪乘虛隨脈入耳氣與之搏故為耳鳴先用生料五苓散加制枳殼橘皮紫蘇生薑同煎吞青木香丸方並見水飲門散邪疏風下氣續芎歸飲和養川芎當歸華陰細辛各半兩辣桂石菖蒲白芷各三錢上銼細每服三錢入紫蘇薑棗煎服如虛冷甚者酌量加生附子附諸方犀角飲子濟生方治風熱上壅兩耳聾閉內外腫痛膿水流出犀角鎊菖蒲木通玄參赤芍藥赤小豆炒各一兩甘菊花去梗一兩甘草灸半兩上㕮咀每服四錢水一盞半生薑五片煎七分溫服清神散治風氣壅上頭目不清耳常重聽殭蠶炒去絲嘴干菊花各一兩荊芥穗羌活木通川芎防風各五錢木香一錢石菖蒲甘草各三錢上為末每服三錢食後臨臥茶清調下復聰湯姚方伯傳治痰火上攻耳聾耳鳴半夏制陳皮去白白茯苓去皮甘草炙瞿麥萹蓄木通黃柏去粗皮炒褐色各一錢上用水二茶鍾生薑三片煎至一茶鍾空心臨臥各一服涼膈散治風熱上攻耳聾方見積熱門通聖散治風熱上攻耳聾方見風門滾痰丸治熱痰濕痰耳聾方見痰門神芎散治濕熱濕痰耳聾檳榔丸治濕熱濕痰耳聾方見積聚門龍薈丸治肝火上升耳聾方見脅痛門一方治耳聾久不聞磁石一塊如豆大穿山甲燒存性為末一字上用新綿子裹塞於患耳內口中含些生鐵覺耳內如風聲即愈一方治耳作膿者用甘遂一塊如棗核大以綿裹塞耳中以甘草含口中漸漸嚼下一方治凍耳用橄欖核燒灰清油調敷雀腦亦可鼻鼻論肺為氣之主通竅於鼻鼻者清氣出入之道路也陰陽升降氣血和平則一呼一吸營衛行焉其或七情內蠹六氣外傷則清濁不分泥丸汩亂諸證迭起矣夫血之與氣相隨而行若臟腑生熱乘於血氣故熱氣迫血妄行自鼻孔出謂之鼻衄熱則津液中干冷則髓涕流注若風冷隨氣乘於鼻腦則津液交涕不能自收謂之流涕肺為風寒所傷津液冷滯鼻氣不宣香臭不聞於是壅作鼻齆冷氣停聚血脈陰凝歲月淹延轉加壅結於是變生息肉或風邪入鼻搏於正氣邪正相擊鼻道不通則為鼻痛或氣血壅滯上焦生熱邪熱之氣留伏不散則為鼻瘡疊是數證七情六氣皆當究其感受之原用藥有序痊愈可期執方無權迄未有所濟也外此更有濕䘌一證鼻爛汁臭下部生瘡詳於後篇疳論見之鼻病證治生地黃湯治上熱衄血生地黃洗淨二兩阿膠炒酥一兩川芎北梗蒲黃甘草生各半兩上銼碎每服三錢水煎熟入生薑汁二匙溫服麥門冬散治鼻衄生地黃生麥門冬三錢生薑一錢白藥蒲黃各二錢白蜜一合上搗細以井水二大碗煎七分二服川芎三黃散治實熱衄血大黃濕紙裹蒸川芎黃連淨黃芩等分上為末每服二錢井水調服食後敗毒散方見寒類吞雞蘇丸治肺熱胸中鬱熱衄血兼治血淋吐血口臭雞蘇即腦荷半斤真蒲黃一兩焙麥門冬浸去心曬二兩阿膠一兩炒甘草七錢半焙人參黃耆各半兩木通柴胡各一兩生地黃末三兩上研為細末用冬蜜一斤熬一二沸即入地黃末頻攪得所次將余藥和丸如桐子大每服三十丸食後下蘇子降氣湯治虛壅鼻血方見腳氣門衄血方川鬱金末井水調下亦治吐血又茅花煎湯通口服又方血餘散方見血類曾服燒煉藥致鼻血者山梔煎湯解之仍燒山梔存性為末入鼻又方烏賊骨槐花等末入鼻又方槐花半生半炒末入鼻又方成片人中白燒去穢為末入麝少許入鼻或加油發灰又方蘿蔔汁或藕汁滴入鼻又方大蒜煨香取三瓣研敷腳底鼻中有蒜氣即去之川椒散治流涕大紅開口川椒微炒蓋出汗訶子煨取肉川白姜生者辣桂川芎細辛淨白朮等分上件為末每服二錢溫酒調下南星飲治風邪入腦宿冷不消鼻內結硬物窒塞腦氣不宣遂流髓涕上等大白南星切成片用沸湯蕩兩次焙乾每服二錢用棗七個甘草少許同煎食後服三四服後其硬物自出腦氣流轉髓涕自收仍以大蒜蓽茇末杵作餅用紗襯炙熱貼囪前熨斗火熨透或香附蓽茇末入鼻芎藭散治鼻塞為齆芎藭檳榔麻黃去節肉桂防己木通細辛白芷石菖蒲各一分木香川椒甘草焙各半分上銼每三錢生薑紫蘇煎服通頂散治鼻齆瓜蒂藜蘆各一分皂角肉半分麝少許上為末吹些入鼻鼻齆雄黃丸雄黃半錢瓜蒂二個綠礬一錢麝少許上為細末搐些入鼻亦治息肉又方瓜蒂明礬華陰細辛各一錢雄黃半錢上為末以雄犬膽汁和丸綿包塞鼻千金息肉方瓜蒂華陰細辛等分上末綿包少許塞鼻又息肉方甘遂明礬煅硃砂雄黃雌黃藜蘆瓜蒂等分上為末清蜜調敷前齆二藥通用人參順氣散方見風類藿香正氣散方見嘔吐類皆治鼻痛又方杏仁水浸去皮焙細辛白芷各一錢全蠍兩個焙上為末麻油調敷甘露飲方見積熱門黃連阿膠丸方見嗽門共治鼻瘡又方用杏仁研乳汁敷之或以烏牛耳垢敷或黃柏苦參檳榔等為末以豬脂研敷或青黛槐花杏仁研敷酒渣鼻並鼻上贅肉麵粉刺雀斑方黃虢丹二錢半硇砂半錢巴豆肉十個紙壓去油餅藥一盞半上件同入罐子中以慢火熬三四沸取下續入研細石灰三錢和畢酒渣鵝毛蘸掃紅處日一次粉刺雀斑小竹杖挑藥點才見微腫便洗去鼻上贅肉敷之半月取出膿血自成痂落矣又酒渣鼻面上肺風瘡方白龍丸末逐日洗面如澡豆法更罨少時方以湯洗去食後常服龍虎丹一貼並見和劑方半月瑩潔酒渣鼻方白鹽常擦妙鼻血方發灰入鼻磨好墨入點法醋井水調下附諸方茜根散治鼻衄不止茜根阿膠蛤粉炒黃芩側柏葉生芐各一兩甘草半兩上以水煎服加姜三片黃芩芍藥湯治鼻衄不止黃芩芍藥甘草上以水煎服或犀角地黃湯如無犀角以升麻代之一方治鼻血不止用頭髮燒灰以竹管吹入鼻中即止或以酒調亦可禦寒湯治寒邪傷於皮毛令人鼻塞咳嗽上喘黃柏二分黃耆一兩人參五分炙甘草款冬花各三分羌活黃連各二分白芷防風各三分陳皮五分佛耳草三分升麻半錢蒼朮七分上㕮咀如麻豆大都作一服水二大盞煎至一盞去滓稍熱服菖蒲散御藥院方治鼻內窒塞不通不得喘息菖蒲皂角等分上為末每用一錢綿裹塞鼻中仰臥片時增損防風通聖散治鼻塞不利肺氣不清鼠黏子桔梗桑白皮紫菀荊芥穗各三分甘草生二兩上㕮咀每服八錢水一鍾半姜五片煎八分食後溫服羌活散治腦有鬱熱遇寒鼻塞方見傷風門蒼耳散三因方治鼻流濁涕不止名曰鼻淵辛荑仁半兩蒼耳子炒二錢半香白芷一兩薄荷葉五分上為末每服二錢蔥茶清食後調下辛荑散濟生方治肺虛為四氣所幹鼻壅塞涕出不已或氣息不通或不聞香臭川芎木通去節防風去蘆羌活甘草辛荑細辛洗去土藁本升麻香白芷各等分上為末每服三錢茶清調下防風湯治鼻淵腦熱滲下濁涕不止久而不已必衄血防風二兩半黃芩人參甘草灸川芎麥門冬去心各一兩上為末每服二錢沸湯調食後服丹溪方治鼻中息肉胃中有食積熱痰流注治本當消食積蝴蝶礬二錢細辛一錢白芷半錢上為末納鼻中治鼻淵方南星半夏蒼朮白芷神麯酒芩辛荑荊芥各等分上為末水調食後服白黃散簡易方治鼻齆息肉鼻痔等證雄黃白礬細辛瓜子各等分上為末搐入鼻中辛荑膏御藥院方治鼻生息肉窒塞不通有時疼痛辛荑葉二兩細辛木香木通白芷杏仁湯泡去皮尖研各五錢用上用羊髓豬脂二兩和藥於石器內慢火熬成膏取赤黃色放冷入龍腦麝香一錢為丸綿裹塞鼻中數日肉脫即愈又方治鼻中息肉蝴蝶礬二錢細辛一錢白芷五分上為末納鼻中唇舌唇舌論心之所司者舌脾之所司者唇口是雖各有所司存然心之氣未嘗不通於脾脾之氣未嘗不通於心也夫舌者心之官嘗五味之秀以榮養一身資脾胃之臟以分布水穀故心之本脈繫於舌根脾之絡脈繫於舌旁或風寒暑濕之所中傷則舌縮卷不能言或憂怒思恐之所鬱閉則舌腫滿而不得息心熱則破裂生瘡脾閉則白苔如雪舌之為病合心脾而主治之故曰心之氣未嘗不通於脾者此也口者一身吐納之都門百物榮養之要道節宣少舛病必生焉故熱則苦寒則咸宿食則酸煩躁則澀虛則淡疸則甘臟氣偏勝則其味必偏應於口咸酸甘苦非舌味之而誰歟若夫上池津液出於舌端心實主之也津液流布非胃而何故曰脾之氣未嘗不通於心者此也或問口臭一證可得聞乎曰臟腑異氣燥腐不同是氣蘊積胸膈之間挾熱而沖發於口人將掩鼻而過之信夫醫不難於處方惟難於識證受病源流懵不及究律以古方嘗試一中不幾費人乎此辨之不可不早唇舌證治升麻散治心脾有熱口舌破裂生瘡川升麻玄參川芎生地黃洗曬麥門冬去心各半兩大黃黃連淨黃芩甘草焙各三錢上件銼碎每服三錢薑棗煎食後服龍石散治口舌生瘡喉間腫痛寒水石燒紅半斤硃砂六錢腦半錢上為細末日三五次摻五福化毒丹治唇舌腫破生瘡煩渴玄參洗焙北梗各三錢茯芩二兩半人參半兩馬牙硝枯青黛各一兩甘草七錢半焙麝一字金銀箔用四十片為衣上為細末煉蜜為丸如皂子大以腦荷泡湯候冷調下如口臭以生地黃汁調下生地黃膏治口舌瘡腫生地黃藍青葉各等分上入蜜杵細每服半兩井水煎食後服萍草丸治口舌瘡浮萍草曬黃柏並末杏仁青黛等分輕粉少許上煉蜜研丸皂子大以綿裹含有涎吐之洗心散治心熱四順清涼飲治脾熱甘露飲治血熱牛黃涼膈丸治唇焦口瘡咽痛並見積熱門舌出血槐花曬為末敷舌上或真蒲黃生敷黃連阿膠丸治心熱口瘡方見嗽門可擇用硼砂丸治口臭口乾口舌瘡寒水石燒紅十兩硼砂二兩腦麝各二錢馬牙硝枯四錢甘草浸汁熬膏二兩上為細末甘草膏搜丸麻子大含咽雞蘇丸治胸中鬱熱口臭煩渴方見鼻門舌腫大方真蒲黃摻敷又方硼砂末姜錢蘸擦舌腫強方蛇皮燒存性全蠍上為末少許摻敷治舌瘡腫方大山豆根銼細含咽或末摻敷口瘡方正黃連厚黃柏雞心檳榔上等分為細末敷之即可又方黃柏四錢青黛二錢銅綠一錢上件為末敷之又方黃連升麻上二件為末以薄綿包含咽蘆苓末敷又口吻邊瘡白爛檳榔燒存性和少輕粉研敷唇舌焦燥口破生瘡者蓋心脾受熱所致也以水浸黃連重湯烑而飲之或用黃連阿膠丸以粳米飲吞下此為要藥至於大渴而不能御合少與竹葉湯執劑之法無以逾此然此特隨機應變而已就根本論之則水火相濟蠟苓丸方見消渴門附諸方立效散端效方治唇緊瘡疼痛訶子肉五倍子上為末干貼唇上立效赴筵散端效方治赤白口瘡黃柏青黛密陀僧上為末干貼瘡桃花散治口舌生瘡玄胡索一兩黃柏黃連各半兩密陀僧一錢青黛二錢上為末敷貼口內有津即吐升麻散濟生方治上膈壅毒口舌生瘡咽喉腫痛升麻赤芍藥人參桔梗乾葛各一兩甘草生用五錢上㕮咀每服四錢水一鍾半姜五片煎八分溫服增損如聖散治上焦熱壅口舌生瘡桔梗二兩甘草灸一兩半防風半兩枳殼制二錢半黃芩上為末每服三錢水煎食後服一方治舌腫用百草霜為末以好醋調敷立效一方治口唇生瘡赤爛青黛枯礬檳榔末各等分冰片少許上共為細末摻患處瀉黃飲子濟生方治風熱蘊於脾經唇燥拆裂生瘡白芷升麻枳殼去白炒黃芩防風去蘆半夏湯洗石斛各一兩甘草炙半兩上㕮咀每服四錢水一盞姜五片煎七分溫服咽喉咽喉論咽者胃之系喉者肺氣之所通咽以咽物喉以候氣理一而分殊也自其風邪客於喉間氣鬱而熱則壅遏而為咽疼自其熱氣生於肺胃風毒蘊隆則腫結而為喉痹屍咽者陰陽不和脾肺壅盛風熱毒氣不能宣通故令屍蟲發動上蝕於喉或癢或疼如慝之候也谷賊者谷芒強澀藏於米而誤食之滯於咽門不能傳化故風熱並聚與血氣搏遂令腫刺如喉嗌之生谷賊也胃脘實熱熏炙上焦發為白頭赤根固有咽瘡之證臟腑停寒寒則氣縮如物窒礙於其間亦有喉閉之證至若懸癰生於上齶雖不關於咽喉所以暴腫者抑亦熱氣使然也咽喉懸癰關要所繫病不急療皆能殺人然則療之將何如曰熱則通之寒則溫之不熱不寒依經調之寒熱和平病不生矣咽喉證治膽礬散治酒面熱盛咽喉腫結閉塞鴨嘴膽礬半錢全蠍二個上為末以雞羽蘸藥入喉中須臾破開聲出次用生青荷研細井水調下喉吐出毒涎即愈未吐再服山豆根丸治積熱咽喉閉塞腫痛山豆根一兩北大黃川升麻朴硝生各半兩上為末煉蜜丸如皂子大每一粒以薄綿包少痛便含咽液青解毒丸治熱毒上攻咽喉腫痛寒水石石膏各四兩研青黛二兩上為細末拌和青黛水浸蒸餅研糊丸龍眼大每一丸食後以井花水化下吹喉散治咽喉熱腫口舌生瘡盆硝四兩青黛七錢半真蒲黃半兩上以生荷汁半斤和三件入瓷銚慢火熬干研細每半錢筒吹入口內絳雪散治咽喉熱痛腫塞寒水石半兩煅紅硼砂牙硝硃砂各研一錢腦半錢上為末每一字摻入口咽津玉屑無憂散治咽喉熱閉腫痛舌瘡物鯁貫眾縮砂仁荊芥穗白茯芩玄參黃連淨山豆根滑石研甘草生各半兩寒水石一兩硼砂一錢研細上為細末每一錢乾摻舌上漸以新水嚥下牛黃涼膈丸治咽喉唇舌熱腫生瘡方見積熱門如聖湯治咽喉腫痛北梗去蘆甘草焙加荊芥穗上件等分為粗末每服二錢用井水煎臨臥服殭蠶丸治喉風白殭蠶炒明白礬生上件為末以白梅肉和丸如皂子大每一丸薄綿包入喉少頃涎水出即愈遠志散治喉閉遠志去心取肉上為細末以管子擀開口吹藥入喉策令頭低涎出而愈白藥散治喉中熱塞腫痛散血消痰白藥朴硝上為末以小管吹入喉谷賊方木鱉子仁川大黃焙牙硝射干山豆根川升麻白藥上件等分為末煉蜜丸如皂子大以薄綿包含咽液又方硼砂牙硝上件等分細研每服半錢以薄綿裹含咽口瘡赤爛方清蜜浸黃柏一宿取汁含咽和劑七氣湯加北梗甘草指迷七氣湯治冷證氣縮喉閉方見氣類半夏桂甘湯治冷證無陽咽痛喉閉辣桂甘草焙半夏制上件等分銼碎每服三錢水一大盞煎半候冷少呷咽閉方膽礬細研以管子挑少許吹入喉中即破續以白梅煎湯調炒殭蠶末以去其風如無膽礬只透明綠礬代之亦得又方明白礬末一大錢匕用川巴豆肉一粒入礬中以火熬干取礬為末極細每一字以小管挑吹入喉涎出自愈又喉風喉痹方蛇皮略洗過曬乾剪作細屑白梅肉上件研和為丸含化屢效解毒雄黃丸治纏喉風急喉閉方見積熱門每服七丸研細以熱水研白梅肉調下或熱茶清下熱則通之用此玉鑰匙治風熱喉痹焰硝三分硼砂一分直殭蠶炒半分腦少許上為末每半錢以竹管吹入喉又熱閉方川升麻半兩上銼井水濃煎服少頃吐出毒氣又方山豆根射干升麻上井水頻煎服喉風喉痹方蠶蛻紙燒存性為末煉蜜丸皂子大含咽又方綠礬研細米醋調咽一邊痛側臥含咽又方皂角肉半挺銼細以米醋一大盞煎至七分濾清咽通關散白礬枯直殭蠶炒南星生藜蘆各一錢全蠍焙二個上為末以小管挑一字吹入鼻中吐痰喉通又方治喉痹欲絕雄黃二錢明礬生藜蘆各一錢蠍梢七枚豬牙皂七錢上為細末每服一字吹入鼻吐痰效懸癰腫痛方玄參半兩升麻射干大黃各一分甘草一錢上為末每三錢以井水煎時時含咽又方明礬燒灰存性和鹽花研細箸頭點敷患處谷賊方芝麻炒為末以湯點服喉癰閉方白明礬煅牙硝各一錢胭脂半錢上研細爛烏梅肉丸旋含咽又方治痰熱閉喉以蘿蔔汁和皂角漿吐之又喉閉方牙硝胭脂鹽梅屑上件同研以雞羽送入又喉痛方以山豆根常常含咽汁附諸方甘桔湯活人方治少陰喉痛桔梗甘草各等分上㕮咀每服五錢水一鍾半又方治喉痹並時行疼痛桔梗甘草升麻連翹防風牛蒡子杵研黃芩酒炒各一錢上㕮咀作一服水二盞煎八分食後細細飲服噙化三黃丸秘方治咽喉痛大效山豆根一兩硼砂二錢龍腦少許麝香少許上為末用青魚膽為丸如綠豆大每服三五丸噙化津嚥下一方治咽喉腫痛山豆根射干花根上同陰乾為末吹入喉中如神三黃丸大成治丈夫婦人三焦積熱咽喉腫悶心膈躁煩小便赤澀大便秘結並宜治之方見火門涼膈散大成治大人小兒臟腑積熱口舌生瘡痰實不利咽喉煩躁多渴腸胃秘澀小便不利一切風熱並宜治之方見積熱門吹喉散治咽喉腫痛急慢喉痹懸癰乳蛾咽物不下訶子一兩醋浸一宿去核曬乾黃芩酒浸一宿曬乾膽礬一錢明礬一錢半牛蒡子甘草生薄荷各五錢一方有百藥煎上為末先用好生薑擦舌上每用藥一錢蘆管吹入喉中吐出涎痰便用熱茶吃下再吹第二次便用熱粥三次再吹用熱茶或熱粥亦熱食之加朴硝末少許如口舌生瘡用藥吹入口中利去痰涎為妙針灸法一穴在大指甲後第一節灸三小壯治累年喉痹舉發男灸左女灸右少商二穴在大指內側去爪甲角韭菜許針出血愈合谷二穴在虎口針五分治喉閉立愈齒齒論齒者骨之所終髓之所養腎實主之經云腎衰則齒豁精固則齒堅誠哉是言也或曰手陽明之支脈入齒手陽明者大腸經也於齒夫何預不思大腸傳送氣道行焉壅則齒浮虛則宣露挾風則上攻頭面疳䘌則變成齲脫不相為而實相關也夫齒之為痛者五一曰風熱二曰風冷三曰毒痰四曰惡血五曰蟲蝕風氣襲虛客於齒間乘於血氣故令齦腫熱氣加之膿汁遺臭此風熱之為齒痛一也血氣不足骨髓乃虛風冷湊入停於齒根不腫不蛀日漸動搖此風冷之為齒痛二也熱則生痰毒氣上攻灌注經絡最能發痛外證壅盛咳唾交沖此毒痰之為齒痛三也頭面有風挾熱攻齦熱搏於血故令血出淤滯不消掣痛鑽刺此惡血之為齒痛四也凡人飲食甘肥不能潔齒腐臭之氣淹漬日久齒根有孔蟲在其間蝕一齒盡又度其餘至如疳䘌皆其種類必蟲殺而後痛止此非五曰蟲蝕之證乎前是數者痛有自來治各隨證條例於後雖然百物養生莫失口齒不漱不洗損蠹之媒是不惟患生宿腐而暑毒酒毒常伏於口齒之間莫若時時洗漱之為愈也臨睡洗畢至於晨興灌漱一口吐出掌中就掌滌眼自覺光明終身行之真可為終身受用齒病證治荊芥湯治風熱齒痛荊芥腦荷升麻細辛上件等分為末每服二錢以沸湯點漱口含咽並用擦牙消風散方見頭風門治齒熱痛齦腫有汁先敷消風散又以朴硝敷其上又法川升麻煎湯漱咽解毒溫風散治風冷齒痛當歸川芎細辛白芷蓽茇藁本蜂房炒等分上銼每二錢井水煎服仍含漱安腎丸方見水腫門八味丸方見痼冷門治冷證齒痛香椒散治冷證齒痛香附紅川椒炒故紙炒各二錢蓽茇一錢上為末和炒鹽二錢擦敷開笑散治風冷齒痛白芷細辛淨良薑蓽茇川椒香附蜂房炒上件等分為末擦牙搐鼻皂莢散治風齒動搖長肥皂莢二錢白鹽半兩上二件同燒赤研細常擦二陳湯方見瘧類加細辛枳殼用薑棗烏梅煎治毒痰齒痛仍以片子薑黃蓽茇等分井水煎候溫以舌浸其中涎自流出甘露飲治毒血齒痛方見積熱門加升麻煎荊槐散治牙宣出血或痛槐花荊芥穗上等分為末擦牙仍煎點服鬱金散治齒出血鬱金白芷細辛上件等分為末擦牙仍以竹葉竹皮濃煎入鹽少許含咽或炒鹽敷靈脂醋治惡血齒痛川五靈脂以米醋煎汁含咽鶴蝨丸治蟲蝕齒痛豬牙皂角三錢川椒一錢半生明礬鶴蝨各一錢上為末蒸飯搜丸如麻子大納於孔中有痰吐之椒鹽散治齒蟲痛川椒白鹽蜂房炒上件銼細等分每服二錢以井水蔥白煎熱含冷吐蟲蛀牙痛方川巴豆肉三枚明乳香一錢上同研溶蠟丸麻子大每服一丸塞孔又蟲痛方紅川椒末一錢大巴豆肉一粒上件研細蒸飯丸如麻子大以薄綿包塞孔明礬煅二錢滴乳香一錢上為細末飯丸塞孔又方蜘蛛殼一個揉軟以薄綿包塞痰吐之又方米醋煮川椒入蜂房蘸軟捻塞又方蠶紙燒存性擦少時鹽湯漱口又方雄黃末入麝研敷痛處又方直殭蠶蜂房炒二件各等分樟腦半之上為末皂角肉挼濃漿煮少頃和作小丸塞痛孔齒痛通用方蓽茇生地黃當歸鬚荊芥穗白芷桑白皮炒蜂房炒赤芍藥薑黃細辛蒿藁本赤甘草生等分上為粗末每服三錢井水煎頻漱齒歸荊散齒痛通用當歸荊芥穗川升麻川鬱金細辛白芷蓽茇等分上為末每服半錢揩痛處良久鹽湯灌漱齊峰川椒散齒痛通用紅川椒四錢樟腦赤小豆縮砂仁各二錢明礬煅一錢上為末少許塞敷咽不妨齒痛惟藉川椒麻痹又方蜂房三錢炒全蠍二個焙上為末敷亦治風疼又通用方絲瓜乾燒存性為末擦敷又方蜂房炒明礬煅黃虢丹等分上為末飯為小丸塞齒麝香散治疳䘌齦爛口臭白礬煅青黛胡黃連蘆薈各一分蝦蟆炙焦半分麝一字上為末每服半錢敷患處又牙疳臭方以蜘蛛殼為末用胭脂麝敷之或用大蜘蛛一枚以濕紙裹又用荷葉外包煨令焦存性為末入少麝研敷又蠶蛻紙燒入麝亦治牙疳香附末可為齒藥牙癰方硃砂雄黃磁石石膽礬石即銀星石上件等分入瓷合鹽泥塗燒兩日夜覆地出火毒兩日細末雞羽蘸敷瘡惡肉朽骨損牙俱出而愈此周官五毒攻瘍正方諸惡肉朽骨瘡毒通用牙蛀痛方蠶紙燒存性直殭蠶炒等分上為末擦敷良久鹽湯漱口又方鶴蝨為細末擦良久鹽湯漱口又牙宣出血方明白礬煅二錢乳香半錢少麝上件同研細輕手擦良久鹽湯灌漱治齒痛方以井水洗口頻換且含且漱或百藥煎泡湯微冷含咽或縮砂嚼敷齒痛通用附諸方羌活散治客寒犯腦風寒濕腦痛項筋急牙齒動搖肉斷袒脫疼痛苦楚麻黃去節根三兩羌活一錢半防風三分半藁本三分細辛少許升麻五分柴胡半兩當歸身六分蒼朮五分白芷桂枝三分骨灰即羊脛骨灰也二錢草豆蔻二錢上為細末先用溫水漱口淨擦之其痛立止草豆蔻散治寒多熱少牙疼痛草豆蔻一錢二分不去皮黃連一錢半升麻二錢半細辛葉防風各二分骨灰熟地黃各五分當歸六分上為細末擦之同前立效散治牙齒疼不可忍痛及頭腦項背微惡寒飲大惡熱飲防風一錢升麻七分炙甘草三分細辛葉二分草龍膽酒製四兩上㕮咀如麻豆大都作一服水一盞煎至五分去滓以匙抄在口中炸痛處待少時立止如多惡熱飲更加龍膽草一錢此法不定隨寒熱多少臨時加減若更惡風作痛加草豆蔻五分黃連五分卻勿加龍膽草屢用得效秘方治風牙疼痛用芒硝食鹽川椒等分為末用肥皂一個去子將藥末安於肥皂內用線縛定用炭火燒存性為末擦於患處立效久擦齒白牙堅一方治陰虛牙出鮮血四物湯赤牛膝香附生甘草秘方治牙落重出公鼠骨一副取骨法用鼠一個剝去皮用硇砂擦上三日肉爛化盡取骨瓦上焙乾用香附一兩白芷川芎桑葉地骨皮川椒蒲公英青鹽川槿皮各三錢旱蓮草上為細末擦百日復出固齒無不效驗
