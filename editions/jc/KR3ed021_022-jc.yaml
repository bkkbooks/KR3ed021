body:
  text: 卷之二十二癰疽癰疽方論癰疽五發發腦髮鬢發眉發頤發背是也人之一身血氣周流而無間稍有壅聚莫不隨所至而發見焉又豈特五者而已哉俗以癌痼瘭附於癰疽之列以是為五豈知瘭與痼癌不過癰疽之一物古書所載僅有所謂瘭疽則瘭亦同出而異名也若癌若痼前未之聞合是以為五發其可乎癰者壅也疽者沮也血氣壅沮寒熱不散陰滯於陽則發癰陽滯於陰則發疽而所發無定處也蓋衣服厚暖則易表招寒滋味過多則里易生熱感受日久熱勝於寒寒化為熱六腑蘊熱騰出於膚肉之間其發暴盛腫而光軟皮薄以澤侵展廣大者為癰其患浮淺不傷筋骨此可治也五臟蘊熱攻焮乎肌骨之內其發停蓄狀如㾦癗皮厚以堅淡白焦枯者為疽其患沉深傷筋蝕骨此不可治也凡發熱憎寒頭痛惡心筋節拘牽氣急悶悶或病渴經年是皆欲發癰疽之證發於喉舌頭面腦項肩背胸腹四肢大節女子妒乳數者為險其他為緩腫高而軟者發於血脈腫下而堅者發於筋骨肉皮色不變者發於骨髓近骨者多冷近虛者多熱近骨久不愈則化血成蟲近虛久不愈則傳氣成漏成蟲則多癢少痛或先癢後痛成漏則多痛少癢或不痛不癢若形狀腫大按而後痛者其膿深小按即痛者其膿淺按之軟而即復者有膿按之強而不復者無膿瘡淺者欲在厚處瘡深者欲在薄處腫起堅硬膿稠者為實腫下軟慢膿稀者為虛有實熱者易療虛寒而邪熱多者難瘳癰疽已決去其膿而煩疼尚未全退其脈洪粗者又難為力要之癰疽脈來帶澀但得和緩為平若洪粗則銳毒不收鮮有濟也然則治療之法將何如曰血得溫則流行氣得溫則和暢服餌貼敷藥用和平初覺則散腫內消已潰則排膿斂毒膿盡則去腐內塞惡肉盡則生肌附痂此定則也瘡家臟腑生熱熱蒸其血血敗則腐肉肉腐則成膿當膿血焮聚之時所賴朝夕洗瘡以外舒其毒氣才覺有膿即暖醋蘸熨而破之才見敗肉即煮藥蕩射而去之稍或稽延不反掌而侵蝕筋骨是必腐敗盡除庶幾真氣得復好肉得生耳而況癰疽險惡古人以虎口鴆毒喻之一芽初萌灸熨宣散急作主張殆有甚於拯溺救焚之不可緩也奈何人多翫忽荏苒成形潰裂四出往往不救伊誰咎歟大抵癰疽自內發外最不可服冷藥亦不可敷冷藥但以溫和調治使毒氣自內發出可也若服冷藥則必至傷動臟腑若敷冷藥則逼令毒氣內行內氣有虧毒從外入衝心煩躁嘔逆嗽喘以至泄瀉此為內壞殺人無疑或不隨順療理妄以急澀匕劑行之斂口太速毒氣舒泄未盡必於其旁復發大疽活血排膿斂毒去腐生新收口人所共知也孰知諸痛癢瘡皆屬於心心主血脈心通諸竅如茯苓茯神遠志益智石菖蒲等輩又當佐助於其間抑使病人不得憂驚嗔怒勞精疲神有觸於心尤關利害五臟六腑所包者一膜耳人有患疽醫療兩月新肉已平夜寐中乾者攻擊疾呼驚觸入心新肉開裂醫者謂其肉膜已破而後肉開神仙莫救果非心乎於此又能精加飲食使胃氣有所充和劑救里使內氣得所養有諸中形諸外理勢必然切戒癰疽成形以後不得通利大便上醫宣毒蓋用車螯栝蔞甘草紫草等類以乳香沒藥佐之若大黃則不敢輕用也如其有熱即以赤茯苓麥門冬桑白皮燈心草利其熱於小便之中或以杯勺黑豆入紫蘇生薑如豆湯法亦能疏導若夫瘡口淤熱而焮疼卻暫用升麻山豆根厚黃柏煎湯入麝為之熏洗或瘡口斂平尚留一竅經時汁水不幹者其中必有淫蟲朽骨當以藥消蝕而盡除之婦人患此適值月候不行尤當急為調血所謂大寒大熱大渴大吐大痛狂言無事喜笑鼻青唇慘赤暈不收膿青血黯膿血腥臭血流不止小便如淋結硬過月方發硬如石榴不破多日不腫不疼昏睡不知痛癢患熱恣意取涼沉重痿弱氣乏肩項動掉不便心病臉如脂坯貼藥鮮血常流膿如赤白下痢眼小竄視而白睛青黑膿血大泄而焮腫且堅聲嘶色脫而肢體腫浮氣短喘粗而恍惚嗜腫煩躁時嗽而腹痛渴甚飲食不下而服藥即嘔與夫吃逆嗽喘大便泄瀉皆惡證也抑尤有內外之別焉疽初發來一粒如麻豆許身體即熱患處亦熱腫大而高多生疼痛破後肉色紅紫此為外發縱使極大用藥有條百無一失自發疽以來不問小大身體無熱但覺倦怠瘡亦不熱數日之間漸漸開闊不腫不高不焮不痛低陷而壞爛肉色紫黑此為內發盧扁無如之何蓋其未發以前臟腑已先潰爛矣此又善惡之衡鑑云雖然癰疽治法已條列於前矣究其病源有風有氣有食有藥毒有勞損而所受不同焉風則多癢氣則多痛食則發寒熱藥毒則堅硬勞損則瘦弱此外證之為可驗也風氣食三種易療藥毒勞損二者難醫大概風毒當驅風氣毒當調氣食毒當消積勞損當補虛藥毒則黑豆汁利之甘草生薑解之丹砂則羊血綠豆可以為佐登山到頂酌水問源故推明本始以為瘍醫一發之助癰疽證治灸法癰疽初發小點一二日間急以大蒜頭橫切如錢貼其中心頓小艾柱灸之五壯而止若形狀稍大以黃稈紙蘸酒全貼認先干處為筋腳於先干處灸之或兩處先干皆灸但五七壯而止又法屈指從四圍尋按遇痛處是根就此重按深入自覺輕快即此灸之更於別外尋灸若或大腫即搗蒜為餅焙乾蘸法醋炙熱更換頓罨或以熨斗火於蒜餅上熨之更換熱餅頻熨如覺患處走散即以綿帛覆蓋勿令氣泄俟少間敷藥凡癰疽展大如龜之形且看頭向上下先灸其前兩腳次灸其尾或紅筋走緊而長從盡處灸之須留頭並後兩腳勿灸若盡灸之不惟火氣壅聚彼毒無所走散又攻入里也或辨認不明以白芷三分漢椒桑白皮各一分連根蔥白十片上取新水煎湯入酸醋半盞淋洗少頃其筋自現可以辨認頭尾速消方癰疽發背已發未結已結未潰急以黃明牛皮膠新水溶令稀稠得所攤在抄紙上貼之良久以軟布二條於釅醋中煮熱互換漉出罨在膠紙上蒸熨常要熱氣相接若患處癢乃藥氣透須忍癢頻蒸熨直至消散或破而膿出將盡即以貫眾煎湯洗去膠紙用退腫散蠲毒散沉水膏等類摻敷或便用拔毒散隨意急服萬金一醉膏或內消散乳粉托裡散破後以洗瘡方蕩洗發散毒氣拔毒散癰疽腫結通用能散能潰南星上等大白者一兩草烏頭白芷各半兩木鱉子仁一個研上細末分兩次法醋入蜜調敷紗貼之蠲毒散治癰疽腫毒未結則散已結則潰去風排膿大南星一兩貝母三分白芷赤小豆直殭蠶焙各半兩雄黃二錢研上細末初用醋調敷後用蜜水調敷癰疸宣毒方諸癰疽已破未破通用瓜蔞一個去皮銼細紫車蛾殼一個黃泥和鹽塗敷煅通紅用三錢皂角刺甘草微炙各二錢乳香輕粉各半錢上細末先用老酒二碗煎栝蔞濾清取一大碗五更暖栝蔞酒調上項藥末空心服大便自下惡物如魚涎狀宣毒一醉膏栝蔞一個去皮老翁須一倍半上銼酒水等分同煎少頃入開口真川椒四十九粒臨熟又入乳香沒藥末少許任意服癰疽宣毒方黑牽牛去皮上取仁入豬腎中線扎濕紙包熱火灰內煨香熟候冷溫酒嚼下宣毒方斑蝥一枚只去翅好大棗一枚去核包裹斑蝥入豬腎中線扎青竹葉重包濕紙裹煨熟去蝥上空心吃豬腎溫酒下又方宣散癰疽腫毒老翁須草亦名金銀花忍冬草鷺鷥藤水楊藤其藤左纏花五出而白微香蒂帶紅色野生延蔓上花與葉生搗暖酒調服無花只用葉酒和葉烘暖可敷瘡穿山甲散癰疽托毒排膿治五毒附骨在臟腑里托出毒氣止痛內消蜂房一兩蛇蛻穿山甲油發並燒帶生存性各一分上為末每服二錢入乳香末半錢暖酒調下皂棘散托毒排膿川芎半兩甘草生一兩乳香一分皂莢刺燒帶生存性四兩上末每二錢溫酒調下芎歸托裡散托裡排膿生肌川芎當歸白芍藥炒木香白芷茯苓各半兩人參辣桂丁香甘草生各一分上末每二錢食前米湯調下癰疽毒入臟腑嘔吐惡食方甘草焙半兩丁香三錢半上銼每服二錢水煎入麝少許溫服癰疽腫毒敷藥仙靈散收腫斂毒排膿滑蘭𣗬皮末紫貝草搗上二味同搗酒調為膏敷或蜜水調亦好滑蘭托毒紫貝散血或單用紫貝草亦效妙勝散收腫斂毒排膿落地茄花去心黃蜀葵花去心並萼曬乾瓷器收上為末井水稀調雞羽掃放患處干則再敷或收毒平散或破潰出膿神效如瘡口開用末摻亦斂毒不急澀消腫散癰疽通用滑蘭皮大南星赤小豆白芷薑黃各一分白芨半分上細末酒調敷或蜜水醋同調敷退毒散癰腫通用木鱉子去油大南星半夏生赤小豆白芷草烏連皮尖等分上細末硬則法醋調敷熱焮則蜜水調敷川烏散癰腫初發急用川烏螟蛉窠土等分上細末法醋調敷未結則散已結則潰夜明砂膏潰腫排膿夜明砂一兩辣桂半兩乳香一分上細末八干砂糖半兩研和用井水調膏敷乳豆膏治癰疽腫節疼痛入門先用此止痛綠豆去皮取肉一兩乳香竹葉裹熨斗熨一分上末酒調敷傘紙貼干則再敷續後卻換消腫排膿藥星烏散治癰疽已結未作穴潰大南星草烏頭辣桂等分上末用酒或醋調敷軟白紙貼未穴再用斂毒散敷四圍收毒南星赤小豆白芨等分上末井水調敷四周軟帛貼上退腫散癰疽腫毒通用大南星圓白者半夏生各半兩赤小豆五倍子白芷貝母各二錢半上細末蜜醋調敷收毒外消膏黃明牛皮膠以長流水半升溶開一兩虢丹再煎柳枝急攪五六沸一兩上候冷收入瓷合以雞羽攤於瘡上留口如未破敷腫自消乳香膏治癰疽腫毒惡瘡排膿止痛收縮筋腳乳香竹葉包熨研沒藥各一分輕粉一錢麝半錢黃蠟二錢蓖麻子仁一兩上搗研極細成膏以撫紙折薄攤藥留眼貼之日二換或純用蓖麻子仁入沒藥研細敷貼保安妙貼散治癰疽發背腫毒透明硫黃為細末蕎麥麵各二兩上用井花水調和作餅焙乾收下要得硫黃性和用時再末之入乳香少許井水調厚敷瘡上如干以雞羽蘸新水潤之如此至瘡愈方歇通則不痛不通則痛神驗蜀葵膏治癰疽腫毒惡瘡黃蜀葵花上用鹽摻收入瓷器密封經年不壞患處敷之自平自潰蜀葵子炒碎入宣毒藥中尤驗皂角膏癰疽腫結通用不蛀皂角滿尺者捶碎去弦核上以法醋煮爛研膏敷之自消四虎散治發疽腫硬厚如牛皮按之方痛大南星草烏頭半夏生狼毒等分上細末醋蜜調敷留頭出毒氣沉水膏癰疽發背排膿斂毒大南星三分白芨白芷赤小豆半夏生貝母各半兩木鱉子仁去油乳香沒藥各二錢半雄黃一錢上細末井水入蜜調敷紗貼爐峰散治癰疽腫毒等患爐甘石綠者十分細一兩大南星半夏生各半兩五倍子赤小豆片薑黃直殭蠶貝母白芨各四錢乳香二錢半上細末未破者酸醋調敷已潰者清蜜調敷半乾濕只摻若紅腫多汁生地黃研汁調敷仍煎苦參桑白皮湯淋麝香散癰疽已結而頭不破用此直雀屎研一錢斑蝥去頭足翅一錢半腦麝隨意上細末法醋調少許點在有頭處立破急用煎黃連湯洗去湧泉膏治癰疽軟而瘡頭不破或已破而瘡頭腫結無膿斑蝥去頭足翅焙上為末揉和蒜膏似小豆許點在膏藥中准瘡口處貼之少頃出膿即去藥或用綠礬直雀屎少許用餅藥調一點敷瘡頭軟處亦破須四圍塗藥護之蚣蠍散治癰疽瘡口小而硬貼膏藥膿不出是為風毒所勝用赤足蜈蚣一條去頭足全蠍三枚實全尾者並生用木香一錢上細末每用一字摻於膏藥錢上准瘡口貼如瘡口開闊不硬勿用若是風邪所搏即煎連根蔥白五莖次入白芷末半兩少頃濾清淋洗明日又洗仍服不換金正氣散護肌膏收暈斂毒大南星二兩明白礬並生用七錢半白蘞白芨雄黃上細末每半兩生地黃取汁調敷瘡暈外舊肉上自外圓而促斂之又驗瘡用新水調筆蘸敷瘡藥力勝則腫消皮