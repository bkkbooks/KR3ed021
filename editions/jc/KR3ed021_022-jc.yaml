乾麩炒微黃色上為細末麝香研少許每服二錢酒調服初發覺赤腫疼痛一服效因小兒吹奶變成此疾者並治復元通氣散治髮乳癰疽及一切腫毒木香茴香青皮穿山甲炙酥陳皮白芷甘草各等分貝母去心薑製加漏蘆上㕮咀每服五錢水一盞半煎八分去滓入酒食遠服末酒服二錢亦可一方治婦人乳赤腫成癰者歌曰欲治乳癰良捷法紫蘇一味勝他方濃煎湯飲頻頻服蘇葉圍來合乳房一方治乳癰神效用桑黃不拘多少用好酒磨熱服即安一方治婦人吹奶用棗七枚去核入鼠糞七粒火煅存性研末入麝香少許溫酒調服又方治婦人吹奶詩曰婦人吹奶治如何皂角燒灰蛤粉和熱酒一盞調八字雙手揉散笑呵呵一方加乳香少許一方治婦人乳頭裂用秋後冷露茄兒裂開者曬乾燒存性為末水調敷患處甚驗癌癰疽諸發此法通用發癌方論癌者上高下深巖穴之狀顆顆累垂裂如瞽眼其中帶青由是簇頭各露一舌毒根深藏穿孔透里男則多發於腹女則多發於乳或項或肩或臂外證令人昏迷治法急用蓖麻子等藥外敷以多出其毒水如癰疽方中乳香膏神攻妙貼散是也內則於小便利之蓋諸痛癢瘡皆屬於心心與小腸為表裡所當宣毒於小便但諸發蘊毒又非麥門冬燈心草之所能宣必如是齋方中立應散以地膽為主以白牽牛滑石木通佐之而後可以宣其毒矣自此又於心腎用工人之一身水不能濟火則渴而後發瘡心腎相交水火既濟於人何病之有心主血也清心行血固所當然亦使腎得其養則水有所司真元凝合彼瘡自平更服童尿又可以灌滌餘毒切戒忌風邪入之將理一節米餔豬蹄可以益腎可以養中當加之意痼發痼方論痼發於手足或掌心或腰腿或臀下伸縮處長形平腫無頭無面低貼肌肉瞰里開瘡如𤷍而大走注牽連較之諸發煩渴為甚其患淺則可療其患深則害人或重毒已平數月之後復於他處大發但作肉色微帶淡紅終不能救治法以癰疽類例推之大要培養內氣以防滑泄兼用膏藥吮瘡神異膏遇仙膏可貼可服瘭發瘭方論瘭疽之發有數種先作點而後露肉小者如粟如豆劇者如梅如李赤黑青白色變不常或臂或臀或口齒或肚臍發無定處大概多見於手指之間根深入肌走臂遊腫毒血流注貫穿筋脈爛肉見骨出血極多令人串痛狂言痛入於心即死突出於外腎者亦死此瘡最慮引風治法宣毒行血尤當於心腎加意焉蓋心為萬病之門敗血鬱滯煩躁噯悶皆毒氣攻心之候也心家為毒所攻若於小便利之又恐外腎虛怯易至傷風勢必宣毒於大便如栝蔞酒之入沒藥五靈脂皂莢刺帶生灰是也是雖大便引導毒氣然清心行血去風邪之劑如之何而廢之心清血行風邪解散庶乎有瘳矣經云在指則截在肉則割蓋慮毒氣隨風走肌隨脈入腹倏忽害人至速而不可留也此疾根源初因感受惡風入於脈理或傷寒瘴瘧之後毒變所生凡癰疽諸發開一寸則一寸引風非必風入於其中蓋虛處自引風也惟風邪襲虛則肉爛透骨惡血橫流大南星生半夏白芷梢最能去風可以頻敷其諸療理推廣癰疽法度行之發瘭證治癰疽癌瘭惡瘡妙方生髮燒留性三分皂莢刺燒帶生二分白芨一分上細末乾摻或井水調敷皂莢刺能行諸藥瘭方生髮燒留性皂莢刺燒留性各二分赤蜈蚣半燒厚黃柏各一分上細末雄豬膽汁調敷又方雞內金生髮各燒留性夾和大南星半夏生上為細末摻又方皂莢刺燒帶生白芨少許上為細末摻諸瘡通用又方燕窠和百雀兒糞研膏敷又方生髮燒留性末之米湯調服兼敷漏瘡亦效諸發諸瘡蠟礬丸冷酒入麝香送下洗盪瘭瘡方荊芥穗白芷漢椒去目蔥白連根上用井水煎入鹽候溫自手臂上蕩下日三次瘭疽毒氣走臂腫所至處緊繫之又洗方山灶屋垂塵灶煙釜下土各半升上研和分兩次井水煮沸溫洗日如是瘭方生井蛙取皮曬乾燒帶生上細末摻或蜜水調敷又通用方在前是齋立應散方見瘭癧門瘭瘡灸法瘭瘡自手發者毒走至心不救自足發者毒走至腎不救各有小紅筋湯洗再尋其筋之住處灸小艾柱三壯即瘥此即蛇瘴瘭瘡方論瘭瘡一名蛇瘴南地多有毒蛇吐毒於蠻煙瘴雨之鄉人有伏水土風氣而感觸之者數月以還未有不發為蛇瘴也唯赤蜈蚣伏蛇最為上藥雄黃白芷次之諸蛇藥亦可以制其毒矣雄黃有毒爛肌但夾和蛇藥用疔瘡疔瘡方論疔瘡含蓄毒氣突出兩寸痛癢異常一二日間害人甚速是尤在癰疽之上也內經以白疔發於右鼻赤疔發於舌根黃疔發於口唇黑疔發於耳前青疔發於目下蓋取五色之應五臟各有所屬部位而已然或肩或腰或足發無定處在手足頭面骨節間者最急其餘尚庶幾焉疔曰五疔類分數種如臼如豆如葩如箔金如茱萸如石榴子或發疹搔破而青黃汁出或衣物觸著而疼痛忽生或白而腫實或赤而浮虛其狀不一大抵瘡頭黑硬如釘四畔帶赤如火盤根突起隨變焦黑未幾腫大而光轉為濕爛深孔透肌如大針穿之狀外證心驚頭痛拘急惡寒四肢痛強或寒熱交作頰舌間赤黑點點如珠若毒入腹心則煩悶嘔逆恍惚癡眠其斃可立待也此疾雖自風毒而來其諸觸犯不可不信如石疔之忌瓦礫磚石麻子疔之忌麻衣麻仁火疔之忌火光炙爆水疔之忌飲水渡河惡眼鹹食爛帛刀鐮色色見忌又不特雌雄二疔戒謹房事而止一有觸犯難以有瘳其或背脊拘強瘡痛徹骨此觸犯之候也治法以調平心氣為上蓋疔瘡蓄毒壅結於心如茯苓茯神遠志益智蓮子石菖蒲之類佐以川芎當歸皆舒豁心經之劑也心氣一清毒自消散外所敷者用銷蝕惡肉輩如膽礬綠礬鉛霜斑蝥等類以餅藥調和而筆敷之爛其肉而後剪隨敷隨爛次第剪平卻以生髮蛇皮土蜂窠皂莢刺各燒留性白芨減半併為細末以平瘡口或銷蝕惡肉輩敷之作痛則以排膿內補散多用酒調以醉之矣又有一種瘡頭黑深形如魚臍破之黃水滲出四畔浮漿是曰魚臍疔瘡其毒尤甚通前治法即癰疽方中萬病解毒丸以清心行血湯使服之以井花水磨敷之是為神仙妙藥疔瘡證治諸疔瘡方生髮拔一團如雞子大攤在一尺緋絹上雄黃研一豆許皂莢刺二十一針赤小豆二十一粒上並粗末撒放發上卷就緋絹作一團外用發繩十字縛定熨斗內烈火燒帶性為末入地骨皮末倍之分作兩服空心酒調下又方生髮蛇皮洗曬土蜂窠皂莢刺各半兩上以緋絹一尺分作四片分裹上件藥發繩扎之炭火燒帶性併為細末每一錢空心酒調下又方蛇皮土蜂窠燒帶性等分上為末每一錢酒調下又方蛇皮洗曬炙焦為末雞子清調敷又方磁石於石臼中搗為細末再研醋調敷又方蒼耳亦名鼠黏子根莖苗實但取一色研細上酒調下仍以蒼耳燒灰醋調敷或不拘一色雜採用之疔瘡方金頭蜈蚣一條膽礬銅綠烏賊骨各一錢麝一字上細末以紙捻蘸麻油黏藥引入瘡中如瘡頭硬即灸破或針刺破然後入藥附諸方立馬回疔丹治疔瘡走徹不止金腳信蟾酥血竭硃砂沒藥各五分輕粉片腦麝香各一字上為細末生草烏頭汁為錠如麥子長大用時將瘡頭刺破納入一錠第二日瘡腫為效以膏藥貼之飛龍奪命丹聖惠方治一切惡疔瘡人言二錢半斑蝥十二個去足巴豆十二個去殼油硃砂硇砂硼砂乳香沒藥黃丹各三錢南星水洗半夏水洗各一錢血竭二錢麝香一錢二分半上為末蟾酥汁為丸如紅豆大五分內分一分加入斑蝥四個然後捻成錠子如小麥大每一瘡針破下一錠子用飯黏白紙封口用前四分內一丸噙在舌上覺麻涼水吞下忌熱物片時如蟾酥干用人乳汁化開一方加雄黃二錢千金托裡散治疔腫發背一切惡腫官桂人參甘草川芎白芷芍藥各一兩木香沒藥各三錢乳香二錢當歸半兩連翹一兩二錢黃耆一兩半防風桔梗厚朴上十五味為細末每服三錢酒一盞煎三二沸和滓服無時一方治疔瘡土蜂房一窠全蛇蛻一條全上作一處細瓦器中以黃泥封固火煅存性研為細末空心酒調服一錢少頃腹中大痛痛止其瘡已化為黃水仍服五聖散五聖散大黃生薑金銀花甘草各一兩栝蔞一個皂角針二兩上㕮咀每服一兩用好酒二盞煎至一盞溫服瘰癧瘰癧方論瘰癧生於項腋之間凡人少小以來動輒蓄怒或憂思驚恐抑鬱不伸多致結核於項日積月累風毒熱氣聚焉於是腫濕開瘡起伏無已甚則牽連至於腋下自腋下而漫衍心胸殆無及矣發熱憎寒煩渴盜汗或寒熱往來或痛或不痛其外證也治法無他大抵以地膽斑蝥為主蓋瘰癧之毒莫不有根地膽斑蝥制度如法能使其根從小便中出或如粉片或如塊血或如爛肉皆其驗耳但毒根之行小便亦必澀痛當以木通滑石輩導之然是毒必從小便出者何哉諸痛癢瘡蓋屬於心其或流行於小便就快也人有此患不惟懲忿窒欲謹護燥濕風寒其於飲食百味一切戒之然則投方匕之劑當何如而責效焉曰飯蔬食而已瘰癧證治是齋立應散治瘰癧神效已破未破皆可服連翹赤芍藥川芎當歸甘草炙滑石研各半兩黃芩三錢白牽牛生取末土蜂房蜜水洗飯上蒸曬乾各二錢半川烏尖七個地膽去頭皮足秫米炒米黃為度去米秤三錢上為細末每服抄一大錢匕煎濃木通湯調下臨臥服毒根從小便中出澀痛不妨毒根如粉片塊血爛肉是也如未效後再服繼以薄荷丹解其風熱且地膽性帶毒濟以烏尖或衝上麻悶不能強制嚼蔥白一寸茶清下以解之如小便澀燈心煎湯調五苓散服瘡處用好膏藥貼若療痛疽用此宣導惡毒本方去黃芩不用薄荷丹解瘰癧風熱之毒自小便宣毒後須常服杜薄荷皂角不蛀者去弦皮連翹何首烏米泔浸一宿蔓荊子京三稜煨荊芥各一兩上為末好豉二兩半以米醋煎沸灑豉淹令軟研如糊和丸桐子大每三十丸食後熟水下日一服病雖愈常服之必捷丸治瘰癧多年不瘥斑蝥去頭翅足秫米炒一分薄荷葉三分上細末烏雞子清和丸桐子大空心茶清下二丸午時後服三丸臨臥服四丸次日空心服五丸臍下痛小便取下惡物為效如小便秘吃蔥茶少許神秘散治瘰癧斑蝥去頭足翅麵炒二十一個荊芥穗曬乾直殭蠶炒去絲嘴黑牽牛微炒取仁各二錢上細末每服一錢五更好酒調下日中當取下惡物如不下次日五更再進一服或更不下第三日五更先吃秫米粥一盞次服此藥其毒決下如小便痛澀以蔥茶解之或木通燈心煎湯利之雌雄散治瘰癧斑蝥一雌一雄足翅全者新瓦焙焦去頭翅足貫眾二錢鶴蝨甘草各五分上細末作兩服飽飯後好茶濃點一錢調下木鱉膏治瘰癧經年發歇無已木鱉仁二個用厚紙捍去油研碎上以烏雞子清調和瓷盞盛之甑內蒸熟每日食後吃一次服之半月自然消靡粉乳托裡散治瘰癧攻心嘔吐發出毒方見癰疽門蠟礬丸治瘰癧神效方見癰疽門山豆根方治咽喉上隔熱毒患瘰癧者常常含汁嚥下仍以山豆根紫蘇葉細銼煎湯臨臥服解熱方瘰癧四畔紅腫多汁為熱證小黑豆二合紫蘇一莖姜七片上細銼煎湯食後服洗敷方白芷煎湯泡荊芥上候溫軟帛蘸洗拭乾好膏藥貼膿汁惡肉出盡更用半夏生南星各二錢血竭一錢輕粉少許上細末以津唾調敷究原方斂瘡口血竭一字棗燒灰半錢麝少許上夾研津唾調敷附諸方散腫潰堅湯治馬刀瘡結硬如石或在耳前後上下及肩脅背手足少陽經及瘰癧遍於頭或頰車堅而不潰在足陽明經一瘡已破乃流膿水並皆治之草龍膽酒洗炒四次桔梗各五錢升麻六錢甘草炙柴胡各五分連翹三錢葛根白芍藥黃連各二錢黃芩梢錢半酒錢半生昆布知母酒洗栝蔞根酒洗黃栝各五錢京三稜酒洗廣茂酒洗各三錢當歸梢酒洗半錢上㕮咀每帖七錢水二盞煎八分去渣食遠熱服於臥處伸足於高處頭微低每噙一口作數次嚥下至服畢如常安臥取藥在胸中停蓄也另攢一料作細末煉蜜丸每服百丸此藥湯留一口送下更加海藻五錢炒白花蛇散三因方治久漏瘰癧發於項腋之間癢痛憎寒發熱青皮半兩生犀鎊半錢黑牽牛半兩一半生用一半炒熟白花蛇酒浸軟去皮骨焙乾秤二兩上為末每服二錢膩粉五分研勻五更糯米飲調下以利下惡毒為度十餘日再進一服可絕病根梅花點舌丹治男婦惡瘡瘰癧蟾酥二錢粉霜沒藥輕粉各六分麝香冰片血竭各四分乳香雄黃各一錢上為細末用男人乳丸如茄子大每服一丸含一丸在舌上待自化瘰癧可先食胡椒麵然後含之其瘡自消神效針灸法治瘰癧以手仰置肩上微舉肘尖上是穴隨患處左即灸左右即灸右艾炷如箸頭大再灸如前三次永無恙如患四五年用藥不退辰時著灸申時即落所感稍深三灸即安法仍以蒜切片貼癧瘡上灸七壯易蒜多灸取效癭瘤癭瘤方論氣血凝滯結為癭瘤癭則憂恚所生多著於肩項皮寬不急槌槌而垂是也瘤則隨氣留住初作梅李之狀皮嫩而光漸如杯卵是也其肉色不變者謂之肉癭其筋脈呈露者謂之筋癭其赤脈交絡者謂之血癭隨憂愁而消長者謂之氣癭堅硬而不可移者謂之石癭癭之名有五者此也一曰骨瘤二曰脂瘤三曰肉瘤四曰膿瘤五曰血瘤六曰石瘤瘤之種有六者此也癭瘤二者雖無痛癢最不可決破決破則膿血崩潰滲漏無已必至殺人其間肉瘤攻療尤所不許若夫脂瘤氣癭隨順用藥尚庶幾焉癭瘤證治海藻丸癭瘤通用海藻洗曬一兩海蛤煅松蘿各七錢半當歸川芎官桂白芷細辛藿香白蘞明礬煅昆布洗曬各五錢上細末煉蜜丸彈子大每一丸含嚥下蠟礬丸癭瘤通用常服自然縮小消磨方見癰疽門針沙方專治氣癭針沙浸於水缸平日飲食皆用此水十日一換針沙服之半年自然消散針沙能去積也治小瘤方先用甘草煎膏筆蘸妝瘤旁四圍干而復妝凡三次後以大戟芫花甘遂上等分為細末米醋調別筆妝敷其中不得近著甘草處次日縮小又以甘草膏妝小暈三次中間仍用大戟芫花甘遂如前自然焦縮又治瘤方舊牛皮鞋皮洗煎凍常食之瘤若破如豆腐極臭附諸方破結散治五癭海藻洗龍膽草海蛤通草昆布明礬枯松蘿各三分麥曲四分半夏貝母各二分上為末酒調服日三食忌甘草鯽魚豬肉五辛生菜毒物昆布丸治一切癭瘤昆布洗海藻洗小麥醋煮乾各一兩上為末煉蜜丸如杏核大每一丸食後噙咽秘傳治癭方治一切癭瘤神效干豬靨七個用燈盞火烘過干為末海螵蛸木香青木香孩兒茶各五錢雄黃神麯麥芽辰砂各一錢上為細末用酒送下食後令睡時服之即睡再不可言語戒惱怒房室此方繫累用無不效驗海帶丸治癭氣久不消者海帶貝母青皮陳皮上各等分為末煉蜜丸如彈子大每服一丸食後噙化一方治頦下結核不消經效大蜘蛛不計多少上以好酒浸過研爛同酒調開澄去滓臨臥服外臺秘要治項下猝結囊漸大欲成癭者昆布海藻各等分上為末蜜丸如杏核大含稍稍咽津針灸法天突一穴在結喉下宛宛中灸三七壯治諸般癭疾肩髃二穴在膊骨頭肩端兩骨間陷宛中舉臂取之男左十八壯右十七壯女左十七壯右十八壯又灸兩耳後髮際七壯漏瘡漏瘡方論漏者諸瘻之潰漏也狼瘻鼠瘻螻蛄瘻蜂瘻蚍蜉瘻蠐螬瘻蜉蛆瘻瘰癧瘻轉筋瘻古所謂九瘻是爾析而言之三十六種其名目又不同焉大抵外傷四氣內窘七情與夫飲食乖常染觸蠢動含靈之毒未有不變為瘻瘡穿孔一深膿汁不盡得冷而風邪並之於是涓涓而成漏矣漏喜發於項腋亦喜發於陰僻肛門之間療治失時即生寒熱不特瘻能為漏凡癰疽諸發隨所在處苟有宿膿敗肉朽骨停蓄其間皆一切漏瘡之萌芽也治法溫散風冷為急收水次之生肌又次之藿香厚朴半夏橘皮蒼朮細辛川芎白芷以官桂乾薑一匕佐之此足以溫散風冷矣然有近年漏者有久年漏者近則或帶淡紅或帶微腫或留小核久則上而槁白內而黑爛淫蟲惡臭生焉近者不過前藥數品而已久者復其元陽亦當以漏監輩加減而用之如其不當用而輕用又恐熱氣乘虛變移結核旁緣相通而孔竅為尤甚若夫收水一節則有司存水屬腎也腎虛不能傳導而後水溢於腎水溢則滲漉於漏瘡行腎之水無如黑牽牛必以牽牛取末入於豬腎慢火煨熟而溫酒下之則借腎入腎一縱一擒兩得其便惡水既泄不復淋漓繼以當歸黃耆川芎官桂川續斷胡蘆巴等修治細末佐以發灰空心溫酒調下仍以安腎丸山藥丸兼而濟之庶幾腎得所養真元凝合夫然後龍骨牡蠣人齒犬牙加之血竭乳麝發灰內外相維生肌必矣然而新肉方生又當以膂肉豬蹄米餔為養不惟滋味益腎而陽明之主肌肉亦藉穀氣以充之此則自本自根之論也雖然漏已息矣瘡已平矣衾幃動念可乎否乎曰始焉之漏者溝澮之細流也終焉之犯者江河之浚決也知而故作盧扁其如之何漏瘡證治溫解散溫散漏瘡風冷藿香葉厚朴制半夏曲橘皮蒼朮炒細辛川芎白芷各一分辣桂川白姜生甘草炙各半分上銼散薑棗煎服豬腎酒通行漏瘡中惡水自大腸出黑牽牛碾細去皮取末一分入豬腎中以線扎青竹葉包上慢火煨熟空心溫酒嚼下續斷散止漏活血益腎氣續筋脈榼藤子去瓤酥炙當歸川芎黃耆微炙川續斷洗曬葫蘆巴炒紫金皮生乾地黃洗曬牡蠣粉研細各半兩木香辣桂各三錢甘草炙二錢上為末每二錢空心溫酒調下或加發灰佐之保安炙甘草方治漏瘡內外癰方見乳癰門乳麝雲母膏治漏瘡效穿山甲浸一宿去肉用一百片真蚌粉同炒侯香熟起泡去粉以甲為末四兩上入乳香末一錢麝香半錢夾和雲母膏十五貼為丸桐子大每服三十丸溫酒下仍以鹿角膠調鹽酒服神授丸川椒方見虛勞門兼服之代赭石丸治漏瘡膿血不止方見痔門冷漏乳香丸白淨滴乳香一分牡蠣粉半分上細末雪糕糊丸麻子大每服三十丸道地川白姜生用煎湯空心下雄黃膏治積年冷漏黃水不止雄黃硫黃研細各一分頭髮黃蠟各半兩上用麻油二兩煎熬頭髮溶盡去滓次入雄黃硫黃碎片黃蠟慢火上桑枝頻攪為膏攤生絹貼用藥先以赤甘草頭煎湯洗或露蜂房白芷煎湯常洗常貼黑靈散漏瘡通用露蜂房銼淨二分牡蠣粉虢丹硫黃研各一分上同炒令煙盡為細末入發灰一分麝少許拌和敷患處麝能引藥透達亦殺蟲血竭散治痔漏痛不可忍血竭牡蠣灰發灰各等分上細末入麝香少許自以津唾調敷如更痛研杏仁膏調藥敷之生地黃膏漏瘡通用露蜂房炙黃五倍子木香各三錢滴乳香二錢輕粉一字上細末用生地黃一握搗細和為膏攤生絹上貼瘡蜂房散治久年漏瘡或暫瘥復發或移於別處多孔露蜂房炙黃三分穿山甲炙焦龍骨各一分上末入麝香用臘月豬脂調敷濕則摻蛇蛻散治漏瘡血水不止蛇皮洗焙焦五倍子龍骨各一分川續斷洗曬二分上細末入麝香少許津唾調敷人牙散治漏瘡惡瘡生肌里欲干則用人牙油發各燒存性雄雞內金各等分上為末入麝香輕粉少許濕則摻干則麻油調敷平肌散治漏瘡久不合露干則用老狗頭骨露蜂房生髮各燒存性一分新桑白皮半分上細末入輕粉麝香少許津唾調敷干則摻鐵屑膏治漏瘡露干則用煅落鐵屑半兩狗頭連齒骨炙黃一兩鹿角燒灰一兩真輕粉一錢上細末用豬脂調敷熏漏瘡方艾葉五倍子白膠苦楝根等分上銼碎如燒香法置長桶內坐熏瘡處洗漏瘡方漏瘡孔中多有惡穢常須避風洗淨露蜂房白芷煎湯洗或大腹皮苦參煎湯洗上洗畢候水出拭乾先用東向石榴皮曬為末乾摻以殺淫蟲少頃敷藥諸漏瘡方百日兒屎密器封五日取塗瘡惡核漏瘡並戒怒氣不然核則大漏則水多漏瘡方真龍骨蜂房炙黃各二錢黃丹煅五倍子降真香節枯骸骨瓦煅各一錢上為細末敷之久瘻方九孔蜂房炙黃為末臘月豬脂研敷俟收汁以真龍骨降真香節細末入些乳香塗瘡附諸方蓋漏瘡須先服補藥以主血人參黃耆白朮當歸川芎各等分上㕮咀為一大劑服之外以附子末唾調作餅如錢厚以艾炷灸之漏大艾炷亦大但灸令微熱不可令痛干則易之如困倦則止來日又灸直至肉平為效仍用好膏藥貼之翠霞錠子治年深冷漏日久惡瘡有反肉用之銅綠寒水石煅滑石各三錢明礬膩粉砒霜雲母石研如粉各錢二分半上為細末擦百日便愈
