尾七壯火未滅便灸後一腳七壯火未滅又灸後一腳七壯迤邐如是灸至前兩腳而止須留龜頭莫灸以出毒氣法艾捍實如筋中間大剪作艾柱此法合陰陽氣候可用灸之省力療理論熱背發大瘡惟發熱則謂之背若不發熱皆癤也其有陰證於五臟內發者卻又沉睡無熱大凡癰疽惟藉有熱則發熱則氣血行冷則氣血滯熱則能生肌冷則瘡不合遇有熱者切不可退熱但用溫藥以微涼少濟之是為和劑論暈癰疽發背俗以腫痕所至為暈非真暈也暈生於瘡口之旁如紅筋之狀才見暈則非美證矣一暈二暈以至三暈尚可措手若四暈五暈是臟腑蘊受銳毒斷斷難醫保安炙甘草方癰疽漏瘡通用神妙粉草以山泉溪澗長流水一小碗徐蘸慢火炙水盡為度秤一兩上銼粗末用醇酒三碗煎二碗空心隨意溫服最活血消毒癰疽方赤小豆綠豆黑豆川薑黃上為細末未發起薑汁和井水調敷已發起蜜水調敷諸癰疽大便秘方甘草生一兩上銼碎井水濃煎入酒溫服能疏導惡物蝕漏方生油發燒留性四錢白芨一錢細末摻敷去水膏治癰疽破穴後誤入皂角水及諸毒水以致疼痛甘草生為末一分砂糖糯米粉各三分上為膏攤在絹上貼毒水自出驢馬汗及尿糞一切毒水皆治之木香摻收瘡口方木香雞心檳榔虢丹煅各一錢輕粉半錢上細末摻秦艽摻方治一切瘡口不合秦艽細末摻之蕩洗方蜂房白芷苦參川椒上煎洗熱焮加荊芥癰疽瘡口深大方深山黃牛糞塞滿瘡藤紙貼上三四日後蜂房白芷大腹皮三件煎湯淋洗拭乾上以黃桑葉曬乾為細末撒摻常服酒調排膿內補散飲醇酒食肥肉自然生肌深山黃牛吃百草平田牛隻吃禾藁諸惡核方或在上或在下頑結留滯不潰不散用瘰癧門立應散宣毒從小便出非用一醉膏之類宣毒從大便出也先以大戟草烏為末酒調敷仍服蠟礬丸或穿山甲炙焦為末溫酒調下佐之在上者加皂莢刺帶生灰煎蔥湯熏洗癰疽惡核男以左邊為重女以右邊為重發頤方此瘡最險毒氣灌注頭面腫大可畏牙齒亦脫治法解開頭髮尋頂螺中灸二十一壯如不透達灸至四十九壯而止其瘡開口大孔用東向石榴皮曬為細末撒摻其中特異萬靈散本方加煅過石膏半倍蜜水少許調敷四周不換金正氣散排膿內補散二藥各加川續斷皂角刺燒去半帶生灰相間煎服皂莢刺性上行主上焦病凡癰疽藥太溫加干薄荷煎服石膏性寒始亦疑之然火煅通紅盆覆地上以出火毒最能收暈使瘡口把就不至爛肌附諸方真人活命飲治癰疽發背發腦發髭發脅癤毒騎毒腫肚癰腿癰附骨癰疽惡瘡惡漏瘡血塊氣塊面目手足浮腫隨病加減並宜治之天花粉一錢甘草節乳香透明各一錢穿山甲三大片蛤粉炒去粉赤芍藥白芷貝母各一錢防風去蘆七分沒藥皂角刺各五分當歸尾酒洗陳皮各一錢半金銀花三錢或加大黃一錢木鱉子去殼八分體虛加黃耆一錢在背俞皂角刺為君在腹白芷為君在胸次加栝蔞二錢在四肢金銀花為君如疔瘡加紫河車草根三錢無加亦可上作一貼用金華好酒一鍾半煎至一鍾溫服煎時次用大瓦瓶以紙密封口勿令泄氣能飲酒服藥後再飲數鍾浩大不可憶度偈云真人活法世間稀大惡癰疽總可醫消毒只如湯潑雪化膿漸使肉生肌陰功豈止萬人活神效何須刻日期留下仙方誠信授存仁修制上天知此方治一切癰疽疔腫不同陰陽虛實善惡腫潰大痛或不痛先用此劑大勢已退然後隨餘證調治其功甚捷誠仙方也防風通聖散治癰疽通用方見中風門狗寶丸濟生方專治癰疽發背附骨疽諸般惡腫將發時先覺口中煩渴四肢沉重遍身壯熱乃其候也此藥功效不可具述蟾酥二錢金條蜈蚣七條全者酥炙黃色輕粉雄黃滴乳香沒藥烏金石即石炭各一錢狗寶癩狗腹中得之一錢又云一兩狗膽一個乾者用之去皮黑狗臘月者佳鯉魚膽一個乾者用之臘月者佳粉霜黃臘各三錢硇砂半兩麝香一分孩兒乳一合頭首者鉛白霜一錢一本無此上先將乳汁黃臘放在罐內文武火化開次將各藥末和成劑用時大人丸綠豆大小兒丸如芥子大每服三丸病重者加至五丸用白丁香七個研爛新汲水調送下腰以下食前服腰以上食後服如人行五里熱蔥白粥投之即以衣被蓋定汗出為度以後只吃白粥常服十宣散留頭其四邊以烏龍膏貼漏蘆湯精義治一切惡瘡毒腫丹瘤瘰癧疔腫魚睛五發瘭疽初覺一二日便如傷寒頭痛煩渴拘急惡寒肢體疼痛四肢沉重恍惚悶亂坐臥不寧皮膚壯熱大便秘澀小便赤黃並宜服之惟妊娠忌服漏蘆白蘞黃芩去黑心麻黃去節枳實麩炒去瓤升麻芍藥甘草炙各一錢大黃二錢朴硝一錢上水煎服千金漏蘆湯精要治證同前漏蘆連翹黃芩白蘞枳殼去瓤麩炒升麻粉草炙麻黃去根節各一錢大黃一錢半濕紙煨朴硝另研一字上作一服用水一盞半煎至八分去滓空心熱服淵然真人奪命丹專治疔瘡發背腦疽乳癰附骨疽一切無頭腫毒惡瘡服之便有頭不痛者服之便痛已成者服之立愈此乃惡證藥中至寶病危者服之亦可矣萬無一失不可輕易蟾酥二錢乾者老酒化血竭一錢乳香沒藥銅綠硃砂為衣各二錢輕粉半錢膽礬寒水石各一錢雄黃三錢麝香半錢腦子半錢無亦可蝸牛一十一個連殼用蜈蚣一條酒浸炙黃去頭足上為細末將蝸牛研作泥和前藥為丸如綠豆大若丸不就以好酒煮麵糊為丸每服只二丸先用蔥白三寸令病人嚼爛吐於手心男左女右將丸子裹在蔥白內用無灰熱酒三四盞送下於避風處以衣被蓋覆約人行五里之久再用熱酒數杯以助藥力發熱大汗出為度如汗不出重者再服二丸汗出即效初覺者二丸即消三五日病重者再進二丸如疔瘡走黃過心者難治汗出冷者亦死如病人不能嚼蔥擂爛裹藥仍以熱酒吞下瘡在上食