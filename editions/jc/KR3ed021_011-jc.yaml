body:
  text: 卷之十一眩運眩運方論眩言其黑運言其轉冒言其昏眩運之與冒眩其義一也其狀目閉眼暗身轉耳聾如立舟舡之上起則欲倒蓋虛極乘寒得之亦不可一塗而取軌也風則有汗寒則掣痛暑則熱悶濕則重滯此四氣乘虛而眩運也喜怒哀樂悲恐憂思鬱而生痰隨氣上厥此七情攻虛而眩運也淫欲過度腎家不能納氣歸元使諸氣逆奔而上此眩運之出於氣虛也明矣吐衄漏崩肝家不能收攝營氣使諸血失道妄行此眩運之生於血虛也又明矣以致新產之後血海虛損或淤滯不行皆能眩運是可不推尋致病之因乎治法隨機應敵其間以升降鎮墜行焉最不可妄施汗下然而眩運欲解自汗則有之若諸逆發汗劇者言亂目眩與夫少陰病下利止而頭眩時時自冒者此虛極而脫也識者將有采薪之憂肝脈溢大多作眩運諸風掉眩皆屬於肝眩運證治茯苓桂枝白朮甘草湯治氣上衝胸戰搖眩運茯苓一兩桂枝三分白朮甘草炙各半兩上銼散每服四錢新水煎服風證加川芎細辛濕證加川芎蒼朮寒證加乾薑良薑理中湯方見瀉門治寒濕眩運仍吞來復丹方見暑門甚者養正丹方見痼冷門芎術除眩湯治感濕感寒頭重眩運附子生白朮川芎各半兩官桂甘草炙各二錢半上銼每服三錢姜七厚片同煎食前服乾薑甘草湯方見脾疼門附子理中湯方見寒類並主虛寒眩運桂苓丸治暑證眩運肉桂茯苓等分上細末煉蜜丸每兩作八丸每服一丸用香薷銼散調下消暑丸通用方並見暑門十四友丸方見驚悸門安腎丸方見水飲門二藥夾和用和濟七氣湯送下方見諸氣門治七情相干眩運欲倒仍間用乳香泡湯下芎辛湯方見頭風門治痰飲厥逆眩運千金五套丸方見脾疼門治痰飲結聚胸脘眩運欲嘔香橘飲治氣虛眩運木香白朮半夏曲橘皮白茯苓縮砂各半兩丁香甘草炙各一分上銼散每服三錢姜五厚片同煎吞蘇合香丸方見嗽門本方加當歸川芎各三分官桂半兩治血虛眩運蘇沈沉麝丸治一切血運每服一丸研開用滴乳香泡湯調下芎藭湯方見血類加細辛石菖蒲治婦人血運眩冒不省人事次用和濟七氣湯佐之五苓散方見水飲門加赤茯苓治停飲眩冒心下悸氣養正丹方見痼冷門來復丹方見暑門升降陰陽用之養正丹夾和震靈丹以乳香泡湯下升降鎮墜功用兩全震靈丹方見瀉門黑錫丹方見痼冷門鎮墜眩運用之蘇合香丸用棗湯調開吞震靈丹治心氣不斂怔忪頭運二陳湯方見瘧門加生乾薑治因氣鬱痰眩運及酒食所傷眩運吞來復丹尤勝芷彈丸治風證眩運及血證眩運新白芷擇大塊湯蕩洗三次曬乾上為末煉蜜丸彈子大每服一丸荊芥煎湯嚼下白附子丸治風痰上厥眩運頭疼白附子炮南星炮半夏蕩七次旋覆花甘菊天麻川芎橘紅殭蠶炒去絲嘴乾薑生各一兩全蠍半兩焙上末用生薑半斤取汁打麵糊小丸每五十丸食後荊芥湯下人參前胡湯治風痰頭運目眩前胡橘紅半夏曲木香枳殼制紫蘇葉赤茯苓南星炮甘草炙各半兩人參三錢上粗末每三錢姜七厚片慢火熟煎服真方白丸子方見身疼門用三十丸蘇合香丸三粒全蠍一個炙為末三件研和以紫蘇橘皮煎湯入生薑汁少許調下治諸風眩運搐掣語短嘔吐驚悸驚悸方論人之所主者心心之所養者血心血一虛神氣不守此驚悸之所肇端也曰驚曰悸其可無辨乎驚者恐怖之謂悸者怔忪之謂心虛而鬱痰則耳聞大聲目擊異物遇險臨危觸事喪志心為之忤使人有惕惕之狀是則為驚心虛而停水則胸中滲漉虛氣流動水既上乘心火惡之心不自安使人有怏怏之狀是則為悸驚者與之豁痰定驚之劑悸者與之逐水消飲之劑所謂扶虛不過調養心血和平心氣而已若一切以剛燥用工或者心火自炎又有熱生風之證驚悸證治養心湯治心虛血少驚惕不寧黃耆炙白茯苓茯神半夏曲當歸川芎各半兩遠志取肉薑汁醃焙辣桂柏子仁酸棗仁浸去皮隔紙炒香北五味子人參各一分甘草炙四錢上粗末每服三錢姜五片棗二枚煎食前服加檳榔赤茯苓治停水怔悸寧志丸治心虛血虛多驚人參白茯苓茯神柏子仁琥珀當歸酸棗仁溫酒浸半日去殼隔紙炒香遠志酒浸半日新布裹捶取肉焙各半兩乳香硃砂別研石菖蒲各一分上末煉蜜丸桐子大每三十丸食後棗湯下參乳丸治心氣不足怔忪自汗人參半兩當歸一兩曬乾乳香一錢半研上末山藥煮糊丸桐子大每三四十丸食後棗湯下十四友丸治心血俱虛怔忡驚惕柏子仁研遠志肉薑汁醃焙酸棗仁湯浸去皮隔紙炒香紫石英煅熟乾地黃川當歸白茯苓白茯神人參黃耆炙阿膠炒辣桂龍齒研各一兩硃砂半兩研上細末煉蜜丸桐子大每三四十丸食後棗湯下朱雀丸治心病怔忪不止白茯神二兩淨沉香半兩上細末煉蜜丸小豆大每三十丸人參煎湯下密陀僧散治大驚入心敗血頑痰填塞心竅喑不能言密陀僧即是爐底研極細上每服挑一大錢匕無熱者用熱酒調下有熱者沸湯泡麝香調下亦治暗風頗有奇效出夷堅志溫膽湯治心膽虛怯觸事多驚亦治水氣怔悸半夏制枳殼制白茯苓各一兩橘紅一兩半甘草炙半兩上銼每服三錢半姜七片棗二枚刮青竹皮一塊如錢大煎服或加制遠志尤妙加味四七湯治心氣鬱滯豁痰散驚半夏制二兩半白茯苓厚朴制各一兩半茯神紫蘇葉各一兩遠志薑汁蘸濕取肉焙甘草炙各半兩上銼每服四錢姜七片石菖蒲半寸棗二枚煎服茯苓甘草湯治心下停水忪悸茯苓桂枝各二兩甘草炙一兩生薑三兩上銼每服四錢水煎服薑朮湯治虛證停飲怔忪白姜生白朮茯苓半夏曲各半兩辣桂甘草炙各一分上銼每服三錢薑棗煎服小半夏茯苓湯五苓散並主水氣心下怔忪方見水飲門炙甘草湯治心下動悸其脈結代動而時止曰代甘草炙一兩人參半兩生乾地黃四兩桂枝三分麻仁麥門冬去心各一合生薑三分大棗八枚上粗末每挑三大錢水一盞半酒半盞煎至八分入透明阿膠一片俟膠消溫和服日進三劑不拘時寧志膏治因驚失心人參酸棗仁湯浸去皮各一兩辰砂半兩滴乳香一錢浮缽坐水研上末煉蜜和杵丸如彈子每一丸薄荷湯化下附諸方硃砂安神丸治血虛心煩懊憹驚悸怔忡胸中氣亂方見內傷門加味定志丸治痰迷心膈驚悸怔忡遠志去心二兩人參一兩菖蒲二兩白茯苓三兩琥珀鬱金各五錢上為細末煉蜜丸如梧子大硃砂為衣每服二十丸米湯下健忘丹溪云精神短少者多亦有痰者戴云健忘者為事有始無終言談不知首尾此以為病之名非此生成之愚頑不知人事者歸脾湯濟生方治思慮過制勞傷心脾健忘怔忡白朮茯神去木黃耆蜜炙龍眼肉酸棗仁去殼人參去蘆各一兩木香半兩甘草炙二錢半上㕮咀每服四錢水一鍾姜五片棗一枚煎七分溫服人參遠志丸聖惠方治氣不足驚悸健忘神思不寧天門冬去心白茯苓菖蒲各七錢半人參去蘆遠志去心酸棗仁黃耆蜜炙各半兩桔梗丹砂官桂去皮各二錢半上為末蜜丸如豆大每服二十丸至三十丸米湯下寧心膏和濟方治心神懊憹一時健忘方見前
