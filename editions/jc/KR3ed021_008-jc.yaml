body:
  text: 卷之八咳嗽咳嗽方論江流滔滔日夜無聲狂瀾激石不平則鳴所以咳嗽者痰塞胸脘氣逆不下衝擊而動肺耳然亦何以致此哉曰感風傷冷挾熱受濕淤血停水與夫肺實肺虛皆能壅痰而發嗽也夫肺為嬌臟外主一身之皮毛內為五臟之華蓋形寒飲冷最易得寒燥氣鬱蒸最易生熱惟其易為冷熱所以內外交侵動則邪氣窒塞矣此非不平而鳴乎感風者鼻塞聲重傷冷者悽清怯寒挾熱為焦煩受濕為纏滯淤血則膈間腥悶停水則心下怔忡或實或虛痰之黃白唾之稀稠從可知也治嗽大法肺脈浮為風邪所客以發散取之肺脈實為氣壅內熱以清利行之脈濡散為肺虛以補肺安之其間久嗽之人曾經解利以致肺胃俱寒飲食不進則用溫中助胃加和平治嗽等輩至若酒色過度虛勞少血津液內耗心火自炎遂使燥熱乘肺咯唾膿血上氣涎潮其嗽連續而不已惟夫血不榮肌故邪在皮毛皆能入肺而自背得之尤速此則人參芎歸所不可無一種傳注病涉邪惡五臟反克毒害尤深近世率用蛤蚧天靈蓋桃柳枝丹砂雄黃安息香蘇合香丸通神之劑然則咳嗽證治於此可以問津索途矣抑尤有說焉肺出氣也腎納氣也肺為氣之主腎為氣之藏凡咳嗽暴重動引百骸自覺氣從臍下逆奔而上者此腎虛不能收氣歸元也當以補骨脂安腎丸主之毋徒從事於寧肺諸氣諸痰咳嗽喘壅之煩須用枳殼為佐枳殼不惟寬中又能行其氣氣下痰下他證自平咳嗽證治華蓋散治肺感風寒痰壅咳嗽麻黃去節紫蘇子炒杏仁去皮尖炒桔紅桑白皮炒赤茯苓各一兩甘草炙半兩上細銼每服二錢半薑棗煎食後服隨意加製半夏添姜煎加減麻黃湯治肺感寒邪咳嗽麻黃去節一兩辣桂甘草炙各半兩杏仁五十枚去皮尖微炒別研陳皮半夏制各半兩上細銼拌和杏仁每三錢紫蘇三葉姜四片煎服溫肺湯治肺虛感冷咳嗽嘔吐痰沫乾薑辣桂甘草炙半夏制陳皮北五味子杏仁去皮尖各一兩細辛阿膠炒各半兩上粗散每二錢半薑棗煎服三拗湯治寒燠不常暴嗽喘急鼻塞痰壅麻黃不去節杏仁不去皮尖各一兩甘草不炙半兩上銼散每二錢半姜五片煎服金沸草散治上壅熱嗽荊芥穗二兩旋覆花去梗麻黃去節北前胡各一兩半半夏制赤芍藥甘草炒各半兩上細銼每二錢半加炒葶藶半錢姜四片煎服如咽喉焦燥加朴硝食後又治傷風鼻塞流涕壅嗽若聲啞嗽不止兼服人參款花膏人參款花膏款冬花紫菀茸洗去土炒用人參北五味子桑白皮炒等分上為末煉蜜丸小彈子大含化一丸或淡薑湯嚼下若身熱口乾兼服天麻防風丸天麻防風丸人參天麻防風各一兩全蠍炒直殭蠶炒各半兩硃砂研雄黃研甘草炙各一分牛黃一錢麝一字上細末煉蜜丸桐子大每二丸紫蘇薄荷湯嚼下清肺飲治肺氣上熱咳嗽前胡荊芥桑白皮炒甘草炙枳殼制各三分知母貝母去心炒腦荷赤茯苓北梗紫蘇阿膠炒杏仁去皮天門冬去心各半兩上銼散每三錢姜三片烏梅一枚食後煎服如更內實與解毒雄黃丸方在積熱門黃連阿膠丸治肺熱或咯血黃連淨三兩赤茯苓二兩阿膠炒一兩上黃連茯苓同末水調阿膠和眾手丸桐子大每三十丸食後米飲下黃連赤茯苓能抑心火則肺得其清不換金正氣散治傷濕咳嗽方見寒類如赤茯苓生乾薑煎服大阿膠丸治肺虛客熱咳嗽咯血嘔血阿膠炒熱地黃淨白茯苓北五味子山藥各一兩貝母去心炒百部柏子仁茯神丹參杜仲去粗皮銼炒麥門冬去心各半兩遠志浸去心炒人參防風各一分上細末煉蜜丸彈子大每一丸少水略煎食後臨臥服或金沸散加腦荷煎湯嚼下凡嗽藥不效覺胸膈腥悶乃宿血乘肺黑豆入紫蘇生薑煎汁與之桑皮散治上焦有熱壅血腥悶嗽聲連並氣不得透腦荷北梗川芎防風桑白皮炒黃芩北前胡柴胡紫蘇赤茯苓枳殼制各一分甘草炙一分半上銼細每三錢薑棗煎服或吃梨亦可小青龍湯治表證水氣身熱嗽喘乾嘔怔忡十棗湯治里有水氣身涼咳痞滿脅痛藥證方見水飲門真武湯治少陰腎證水飲與裡寒合而作嗽腹痛下白茯苓白朮白芍藥各一兩熟附子半兩上銼散每二錢半加生乾薑細辛五味子各半錢姜三片食前服凡年高氣弱久嗽通用仍間服養正丹補肺湯治肺虛氣乏久嗽阿膠炒真蘇子北梗半夏制甘草炙各半兩款冬花紫菀細辛杏仁去皮焙陳皮桑白皮炒青皮縮砂仁五味子石菖蒲草果各一分上銼散每三錢姜四片紫蘇三葉煎服理中丸補肺止寒嗽人參乾薑白朮甘草炙等分上末煉蜜丸彈子大每一丸加炒阿膠五味子煎服加味理中湯治肺胃俱寒咳嗽人參白朮乾薑不炒甘草炙半夏制茯苓橘紅細辛北五味子等分上細銼每服二錢半薑棗煎食前服曾經解利者通用養胃湯方見寒類人參款花膏方見前二藥兼服治肺胃俱寒作嗽或煎人參飲嚼下大阿膠丸亦可人參飲咳嗽痰壅通用人參北梗半夏曲五味子細辛枳殼制赤茯苓杏仁不去皮各一分甘草炙半分上細銼每三錢姜五片烏梅半個食後煎服養肺湯治肺壅上氣痰嗽人參紫菀赤茯苓杏仁不去皮真蘇子陳皮桑白皮炙款冬花半夏曲北梗甘草炙等分上為粗末每三錢姜四片烏梅半個食後煎服寒者加桂寧嗽湯諸嗽通用桑白皮炒紫蘇細辛北五味子橘皮半夏制茯苓杏仁去皮縮砂仁枳殼制北梗甘草炒等分上銼散每三錢姜四片烏梅半個食後煎服人參潤肺散治咳嗽喘急痰壅鼻塞麻黃去節杏仁去皮麩炒貝母去心麩炒各一兩人參阿膠炒甘草炙各半兩橘紅北梗各一分上粗末每二錢半紫蘇三葉煎服亦能發散小兒通用冷嗽寒痰方橘皮半夏湯大七氣湯夾和每三錢姜七片棗二個同煎吞白丸子三十粒加味半夏茯苓湯治痰多咳嗽半夏制二兩半茯苓一兩半陳皮五味子各一兩人參細辛甘草炙各半兩上銼散每四錢姜七厚片煎服南星散治風氣動痰發嗽生南星一兩枳殼制細辛各半兩木香甘草炙各一分上㕮咀每服三錢姜七厚片慢火熟煎服人參芎歸湯治虛勞少血津液內耗心火自炎燥熱乘肺咳嗽咯血及血不榮肌動輒毛寒咳嗽當歸川芎白芍藥各二分人參半夏制橘皮赤茯苓阿膠炒細辛北五味子甘草炙各一分上銼每服三錢姜四片棗二個煎服人參芎歸湯大阿膠丸方見前兼服治腎虛勞嗽人參胡桃湯夾和定肺湯方見喘門治勞氣喘急七寶散治肺痿勞嗽久嗽人參款冬花鐘乳石鵝管石並生研明礬煅各二錢辣桂甘草各一錢上細末臨臥以少許嚥下兩次黃耆建中湯方見濕門加半夏曲生乾薑五味子同煎空心吞安腎丸方見水飲門治腎經虛寒咳嗽痰唾面色黯黑小腹動氣作痛消膿飲治肺有癰膿腥氣上衝嘔吐咳嗽生南星一兩知母貝母去心炒生地黃阿膠炒川芎桑白皮炒甘草炙各三分防風射干北梗天門冬去心腦荷杏仁不去皮半夏制紫蘇葉白芷白芨各半兩上銼散每四錢姜七片烏梅一個食後煎服雄黃散治傳疰勞嗽肺管有蟲令人喉癢雄黃安息香各一分露蜂房去子燒灰桃仁去皮炒各二分麝少許上為末每用一錢生艾葉入生蜜研汁夾和臨臥含化仍燒艾以管子吹煙燻喉蘇合香丸安息香二兩別為末用無灰酒一升熬膏蘇合香油一兩入安息膏內白朮丁香青木香白檀香沉香蓽茇香附淨訶子煨取肉烏犀鎊屑硃砂研水飛各二兩薰陸香龍腦研各一兩麝香一兩半上為細末入研藥拌和用安息香膏並煉白蜜和劑每一大丸沸湯化下前氣血風類後諸痛嘔逆類並用此咳逆方蘇合香丸用丁香柿蒂湯調下噫逆即咳逆胃寒所致也良薑為要藥人參白茯苓佐之良薑溫胃能解散胃中風邪安腎丸方見諸虛門凡咳嗽暴重覺氣從臍下逆奔而上者蓋腎虛氣不歸元補骨脂安腎丸主之附諸方參蘇飲治上膈有熱咳嗽聲重方見傷風門五拗湯澹寮方治風寒咳嗽肺氣喘急麻黃不去節杏仁不去皮甘草生用荊芥穗桔梗各等分上㕮咀姜三片同煎溫服咽痛甚者煎熱後加朴硝少許一方去桔梗荊芥用半夏枳實等分人參荊芥散濟生方治肺感風邪上壅咳嗽頭目不清言語不出咽乾項強鼻流清涕陳皮去白荊芥穗桔梗半夏湯泡七次細辛洗去土甘草炙人參杏仁去皮尖通草麻黃去根節各半兩上㕮咀每服四錢水盞半姜五片煎八分食後溫服消風百解散和劑方治咳嗽聲重身熱頭疼方見傷風門加減三奇湯東垣方治咳嗽上氣喘促胸膈不利桔梗陳皮甘草青皮人參紫蘇桑白皮各五錢半夏七錢杏仁三錢五味子四錢上㕮咀每六七錢入姜煎服加減瀉白散東垣方治陰氣在下陽氣在上咳嗽嘔吐喘急桑白皮一兩地骨皮七錢陳皮青皮五味子人參各五錢白茯苓一錢上㕮咀每服半兩水煎入粳米二十粒人參五味子散聖惠方治男女老稚諸虛百損氣血勞傷涎喘咳膿或嗽咯血寒熱往來夜有盜汗羸瘦困乏一切虛損人參五味子桔梗白朮白茯苓甘草炙熟地黃當歸焙半兩地骨皮前胡去苗桑白皮炒枳殼去瓤炒黃耆炙陳皮去白柴胡各三錢上㕮咀每服八錢水一盞半生薑三片煎至八分去滓溫服食後服日三次煩渴加烏梅青蒿煎咳膿血加知母阿膠煎尤妙諸般嗽不已粟殼制烏梅去核陳皮去白人參去蘆木香五味子桔梗炒杏仁去皮尖炒石膏甘草上㕮咀每服八錢齏水二盞煎至八分去滓溫服食後止嗽煙筒方冬花蕊鵝管石雄黃艾葉各等分上為末用紙捲筒內用火點煙入口內吞下就用水吞一口以塞煙氣立效加味人參紫菀散治虛勞咳嗽大寧嗽湯勞嗽諸嗽通用神效並見虛勞門咳嗽治例出名醫雜著王節齋曰咳謂有聲肺氣傷而不清嗽謂有痰脾濕動而生痰咳嗽者因傷肺氣而動脾濕也病本雖分六氣五臟之殊而其要皆主於肺蓋肺主氣而聲出也須分新久虛實新病風寒則散之火熱則清之濕熱則瀉之久病便屬虛屬郁氣虛則補氣血虛則補血兼鬱則開鬱滋之潤之斂之降之則治虛之法也主方杏仁去皮尖白茯苓各一錢橘紅七分五味子桔梗甘草各五分春作多上升之氣宜潤肺抑肝加川芎芍藥半夏各一錢麥門冬炒黃芩知母各五分春若傷風致咳鼻流清涕宜辛涼解散加防風薄荷紫蘇炒黃芩麥門冬各一錢夏多火熱炎上最重宜清金降火加桑白皮知母炒黃芩麥門冬石膏各一錢秋多濕熱傷肺宜清熱瀉濕加蒼朮桑白皮各一錢防風黃芩山梔各五錢炒冬多風寒外感宜解表行痰加麻黃桂枝半夏生乾薑防風各一錢肺經素有熱者再加酒炒黃芩知母各五分若發熱頭痛鼻塞聲重再加藁本川芎前胡柴胡各一錢若有痰加半夏枳殼風痰再加南星薑汁炒濕痰脾困少食加白朮蒼朮有痰而口燥咽乾勿用半夏南星宜加知母蜜水拌炒貝母栝蔞仁黃芩炒若夏月熱痰或素熱有痰加黃芩黃連知母石膏上半日咳者胃中有火加貝母石膏黃連五更嗽者同治黃昏咳者火浮於肺不宜正用寒涼藥宜加五味子訶子皮斂而降之若咳嗽久肺虛滋氣補血加人參黃耆阿膠當歸生薑天門冬款冬花馬兜鈴酒芍藥之類肺熱咳喘去人參用沙參此兼補氣血也若午後咳者屬陰虛即勞嗽也宜補陰降火加川芎當歸芍藥熟地黃黃柏知母竹瀝薑汁天門冬栝蔞仁貝母此專補陰血也若火鬱嗽謂痰鬱火邪在中宜開鬱消痰用訶子皮便香附栝蔞仁半夏曲海石青黛黃芩為末蜜調為丸噙化仍服前補陰降火藥失治則成勞若痰積食積作咳嗽者用香附栝蔞仁貝母海石青黛半夏曲軟石膏山楂子枳實姜炒黃連為末蜜調噙化若勞嗽見血加阿膠當歸芍藥天門冬知母貝母桑白皮亦於前肺虛陰虛二條擇用大抵咳嗽見血多是肺受熱邪氣得熱而變為火火盛而陰血不寧從火上升故治宜瀉火滋陰忌用人參等甘溫補氣之藥然亦有氣虛而咳血者則宜用人參黃耆款冬花三藥但此等證不多耳因咳而有痰者咳為重主治在肺因痰而致咳者痰為重主治在脾但是食積成痰痰氣上升以致咳嗽只治其痰消其積而咳自止不必用肺藥以治嗽也針灸法風門二穴在背二椎下各開半寸肺俞二穴三椎下各寸半三里二穴見前附肺痿肺癰肺痿方論金匱曰熱在上焦者因咳為肺痿得之或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之寸口脈數其人咳口中反有濁唾涎沫者為肺痿若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰咳傷肺葉成也丹溪云宜補血養肺養氣清金虛者用人參平肺散治之紫菀散拔粹方治咳嗽唾中有膿血虛勞證肺痿變癰人參桔梗茯苓各一錢知母貝母各一錢半紫菀甘草阿膠炒各五分五味子十五粒上㕮咀水煎服一云各等分水二盞生薑三片煎至一盞食前服人參平肺散拔粹方治心火克肺傳為肺痿咳嗽嘔痰涎壅盛胸膈痞滿咽嗌不利桑白皮炒一兩知母七錢甘草炙地骨皮各半兩青皮五味子三百個茯苓人參各四錢陳皮去白半兩天門冬去心四錢如熱加黃芩四錢紫蘇葉半夏各半兩上㕮咀每服五錢水二盞生薑三片煎至八分去滓溫服或為末薑汁丸彈子大噙化亦得食後知母茯苓湯宣明方治肺痿喘嗽不已往耒寒熱自汗茯苓甘草炙各一兩知母五味子人參去蘆薄荷半夏洗七次柴胡去苗白朮款冬花桔梗麥門冬去心黃芩各半兩川芎阿膠各二錢炒上㕮咀每服一兩水二盞生薑十片煎至一盞去滓通口服食後生薑甘草湯千金方治肺痿咳唾痰涎不止咽燥而渴生薑五兩人參二兩甘草四兩大棗十五枚上四味以水七升煮取三升分溫三服七寶散治肺痿勞嗽久嗽方見前咳嗽門保和丸葛氏方治勞嗽肺成痿者服之決效潤肺膏葛氏方治久肺燥成痿並見癆瘵門葶藶大棗瀉肺湯治肺癰喘不得臥葶藶熬令黃色搗丸如彈子大大棗十二枚上先以水三升煮棗取二升去棗納葶藶煮取一升頓服桔梗湯金匱方治咳而胸滿振寒脈數咽乾而渴時出濁唾腥臭久吐膿如米粥者為肺癰桔梗二兩甘草二兩上二味以水三升煮取一升分溫再服則吐膿血也桔梗湯濟生方治肺癰咳嗽膿血咽喉多渴大小便亦澀桔梗去蘆貝母去心膜當歸去蘆酒浸栝蔞子枳殼去瓤麩炒薏苡仁炒桑白皮蜜水炙防己各二兩黃耆去蘆一兩半甘草節生用杏仁去皮尖麩炒百合蒸各半兩上㕮咀每服五錢水盞半生薑五片煎八分不拘時服如大便秘加大黃小便赤少加木通消膿飲治肺癰膿腥氣上衝而嘔咳嗽方見前咳嗽門針灸法肺俞二穴穴法見前膻中一穴在兩乳相系肉下一寸六分又名元兒仰取之喘嗽喘嗽方論肺主氣也一呼一吸上升下降營衛息數往來流通安有所謂喘惟夫邪氣伏藏癡涎浮湧呼不得呼吸不得吸於是上氣促急填塞肺脘激亂爭鳴如鼎之沸而喘之形狀具矣有肺虛挾塞而喘者有肺實挾熱而喘者有水氣乘肺而喘者有驚憂氣鬱肺脹而喘者又有胃絡不和喘出於陽明之氣逆真元耗損喘生於腎氣之上奔如是等類皆當審證而主治之肺虛肺寒必有氣乏表怯冷痰如冰之證法當溫補如官桂阿膠之類是也肺實肺熱必有壅盛胸滿外烘上炎之狀法當清利如桑白皮葶藶之類是也水氣者漉漉有聲怔忡浮腫與之逐水利小便如小半夏茯苓湯五苓散輩驚憂者惕惕悶悶引息鼻張與之寬中下氣如四七湯桔梗枳殼湯輩陽明之氣下行今逆而上行古人以通利為戒如分氣紫蘇飲指迷七氣湯加半夏二陳湯加縮砂施之為當真陽虛憊腎氣不得歸元固有以金石鎮墜助陽接真而愈者然亦不可峻驟且先與安腎丸八味丸輩否則人參煎湯下養正丹主之雄黃麻黃馬兜鈴漢防己雞內金諸品非不主喘也如前治法大要究其受病之源至若傷寒發喘表汗里下腳氣喘滿疏導收功此則但療本病其喘自安圓機之士可以舉隅而反矣雖然喘有利下而愈者亦有因瀉而殂者喘有數年沉痼而復瘳者亦有忽因他疾大喘而不救者汗出發潤喘者為肺絕身汗如油喘者為命絕直視譫語喘滿者不治諸有篤病正氣欲絕之時邪氣盛行多壅逆而為喘然則喘之危惡又安可以尋常目之喘嗽證治九寶湯經年喘嗽通用常服屢效麻黃去節橘紅腦荷各一兩辣桂紫蘇桑白皮炒杏仁去皮尖大腹子連皮甘草炙各半兩上細銼每服三錢姜五片烏梅一個水煎食後臨臥服或入童子小便半盞同煎尤妙定肺湯治上氣喘嗽紫菀茸北五味子橘紅杏仁去皮尖略炒甘草炙真蘇子炒桑白皮炒半夏制枳殼制等分上細銼每三錢姜五片紫蘇五葉食後煎服調降湯治喘嗽枳殼制一兩半夏制北梗青皮陳皮真蘇子檳榔茯苓葶藶隔紙炒各半兩木香白豆蔻仁縮砂仁紫蘇葉各二錢半甘草炙三分上銼散每三錢姜五片煎服杏蘇飲治上氣喘嗽浮腫紫蘇葉二兩五味子大腹皮烏梅肉杏仁去皮尖各一兩半陳皮北梗麻黃去節桑白皮炒阿膠炒各三分紫菀甘草炒各一兩上㕮咀每三錢姜五片煎服五味子湯治寒喘北五味子杏仁去皮麩炒橘紅各一兩麻黃去節一兩半甘草炙生乾薑辣桂各半兩上粗末每服二錢半蘇三葉煎服肺虛加炒阿膠喘甚加馬兜鈴人參胡桃湯治肺虛發喘氣乏人參一寸揀者胡桃肉二個去殼不去皮上切碎姜錢五片棗二枚食後臨臥煎服蓋人參定喘帶皮胡桃斂肺夷堅志方三拗湯方見咳嗽門寒證喘者加生乾薑辣桂熱證喘者加葶藶腦荷煎畢入朴硝少許玉華散清肺定喘甘葶藶焙香桑白皮炒天門冬去心馬兜鈴半夏制紫菀杏仁去皮尖貝母炮百合人參各半兩百部甘草炙各一分上銼散每服二錢半姜四片大棗三枚煎服小青龍湯方見水飲門本方去麻黃加杏仁去皮三兩治水氣喘嗽若小腹滿更加茯苓郁李仁丸治水氣乘肺動痰作喘身體微腫葶藶隔紙炒杏仁去皮尖防己郁李仁炒真蘇子陳皮赤茯苓各半兩上末煉蜜丸桐子大每三四十丸食後生薑紫蘇湯下神秘湯治水氣作喘陳皮北梗紫蘇人參五味子檳榔桑白皮炒半夏制甘草炙等分上細銼每服三錢姜五片煎服小半夏茯苓湯五苓散方見水飲門田七湯治驚憂氣遏上喘半夏制二兩半茯苓二兩厚朴制一兩半紫蘇葉一兩上㕮咀每服三錢半姜七片棗二枚煎服桔梗枳殼湯指迷七氣湯分氣紫蘇湯方見氣門二陳湯方見瘧類安腎丸方見水飲門八味丸養正丹見痼冷門治腎虛上喘凡腎虛而喘須以人參為佐五靈丸治久喘木香半兩馬兜鈴去殼炒葶藶微炒各一分川五靈脂二兩上為細末煉蜜丸桐子大每二十丸杏仁三個捶碎姜三片煎湯下雄黃丸至誠修合治喘雄黃研白礬煅木香生葶藶各一分馬兜鈴去殼雞內金淡豆豉各三錢半信砒鋒芒瑩者研生用一錢半上八味各取實分數並細末研米漿煮糊丸如胡椒大每服五丸茶清稍冷臨臥送下加至七丸而止次日飲食勿用熱綠豆生嚼解砒霜毒控痰良方方見痰飲門治喘嗽虛勞喘嗽眩運方靈砂一兩研細人參木香各二錢半大香附杵淨大紅川椒去合口並子焙出汗各半兩上細末糕糊丸麻子大每服二十丸空心食前橘皮湯下川椒引氣歸元附諸方蘇沉九寶湯簡易方治老人小兒素有喘疾遇寒暄不常發則連綿不已咳嗽哮吼夜不得睡桑白皮甘草大腹皮麻黃官桂薄荷陳皮紫蘇杏仁各六分上㕮咀每服三錢水盞半姜三片烏梅半個煎六分服五味子湯活人方治喘促脈伏而數者五味子五錢人參麥門冬去心杏仁去皮尖生薑陳皮各一錢半棗子三枚上㕮咀作二服每服水二盞煎至一盞食後溫服四磨湯治七鬱結上氣喘急人參檳榔沉香烏藥上件各濃磨水和煎三五沸溫服千緡湯治痰喘不能臥人扶而坐一服即安半夏七個銼泡七次甘草炙一寸生薑一指皂角一寸上㕮咀作一服水煎丹溪治痰喘方南星半夏杏仁栝蔞仁香附陳皮去白皂角灰蘿蔔子上為末神麯糊為丸每服六七十丸薑湯下五虎湯治喘急痰氣麻黃七分杏仁去皮尖一錢甘草四分細茶炒八分白石膏一錢五分上作一服白水煎風寒傷而喘者三拗湯華蓋散神秘湯可選而用之象云止喘氣促以天門冬人參黃耆為主針灸法璇璣一穴在天突下一寸氣海一穴在臍下一寸半三里二穴聲音聲音方論心為聲音之主肺為聲音之門腎為聲音之根風寒暑濕氣血痰熱邪氣有干於心肺者病在上脘隨證解之邪氣散則天籟鳴矣惟夫腎虛為病不能納諸氣以歸元故氣奔而上咳嗽痰壅或喘或脹髓虛多唾足冷骨痿胸腹百骸俱為之牽制其嗽愈重其氣愈乏其聲愈干君子當於受病之處圖之可也按錢氏方小兒吐瀉利其小便過多以致脾虛不食錢用益黃散作效數日以後忽爾不語錢知其脾氣已復腎氣尚虛投以地黃丸益腎相繼數劑於是能言余益信聲音之根出於腎也不誣矣諸病不語或聲干沉難以痊復余見活人總括小兒疳啞見小兒類聲音證治星姜飲治風邪風毒纏喉不語南星略炮半兩生薑四錢橘皮三錢上銼每服三錢紫蘇五葉煎服荊蘇湯失音通用荊芥蘇葉木通橘紅當歸桂石菖蒲上等分銼煎四錢服金沸草散人參款冬花膏兼服治傷風鼻塞涕流壅嗽聲啞熱證通用方見嗽門二物湯治風寒邪氣留滯失音辣桂半兩石菖蒲二錢上銼每服二錢半新水煎細呷歸荊湯治風痙口噤不語項強背直身腰反張方附在濕門小柴胡湯治伏暑發熱汗渴暑入心包不語方見血類加茯苓煎不換金正氣散方見寒類加石菖蒲治濕證聲啞加桂治寒證聲啞三因七氣湯方見氣門加枳殼甘草治氣隔聲沉犀角地黃湯治血證心忪語短眩冒迷忘生地黃四兩淨犀角牡丹皮芍藥各半兩上銼每服四錢入桃仁去皮尖七粒煎服如無犀角以升麻代硃砂丸治打撲驚忤血入心竅不語方見血類二陳湯方見瘧類加石菖蒲煎吞白丸子方見身疼類治痰證聲沉金花散治失音亦治喉痹槐花新瓦上炒香熟三更後床上仰臥隨意食之熱證通用密陀僧散治大驚入心痰血窒塞喑不能言亦治暗風方見驚悸門治䘌桃仁湯治狐惑蟲食其臟上唇瘡其聲啞桃仁浸去皮焙槐子艾葉各一兩大棗十五枚上用水三盞煎至一盞半分三次服人參平肺湯治腎虛聲不出人參川芎當歸熟地黃洗曬白芍藥白茯苓菟絲子酒浸爛研細北五味子杜仲去粗皮銼薑汁製炒去絲巴戟酒浸去心曬橘紅半夏曲各半兩牛膝酒浸焙白朮補骨脂炒葫蘆巴炒益智仁甘草炙各二錢半石菖蒲一錢半上銼細每服三錢姜五片棗二枚食前煎吞山藥丸七十粒方見漏濁門五更頭腎氣開不得咳唾言語默然再進上藥功效勝常杏仁煎治咳嗽暴重聲音不出杏仁水浸去皮研膏冬蜜砂糖薑汁各一盞桑白皮去赤炒木通貝母去心各一兩半北五味子紫菀茸各一兩石菖蒲半兩款冬花蕊上後六味銼以水五升煎半去滓入杏薑糖蜜夾和微火煎取一升半每服三合兩日夜服之木通湯治諸風失音木通石菖蒲防風羌活桑螵蛸全蠍焙直殭蠶炒甘草炙各一分圓白南星略炮半兩上銼每服二錢半紫蘇五葉姜五片熟煎服附諸方訶子湯治失音不語訶子四個半生半煨桔梗一兩五錢半生半炒甘草二寸一寸生一寸熟上為粗末分二帖每帖水一盞童便一盞煎至八分去滓食後溫服玉粉丸治冬月寒痰結於咽喉不利語音不出針經云寒氣客於會厭猝如啞宜服此藥桂心草烏各一字半夏湯洗五錢上為細末薑汁浸蒸餅為丸如雞頭大每服一丸至夜含化多年不愈者亦效響聖破笛丸治歌謳失音不語者宜服神效連翹桔梗甘草各二兩半薄荷四兩訶子肉炒砂仁大黃各一兩川芎一兩半百藥煎二兩上為細末雞子清和為丸如彈子大每服一丸臨臥噙化服一方治失音不語百藥煎杏仁去皮尖百合訶子肉薏苡仁各等分上為末以雞子清和丸如彈子大每用一丸臨臥噙化
