body:
  text: 卷之四風緩附痿證風緩方論風緩者風邪深入而手足為之緩弛也夫人四肢百脈逢寒則攣急遇熱則柔緩病在陽經氣行遲而關以縱病在陰經氣行疾而關以收此物理之常然也然脾主肌肉四肢胃為水穀海所以流布水穀之氣周養一身脾胃既虛肢體失其所養於是風邪襲虛由腠理而入肌肉由肌肉而入脾胃安得不為之緩廢乎若曰驅風之劑與助胃之劑不同亦顧吾活法用之何如耳抑余聞人之一身筋骨為壯肝主筋腎主骨肝腎氣虛風邪襲之亦有肢體緩弱之證然則先散其風而後益之於此尤當加意風緩證治排風湯續命湯方見風類加製半夏雞心大檳榔增姜煎先以此散風毒邪氣蘇合香丸用沸湯泡生薑汁調開吞真料白丸子二十丸日二服治手足風緩或白丸子安腎丸夾用食前服方見嗽門身疼門水飲門不換金正氣散方見寒類加川芎官桂煎食前吞安腎丸治脾胃肝腎俱虛風入四體筋骨緩弱不仁仍早晨常服炒黑豆淋酒大聖一粒金丹治中風昏僕舌強涎潮癱瘓偏枯頑癢麻痹癲癇倒地閉目作聲項強反張口噤直視大川烏炮大附子炮去皮臍新羅白附子炮各二兩川五靈脂白殭蠶炒去絲嘴白蒺藜炒去刺各一兩白礬枯硃砂沒藥麝香另研各半兩上細末合和用松煙墨半兩新汲水磨汁搜丸每兩作六丸金箔二百片為衣令自干每服一丸以生薑半兩取自然汁磨開溫酒半盞調服蓋取微汗為效大鐵彈丸治中風癱瘓口眼喎斜筋骨攣疼肢體麻木自然銅燒紅醋淬七次一兩半虎脛骨酒浸炙黃當歸酒浸焙白附子炮川烏炮去皮臍五靈脂炒麻黃去節各一兩沒藥乳香全蠍焙安息香白芷直殭蠶炒去絲各半兩烏蛇肉酒浸焙乾三分木鱉二十一個去殼炒熟硃砂麝香各一分上為末以酒煮安息香入飛白麵為糊丸彈子大每一丸溫酒磨下蠍附散治肝腎氣虛風入筋骨手足緩弱小附子去皮生草烏頭炮去皮臍蒼朮炒牛膝酒浸焙川芎當歸天麻各半兩防己白芷黃耆蜜炙全蠍焙各一分上末每一錢黑豆淋酒調下兼用核桃肉研酒下食前服四斤丸治風寒濕毒與血氣搏筋骨緩弱四肢痠疼癢痹宣木瓜去穰切焙天麻銼牛膝銼焙蓯蓉洗切焙四味各一斤用好酒五升浸三日熟附子虎骨酥炙各二兩上為末用浸藥酒調麵糊丸桐子大每服三四十丸食前溫酒或豆淋酒下又方加當歸三分乳香沒藥五靈脂各半兩麝香一錢名大四斤丸用木瓜煎湯下亦治腳氣虎骨酒治諸風緩弱及歷節風骨節痠疼虎脛骨酥炙黃上捶碎如米每骨一升以酒三升浸五日空心服一盞冷則暖之鐵骨丹鐵彈丸方並見風類治諸風緩弛其它用藥風類甚詳也矣附痿證痿證方論內經曰肺熱葉焦五臟因而受之發為痿蹶心氣熱生脈痿故脛縱不任地肝氣熱為筋痿故宗筋弛縱脾氣熱生肉痿故痹而不任腎氣熱生骨痿故足不任身然治痿獨取陽明陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也云云故陽明虛則宗筋縱帶脈不引故足痿不用也或曰手陽明大腸經肺之腑也足陽明胃經脾之腑也治痿之法取陽明一經何也願明以告我丹溪先生曰內經云諸痿生於肺熱只此一句便見治法大意經曰東方實西方虛瀉南方補北方此固是就生克言補瀉而大經大法不外於此東方木肝也西方金肺也南方火心也北方水腎也五行之中惟火有二腎雖有二水居其一陽常有餘陰常不足故經曰一水不勝二火理之必然肺金體燥而居上主氣畏火者也脾土性濕而居中主四肢畏木者也火性炎上若嗜欲無節則水失所養木寡於畏而侮所勝肺得火邪而熱矣木性剛急肺受熱則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿之病作矣瀉南方則肺經清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此駱隆吉亦曰風火既熾當滋腎水東垣先生取黃柏為君黃耆等補藥之輔佐以治諸痿而無一定之方有兼痰積者有濕多者有熱多者有濕熱相半者有挾氣者臨病制方其善於治痿者乎雖然藥中肯綮矣若將理失宜聖醫不治也天產作陽厚味發熱先哲格言但是患痿之人若不淡薄食味吾知其必不能安全也丹溪云痿證斷不可作風治而用風藥有濕熱濕痰氣虛血虛淤血濕熱東垣健步丸加燥濕降陰火藥蒼朮黃芩黃柏牛膝之類濕痰二陳湯加蒼朮白朮黃芩黃柏竹瀝薑汁氣虛四君子湯加黃芩黃柏蒼朮之類血虛四物湯加黃柏蒼朮煎送補陰丸方見虛損門亦有食積死血妨礙不得下降者大率屬熱用參朮四物湯黃柏之類清燥湯東垣方治溫熱成痿以燥金受濕熱之邪是絕寒水生化之源絕則腎虧痿厥之病大作腰以下痿軟癱瘓不能動黃耆一錢半蒼朮一錢白朮橘皮澤瀉各五分五味子九個人參白茯苓升麻各三分麥門冬當歸身生地黃曲末豬苓酒黃柏各二分柴胡黃連甘草炙各一分上㕮咀每半兩水煎空心熱服健步丸治膝中無力伸而不得屈屈而不得伸腰背腿腳沉重行步艱難羌活柴胡各半兩防風三錢川烏頭一錢炒滑石炙甘草各半兩防己一兩苦參一錢酒製肉桂半錢瓜蔞根半兩酒製澤瀉三錢上為末酒糊丸如桐子大每服七十丸煎愈風湯空心送下愈風湯方見風門二陳湯方見瘧門四君子湯四物湯方並見虛勞門謹按風痿之別痛則為風不痛則為痿經曰痛則為實不痛則為虛曰風曰痿虛實二者而已矣東垣曰氣盛病盛氣衰病衰何則人之氣血充實而風寒客於經絡之間則邪正交攻而疼痛作矣人之氣血弱虛而痰火起於手足之內則正不能勝邪而痿痹作矣丹溪先生曰痿症切不可作風治而用風藥蓋以風為實而痿為虛也曰散邪曰補虛豈可紊亂矣乎歷節風歷節風方論歷節風之狀短氣自汗頭眩欲吐手指攣曲身體魁羸其腫如脫漸至摧落其痛如掣不能屈伸蓋由飲酒當風汗出入水或體虛膚空掩護不謹以致風寒濕之邪遍歷關節與血氣搏而有斯疾也其痛如掣者為寒多其腫如脫者為濕多肢節間黃汗出者為風多遍身走癢徹骨疼痛晝靜夜劇發如蟲齧者謂之白虎歷節治法當以溫藥解其風寒濕之毒或用和平則獨活寄生湯輩可也其白虎歷節遊走癢痛蟲實為之況夫脾主肌肉虛則為癢遇癢而進飲食尚庶幾焉而蟲亦饜飫其間不至於頻頻齧也書曰若藥弗瞑眩厥疾弗瘳似此證候一名厲風須當大作湯丸未可拘以平常淺近之劑歷節風證治虎骨散治白虎歷節走注癢痛不得屈伸虎脛骨酒炙黃一兩半白花蛇酒浸取肉炙黃天麻自然銅用醋淬七次防風白附子炮檳榔官桂當歸羌活牛膝白芷川芎殭蠶炒去絲各一兩全蠍焙地龍去土乳香沒藥雄黃各半兩麝香一分上末每服二錢食前以暖豆淋酒調下雄麝丸治歷節風骨節疼痛攣急痹頑安息香五靈脂天麻各一兩半地龍淨白殭蠶微炒各三分全蠍微炒雄黃各半兩麝香一分烏蛇酒浸取肉炙天雄炮去皮臍當歸川烏炮去皮臍川芎南星炮官桂虎脛骨酒炙黃各一兩川獨活二兩上末煉蜜杵丸桐子大每服十五丸食前溫酒下海桐皮散治歷節走注骨節疼痛獨活萆薢鹽水浸焙川芎當歸各三分桃仁去皮焙天麻辣桂牛膝麻黃去節枳殼制海桐皮白芍藥川烏炮去皮臍松節防風杜仲薑製甘草炙各半兩麝香一分虎脛骨酒炙黃一兩上粗末每服二錢姜五片棗二枚食前煎服獨活寄生湯治歷節風亦治腳氣方見腰疼門麝香丸治白虎歷節遊走癢痛狀若蟲齧方見風類虎骨酒治歷節諸風百節疼痛方見風緩門硫黃酒治惡風頭面肢體癮疹尪羸透明鋒芒硫黃上每服三錢乳缽內研細入醇酒再研空心飲其清者滓又研細入酒飲之連日如是硫黃能殺惡蟲自大便下必用歷節厲風方治手指彎曲骨節間痛甚蓖麻子去皮二兩黃連去須銼如豆一兩上用新水二升於瓷瓶內浸二藥密封七日取出逐日侵晨面東以浸藥水吞蓖麻仁一粒七日後添兩粒微利不妨以療大風亦效返魂追命再造散治大風厲風川大黃錦紋皺者一兩獨生皂角刺一兩半上末每服二錢臨夜冷酒調下以淨桶伺候泄蟲如蟲口黑色乃是多年蟲口赤色是為方近三數日又進一服直候無蟲則絕根也癮疹若吃醋則風疹食人神授丸治風寒濕合而為痹遍身或半身麻木不仁最能殺蟲方見虛勞門用增味五痹湯下空心服方見風類白虎風走注癢痛方雞子揩患處咒三遍願送糞堆頭蓋白虎是糞神愛吃雞子患者下飯用黃腳雞為妙亦可抱雞來壓之其癢自止麝香丸治白虎歷節風遊走疼痛遍身瘙癢狀如蟲齧晝靜夜劇方見風類附諸方四炒散治歷節痛風走注威靈仙酒浸五錢羊角灰二錢白芥子一錢蒼耳一錢半一云蒼朮上為末每服一錢生薑一大片擂汁入湯調服洗藥方治一切風氣濕氣足脛羸腫疼痛並皆有效荊芥番白草防風蒼耳草苦參地榆青藤威靈仙麻黃蒼朮生蔥煨鹽各一兩上件用水一桶煎熱於桶內熏蒸痛處出微汗待湯稍溫再洗痛處一二次覺痛減如或貧者只用杔柳榆槐桑椿六件樹枝煎湯洗之亦有神效大補元丸人參去蘆二兩黃耆去蘆四兩白朮四兩泔浸當歸酒洗二兩生地黃酒洗三兩陳皮去白二兩白芍酒炒一兩黃柏酒炒二兩知母酒炒二兩山藥二兩山茱萸淨肉二兩枸杞二兩牛膝酒洗二兩杜仲薑汁炒一兩五錢遠志去心二兩石菖蒲去毛二兩巴戟去心三兩破故紙炒二兩菟絲子炒二兩桔梗二兩上件共為細末煉蜜為丸如梧桐子大每服七八十丸用白滾湯送下或淡酒薑湯清米飲送下亦可祛風丸防風去蘆二兩防己二兩荊芥二兩當歸酒洗二兩川芎二兩生地黃酒洗三兩陳皮去白白朮炒桑寄生薏苡仁各二兩梔子仁一兩牙皂二兩何首烏二兩川烏二個白芍藥酒炒羌活獨活黃芩酒炒各一兩半半夏便煮木瓜青藤牛膝酒洗沉香白豆蔻各二兩木香一兩桂枝一兩光烏酒浸去皮二兩上件共為細末酒打米糊為丸如梧桐子大每日五更時用清茶送下七八十丸少許時再服前大補元丸愈風化痰丸何首烏酒浸殭蠶光烏酒浸去皮全蠍南星薑製半夏便煮桑寄生荊芥牙皂瓦炒破故紙炒陳皮去白菟絲子炒各二兩地黃去土八兩木香一兩沉香一兩半白芍藥酒炒川烏酒浸去皮天麻一兩二錢黃芩酒炒二兩防風去蘆漢防己白朮炒當歸酒洗各二兩羌活獨活各一兩五錢杜仲薑汁炒四兩巴戟去心三兩上件共為細末酒打米糊為丸如梧桐子大每服一百丸空心食前酒送下日服二次諸風應效酒治一切諸般風氣濕痹遍身骨節疼痛紫白癜風神效當歸川芎何首烏各三錢蒼朮四錢白芷苦參防風胡麻石楠藤石連藤殭蠶各二錢細辛一錢穿山甲黃柏知母白芍藥生地黃牛膝白朮藁本木瓜大風子威靈仙羌活各二錢川烏一錢八角風五加皮紫荊皮各二錢木香一錢半薏苡仁三錢上件共為粗末用好酒一罈將藥用絹袋之懸於壇口下用文武火煮一二時辰取出放於濕泥去火毒住二三日再服每服加後末藥入內飲之量力而用末藥方於後入酒末藥方每服煎藥一鍾加此末藥八分入酒服之烏藥白芷木香荊芥甘草何首烏川烏青藤藁本天麻金銀花蒼朮全蠍細辛防風草烏川芎人參當歸石斛麻黃兩頭尖上件共為細末入煎藥酒服之效又煮酒方治一切腫風白虎歷節疼痛當歸三錢六分川芎一錢八分蒼朮六錢白朮九錢白芍藥一錢半枳殼九分生地黃一錢二分半夏一錢半甘草九分烏藥一錢半麻黃三錢茯苓二錢半防己陳皮木通薏苡仁各一錢八分五加皮一錢半木香六