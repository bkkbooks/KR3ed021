應痛丸活血應痛丸叺蒼朮炒六兩香附炒杵淨七兩威靈仙二兩草烏頭二十四兩炮去皮臍陳皮五兩半狗脊燎去毛四兩沒藥一兩另研上末酒面稀糊丸桐子大每服二十丸用獨活湯下治腎受風冷腳氣痠疼及久痢登廁風冷入於腸胃以致兩腳削小成鼓槌風而痢又不止用此兩藥俱效不老地仙丹治腎臟風毒輕腳壯筋當歸牛膝蓯蓉各酒浸焙乾虎骨酒炙黃真川椒去目出汗川萆薢鹽水煮乾蒺藜炒搗去刺川芎各一兩白附子炮黃耆蜜炙圓白南星炮何首烏羌活獨活杜仲薑製炒沒藥另研各三分防風赤小豆地龍去土茴香炒木鱉子去油血竭乳香另研各半兩上細末調面稀糊丸桐子大每服四十丸木瓜橘皮煎湯下烏蛇丸治風寒腳氣隱痛癢痹烏蛇四兩酒浸取肉焙虎骨醋浸洗淨酒炙二兩石斛令作末黃松柏節酒浸研巴戟去心蓯蓉酒浸焙官桂防風獨活續斷五加皮薏苡仁當歸木香川芎各半兩乳香另研生乾薑各二分上末酒面稀糊丸桐子大每四十丸木瓜橘皮煎湯下慈濟丸治腳氣遊走兩足轉上腰腿疼痛不能轉側宣木瓜二兩川烏炮去皮臍黃耆蒺藜炒去刺當歸防風萆薢牛膝天台烏藥各一兩赤小豆茴香炒地龍去土老白膠研篩川五靈脂各三分上細末酒面稀糊丸桐子大丸數四十食前紫蘇湯送下四斤丸治腳氣緩弱隱疼及腎虛感受風寒濕痹方見風緩門大流氣飲加當歸下方見脹滿門虎骨散方見歷節門腳氣筋急掣痛用木瓜橘皮煎湯調下金液丹方見脾疼門治凝陰蘊毒溫而利之養正丹通用以枳殼木瓜檳榔煎湯下二陳湯加檳榔細辛制枳殼治腳氣痰多證方見瘧門無熱者二陳湯下養正丹艾瓜丸方見腎氣門腳痛緩弱患在風濕風證以烏藥順氣散加麻黃白芷主之濕證以不換金正氣散加茯苓生乾薑主之一匕收功容易事也若夫腎虛為病腳弱而痛又當何如曰腎主骨故爾惟安腎丸最良以不換金正氣散送下仍夾和白丸子佐之余每見腳氣緩弱人多服四斤丸亦安腎丸輩也然則腎氣充則骨氣強骨氣強則無緩弱之患治法要當究其源附諸方麻黃左經湯三因方治風寒暑濕流注足太陽經腰足攣痹關節重痛憎寒發熱無汗惡寒或自汗惡風頭痛眩暈麻黃去節乾葛細辛白朮米泔浸茯苓防己桂心不見火羌活甘草炙防風各等分上為末每服四錢水一盞姜三片棗一枚煎空心服自汗為麻黃加肉桂芍藥重者加白朮陳皮無汗減桂加杏仁澤瀉並各等分半夏左經湯三因方治足少陽經為風寒暑濕流注發熱腰脅疼痛頭目眩暈嘔吐不食半夏湯洗七次乾葛細辛白朮麥門冬去心柴胡茯苓桂心不見火防風乾薑炮黃芩小草甘草炙各等分上㕮咀每服四錢水一盞姜三片棗一枚煎七分空心服熱悶加竹瀝喘急加杏仁桑白皮大黃左經湯三因方治風寒暑濕流注足陽明經使腰腳赤腫痛不可行大小便秘或惡聞食氣喘滿自汗細辛去苗茯苓防己羌活大黃蒸甘草炙前胡枳殼去瓤炒厚朴去皮炒黃芩杏仁去皮尖另研各等分上㕮咀每服四錢水一盞姜三片棗一枚煎七分空心熱服腹痛加芍藥秘結加阿膠喘急加桑白皮紫蘇小便澀少加澤瀉四肢瘡瘍浸淫加升麻並等分大料神秘左經湯三因方治風寒暑濕流注三陽經腰足拘攣大小便秘澀喘滿煩悶並皆治之半夏湯洗七次乾葛細辛麻黃去節麥門冬去心小草即遠志苗白姜厚朴薑製炒茯苓防己枳殼去瓤炒甘草炙桂心羌活防風柴胡黃芩各等分上㕮咀每服四錢水一盞姜三片棗一枚煎服自汗加牡蠣白朮去麻黃黃腫加澤瀉木通熱甚無汗減桂加橘皮前胡升麻腹痛或利去黃芩加芍藥附子大便秘加大黃竹瀝喘滿加杏仁桑白皮紫蘇並等分對證加減尤宜審之六物附子湯三因方治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利手足或時浮腫附子炮去皮臍桂心防己各四兩甘草炙二兩白朮三兩茯苓三兩上㕮咀每服四錢水一盞姜七片煎六分食前溫服當歸拈痛湯拔粹方治濕熱為病肢節煩疼肩背沉重胸不利及遍身疼痛下注於足脛痛不可忍羌活甘草炙黃芩酒浸茵陳酒炒各五錢人參去蘆升麻苦參酒洗葛根蒼朮各二錢防風去蘆當歸身知母酒洗茯苓炒澤瀉豬苓各三錢白朮一錢半上㕮咀每服一兩水二盞煎至一盞去滓空心服烏藥平氣湯三因方治腳氣上攻頭目昏眩腳膝痠疼行步艱苦諸氣不和喘滿迫促並皆治之茯神去木甘草炙白芷當歸白朮川芎五味子紫蘇子乾木瓜人參烏藥去木各等分上㕮咀每服四錢水一盞姜五片棗三枚煎七分溫服東垣羌活導滯湯治腳氣初發一身盡痛或股節腫痛便溺阻隔先以此藥導之後用當歸拈痛湯羌活獨活防己當歸各三錢大黃酒浸煨一兩枳實炒二錢上㕮咀每服五錢或七錢水煎服金匱八味丸治足少陰經腳氣入腹腹脹疼痛上氣喘急腎經虛寒所致也此證最急以腎乘心水剋火死不旋踵方見補損門加味敗毒散治足三陽經受熱毒氣流注腳踝上焮赤腫痛寒熱如瘧自汗惡風或無汗惡寒羌活獨活前胡柴胡枳殼桔梗甘草人參茯苓川芎大黃蒼朮等分上㕮咀每半兩入姜煎五積散和劑方治寒濕流注兩腳痠疼有兼痰氣者用之尤宜內加木瓜方見中寒門健步丸方見痿門生苄半兩歸尾芍藥陳皮蒼朮牛膝各一兩吳茱萸條芩各半兩桂枝二錢大腹子三個上為末蒸餅丸如梧子大每服一百丸空心煎白朮木通湯下防己飲丹溪方白朮木通防己檳榔川芎甘草梢犀角蒼朮鹽炒生苄黃柏各酒炒大便實加桃仁小便澀加牛膝有熱加黃芩黃連大熱及時令熱加石膏有痰加竹瀝薑汁如常腫者專主乎濕熱先生別有方腳氣治例心法附錄曰腳氣有濕熱有食積流注有風濕有寒濕勝濕以仙術白朮防己川芎為主或六物附子湯或當歸拈痛湯腳氣氣鬱甚者舟車丸除濕丹有飲者東垣開結導飲丸腳氣解表用麻黃左經湯等藥隨經選用有兼痰氣寒濕者五積散加木瓜若雙解以大黃左經湯東垣羌活導滯湯若理血以八味丸或四物加羌活天麻又或四物加黃柏南星或健步丸若疏風養血用獨活寄生湯最效春夏氣溢腫而痛者用香蘇散加五加皮木瓜檳榔川楝子熱而紅腫者敗毒散加木瓜蒼朮秋冬以後用五積散加木瓜牛膝檳榔吳茱萸附足跟痛丹溪曰有痰有血熱血熱四物加黃柏知母牛膝之類有痰唾者五積散加木瓜四物湯方見補損門五積散方見中寒門舟車丸除濕丹俱見濕類開結導飲丸方見痰涎門治腳轉筋疼痛攣急用松節二兩銼細乳香一錢以銀石器內慢火略炒焦存性研細每服一錢至二錢木瓜酒調下治腳氣筋骨疼痛用金銀花為末每服二錢熱酒調下或銼碎同木瓜白芍藥官桂當歸甘草酒水各半鍾煎去滓空心熱服
