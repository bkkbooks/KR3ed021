body:
  text: 卷之十七消渴消渴方論水包天地前輩嘗有是説矣然則中天地而為人水亦可以包潤五臟乎曰天一生水腎實主之膀胱為津液之府所以宣行腎水上潤與肺故識者以肺為津液之臟自上而下三焦臟腑皆囿乎天一真水之中素問以水之本在腎末在肺者此也真水不竭安有所謂渴哉人惟淫欲恣情酒面無節酷嗜炙爆糟藏鹹酸酢醢甘肥腥膻之屬復以丹砂五石濟其私於是炎火上熏臟腑生熱燥氣熾盛津液乾焦渴引水漿而不能自禁矣渴之為病有三曰消渴曰消中曰消腎分上中下三焦而應焉熱氣上騰心虛受之心火散漫不能收斂胸中煩躁舌赤唇紅此渴引飲常多小便數而少病屬上焦謂之消渴熱蓄於中脾虛受之伏陽蒸胃消穀善飢飲食倍常不生肌肉此渴亦不甚煩但欲飲冷小便數而甜病屬中焦謂之消中熱伏於下腎虛受之腿膝枯細骨節痠痛精走髓虛引水自救此渴水飲不多隨即溺下小便多而濁病屬下焦謂之消腎自消腎而析之又有五石過度之人真氣既盡石氣獨留而腎為之石陽道興強不交精泄謂之強中消渴輕也消中甚焉消腎又甚焉若強中則其斃可立待也雖然真水不充日從事於杯勺之水其間小便或油膩或赤黃或泔白或渴而且利或渴而不利或不渴而利但所食之物皆從小便出焉甚而水氣浸漬溢於肌膚則脹為腫滿猛火自炎留於肌肉則發為癰疽此又病之深而證之變者也總前數者其何以為執劑乎籲此虛陽炎上之熱也叔和有言虛熱不可大攻熱去則寒起請援此以為治法又曰消渴證候人皆知其心火上炎腎水下泄小便愈多津液愈涸飲食滋味皆從小便消焉是水火不交濟然爾孰知脾土不能制腎水而心腎二者皆取氣於胃乎治法總要當服真料參苓白朮散可以養脾自生津液兼用好粳米煮粥以膂肉碎細入鹽醋油酒蔥椒茴香調和少頃粥熟而後入以此養腎則水有所司又用淨黃連濕銼入雄豬肚中密扎於鬥米上蒸爛添些蒸飯臼中杵黏丸如桐子每服百粒食後米飲下可以清心止渴消渴證治茯菟丹三消渴通用亦治白濁菟絲子酒浸三宿水淘砂盆研細捏餅焙乾一十兩北五味子七兩白茯苓五兩石蓮肉三兩上末山藥六兩末為糊攪和搗三百杵丸桐子大每五十丸食前米湯下神妙降心湯治心火上炎腎水不濟煩渴引飲氣血日消人參遠志薑醃取肉焙當歸川芎熟地黃白茯苓黃耆蜜炙北五味子甘草微炙各半兩天花粉一兩上銼細每三錢棗煎食前服生地黃膏渴證通用生地黃束如常碗大二把冬蜜一碗人參半兩白茯苓一兩上將地黃洗切研細以新水一碗調開同蜜煎至半次入參苓末拌和磁器密收匙挑服黃耆湯治諸渴疾黃耆茯神栝蔞根麥門冬去心各一兩北五味子甘草炙各半兩生乾地黃一兩半上銼細每四錢新水煎服豬肚丸治諸渴疾川黃連五兩淨白乾葛知母茯神麥門冬去心大熟地黃洗焙各二兩栝蔞根粟米各三兩人參一兩上木臼中同搗為散入淨豬肚內縫密置甑內蒸極爛乘熱再杵細若硬加蜜丸桐子大蒸汁下五十丸或粥飲下又方一味黃連末入豬肚內縫密滿甑粳米上蒸熟曬過杵丸如前法川黃連丸治諸渴川黃連淨五兩白天花粉麥門冬去心各二錢半上末以生地黃汁並牛乳汁夾和搗丸桐子大每三十丸粳米飲下玉泉丸治煩渴口乾麥門冬去心曬人參茯苓黃耆半生半蜜炙烏梅肉焙甘草各一兩栝蔞根乾葛各一兩半上末煉蜜丸彈子大每一丸溫湯嚼下止渴銼散枇杷葉新布拭去毛炙白乾葛生薑切片焙各一兩大烏梅七個大草果二個去皮淡竹葉甘草生各半兩上銼每四錢新水煎服衛生天花丸治渴通用黃連淨三兩童尿浸三宿焙白扁豆薑製去皮炒二兩辰砂白茯苓牡蠣粉知母苦參天花粉鐵粉各半兩蘆薈一分金銀箔各二十片上末取栝蔞根生汁和生蜜丸桐子大每三十丸麥門冬湯下桑椹方治渴疾桑椹熟時盡意食之為妙又方生牛乳細呷又方生蘿蔔搗取汁時飲少許蠟苓丸補虛治濁止渴黃蠟雪白茯苓各四兩上茯苓為末熔蠟和丸彈子大每一丸不飢飽細嚼下繭絲湯治渴神效煮繭搔絲湯任意飲之頓效如非時以絲或綿煎湯服辰砂妙香散治渴證小便澀數而瀝兼有油濁方見疸門用燈心草茯苓煎湯下天花粉丸治消渴飲水多身體瘦天花粉黃連去須各一兩茯苓當歸各半兩上末煉蜜丸桐子大每三十丸茅根煎湯下瓜連丸治消渴骨蒸黃連淨銼用冬瓜汁浸一宿曬乾凡七次上末冬瓜汁丸桐子大每三四十丸半飢飽熟水下或五十丸米飲下玉壺丸治消渴引飲無度人參栝蔞根等分上末煉蜜丸桐子大每三十丸麥門冬煎湯下天花散治消渴天花粉生乾地黃洗各一兩乾葛麥門冬去心北五味子各半兩甘草一分上粗末每服三錢粳米百粒同煎服錢氏白朮散治消中消穀善飢人參白朮白茯苓甘草炙藿香葉一兩白乾葛二兩木香半兩加北五味子柴胡枳殼制各半兩上粗末每三錢新水煎服茯神丸治消中煩渴消穀小便數人參茯神生乾地黃黃連淨麥門冬去心焙枳殼制牡蠣粉各一兩石蓮肉黃耆炙知母各半兩栝蔞根三分上末煉蜜同搗三百杵丸桐子大每五十丸清粥飲下小菟絲子丸治消腎以天花粉北五味子煎湯下方見疸門枸杞子丸治消腎久渴困乏小便滑數枸杞菟絲子酒浸研焙白茯苓黃耆炙牡蠣粉牛膝熟地黃洗麥門冬去心各一兩雞內金微炙一兩半桑螵蛸栝蔞根各三分山茱萸牡丹皮各半兩上末煉蜜和搗三百杵丸桐子大每五十丸食前粥飲下八味丸治消腎補虛止渴方見痼冷門本方去附子以北五味子代之納澤瀉截塊再蒸熟地黃再蒸平補丸治消腎不渴肌肉瘦削小便澀數而瀝如欲滲之狀菟絲子酒浸研焙山茱萸酒浸焙當歸益智仁各半兩川楝肉牛膝葫蘆巴炒厚杜仲薑製炒巴戟去心蓯蓉酒浸焙各三錢半乳香二錢上末糯米糊丸桐子大每五十丸棗湯或鹽湯食前服雙補丸治腎虛水涸燥渴勞倦鹿角膠二兩沉香半兩澤瀉截塊再蒸半兩覆盆子白茯苓人參宣木瓜薏苡仁黃耆炙熟地黃洗再蒸蓯蓉酒浸焙菟絲子酒浸蒸碾焙北五味子石斛炒當歸酒浸焙各一兩麝香一錢上末煉蜜丸桐子大硃砂衣每五十丸空心棗湯下煞蟲方治消渴有蟲出夷堅志苦楝根取新白皮一握切焙入麝少許水二碗煎至一碗空心飲之雖困頓不妨自後下蟲三四條狀如蛔蟲其色真紅而渴頓止乃知消渴一證有蟲耗其津液附諸方麥門冬飲子治膈消胸脹滿心煩津液乾燥短氣消渴人參茯神麥門冬知母五味子生地黃甘草炒栝蔞根葛根各等分每服水二鍾竹葉十四片煎去滓溫服生津甘露飲子東垣方治膈消大渴飲水無度舌上赤澀上下齒皆麻舌根強硬腫痛食不下腹時脹痛渾身色黃白白睛黃甚則四肢痿弱無為面塵脫色脅下急痛善嚏善怒臀腰背寒兩丸冷甚石膏一錢二分人參炙甘草各二錢生甘草山梔子蓽澄茄白豆蔻香白芷連翹各一錢杏仁去皮尖黃柏酒拌各一錢半白葵麥門冬各半錢黃連木香各三分桔梗三錢升麻知母酒製各二錢薑黃一錢當歸身半錢全蠍二個藿香二分柴胡三分蘭香半錢上件為細末如法湯浸蒸餅和勻成劑捻作餅子曬半乾杵碎篩如黃米大食後每服二錢抄於掌中以舌舐之隨津唾下或送以白湯少許亦可此制之緩也不惟不成中滿亦不傳下消矣戊申正月七日葉律千戶服此大效枇杷葉散治消渴胸滿心煩津液大消枇杷葉去毛水洗二張麥門冬去心一錢五味子去梗五分栝蔞實生地黃人參去苗蘆各七分茯神去木粉葛家種者佳一錢知母去毛甘草炙以上各七分上作一服水二鍾竹葉十四片入烏梅一個去內仁煎七分去滓食遠溫服不拘時人參石膏湯即白虎加人參湯治膈消上焦燥渴不欲飲食人參半兩石膏一兩二錢甘草四錢知母七錢東垣加黃芩杏仁上㕮咀每服一兩水二盞粳米一撮煎至一盞去滓通口服硃砂黃連丸祕方治心虛蘊熱或因飲酒過多發為消渴硃砂二兩另研黃連三兩生地黃二兩上為末煉蜜丸如桐子大每服五十丸燈心棗子湯送下人參白朮湯宣明方治胃膈疸熱煩滿飢不欲食疸成為消中善食而瘦燥熱鬱甚而成消渴多飲而數小便兼療一切陽實陰虛風熱燥郁頭目昏眩中風偏枯酒過積毒一切腸胃燥澀倦悶壅塞瘡疥痿痹並傷寒雜病産後煩渴氣液不得宣通人參白朮當歸芍藥大黃山梔子荊芥穗薄荷桔梗知母澤瀉各半兩茯苓去皮連翹栝蔞根乾葛各一兩甘草三兩藿香葉青木香官桂各一分即二錢半是也石膏四兩寒水石二兩滑石半斤上為細末每服抄五錢水一茶盞入盆硝半兩生薑三片煎至半盞絞汁入蜜少許溫服漸加至十餘錢得臟腑流利取效如常服以意加減兼服消痞丸散以散腸胃結治濕熱內甚自利者去了大黃芒硝調胃承氣湯治消中暑熱在胃而能飲食小便黃赤方見傷寒門三黃丸方見火門加減八味丸治腎水枯竭心火炙炎煩燥渴小便頻數白濁陰痿飲食不多肌膚日削本方減附子加五味子六味地黃丸方並見虛勞門針灸法脾俞二穴在十一椎下各開寸半中脘一穴在臍上四寸治飲不止渴三里二穴在膝下三寸大脛骨外廉兩筋間舉足取之治食不充飢太溪二穴在足內踝後跟骨上動脈陷中治房勞腎消脹滿脹滿方論陰陽愆伏營衛凝滯三焦不能宣行脾胃不能傳布此脹滿之所由生也曰谷脹曰水脹曰氣脹曰血脹或冷或熱又不可以無別失飢傷飽痞悶停酸旦則陰消陽長穀氣易行故能飲食暮則陰長陽消穀氣難化故不能食是為谷脹脾土受濕不能制水水漬於腸胃而溢於體膚漉漉有聲怔忪喘息是為水脹七情鬱結氣道壅隔上不得降下不得升身腫大而四肢瘦削是為氣脹煩躁漱水迷忘驚狂痛悶嘔惡虛汗厥逆小便多大便黑婦人尤多見之是為血脹陽熱為邪則身體有熱脹滿而咽乾陰寒為邪則吐不下食脹滿而自利隨證劑量是固然爾抑猶有虛實之辨焉實者腹中常脹外堅內痛按之不陷法當為之疏利虛者時脹時減虛氣留滯按之則濡法當以溫藥和之此又出於隨證劑量之外其若久病羸乏猝然脹滿喘息不得與夫臍心突起或下利頻頻百藥遍嘗未見一愈者耳脹滿證治十隔散治七氣為隔飲食不消谷脹氣脹通用人參茯苓厚朴制橘紅莪朮枳殼制半夏曲甘草炙生白薑辣桂檳榔木香等分上粗末每三錢薑二片棗二枚煎服大異香散治谷脹氣脹京三稜莪朮青皮陳皮半夏曲藿香北梗益智仁枳殼制香附炒各半兩甘草炙三分上銼散每三錢薑五片棗二枚煎服五膈寬中散治七氣留滯飲食不下氣滿膨脹方見諸氣門蓽澄茄丸治痞滿脹痛欲脹氣脹通用蓽澄茄白豆蔻仁縮砂仁青皮蘿蔔子木香各三分肉豆蔻茴香炒辣桂丁香各一分半陳皮三分上末飛面煮稀糊丸桐子大每三十丸陳皮煎湯下調氣散治氣滯脹滿宿食不消方見諸氣門大半夏湯方見痰涎門小半夏茯苓湯方見水飲門二藥加橘紅北梗檳榔甘草炙並主水氣脹滿和劑流氣飲調營衛利三焦行痞滯消腫方見諸氣門加減見水飲門調降湯治氣脹方見喘門沉香降氣湯治陰陽交滯心腹脹滿留飲停酸積冷諸證方見諸氣門人參芎歸湯治血脹當歸半夏制三分川芎一兩莪朮木香縮砂仁烏藥甘草炙各半兩人參辣桂五靈脂炒各一分上銼散每服三錢薑五片棗二枚紫蘇四葉煎食前服溫胃湯治冷則氣聚脹滿不下食熟附子當歸厚朴制人參橘紅半夏曲生白薑甘草炙各一兩川椒去合口者三分上銼散每服三錢棗二枚食前煎服順氣木香散治冷證腫脹泄瀉方見諸氣門枳殼銼散治熱證脹滿厚朴制枳殼制北梗各半兩甘草炙大黃蒸各一分上銼每三錢薑五片棗二枚烏梅一枚煎服感應丸丁香木香各一兩半乾薑一兩煨深村百草霜二兩淨大杏仁一百四十個去皮尖肉豆蔻二十個肥巴豆七十粒略去油黃蠟四兩用老酒煮麻油一兩秋冬添半兩減蠟半兩上將丁香木香薑蔻為細末並三味研極得所煉油蠟和劑油單裹漸丸緑豆大每五七丸加至十五丸熱水下夾蘇合香丸方見諸氣門通利脹滿雖然感應丸只可治痢不可治瀉蓋痢家服之有積則行無積則止若以此亦可治瀉誤人以上數劑前氣類多用之方卻在此附諸賢論東垣曰六元政紀論云太陰所至為中滿云云太陰所至為蓄滿云云諸濕腫滿皆屬脾土論云脾乃陰中之太陰同濕土之化脾濕有餘腹滿食不化天為陽為熱主運化也地為陰為濕主長養也無陽則陰不能生化故云臟寒生滿病調經篇云因飲食勞倦損傷脾胃始受熱中末傳寒中皆由脾胃之氣虛弱不能運化精微而致水穀聚而不散而成脹滿經云腹滿䐜脹支膈胠脅下厥上冒過在太陰陽明乃寒濕鬱遏也脈經所謂中寒則脹滿者是也針經三卷雜病第八腹滿大便不利上走胸嗌喘息喝喝然取足少陰又云脹取三陽三陽者足太陽寒水為脹在通評虛實論説腹暴滿按之不下取太陽經絡胃之募也正同取者瀉也經云中滿者瀉之於內者是也宜以辛熱散之以苦瀉之淡滲利之使上下分消其濕正如開鬼門潔淨府溫衣繆處其處是先瀉其血絡後調其真經氣血平陽布神清此治之正也或曰諸脹腹大皆屬於熱者何也此乃病機總辭假令外傷風寒有餘之邪自表傳裡寒變為熱而作胃實腹滿仲景以大承氣湯治之亦有膏粱之人濕熱鬱於內而成脹滿者此熱脹之謂也大抵寒脹多而熱脹少治之者宜詳辨之心法附録曰心肺陽也居上腎肝陰也居下脾居中亦陰也屬土經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾具坤靜之德而有干健之運故能使心肺之陽降腎肝之陰升而成天地交之泰是為無病今也七情內傷六淫外侵飲食不節房勞致虛脾土之陰受傷轉運之官失職胃雖受谷不能運化故陽自升陰自降而成天地不交之否清濁相混隧道壅塞鬱而為熱熱留為濕濕熱相生遂成脹滿經曰鼓脹是也以其外雖堅滿中空無物有似於鼓其病膠固難以療治又名曰蠱若蟲侵蝕之義理宜補脾又須養肺金以制木使脾無邪賊之患滋腎水以制火使肺得清化卻厚味斷妄想遠音樂無有不安醫又不察虛實急於作效病者苦於脹急喜行利藥以求通快不知寬得一日半日其腫愈甚病邪甚矣真氣傷矣古方惟禹餘糧丸又名紫金丸制肝補脾殊為切當又曰朝寬暮急血虛暮寬朝急氣虛終日急氣血皆虛嚴氏曰脹脈浮者易治虛者為難治平肝飲子濟生方專治喜怒不節肝氣不平邪乘脾胃心腹脹滿頭暈嘔逆脈來浮弦防風去蘆桂心不見火枳殼赤芍藥桔梗去蘆炒各一兩甘草炙木香不見火人參檳榔當歸去蘆酒浸川芎陳皮各半兩上㕮咀每服四錢水一盞薑五片煎服不拘時木香順氣湯治濁氣在上則生䐜脹木香一錢二分厚朴制一錢六分青皮陳皮益智白茯苓去皮澤瀉乾薑半夏洗吳茱萸各一錢八分當歸升麻柴胡各四分蒼朮米泔浸二錢草豆蔻煨一錢二分上㕮咀分二貼每貼水二盞薑三片煎八分食前溫服忌生冷硬物恚怒廣茂潰堅湯治中滿腹脹內有積聚堅硬如石令人坐臥不能二便澀滯上喘氣促面色萎黃通身虛腫厚朴制黃芩草豆蔻麵裹煨益智仁炒當歸酒洗各二錢半黃連三分半夏湯泡三分半莪朮煨紅花吳茱萸湯泡去苦水升麻甘草炙柴胡澤瀉神麯炒陳皮青皮各一錢半上㕮咀分二貼每貼水二鍾薑三片煎八分食遠服木香塌氣丸治中滿腹脹陳皮蘿蔔子炒各五錢胡椒木香草豆蔻麵裹煨青皮各三錢蠍梢炒去毒二錢半上為細末麵糊為丸如梧桐子大每服五十丸食遠米飲下禹餘糧丸治中滿氣脹喘滿及水氣脹蛇含石三兩煨真針砂五兩禹餘糧三兩同上砂炒以上三味為主其次量人虛實入下項藥木香牛膝莪朮炮白蒺藜桂心川芎白豆蔻茴香炒三稜炮羌活茯苓乾薑青皮陳皮附子炮當歸各半兩上為細末拌勻以湯浸蒸餅去水搗勻丸如桐子大每服五十丸空心溫酒送下中滿分消丸治中滿鼓氣水氣等證黃芩炒五錢薑黃白朮人參甘草炙豬苓各一錢黃連銼炒五錢白茯苓砂仁乾生薑各二錢枳實半夏洗各五錢厚朴一兩制知母炒四錢澤瀉陳皮各三錢上為末湯浸蒸餅丸如桐子大每服一百丸食遠白湯下中滿分消湯治中滿寒脹寒疝大小便不通四肢厥冷食入反出心痞奔豚益智半夏湯洗茯苓木香升麻各二錢川烏炮澤瀉人參青皮當歸酒浸生薑麻黃柴胡乾薑炮蓽澄茄黃連各二錢黃耆吳茱萸洗草豆蔻煨厚朴制各五錢黃柏二錢上㕮咀每貼一兩水二鍾薑三片棗一枚煎八分食後溫服人參定喘湯治蠱脹有喘人參一兩杏仁去皮尖炒一兩陳皮五錢木香三錢甘草五錢上為末每服三錢食遠濃煎蘇木湯調服三服喘即止祕傳諸蠱保命丹肉蓯蓉三兩皂礬一斤紅棗一斤煮熟去核大麥芽炒一斤半香附一斤蓯蓉皂礬二味入罐內火煅盡煙上為末麵糊為丸如梧桐子大每服二十丸好酒下食後服日進三服量人大小用四炒枳殼丸枳殼去穰咀分四份一份同蒼朮一兩炒一份同蘿蔔子一合炒一份同乾漆一兩炒一份同小茴香一兩炒上各炒枳殼黃色為度揀出為細末卻將蒼朮等四味用水二碗煎至半碗去滓攪麵糊和枳殼末為丸如梧桐子大每服三十丸食遠米飲送下一方治血鼓腹如盆脹三稜煨莪朮乾漆炒煙盡牛膝去蘆酒洗蟲蟲糯米炒琥珀肉桂硇砂水蛭石灰炒赤大黃各等分上為末用生地黃自然汁和米醋調勻為丸如梧桐子大每服十丸空心溫酒送下童便下亦可敷法治腹緊硬如石或陰囊腫大先用甘草煎湯一鍾服之後用此藥敷大戟芫花甘遂海藻各等分上為末醋糊和藥塗腫脹處針灸法脾俞二穴在第十一椎下兩旁相去各一寸半隨年壯肝俞二穴在九椎下兩旁各一寸半隨百壯分水一穴在臍上一寸治腹脹繞臍結痛灸百壯三焦俞二穴在十三椎下兩旁各寸半治心腹滿腰背痛飲食吐逆小便不利羸瘦少氣虛腫虛腫方論賈洛陽以病腫不治必為痼疾雖有扁鵲亦莫能為則知腫之危惡非他病比也夫人所以得全其性命者水與谷而已水則腎主之谷則脾主之惟腎虛不能行水惟脾虛不能制水胃與脾合氣胃為水穀之海又因虛而不能傳化焉故腎水泛溢反得以浸漬脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而發腫矣其狀目胞上下微起肢體重著咳喘怔忪股間清冷小便澀黃皮薄而光手按成窟舉手即滿是也治法大要身有熱者水氣在表可汁身無熱者水氣在裡可下其間通利小便順氣和脾俱不可緩耳然而證雖可下又當權其重輕不可過用芫花大戟甘遂猛烈之劑一發不收吾恐峻決者易固閉者難水氣復來而無以治之也雖然水之為腫特一耳曰風曰氣曰血合而有四焉風腫者皮粗麻木不仁走注疼痛氣腫者皮厚四肢瘦削腹脅脹膨其或煩躁漱水迷忘驚狂嘔逆煩悶皮間有紅縷赤痕者此血腫也婦人經脈壅閉敗血停腐尤多見之然婦人懷胎亦有氣遏水道而虛腫者此但順氣安脾飲食無阻既産而腫自消若産後發虛則虛退而告殂矣大凡虛腫先起於腹而後散於四肢者可活先起於四肢而後歸於腹者不治至若蠱脹而肚上有筋腹滿而大便滑泄久虛而轉作虛浮與夫唇黑傷肝缺盆平傷心臍突傷脾足平傷腎背平傷肺皆為不治之證當明辨之男從腳下腫而上女從身上腫而下或肉硬或手掌平並不治虛腫證治青龍湯治表有水十棗湯量用治里有水方詳見水飲門安腎丸多用青木香丸少用二藥夾和食前溫湯下治水腫屢效方見水飲門溫白丸治十種水病積聚脹滿症癖塊痛久瘧諸風吳茱萸蕩洗七次焙柴胡北梗石菖蒲乾薑肉桂黃連去須茯苓人參川椒去目隔紙炒出汗厚朴制皂角去皮子炒紫菀茸巴豆去皮膜出油各半兩川烏頭炮去皮臍一兩半上細末和勻煉蜜丸桐子大每服三丸食後薑湯下加至五七丸止治水腫溫白丸用五苓散加炒牽牛入些薑汁略煎送下方見水飲門集香湯沉香丁香各二錢木香青木香藿香川芎赤茯苓檳榔枳殼制甘草炙各三錢乳香一錢半麝香一字別研上粗末每二錢半薑三片紫蘇三葉空心煎服凡虛腫先用諸香以透其關絡然後審證療之蘿蔔子飲治水病浮腫蘿蔔子赤茯苓生各半兩牽牛末炒葶藶炒香甘草炙各四兩半夏制川芎檳榔辣桂青皮陳皮青木香白色商陸各三錢上銼每服三錢薑四片不飢不飽煎服三和散方見諸氣門加縮砂赤茯苓煎吞青木香丸治水蠱氣脹腹腫腎腫面浮青木香丸乃水腫要藥但酌量用或五皮散送下或枳殼散下無熱者沉香降氣湯下神助散治水腫牽牛炒取末葶藶炒香各二兩半木豬苓水浸軟去皮切焙澤瀉木香各一兩川椒目一兩半上末先以蔥白三莖漿水一盞煎半盞入老酒半盞調藥末三錢空心服行水丸治水腫氣腫葫蘆巴炒故紙炒縮砂仁蓽澄茄真川椒去目紙上炒出汗烏梅肉焙乾各二錢半木香牽牛炒取末各半兩巴豆肉略去油一錢半上末稀麵糊丸緑豆大每五丸食後薑湯下薑蔻散治胸滿腹腫大瀉不止時或乾嘔人參川厚朴制草果仁良薑訶子炒川白薑生藿香丁皮蒼朮炒真橘紅甘草炒各一分木香肉豆蔻炮縮砂仁茯苓各一分半上銼散每服三錢水煎食前服仍以木香縮砂煎湯濃調正料參苓白朮散佐之桑皮飲治肺間積水頭面浮腫桑白皮炒青皮陳皮檳榔制枳殼赤茯苓木青香當歸川芎石葦炙去毛羌活各一分牽牛炒末半夏制葶藶炒香甘草炙各一分半上銼每三錢薑四片煎服防風散治風腫皮粗麻木不仁或時疼痛麻黃去節牽牛炒取末甘草炙各一分半杏仁去皮防風半夏制芍藥辣桂白芷防己當歸川芎羌活獨活檳榔各一分上銼每三錢薑四片紫蘇三葉煎服消蠱湯治氣作蠱脹但腹滿而四肢頭面不腫紫蘇莖葉縮砂肉豆蔻生枳殼制青皮陳皮三稜莪朮檳榔辣桂白豆蔻仁蓽澄茄木香各一分半夏制蘿蔔子生甘草炙各一分半上銼每三錢薑棗煎服加味枳朮湯治氣為痰飲所隔心下堅脹名曰氣分枳殼制白朮紫蘇莖葉辣桂陳皮檳榔北梗木香五靈脂炒各一分半夏制茯苓甘草炙各一分半上銼每服三錢薑四片煎服調榮飲治瘀血留滯血化為水四肢浮腫皮肉赤紋名曰血分華陰細辛莪朮辣桂赤芍藥延胡索當歸川芎白芷檳榔大腹皮桑白皮炒瞿麥穗赤茯苓陳皮葶藶炒香大黃濕紙煨各一分甘草炙各一分半上銼每服三錢薑棗煎食前服續斷飲治血分如前延胡索微炒當歸川芎牛膝川續斷赤芍藥辣桂白芷五靈脂炒羌活各一分赤茯苓牽牛炒取末半夏制甘草炙各一分半上銼散每服三錢薑四片食前煎服土狗方治遍身腫外腎腫生土狗一個手足全者研細入縮砂末等分老酒調下虛腫方以大香附杵淨以童尿浸一日夜取出別換童尿又浸一日夜再取出又換童尿浸一日夜次以生布錢袋牽擦去皮於臼中搗細用米醋煮飛白麵糊丸桐子大每服七十丸煎和劑流氣飲送下方見脹滿門又方生緑豆一合碾末橘皮二錢良薑一錢細銼上橘皮二錢良薑一錢細銼煎湯候冷調緑豆末得所然後略暖連三日空心服青皮木香黃連橘紅各一分胡椒一錢半上為末入巴豆肉不用去油一錢麵糊丸胡椒大每三四丸薑湯下大便利腫自消未利再服停積痢滯通用又方二十四味大流氣飲一貼加枳殼一錢用紫蘇連莖三條截碎燈心一握生薑七片大棗二枚新水一大碗同煎取清汁調蘇合香丸三丸吞溫白丸五丸效溫白丸方見浮腫門治外腎腫大莖物水泡通明方二十四味流氣飲加白芷木通紫蘇煎吞青木香丸百粒效附諸方治十種水氣病根源證方法先從面腫者曰熱水其根在肺桑白皮為主先從四肢腫者曰黃水其根在脾大戟為主先從背腫者曰鬼水其根在膽雄黃為主先從胸腫者曰食水根在皮膚茯苓為主先從脅腫者曰飲水其根在肚芫花為主先從腰腫者曰肝水其根在胃甘遂為主先從腹腫者曰冷水其根在肺商陸為主先從陰腫者曰勞水其根在腎澤瀉為主先從手腫者曰心水其根在腹巴戟為主先從腳腫者曰清水其根在心葶藶為主上十味為末所主藥加倍余藥各等分每服一錢空心井水調服以利為度忌鹽百日外忌魚蝦麵食一切毒物房事病痊後更服調補藥調補藥方肉桂乾薑炮肉豆蔻青皮白朮川芎檳榔桔梗各等分上為細末每服三錢食遠白湯調服神效丸治十種水氣大戟微炒澤瀉葶藶炒連翹桑白皮木香炒甘遂炒赤小豆炒芫花醋炒巴戟去心以上各等分上為末煉蜜為丸如梧桐子大每服三十丸桑白皮湯送下道滯通經湯治脾濕有餘氣不宣通面目四肢浮腫桑白皮白朮木香茯苓澤瀉陳皮各等分上㕮咀每服七錢水二盞煎八分去滓食遠溫服香蘇飲治上氣喘嗽面目浮腫紫菀紫蘇子炒各一錢二分大腹皮烏梅肉杏仁去皮尖五味子陳皮桔梗桑白皮炙麻黃去節阿膠炒甘草炙各一錢上㕮咀分二貼每貼水二盞薑三片煎八分食遠溫服葶藶丸治肺氣咳喘面目浮腫喘促不安小便赤澀防己木通甜葶藶紙炒各一兩杏仁去皮尖麩炒黃貝母煨各一兩上為末棗肉搗膏為丸如梧桐子大每服五十丸食遠桑白皮煎湯下治男子婦人十種水氣取水法大鯽魚一個去腸肚大戟甘遂各二錢半雄黃另研半錢木香牽牛各半錢上先以大戟同甘遂一半入魚肚裡水濕紙裹煨令焦取出焙乾同衆藥為末每服三二錢用土狗一個爛研入藥內冷水調下塗臍膏治腫滿小便少地龍豬苓針砂各等分上為末蔥涎調敷臍中寸高以帛束之五皮飲治水氣遍身浮腫宜先此藥數日次服消水丸茯苓皮陳皮生薑皮大腹皮桑白皮加蘿蔔子蘇子葶藶子漢秋子上四子同炒㕮咀每服五錢水一鍾生薑三片同煎至七分去滓不拘時服一方治酒腫及脾虛作腫蘿蔔十枚皂角五斤上二味用水同煮乾去皂角將蘿蔔搗爛入蒸餅和丸如雞頭實大蘿蔔子煎湯如意送下一方治水腫氣蠱木香檳榔陳皮青皮大戟甘遂肉豆蔻各二錢半牽牛末一兩半上為末水丸或商陸汁丸如緑豆大每服五十丸空心白湯下三花神祐丸治一切水濕腫病大腹實脹喘滿舟車丸方見濕門針灸法水分一穴在臍上一寸灸七壯療腹腫不能食若是水病灸大良神闕一穴當臍中灸三壯主水腫鼓脹腸鳴如流水聲石門一穴在臍下二寸灸七壯主水脹水氣行皮中小便黃氣滿三里二穴在膝下三寸胻外臁兩筋間灸七壯主水腹脹皮腫水溝名人中在鼻柱下灸三壯主水腫人中滿水腫惟得針水溝若針余穴水盡即死此明堂銅人所戒也庸醫多為人針水分殺人多矣若其他穴亦有針得瘥者特幸焉再不可為法也
