body:
  text: 卷之一總論五臟所主論夫在天之風在地為木在人為肝惟肝則主風在天之熱暄暑熾燠熱之用也在地為火在人為心惟心則主熱在天之濕在地為土在人為脾惟脾則主濕在天之燥在地為金在人為肺惟肺則主燥在天之寒在地為水在人為腎惟腎則主寒籲此天地自然之氣也氣之愆伏乘虛入人而人不能克百病之所由生故風喜傷肝熱喜傷心濕喜傷脾燥喜傷肺寒喜傷腎而暑喜傷心包絡心包絡曰膻中在胸膈間蓋心主暑故暑氣伏於三焦膈胃之間其或風氣之勝木邪乘土則脾病生焉熱氣之勝火邪乘金則肺病生焉濕氣之勝土邪乘水則腎病生焉燥氣之勝金邪乘木則肝病生焉寒氣大來心火亦為腎水所乘矣左關為人迎可以知風寒暑濕熱燥所從入之門右關為氣口可以別臟氣鬱暢與食氣聚散盈虛之候若乃憂愁思慮易耗心神恚怒氣逆易損肝氣縱欲強志腎之戕形寒飲冷肺之害飢飽勞倦脾之傷外之六氣相乘內之七情相感凡是數者皆為五臟之邪因其所主而尋其某臟所受之處則得之矣心主血所藏者神上應舌外應諸掌其聲言其色赤其臭焦其味苦其液汗肝主筋所藏者魂上應眼外應爪甲其聲呼其色青其臭燥其味酸其液泣腎主骨所藏者精與志上應耳外應腰背其聲呻其色黑其臭腐其味鹹其液唾腎冷多唾腎熱多渴肺主氣所藏者魄上應鼻外應皮毛其聲哭其色白其臭腥其味辛其液涕脾主肌肉所藏者意與智上應口外應四肢其聲歌其色黃其臭香其味甘其液涎故心肺在上主脈氣也肝腎在下藏精血也脾居中州又所以為精血脈氣之養也心之平脈浮大而散肝之平脈弦細而長腎之平脈沉濡而滑肺之平脈短澀而浮脾之平脈和緩而大平者五臟本然之正脈也春弦夏鉤叔和云夏洪取火脈來盛之義秋毛冬石以其四時當旺者象之木火金水四時各旺七十有二日土為季脈每季之月寄旺一十八日春則弦緩夏則洪緩秋則微緩冬則沉緩合四季而論則亦七十有二日矣春弦者端直之狀細弱而長是也夏鉤者浮大而散來疾去遲是也秋毛者稀軟之狀輕虛以浮是也冬石者沉濡而滑舉指來疾是也土之脈溫厚氣行乎臟腑之中平和不可得見其衰則現焉所謂弦鉤毛石蓋應時而略見耳其中須有穀神胃氣之和若弦如張弓弦鉤如操帶鉤毛如風吹毛石來如奪索去如彈石此皆危脈也此絕無胃氣也胃氣虧絕其能久乎若夫春得金脈夏得水脈秋得火脈冬得土脈四季得木脈其與心之脈克肺肺之脈克肝肝之脈克脾脾之脈克腎腎之脈克心此皆賊邪也一臟無氣況可以為人乎然則諸腑之脈可得聞歟曰小腸微洪大腸微澀膀胱微沉胃微緩而膽微弦急此無他腑與臟合氣同氣相求斯有得其近似者矣抑古人所謂九臟者又何如耶曰形臟四一者頭角二者耳目三者口齒四者胸中神臟五在心藏神在肝藏魂在腎藏志肺藏魄而脾藏意然臟者神之舍色者神之旗五臟已敗其色必夭槁怪異常夭必亡矣抑猶有說焉微遲濡弱其候雖不同而為寒為虛一也數實長洪其形雖不類而為熱為實一也諸脈皆弦吾知其病出於肝諸脈皆緩吾知其病出於脾諸脈皆澀吾知其病出於肺脈皆浮洪病不在心乎脈皆沉滑病不在腎乎若合腑臟而觀假如數在左寸數主熱也沉之而得則熱入於心浮之而得則熱入小腸遲在左尺遲主寒也沉之而得則寒入於腎浮之而得則寒入膀胱其餘以此推之噫此通變法也安得圓機之士與之論此哉五臟病證虛實論五臟各有所主至其病證莫不隨所主而見焉面赤喜笑舌破口乾煩躁掌熱心痛而噦臍上有動氣者心家病也面青多怒脅下痛硬咳逆目眩肢節攣急轉筋溲難臍左有動氣者肝家病也肝乘脾挾水氣故咳逆足厥陰下終於陰器故溲難面黑而恐呵欠呻吟齒痛骨痿耳鳴精泄足脛寒腰脊痛小腹急疼瘕泄而裡急後重臍下有動氣者腎家病也面白善嚏憂愁欲哭喘嗽氣逆咽喉不利灑淅惡寒時作寒熱臍右有動氣者肺家病也面黃善思善噫善嗜中脘脹滿飲食不消身體腫重肢節痠疼怠惰嗜臥四肢不收當臍動氣是非脾家之病乎東萊先生有曰肝受病則目不能視腎受病則耳不能聽脾受病則口不能食心受病則舌不能舉五臟病證以此觀之不待智者而後知矣然而心之惡熱者何熱則脈潰濁也肝之惡風者何風則筋燥急也腎何以惡燥燥則精涸竭也肺何以惡寒寒則氣留滯也脾何以惡濕濕傷肌肉肉傷則痿腫也五臟之病推原及本安有不從所受中來哉是以臟氣有餘謂之實臟氣不足謂之虛心實之候口乾喜笑身熱汗血痛滿乎胛脅膺背之間肝實之候目赤多怒頭眩耳聾痛引乎兩脅小腹之下腎實之候腹膨體腫少氣不言骨痛飧泄而小便黃肺實之候喘促咳嗽上氣鼻張脛股肩疼而胸中滿脾氣一實必至肢體重著而不舉腹脹尿秘而苦飢故曰臟氣有餘謂之實者此也心虛則恍惚多驚憂煩少色咳唾舌強腰背痠疼肝虛則眼昏胸痛筋脅拘攣恐懼面青如人將捕腎虛則心懸如飢胸痛引脊厥逆溲變䏚冷耳鳴肺虛則呼吸少氣鼻涕嗌乾肺中聲鳴喘之咳血唾中有紅縷者此肺損為熱氣所傷也若脅下痛而唾鮮血者此熱氣傷肝也其或吐逆泄利飲食不消腹脹腸鳴四肢無力則脾虛之證生焉故曰臟氣不足謂之虛者此也大抵實者瀉之虛者補之無過不及以平為期否則實實虛虛損不足而益有餘如東坡先生所謂至虛有盛勢大實有羸狀差之毫釐疑似之間便有死生禍福之畏籲何畏哉至若心病而直視面黧肝病而舌卷囊縮腎病而腰折骨枯肺病而毛焦氣出脾病而臍突唇反此則五臟之氣絕也絕者無復生之理脫遇岐扁亦未如之何雖然病亦有虛實之證不同耳邪氣盛則實精氣奪則虛脈盛皮熱腹脹前後不通曰五實脈細皮寒氣少前後泄利飲食不進曰五虛諸病出者為虛入者為實陰出乘陽陽入乘陰言者為虛不言者為實緩者為虛急者為實陰主靜則緩陽主躁則急濡者為虛堅者為實癢者為虛痛者為實外痛內快者外實內虛外快內痛者外虛內實其有心腹皮膚內外俱痛則按之而止者虛也按之而痛者實也經所謂皮虛則熱脈虛則驚肉虛則重筋虛則急骨虛則痛髓虛則墮腸虛則溏泄三陽實三陰虛汗不出三陰實三陽虛汗不止與夫脈浮而緩自汗惡風法當解肌脈浮而緊無汗惡寒法當發汗此表病之一虛一實脈伏而牢腹痛秘結法當下之脈沉而弱厥冷自利法當溫之此里病之一實一虛內實之證心下牢強腹中痛滿前後不通乾嘔而無物出者死內虛之證厥逆煩躁而吐利不止者亡是又不可不知也故並及之諸陰諸陽論稟五行之氣而為萬物之最靈者人也人稟五行之氣而生曰陰與陽誰獨無是哉心為手少陰腎為足少陰肺為手太陰脾為足太陰肝為足厥陰心包絡為手厥陰此手三陰足三陰之經也小腸曰手太陽膀胱曰足太陽大腸曰手陽明胃曰足陽明膽曰足少陽三焦曰手少陽此手三陽足三陽之經也陰六陽六合而為人身之十二經是經者所以周環一身自上至下往來流通而無間斷也其脈則於兩手三部應焉故自其身者言之腑為陽臟為陰外為陽內為陰上為陽下為陰頭戴陽足履陰揹負陽腹抱陰氣屬陽而陽為衛血屬陰而陰為營陽根於陰陰根於陽陰陽互根營衛不息陽動所以為陰之役使陰靜所以為陽之鎮守呼出心與肺吸入肝與腎呼者因陽出吸者隨陰入呼吸之間脾受穀味是則一身之陰陽也自其脈者推之關前為陽陽得九分關後為陰陰得一寸所以有主治之分浮之實大沉之損小曰陽盛陰虛沉之實大浮之損小曰陰盛陽虛所以有表裡之別脈居陽部而陰脈形脈居陰部而陽脈見陽虛則陰出而乘之陰虛則陽入而乘之及所以見寒暑則變之機至若陽生於尺動於寸陰生於寸動於尺牢長促數之為陽虛短結代動細之為陰浮芤滑實弦緊洪之為表微沉緩澀遲伏濡弱之為里陰病見陽脈者生陽病見陰脈者死是則六脈之陰陽也自其病者求之寸口浮疾陽中之陽病主身熱頭痛煩滿內熱寸口沉細陽中之陰病主少氣汗出悲傷不樂尺脈浮滑陰中之陽病主小腹痛滿大小便難尺脈沉細陰中之陰病主兩股痠疼陰癢遺瀝陰出於陽其病怒陽入於陰其病靜腑病欲得寒掀衣氣粗又欲見人者為陽臟病欲得溫惡聞人聲閉戶獨處者為陰腑病屬陽陽主動故其痛多走注而不止臟病屬陰陰主靜故其痛有常處而不移陽病旦靜陰病夜寧陽虛暮亂陰虛夜爭陰勝則寒陽勝則熱陰動則發熱陽動則有汗賊風客邪陽受之飲食居室陰受之陽受風氣傷風者先於上陰受濕氣傷濕者先於下其或邪居陽脈之間則四肢熱盛而為狂邪入陰脈之內則六經凝澀而為痹無陽即厥無陰即嘔陽微不能呼陰微不能吸陽病不能俯陰病不能仰重陽者狂重陰者癲脫陽者見鬼脫陰者目盲是則諸病之陰陽也噫是固然矣抑古人所謂陰陽維蹺溢關格者又何如哉曰脈有陽維陰維陽蹺陰蹺沖督任帶凡此奇經八脈別道而行如設溝渠以備水潦之溢病非自生蓋諸經溢出而流入之也維者總持諸脈之綱維陰陽不相維則悵然失志蹺者健足行走之關要督言其都陽脈之會也任取其妊生養之原也沖者陰脈之通自足至頭通受諸經之氣血帶者迴繞於身總束諸脈取束帶之義焉故陽維之病苦寒熱陰維之病苦心痛陽蹺之病陽急而狂奔陰蹺之病陰急而足直沖病則氣逆而裡急督病則脊強而折厥任病則男疝氣而女帶瘕帶病則腹脹滿而腰溶溶其衝任二經是又婦人乳血月候之所以出奇經之脈其如是乎關前為陽脈當九分而浮若連並而上至魚際者為溢溢則外關內格是為陰乘關後為陰脈當一寸而沉若連並而下入尺澤者為覆覆則內關外格是為陽乘寸脈皆虛為陽虧尺脈皆虛為陰虧寸脈下不至關為陽絕尺脈上不至關為陰絕虧猶庶幾絕與關格其危脈也覆溢虧絕其如是乎雖然人事不可不知也暴喜傷陽暴怒傷陰猶愁不意氣多厥逆七情所發病家謹焉甘辛之劑以之助陽酸苦之劑以之助陰有志活人者又當識此血營氣衛論人之一身所以得全其性命者氣與血也蓋氣取諸陽血取諸陰人生之初具此陰陽則亦具此血氣血氣者其人身之根本乎血何以為營營行脈中滋營之義也氣何以為衛衛行脈外護衛之意也然則營與衛豈獨無所自來哉曰人受穀氣於胃胃為水穀之海灌溉經絡長養百骸而五臟六腑皆取其氣故清者為營濁者為衛營衛二氣周流不息一日一夜脈行五十度平旦以來復會於肺口所謂陰陽相貫如環之無端則是二氣者常相隨而不相離也夫惟血營氣衛常相流通則於人何病之有一窒礙焉百病由此而生矣故氣之作恙發而為寒熱恚怒喜憂愁聚而為積痞疝瘕症痃癖上為頭旋中為五膈下為臍間動氣或喘促或咳噫聚則中滿逆則足寒凡此者氣使之然也血之為患其妄行則吐衄其衰涸則虛勞蓄之在上其人忘蓄之在下其人狂逢寒則筋不營而攣急挾熱則毒內淤而發黃在小便者為淋痛在大便者為腸風其於婦人月事進退漏下崩中病猶不一凡此者血使之然也夫血譬則水也氣譬則風也風行水上有血氣之象焉蓋氣者血之帥也氣行則血行氣止則血止氣溫則血滑氣寒則血凝氣有一息之不運則血有一息之不行病出於血調其氣猶可以導達病源於氣區區調血何加焉故人之一身調氣為上調血次之是亦先陽後陰之意也若夫血有敗淤滯泥乎諸經則氣之道路未免有所壅遏又當審所先而決去之經所謂先去其血而後調之又不可不通其變矣然而調氣之劑以之調血而兩得調血之劑以之調氣而乖張如木香如官桂如細辛如厚朴以至烏藥香附莪朮三稜之類治氣可也治血亦可也若以當歸地黃輩論之施之血證無以逾此然其性纏滯每於胃氣有虧焉胃氣既虧則五臟六腑之氣亦餒矣善用藥者其間劑量而佐助之大凡治病當識本末假如嘔吐痰涎胃虛不食以致發熱若與涼劑退熱則胃氣愈虛熱愈不退惟先以助胃止吐為本其熱自退縱熱不退但得胃氣已正亦可旋與解熱之劑又有傷寒發大熱屢經寒涼疏轉其熱仍前但用和調胃氣自然無事雖然心為血之主肝為血之臟肺為氣之主腎為氣之臟誠哉是言也學者苟知血之出於心而不知血之納於肝知氣之出於肺而不知氣之納於腎用藥模稜往往南轅而北轍矣假如血痢作恙以五苓門冬等劑行其心以巴豆大黃等劑逐其積而其痛獨存者血之所藏無以養也必佐以川芎或芎歸湯輩則其痛止假如喘嗽氣鳴以薑橘枳梗蘇桂調其氣以南星半夏細辛豁其痰而終不下降者氣之所藏無以收也必佐以補骨脂或安腎丸輩則其氣歸元病有標本治有後先綱舉而目斯張矣噫此傳心吃緊之法也耳目所接敢不本衛生之家共之經云腎間動氣五臟六腑之本十二經脈之根呼吸之門生氣之源也脈病逆順論岐伯曰凡人形盛脈細少氣不足以息者危形瘦脈大而胸中多氣者死形氣相得者生參伍不調者病誠哉是言脈病逆順之不可不早辨也蓋人有強弱盛衰之不等而脈實應焉脈有陰陽虛實之不同而病實應焉脈病形證相應而不相反每萬舉而萬全少有乖張良工不能施其巧矣故脈之於病有利浮大而不利沉小者有利沉小而不利浮大者有大小無拘而以浮沉滑澀堅軟為順逆者又有五行反克而賊邪乘虛為深患者請條析而縷陳之壯熱脈浮大而疾者生沉小者死癲癇脈堅大而數者生沉細者死譫語脈洪大者生厥逆而脈微者死暴忤脈實大者生虛濡而小伏者死諸藥中毒可洪大緊急不可微小而不齊疝瘕積聚可堅急實強不可沉小而虛弱腹脹者浮大則順虛小則逆頭痛者浮大則安短澀則危消渴之診貴乎數大緊實不貴乎微細浮短小急不可治水氣之診貴乎浮而洪大不貴乎虛細沉微擊墜淤血順則脈堅強反則脈小弱中惡吐血反則脈沉細順則脈浮洪前所謂利浮大而不利沉小者此也傷寒已得汗沉小之脈安浮大之脈危自汗漏不止虛細之脈安躁盛之脈危中惡腹脹緊細則可洪急則否心腹㽲痛沉細則可堅洪則否厥逆之脈順則沉而澀逆則大而浮痿緩之脈順則散而虛逆則堅而疾唾吐衄血順者小弱沉滑逆者堅躁浮洪金瘡血多順者微細而虛逆者躁實而大久嗽尿血羸瘦者其正則脈微其反則洪急大腸澼泄筋攣者其正則脈細其反則堅洪泄瀉注谷下痢其正者緩細小結其反者弦數浮洪金瘡與諸下血其正者細滑而沉其反者緊急疾大發熱亦反䘌蝕肛陰可虛小而不可緊急產後出血可沉小而不可疾浮前所謂利沉小而不利浮大者此也傷寒脈躁盛而不得汗者陽之極其治也難傷寒已得汗而脈躁盛者陰之極其候即死中風口噤四肢不收脈浮遲而恬靜者存脈洪數而氣粗者亡上氣喘急面目浮腫脈浮滑而手足溫者存脈澀澀而四肢厥者亡加痢即死心下牢強勝則脈緊負則沉濡水病腹腫勝則脈實負則虛散病黃疸者勝則緩大負則弦急而堅猝中惡者勝則洪緩負則堅急而馳腹脹便血活者脈滑殂者脈絕腸癰腫結活者脈浮殂者脈沉膿血諸疾活以滑細殂以堅強腸澼下膿活以其沉殂以其浮有遲滑而無緊數則崩中漏下不必慮有滑實而無浮虛則月經閉塞何足憂諸腸澼身不熱而脈和滑者易愈身熱而脈弦澀者難痊諸咳嗽聲不焦而脈浮軟者易安弦絕沉堅或伏而大者難保逆而堅澀順而濡滑其於上氣為可推反則急堅正則虛緩其於厥逆為可驗耳聾之脈沉而滑者可愈浮而澀者難療蠱毒之脈數而軟者可蘇數而堅者難蘇凡蠱毒脈類如釵股其人吐甚心下切痛如齧而面目黃或吐血不止者皆死前所謂大小無拘而以浮沉滑澀堅軟為順逆者此也心病面赤喜笑心煩掌熱口乾開目妄語臍上動氣脈當洪緊而數反得沉濡而微者水之剋火一不治肝病面青筋急多怒目痛目閉不欲見人臍左動氣脈當弦急而長反得浮澀而短者金之剋木二不治腎病面黑恐欠足寒逆氣腹痛飧泄後重臍下動氣脈當沉而滑反得緩而大者土之剋水三不治肺病面白悲愁嚏哭吐衄交血喘咳寒熱臍右動氣脈當沉細而澀反得浮大而牢者火之剋金四不治五者脾病面黃善思善嗜體重節疼四肢不收怠惰喜臥腹滿泄利飲食不消當臍動氣脈來緩大者脾家正形也設或反是弦長而緊是非木邪之剋土乎前所謂五行反克而賊邪乘虛為深患者此也雖然健人之脈病病人之脈健陽病得陰脈陰病得陽脈凡此皆反也而劉元賓以為形病脈和人不死張長沙以為陰病見陽脈者生其言豈厚誣哉經云脈病人不病曰行屍人病脈不病曰內虛此二者雖皆非順然形病而脈和猶可用力形和而脈病其死不疑況脈和之與脈健本自不同剛馳暴躁之謂健調平而有胃氣之謂和毫釐疑似之間學者當於此而致其辨矣經云忽陽病得陰脈陰病得陽脈者死此二者雖皆非正然張長沙之論特為傷寒設謂如傷寒心腹煩滿而脈浮大之類是爾腹滿病在太陰浮大之脈屬陽亦脾家之本體故能生焉學者當於此而通其故矣逆順之說故備論之以俟大賢之折衷云老者脈陽羸陰強順陰弱陽強逆大人得小兒脈不治左病右痛上病下痛不治下痢手足溫易治手足寒難治手足厥冷脈不至者死吐血發嗽上氣脈數有熱不得臥者死凡病人眼無魂朦朧白雲如外障並不治病人脈和軟者生刮澀如枝梗草根者死男女氣血則一論血氣即陰陽也不論男女長幼均具之人之有病皆知調氣而血之一字念不到焉至於調氣不愈加以消痰逐水無所不至其病自如是皆血之為患伏於冥冥之中而不可測識矣假如婦人得病於經水來去之時固有可驗而知者其若經脈久遏而不行與夫協熱而傷血變生他證如之何而見之況世俗循習其能以男子之診為血證乎夫肝藏血而心主之動則血運於諸經靜則血歸於肝臟肝受血則能視足受血則能步掌受血則能握指受血則能攝故血凝於膚者為痹凝於脈者為泣凝於足者為厥凡神志昏昏驚狂冒悶煩渴嘔吐語短內疼鼻衄唾紅眼紅面赤骨熱膚哄腸垢尿多胸滿頑痰譫語多汗甚至四肢厥冷懵不知人不問男子婦人皆血證耳據脈驗之挾血者脈來乍澀乍數閃灼明滅或沉細而隱伏也若夫血與熱交攻則左手寸關按之洪盛蓋心主血肝藏血固如是爾經曰血上逆則忘血下蓄則狂上焦淤血小便必難下焦淤血小便必自利血之所在當以此推活人總括所載小柴胡湯犀角地黃湯桃仁承氣湯皆其要藥血結者湯劑中入醋為佐特於此而申言之然猶有所謂血鱉氣鱉酒鱉者又不可不知也蓋平時酷酒血入於酒則為酒鱉平時任氣血凝於氣則為氣鱉虛勞痼冷敗血化生則為血鱉搖頭掉尾如蟲之行上侵人之喉下蝕人之肛或附於背脅或隱於胸腹其大則如鱉其小則如錢良可怪也治法用蕪荑炒煎為妙或生硫黃為末老酒調下二者可以殺其毒嗣此則以理中湯沉香降氣湯各半溫胃益血常常服餌以消勝之如其不以溫和為主日從事於雷丸錫灰之劑焉君子未保其往活人書云傷寒太陽證衄血者病欲愈熱結膀胱而血自下者亦欲愈以此觀之他病伏熱之人上焦淤血而作吐者亦其病之有瘳也雖然血既吐而自止則可矣問病論東坡先生嘗曰吾平生求醫蓋於平時默驗其工拙至於有疾必先盡告以所患而後診視使醫者瞭然知厥疾之所在虛實冷熱先定於中則脈之疑似不能惑也故雖中醫療疾常愈吾求疾愈而已豈以困醫為事哉誠哉斯言真警迷濟世之砭劑也何者脈之與證相依而行脈者所以剖其證之未明證者所以索其脈之猶隱據脈以驗證所謂得乎應心者是爾問證以參脈所謂醫者意也是爾烏可舉一而廢一哉私竊怪夫近世以來多秘所患以求診以此驗醫者之能否醫亦不屑下問孟浪一診以自挾其所長甚者病家從前誤藥或飲食居處有所諱誨雖問之而不以盡告遂至索病於冥漠之間辨虛實冷熱於疑似之頃毫釐千里寧不委命一擲與人試伎乎此余於終篇所以特舉前輩格言以解世俗之惑不然難經有謂問其所欲五味以知其病之所起所在者又果何意邪大人小兒諸病瘥後飲食且須漸進常若不足毋使食氣傷胃其病復來大熱方退尤不可飽小兒傷乳熱復則同論易簡方論易簡方論前後活人不知其幾近世之士類以春秋之法繩之曰易簡繩愆曰增廣易簡曰續易簡論借古人之盛名以自伸其臆說籲王氏何負於人哉余謂易簡方論後學指南四時治要議論似之自有人心權度存焉耳況王氏晚年劑量更定者不一日月薄蝕何損於明若夫索瘢洗垢矯而過焉或者公論之所不予也附原脈論出保命集大道之渾淪莫知其原然至道無言無以明其理大象無形非立象無以測其奧道象之妙非言不明嘗試原之脈者何也非氣非血動而不息營行脈中衛行脈外經曰脈者血之府也自素問而下迄於今經所不載無傳記而莫聞其名焉然而玄機奧妙聖意幽微雖英俊明哲之士非輕易可得而悟也夫脈者果何物乎脈者有三名一曰命之本二曰氣之神三曰形之道經謂天和者是也至於折一肢瞽二目亦不為害生而脈不可須臾失失則絕命害生矣經曰春弦一曰長夏洪一曰鉤秋毛一曰澀冬石一曰沉此言正脈同天真造化之元氣也巡於春夏秋冬木火水金之位生長收藏參和相應故稟二儀而生不離於氣故於脈有生死之驗經曰脈者血之府也如世之京都州縣有公府解署也國因置者所以禁小人為非道也公府不立則善者無以伸其枉惡者無以罰其罪邪正混同賢愚雜處而亂之根也經曰五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也既陰陽為神明之府脈為血之府而明可見焉血之無脈不得循其經絡部分周流於身滂沛奔迫或散或聚氣之無脈不能行其筋骨臟腑上下或暴或蹶故經曰出入廢則神機化滅升降息則氣立孤危故氣化則物生氣變則物易氣盛則物壯氣弱則物衰氣絕則物死氣正則物和氣亂則物病皆隨氣之盛衰而為變化也脈字者從肉從永從爪從血四肢百骸得此真元之氣血肉筋骨爪發榮茂可以倚憑而能生長也長久永固道故從肉從永者是也從爪從血者巡之如水分流而布遍周身無有不通也釋名曰脈脈幕也如幔幕之遮覆幕絡一體之形導太一真元之氣也元氣者在氣非寒非熱非暖非涼在脈者非弦非洪非澀非沉不為氣而浮沉不為血而流停乃沖和自然之氣也故春溫夏熱秋涼冬寒所以然者為元氣動而不息巡於四方木火水金之位溫涼寒暑之化生生相續新新不停日月更出四序迭遷脈不為息故人有身形之後五臟既生身中元氣即生焉故春弦夏洪秋毛冬石此四時之氣也而脈者乃在其中矣道經曰視之不見聽之不聞搏之不得迎之不見其首隨之不見其後此如脈之謂也又云埏填以為器當其無有器之用故有之以為利無之以為用又曰吾不知名字之曰道強為之名曰大斯立脈之名之本意也故道者萬物之奧脈者百骸之靈奧靈之妙其道乃同元氣者無器不有無所不至血因此而行氣因此而生故營行脈中衛行脈外瞻之在前忽然在後而不匱者皆由於脈也分而言之曰氣曰血曰脈總而言之惟脈運行血氣而已故經曰血氣者人之神不可不謹養也陰陽別論曰所謂陽者胃脘之陽也此陽者言脈也胃者土也脈乃天真造化之氣也若土無氣則何以生長收藏若氣無土何以養化萬物是無生滅也以平人之氣常稟於胃正理論曰谷入於胃脈道乃行陰陽交會胃和脈行人稟天地之候故春胃微弦曰平得弦而無胃曰死夏胃微鉤曰平但鉤而無胃曰死長夏微軟曰平但弱而無胃曰死秋胃微毛曰平但毛而無胃曰死冬胃微石曰平但石而無胃曰死陰者真臟也見則敗敗則必死五臟為陰肝脈至中而無外急如循刀刃責責然如按琴絃心脈至堅而搏如循薏苡仁累累然肺脈至大而虛如毛羽中人皮膚腎脈至搏而絕如以指彈石辟辟然脾脈弱而乍數乍疏夫如此脈者皆為臟脈獨見而無胃脈五臟皆至懸絕而死故經曰別於陽者知病忌時別於陰者知生死之期故人性候躁急懁促遲緩軟弱長短大小皮堅肉厚各隨其狀而脈應之常以一息四至為準者言呼出心與肺吸入腎與肝五者胃兼主四旁在呼吸之間也數則為熱遲則為寒如天之春秋二分陰陽兩停晝夜各得五十度自此添一遭則熱減一遭則寒脈之妙道從此可知矣或如散葉或如燃薪或如丸泥或如絲縷或如湧泉或如吐頹或如偃刀或如轉索或如游魚假使千變萬化若失常者乃真元之氣離絕矣經曰積陽為天積陰為地陽化氣陰成形此言一氣判而清濁分也元氣者天地之本天和者血氣之根華佗云脈者謂血氣之先也孔子曰天不言而四時行焉百物生焉而脈亦如之又經曰自古通天者生之本皆通乎天氣也通天者謂通元氣天真也然形體者假天地之氣而生故奉生之氣通計於天稟受陰陽而為根本天地合氣命之曰人天氣不絕真靈內屬動靜變化悉與天通易云乾坤成列而易立乎其中矣故天地之體得易而後生天地之化得易而後成故陽用事則春生夏長陰用事則秋收冬藏寒往則暑來暑往則寒來始而終之終而復始天地之化也而易也默然於其間而使其四序各因時而成功至於寒不凌暑暑不奪寒無愆陽伏陰之變而不至於大肅大溫故萬物各得其沖和之氣然後不為過而皆中節也道經曰萬物負陰而抱陽沖氣以為和百姓日用而不知斯脈之道也故脈不得獨浮沉獨大小獨盛衰獨陰陽須可沉中有浮浮中有沉大中有小小中有大盛中有衰衰中有盛陰中有陽陽中有陰充塞一身之中盈溢百骸之內無經絡不有無氣血不至養筋骨毛髮堅壯膩澤非心非腎非肝非脾五臟之盛真氣固密不為邪傷若憂愁思慮飢飽勞逸風雨寒暑大驚猝恐真氣耗亂氣血分離為病之本噫夫萬物之中五常皆備審脈之道而何獨無五常邪夫仁固衛一身充盈五臟四肢百骸亦皆得營養無沖和之氣獨真臟脈見則死矣生則不見死則獨見好生惡死此仁之謂也分布軀體和調氣血貴之在頭目耳鼻賤之在蹠臀陰篡不得上而有不得下而無所不施無所不至此義之謂也長人脈長短人脈短肥人脈沉瘦人脈浮大人脈壯小人脈弱若長人脈短短人脈長肥人浮瘦人沉大人弱小人壯夫如此者皆不中理而為病此禮之謂也見在寸則上病見在關則中病見在尺則下病五臟有疾各有部分而脈出見不為潛藏伏匿一一得察有餘不足而愈其病此智之謂也春弦夏洪秋毛冬石太陽之至其脈沉太陰之至其脈大而長少陰之至其脈浮陽明之至其脈澀而短少陽之至其脈鉤厥陰之至其脈弦四序不失其期六氣為常准者此信之謂也非探頤索隱鉤深致遠學貫天人旁通物理者未能達於此矣附論五篇出丹溪心法不治已病治未病與其救療於有疾之後不若攝養於無疾之先蓋疾成而後藥者徒勞而已是故已疾而不治所以為醫家之法未病而先治所以明攝生之理夫如是則思患而預防之者何患之有哉此聖人不治已病治未病之意也嘗謂備土以防水也苟不以閉塞其涓涓之流則滔天之勢不能遏備水以防火也若不以撲滅其熒熒之光則燎燎之焰不能止其水火既盛尚不能止遏況病已成豈能治歟故宜夜臥早起於發陳之春早起夜臥於蕃莠之夏以之緩形無怒而遂其志以之食涼食寒而養其陽聖人春夏治未病者如此與雞俱興於容平之秋必待日光於閉藏之冬以之斂神匿志而私其意以之食溫食熱而養其陰聖人秋冬治未病者如此或曰見肝之病先實其脾臟之虛則木邪不能傳見右頰之赤先瀉其肺金之熱則金邪不能盛此乃治未病之法今以順四時調養神志而為治未病者是何意耶蓋保身長全者所以為聖人之道治病十全者所以為上工術不治已病治未病之說著於四氣調神大論厥有旨哉昔黃帝與天師難疑答問之書未嘗不以攝養為先始論乎天真次論乎調神既以法於陰陽而繼之以調於四氣既曰食飲有節而又繼之以起居有常諄諄然以養生為急務者意欲治未然之病無使至於已病難圖也厥後秦緩達乎此見晉候病在膏肓語之曰不可為也扁鵲明乎此見齊侯病至骨髓斷之曰不可救也噫惜齊晉之候不知治未病之理亢則害承乃制氣之來也既以極而成災則氣之乘也必以復而得平物極則反理之自然也大抵寒暑燥濕風火之氣木火土金水之形亢極則所以害其物承乘則所以制其極然則極而成災復而得平氣運之妙灼然而明矣此亢則害承乃制之意原夫天地陰陽之機寒極生熱熱極生寒至神不測有以斡旋宰制於其間也故木極而似金火極而似水土極而似木金極而似火水極而似土蓋氣之亢極所以承之者反勝於已也夫惟承其亢而制其害者造化之功可得而成也今夫相火之下水氣承而火無其變水位之下土氣承而水無其災土位之下木承而土順風位之下金乘而風平火熱成其燥金自然金家之疾陰精承其君火自然火家之候所謂亢而為害承而乃制者如斯而已且嘗考之六元正紀大論云少陽所至為火生終為蒸溽火化以生則火生也陽在上故終為蒸溽是水化以承相火之意太陽所至為寒雪冰雹白埃是土化以承寒水之意也霜雪冰雹水也白埃下承土也以至太陰所至為雷霆驟注烈風雷霆驟注土也烈風下承之木氣也厥陰所至為風生終為肅風化以生則風生也肅靜也陽明所至為散落溫散落金也溫下承之火氣也少陰所至為熱生中為寒熱化以生則熱生也陰精承上故中為寒也豈非亢為害則承乃制者歟昔者黃帝與岐伯上窮天紀下極地理遠取諸物近取諸身更相問難以作內經至於六微旨大論有及於六氣相承之言以為制則生化外列盛衰害則敗亂生化大病諸以所勝之氣承於下者皆折其標盛也不然曷以水發而電雪土發而驟飄木發而毀折金髮而清明火發而熏昧此皆鬱極乃發以承所亢之意也嗚呼通天地人曰僵醫家者流豈止治疾而已當思其不明天地之理不足以為醫工之語審察病機無失氣宜邪氣各有所屬也當窮其要於前治法各有所歸也當防其差於後蓋治病之要從窮其所屬為先苟不知法之所歸未免於無差爾是故疾病之生不勝其眾要其所屬不出乎五運六氣而已誠能於此審察而得其機要然後為之治又必使之各應於運氣之宜而不至有一毫差誤之失若然則治病求屬之道庶乎其無愧矣至真要大論曰審察病機無失氣宜意蘊諸此嘗謂醫道有一言而可以盡其要者運氣是也天為陽地為陰陰陽二氣各分三品謂之三陰三陽然天非純陽而亦有三陰地非純陰而亦有三陽故天地上下各有風熱火濕燥寒之六氣其斡旋運動乎兩間者而又有木火土金水之五運人生其中臟腑氣穴亦與天地相為流通是知眾疾之作而所屬之機無出乎是也然而醫之為治當如何哉惟當察乎此使無失其宜而後可若夫諸風掉眩皆屬肝木諸痛癢瘡皆屬心火諸濕腫滿皆屬脾土諸氣恚郁皆屬肺金諸寒收引皆屬腎水此病機屬於五運者也諸暴強直皆屬於風諸嘔吐酸皆屬於熱諸躁擾狂越皆屬於火諸痙強直皆屬於濕諸澀枯涸皆屬於燥諸病水液澄徹清冷皆屬於寒此病機屬於六氣者也夫惟病機之察雖曰既審而治病之施亦不可不詳故必別陰陽於疑似之間辨標本於隱微之際有無之殊者求其有無之所以殊虛實之異者責其虛實之所以異為汗吐下投其所當投寒熱溫涼用其所當用或逆之以制其微或從之以導其甚上焉以遠司氣之犯中焉以辨歲運之化下焉以審南北之宜使大小適中先後合度以是為治又豈有差殊乖亂之失耶又考之內經曰治病必求其本本草曰欲療病者先察病機此審病機之意也六元正紀大論曰無失天信無逆氣宜五常政大論曰必先歲氣無伐天和此皆無失氣宜之意也故素問靈樞之經未嘗不以氣運為言既曰先立其年以明其氣復有以戒之曰治病者必明天道地理陰陽更勝既曰不知年之所加氣之盛衰虛實之所起不可以為工矣諄諄然若有不能自已者是豈聖人私憂過計哉以醫道之要悉在乎此也觀乎原病式一書比類物象深明乎氣運造化之妙其於病機氣宜之理不可以有加矣能合色脈可以萬全欲知其內者當以觀乎外診於外者斯以知其內蓋有諸內者形諸外苟不以相參而斷其病邪之逆順不可得也為工者深燭厥理故望其五色以青黃赤白黑以合於五臟之脈窮其應與不應切其五脈急大緩澀沉以合其五臟之色順與不順誠能察其精微之色診其微妙之脈內外相參而治之則萬舉萬全之功可坐而致矣素問曰能合色脈可以萬全其意如此原夫道之一氣判而為陰陽散而為五行而人之所稟皆備焉夫五脈者天之真行血氣通陰陽以營於身五色者氣之華應五行合四時以彰於面惟其察色按脈而不偏廢然後察病之機斷之以寒熱歸之以臟腑隨證而療之而獲全濟之效者本於能合色脈而已假令肝色如翠羽之青其脈微弦而急所以為生若浮澀而短色見如草滋者豈能生乎心色如雞冠之赤其脈當浮大而散所以為順若沉濡而滑色見如衃血者豈能順乎脾色如蟹腹之黃其脈當中緩而大所以為從若微弦而急色見如枳實者豈能從乎肺色如豕膏之白其脈當浮澀而短所以為吉若浮大而散色見如枯骨者豈能吉乎從至腎色見如烏羽之黑其脈沉濡而滑所以為生或脈來緩而大色見如炱者死死生之理夫惟診視相參既以如此則藥證相對厥疾弗瘳者未之有也抑嘗論之容色所見左右上下各有其部脈息所動寸關尺中皆有其位左頰者肝之部以合左手關位肝膽之分應於風木為初之氣顏為心之部以合於左手寸口心與小腸之分應於君火為二之氣鼻為脾之部合於右手關脈脾胃之分應於濕土為四之氣右頰肺之部合於右手寸口肺與大腸之分應於燥金為五之氣頤為腎之部以合於左手尺中腎與膀胱之分應於寒水為終之氣至於相火為三之氣應於右手命門三焦之分也若夫陰陽五行相生相勝之理當以合之於色脈而推之也是故脈要精微論曰色合五行脈合陰陽十三難曰色之與脈當參相應然而治病萬全之功苟非合於色脈者莫之能也五臟生成篇云心之合脈也其營色也夫脈之大小滑澀沉浮可以指別五色微診可以目察繼之以能合色脈可以萬全謂夫赤脈之至也喘而堅白脈之至也喘而浮青脈之至也長而左右彈黃脈之至也大而虛黑脈之至也上堅而大此先言五色次言五脈欲後之學者望而切之以相合也厥後扁鵲明乎此述之曰望而知之謂之神切脈而知之謂之巧深得內經之理也下迨後世有立方者目之曰神巧萬全厥有旨哉治病必求於本將以施其療疾之法當以窮其受病之源蓋疾源之源不離於陰陽二邪也窮此而療之厥疾勿瘳者鮮矣良工知其然謂夫風熱火之病所以屬乎陽邪之所客病既本於陽苟不求其本而治之則陽邪滋蔓而難制濕燥寒之病所以屬乎陰邪之所客病既本於陰苟不求其本而治之則陰邪滋蔓而難圖誠能窮原療疾各得其法萬舉萬全之功可坐而致也治病必求於本見於素問陰陽應象大論者如此夫邪氣之基久而傳化其變證不勝其眾也譬如水之有本故能薦至汪洋浩瀚派而趨下以漸大草之有本故能薦生莖葉實秀而在上以漸蕃若病之有本變化無窮苟非必求其本而治之欲去深感之患不可得也今夫厥陰為標風木為本其風邪傷於人也掉搖而眩轉瞤動而瘛瘲猝暴強直之病生矣少陰為標君火為本其熱邪傷於人也瘡瘍而痛癢暴注而下迫水液渾混之病生矣少陽為標相火為本其火邪傷於人也為熱而瞀瘛躁擾而狂越如喪神守之病生矣善為治者風淫所勝平以辛涼熱淫所勝平以鹹寒火淫所勝平以鹹冷以其病本於陽必求其陽而療之病之不愈者未之有也太陰為標濕土為本其濕邪傷於人也腹滿而身腫按之而沒指諸痓強直之病生矣陽明為標燥金為本其燥邪傷於人也氣滯而恚郁皮膚以皺揭諸澀枯涸之病生矣太陽為標寒水為本其寒邪傷於人也吐利而腥穢水液以清冷諸寒收引之病生矣善為治者濕淫所勝平以苦熱燥淫所勝平以苦溫寒淫所勝平以辛熱以其病本於陰必求其陰而治之病之不愈者未之有也豈非將以施其療疾之法當以窮其受病之源者哉抑嘗論之邪氣為病各有其候治之之法各有其要亦豈止於一端而已其在表者汗而發之其入里者下而奪之其在高者因而越之謂可吐也剽悍者按而收之謂按摩也臟寒虛奪者治以灸爇脈病攣痹者治以針刺血實蓄結腫熱者治之砭石氣滯痿厥寒熱者治以導引經絡不通病生於不仁者治以醪醴血氣凝泣病生於筋脈者治以熨藥始焉求其受病之本終焉蠲其為病之邪者無出於此也噫昔黃帝處於法宮之中坐於明堂之上受業於歧伯傳道於雷公曰陰陽者天地之道也綱紀萬物變化生殺之妙蓋有不測之神斡旋宰制於其間也人或受邪生病不離於陰陽也病既本於此為工者豈可他求哉必求於陰陽可也至真要大論曰有者求之無者求之此求其病機之說與夫求於本其理一也大抵四時以胃氣為本然治病必須先診六脈皆有胃氣外證雖重病亦可治胃氣未絕則藥力運行而輸散於皮毛經絡故易治而生胃氣既絕則藥雖對證不能使其運用以輸精於皮毛經絡真臟獨見而藥不及矣遂成不治之證也東垣曰脈貴有神有神者有胃氣之謂也故諸經方論皆曰有病早治療不令邪氣深入所以聖人治未病不治已病正謂此也附十二經脈歌手太陰肺中焦生下絡大腸出賁門上膈屬肺從肺系系橫出腋臑中行肘臂寸口上魚際大指內側爪甲根支絡還從腕後出接次指屬陽明經此經多氣而少血是動則病喘與咳肺脹膨膨缺盆痛兩手交瞀為臂厥所生病者為氣咳喘渴煩心胸滿結臑臂之外前廉痛小便頻數掌中熱氣虛肩背痛而寒氣盛亦疼風汗出欠伸少氣不足息遺失無度溺變別陽明之脈手大腸次指內側起商陽循指上連出合谷兩筋岐骨循臂肪入肘外廉循臑外肩端前廉柱骨傍從肩下入缺盆內絡肺下膈屬大腸支從缺盆上入頸斜賁頰前下齒當環出人中交左右上挾鼻孔注迎香此經血盛氣亦盛是動頸腫並齒痛所生病者為鼻衄目黃口乾喉痹生大指次指難為用肩臑外側痛相仍胃足陽明交鼻起下循鼻外下入齒還出挾口繞承漿頤後大迎頰車裡耳前髮際至額顱支下人迎缺盆底下膈入胃絡脾宮直者缺盆下乳內一支幽門循腹中下行直合氣沖逢遂由髀關抵膝臏胻跗中指內間同一支下膝注三里前出中指外關通一支別走足跗指大指之端經盡矣此經多氣復多血是動欠伸面顏黑悽悽惡寒畏見人忽聞木聲心振懾登高而歌棄衣走甚則腹脹乃賁響凡此諸疾皆骭厥所生病者為狂瘧濕溫汗出鼻流血口喎唇裂又喉痹膝臏疼痛腹脹結氣膺伏兔胻外廉足跗中指俱痛徹有餘消穀溺色黃不足身前寒振慄胃房脹滿食不消氣盛身前皆有熱太陰脾起足大趾上循內側白肉際核骨之後內踝前上臑循胻脛膝里股內前廉入腸中屬脾絡胃與膈通挾喉連舌散舌下支絡從胃注心宮此經氣盛而血衰是動其病氣所為食入即吐胃脘痛更兼身體痛難移腹脹善噫舌本強得後與氣快然衰所生病者舌亦痛體重不食亦如之煩心心下仍急痛泄水溏瘕寒瘧隨不臥強立股膝腫疽發身黃大指痿手少陰脈起心中下膈直與小腸通支者還從肺系走直上咽喉系目瞳直者上肺出腋下臑後肘內少海從臂內後廉抵掌中兌骨之端注少衝多氣少血屬此經是動心脾痛難任渴欲飲水咽乾燥所生脅痛目如金脅臂之內後廉痛掌中有熱向經尋手太陽經小腸脈小指之端起少澤循手外廉出踝中循臂骨出肘內側上循臑外出後廉直過肩解繞肩甲交肩下入缺盆內向腋絡心循咽嗌下膈抵胃屬小腸一支缺盆貫頸頰至目銳眥卻入耳復從耳前仍上頰抵鼻升至目內眥斜絡於顴別絡接此經少氣還多血是動則病痛咽嗌頷下腫兮不可顧肩如拔兮臑似折所生病兮主肩臑耳聾目黃腫腮頰肘臂之外後廉痛部分猶當細分別足經太陽膀胱脈目內眥上顴額尖支者巔上至耳角直者從巔腦後懸絡腦還出別下項仍循肩膊挾脊邊抵腰膂腎膀胱內一支下與後陰連貫臀斜入委中穴一支膊內左右別貫胛挾脊過髀樞髀外後廉膕中合下貫踹內外踝後京骨之下趾外側是經血多氣少也是動頭痛不可當項如拔兮腰似折髀強痛徹脊中央膕如結兮腨如裂是為踝厥筋乃傷所生瘧痔小趾廢頭囪頂痛目色黃腰尻膕腳疼連背淚流鼻衄乃癲狂足經腎脈屬少陰小指斜透湧泉心然骨之下內踝後別入跟中腨內浸出膕內廉上股內貫脊屬腎膀胱臨直者屬腎貫肝膈入肺循喉舌本尋支者從肺絡心內仍至胸中部分深此經多氣而少血是動病飢不欲食喘嗽唾血喉中鳴坐而欲起面如垢目視䀮䀮氣不足心懸如飢常惕惕所生病者為舌乾口熱咽痛氣賁逼股內後廉並脊疼心腸煩痛疽而澼痿厥嗜臥體怠墮足下熱痛皆腎厥手厥陰心主起胸屬包下膈三焦宮支者循胸出脅下脅下連腋三寸同仍上抵腋循臑內太陰少陰兩經中指透中衝支者別小指次指絡相通是經少氣原多血是動則病手心熱肘臂攣急腋下腫甚則胸脅支滿結心中澹澹或大動善笑目黃面赤色所生病者為心煩心痛掌熱病之則手經少陽三焦脈起自小指次指端兩指岐骨手腕表上出臂外兩骨間肘後臑外循肩上少陽之後交別傳下入缺盆膻中分散絡心膈高里穿支者膻中缺盆上上項耳後耳角旋屈下至頤仍生頰一支出耳入耳前卻從上關交曲頰至目內眥乃盡焉斯經少血還多氣是動耳鳴喉腫痹所生病者汗自出耳後痛兼目銳眥肩臑肘臂外皆疼小指次指亦如廢足脈少陽膽之經始從兩目銳眥生抵頭循角下耳後腦空風池次第行手少陽前至肩上交少陽右上缺盆支者耳後貫耳內出走耳前銳眥循一支銳眥大迎下合手少陽抵項根下加頰車缺盆合入胸貫膈絡肝經屬膽仍從脅裡過下入氣街毛際縈橫入髀厭環跳內直者缺盆下腋膺過季脅下髀厭內出膝外廉是陽陵外輔絕骨踝前過足跗小趾次趾分一支別從大趾去三毛之際接肝經此經多氣乃少血是動口苦善太息心脅疼痛難轉移面塵足熱體無澤所生頭痛連銳眥缺盆腫痛並兩腋馬刀挾癭生兩旁汗出振寒痎瘧疾胸脅髀膝至胻骨絕骨踝痛及諸節厥陰足脈肝所終大趾之端毛際叢足跗上廉太衝分踝前一寸入中封上踝交出太陰後循膕內廉陰股充環繞陰器抵小腹挾胃屬肝絡膽逢上貫膈里布脅肋挾喉項穎目系同脈上巔會督脈出支者還生目系中下絡頰裡還唇內支者便從膈肺通是經血多氣少焉是動腰疼俯仰難男疝女人小腹腫面塵脫色及咽乾所生病者為胸滿嘔吐洞泄小便難或時遺溺並狐疝臨證還須仔細看火濕分治論肥人氣虛生寒寒生濕濕生痰瘦人血虛生熱熱生火火生燥故肥人多寒濕瘦人多熱燥也夫以人形分寒濕熱燥此得之於外然其中臟腑為病亦有寒濕熱燥之殊不可不知玉匱金鑰曰肝臟由來同火治三焦包絡都無異脾胃常將濕處求肺與大腸同濕類腎與膀胱心小腸寒熱臨時旋商議惡寒表熱小膀濕發熱表寒心腎熾十二經最端的四經屬火四經濕四經有熱有寒時攻裡解表細消息裡熱表寒宜越竭表熱表寒宜汗釋濕同寒火同熱寒熱到頭無兩說六分分來火熱寒寒熱中停真浪舌熱寒格拒病機深亢則害兮承乃制緊寒數熱脈正邪標本治之真妙訣休治風休治燥治得火時風燥了當解表時莫攻裡當攻裡時莫解表表裡如或兩可攻後先內外分多少治濕無過似決川此個筌蹄最分曉感謝軒岐萬世恩爭奈醯雞笑天小虛實分治論夫疾病之生也皆因外感內傷生火生濕濕而生熱火而生痰四者而已審其為少壯新病是濕則燥之是火則瀉之是濕而生熱則燥濕而兼清熱是火而生痰則瀉火而兼豁痰無餘蘊矣審其為老衰久病又當半攻半補焉如氣虛而有濕熱痰火則以四君子湯補氣而兼燥濕清熱豁痰瀉火如血虛而有痰火濕熱則以四物湯補血而兼瀉火豁痰清熱燥濕如此則攻補兼施庶乎可也予故曰少壯新病攻邪為主老衰久疾補虛為先若夫陰虛火動脾胃衰弱真陰者水也脾胃者土也土雖喜燥然太燥則草木枯槁水雖喜潤然太潤則草木濕爛是以補脾胃補腎之劑務在潤燥得宜亦隨病加減焉附病機賦竊謂醫雖小道乃寄死生最要變通不宜固執明藥脈病治之理藥性脈訣病機治法悉望聞問切之情望色聞聲問故切脈藥推寒熱溫涼平和之氣辛甘淡苦酸鹹之味升降浮沉之性宣通瀉補之能脈究浮沉遲數滑澀之形表裡寒熱實虛之應阿阿嫩柳之和弦鉤毛石之順藥用君臣佐使主病之謂君最多輔君之謂臣次之應臣之謂佐使又其次之脈分老幼瘦肥老人脈濡小兒脈數瘦者脈大肥者脈細藥乃天地之精藥宜切病藥不泛用則切病矣脈者氣血之表脈貴有神脈中有力謂有神也病有外感內傷風寒暑濕燥火之機治用宣通瀉補滑澀溫燥重輕之劑外感異乎內傷外感乃有餘之症內傷乃不足之證寒證不同熱證傷寒直中之邪為寒傷寒傳經之邪為熱外感宜瀉而內傷宜補寒證可溫而熱證可清補瀉得宜須臾病愈溫清失度頃刻人亡外感風寒宜分經而解散外感風寒傳變不一宜分經絡解散方可內傷飲食可謂胃以消溶內傷飲食只在一處不過調胃消導而已胃陽主氣司納受陽常有餘脾陰主血司運化陰常不足胃乃六腑之本能納受水穀方可傷化氣液脾為五臟之源能運化氣液方可克營衛胃氣弱則百病生脾陰足而萬邪息調理胃脾為醫中之王道節戒飲食乃卻病之良方病多寒冷鬱氣氣鬱發熱寒謂風寒外感晝夜發熱冷謂生冷內傷午後發熱或出七情動火火動生痰有因行藏動靜以傷暑邪或是出入雨水而中濕氣亦有飲食失調而生濕熱倘或房勞過度以動相火以上六條言病機制伏相火要滋養其真陰以下六條言治法祛除濕熱須燥補其脾胃外濕宜表散內濕宜淡滲陽暑可清熱陰暑可散寒尋火尋痰分多分少而治究表究里或汗或下而施是風寒則汗之謂溫散也是生冷則下之謂溫利也痰因火動治火為先火因氣生理氣為本治火輕者可降重者從其性而升消理氣微則宜調甚則究其源而發散實火可瀉或瀉表或瀉里指外感也虛火宜補或補陰而或補陽指內傷也暴病之謂火怪病之謂痰寒熱濕燥風五痰有異溫清燥潤散五治不同寒痰溫之熱痰清之濕痰燥之燥痰潤之風痰散之有因火而生痰有因痰而生火或郁久而成病或病久而成郁金水木火土五郁當分泄折達發奪五法宜審金鬱泄之水鬱折之木鬱達之火鬱發之土鬱奪之鬱則生火生痰而成病病則耗氣耗血以致虛病有微甚治有逆從微則逆治以寒藥治熱以熱藥治寒甚則從攻以寒藥治熱佐以熱藥以熱藥治寒佐以寒藥病有本標急則治標緩則治本法分攻補虛而用補實而用攻少壯新邪專攻則是老衰久病兼為補為規久病兼補虛而兼解鬱陳症或盪滌而或消溶積在胃腸可下而愈塊居經絡宜消而痊女人氣滯淤血宜開血而行氣男子陽多乎陰可補陰以配陽蓯蓉山藥男子之佳珍補陰故也香附縮砂女人之至寶行氣故也氣病血病二者宜分陽虛陰虛兩般勿紊陽虛氣病晝重而夜輕自子至巳為晝血病陰虛晝輕而夜重自午至亥為夜陽虛生寒寒生濕濕生熱陽為氣為真火陰虛生火火生燥燥生風陰為血為真水陽盛陰虛則生火火逼血而錯輕妄行陰盛陽虛則生寒寒滯氣而周身浮腫陽虛畏外寒陽氣虛不能外故畏外寒陰虛生內熱陰血虛不能配氣故生內熱補陽補氣用甘溫之品滋陰滋血以苦寒之流調氣貴用辛涼氣屬陽無形者也氣鬱則發熱故宜用辛涼之藥以散之和血必須辛熱血屬陰有形者也血積則作痛故宜用辛熱之藥以開之陽氣為陰血之引導陰血乃陽氣之依歸陽虛補陽而陰虛滋陰氣病調氣而血病和血陰陽兩虛惟補其陽陽生而陰長氣血俱病只調其氣氣行而血隨藏冰發冰以節陽氣之燔滋水養水以制心火之亢火降水升斯人無病陰平陽秘我體長春小兒純陽而無陰老者多氣而少血肥人氣虛有痰宜豁痰而補氣瘦者血虛有火可瀉火以滋陰膏粱無厭發癰疽熱燥所使痰薄不堪生腫脹寒濕而然北地聳高宜清熱而用燥南方洿下可散濕以溫寒
