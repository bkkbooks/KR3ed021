body:
  text: 卷之二十四癮疹風論癮疹風論風氣挾熱起於腠理皮膚不腫不疼發為瘙癢謂之癮疹此風熱之浮淺者也其亦有寒暑濕之氣行焉風熱在表天時炎暄而燥氣乘之則為赤疹風熱在表天時寒涼而冷氣折之則為白疹赤者遇涼清而後消白者遇溫暖而後滅然則用藥加減可無權度於此哉其有浴後湊風與夫汗出解脫而得之者隱隱微黃似赤似白凝滯於肌肉之間而四體為之重著此風熱之挾濕外證又可推矣如其不知寒暑濕之所由生概以療風熱等輩索之按圖殆恐痰嗽嘔渴雜證交攻由癮疹而變為瘡疹癮疹證治天麻散治風熱癮疹天麻川芎川升麻半夏制各三錢防風細辛羌活荊芥穗蟬蛻去嘴足甘草焙各二錢上細銼每服二錢姜三片井水煎服挾寒者加官桂挾暑者加柴胡黃芩挾濕者加茯苓蒼朮加味羌活散癮疹通用羌活前胡各半兩人參北梗川芎茯苓天麻枳殼制甘草炙各二錢半蟬蛻去頭足二錢腦荷一錢半上末每挑二大錢匕姜錢三片煎服消風散治癮疹瘙癢方見頭風門川芎茶調散治風熱癮疹方見頭風門胡麻散治風熱癮疹方見歷節門人參羌活散治風熱癮疹瘙癢方見眼目門惺惺散桔梗細辛人參茯苓白朮栝蔞根甘草炙等分上末入薄荷煎要和氣添姜錢可挾和人參羌活散治癮疹亦治瘡疹殭蠶散治癮疹白殭蠶直者去嘴焙盡絲令黃上末好茶清入些薑汁調下敷藥明礬朴硝為末井水調雞羽掃敷又方赤小豆荊芥穗曬為末雞子清調薄敷又方朱黛散撲敷方見丹毒門洗方蠶砂新水煎密室溫洗胡麻散治風氣挾熱癮疹瘙癢胡麻子十二兩苦參荊芥穗何首烏各八兩威靈仙防風石菖蒲牛蒡子炒菊花蔓荊子蒺藜炒去刺甘草炙各六兩上末每服二錢食後薄荷湯點服或好茶清亦得丹疹並不得吃醋附諸方陽毒升麻湯癍在面傷寒一二日或吐下後變或陽毒腰背痛煩悶不安面赤狂言見鬼下痢脈浮大咽痛人參黃芩麝香犀角甘草各二錢五分升麻半兩上㕮咀水煎取飲半盞刻許再進溫覆手足得汗出解玄參升麻湯癍在身治汗下吐後毒不散表虛里實發於外甚則煩躁譫妄玄參升麻甘草各等分上㕮咀水煎服陽毒梔子湯治傷寒壯熱百節疼痛而發癍升麻梔子仁黃芩芍藥石膏知母杏仁柴胡甘草各等分上為粗末每五錢入姜五片豉百粒煎服消毒犀角飲子治癍及癮疹牛蒡子六錢荊芥防風各三錢甘草一錢上㕮咀水煎服解毒防風湯治癍及癮疹癢痛防風一兩地骨皮黃耆芍藥荊芥枳殼牛蒡子各半兩上為粗末每四五錢水煎服調中湯治內傷外感而發陰癍蒼朮一錢半陳皮砂仁藿香芍藥炒甘草炙桔梗半夏白芷羌活枳殼各一錢川芎五分麻黃桂枝各五分上㕮咀姜三片水煎服丹毒丹毒方論丹之為候由熱毒之氣搏於榮血而風乘之所以赤浮肌肉而為之走注也然丹有五丹不特色赤或青或黃或白或黑是血熱風毒有盛有衰挾冷挾熱故其色變易又不同焉要之諸瘡皆屬於心心為血之主血為熱之媒古人以丹命名蓋謂心應火色尚赤揣本揆元大概心家血熱所致風以動之於是遊走而遍體也蔓衍而不歇則爛肌自四肢而入腹入腎則殺人惟初生於胸腹然後流散於四肢者易愈丹毒證治藍葉散治諸丹發熱赤腫白芷柴胡知母杏仁去皮川芎赤芍藥生地黃川升麻乾葛生甘草各一分爛石膏梔子仁各半分藍葉曬乾一分上銼細每一錢半新水煎服熱甚加黃芩玄參煎服防己散治諸丹漢防己三錢川升麻黃芩犀角黃耆川芎各一分朴硝一錢上銼每一錢半新水入少蜜並竹葉煎朱黛散解丹熱諸毒青黛土朱各一分軟滑石荊芥穗各半分上為末每一錢半蜜水調下兼與撲身人參羌活散方見眼目門惺惺散方見癮疹門夾和用竹葉煎湯調下治諸丹諸丹熱證加黃芩玄參冷證加黃耆白芷疏風解毒散亦治丹毒方見諸惡瘡門敷方紫浮萍一碗中等活地龍七條研細敷又方芒硝末水調敷又方赤小豆末雞子清調敷又方青澱汁敷又方水藻搗敷又方芭蕉根取汁敷又方梔子大黃蜜水搗敷又方豬糞燒灰雞子清調敷洗方蠶砂一升井水煎溫和密室洗青白丹灶中黃土一分豉半分為末麻油調敷小兒風疹走帶方薑黃荊芥黃連土朱赤小豆爛石膏等分上為末撲之服藥同前附諸方藍青散治一切丹毒赤腫藍青知母甘草杏仁去皮尖各五錢黃芩升麻柴胡寒水石石膏山梔赤芍藥各四錢羚羊角三錢上銼每服三錢水煎服消毒飲治赤丹火丹紫蒞丹牛蒡子炒研三兩荊芥穗五錢甘草炙一兩防風升麻各七錢半犀角三錢麥門冬桔梗各五錢一方加朴硝二錢上㕮咀每服一二錢水煎服一方治火丹毒遍身赤腫痛寒水石石膏各三錢黃柏甘草各一兩上為末芭蕉汁調敷一方治火帶歌曰瘡毒細如天火帶能令斑駁皮肉壞爛研一味百合根敷若頻時消亦快一方治丹瘤大黃朴硝土蜂窩上為末水調塗之洗藥方防風酸車草赤豆灶心土等分上煎湯洗立效附天疱瘡方防風通聖散蚯蚓泥上共為末略炒蜜調敷極妙從肚皮上起者是重熱發於外還服防風通聖散見中風門癩風癩風方論癩風即經所載癘風也癩之名非一證狀多端不出五種風生五種蟲是爾黃風生黃蟲青風生青蟲赤風生赤蟲白風生白蟲黑風生黑蟲四蟲猶可措手惟黑蟲未必有瘳籲此惡疾也瘡痍荼毒乍熱乍寒身體魁癗手足指脫眼爛鼻塌齒豁唇翻顏色枯黃眉鬢墮落頑痹痛癢不能屈伸病證之惡莫甚乎此然此雖出於風必有所致大率多因嗜欲無度勞動氣血熱發汗出不避冷濕外風遂致淫氣與營衛相干衛氣挾邪則肌肉不仁營氣泣濁則脈絡淤熱故遍身瘍潰變壞人形千金所謂自作不仁極猥之業雖有悔言而無悔心故應如是亦有傳染觸犯而得者此則不謹之所招也其蟲在於病軀去來無數甚入骨髓食人肝則眉睫脫落食人肺則鼻柱頽崩食人脾則語音變散食人腎則耳鳴如雷若食其心則諸痛癢瘡心實司之心不受觸觸則死矣人有斯疾切須忌鹽及一切口味幽隱林泉屏棄世務早早救療庶為全人治法以疏風殺蟲逐惡毒輩為之宣通謹勿用補此風從頭起而下者順從足起而上者逆順則易逆則難又當識此余於直指後集歷節方論見之大寒大熱不得行淫多致風癩或久病尪羸廢其肢體癩風方論通天再造散治大風諸癩川鬱金半兩綿紋大黃一兩微焙白牽牛半生半炒取仁半兩黑色大皂莢刺一兩半焙上細末每服三錢半月首五更面東好酒調下重者泄出黑頭小蟲輕者泄如魚腸爛肉極臭服藥至無蟲則瘥四個月絶口味但吃白粥白飯懲忿窒欲永斷牛馬鵝鴨等物下藥攸至勿令病人知恐蟲匿也本事神效追命散治大風北大黃七錢半大皂莢刺一兩川鬱金半兩上細末每二錢用真大風油入好酒溫調臨睡服隔兩日再服直候泄下無蟲方瘥此疾業緣果報常須至誠念佛懺悔以全其身皂棘湯治大風皂莢刺燒半生半灰二錢北大黃一錢輕粉半錢上末酒調空心服取下惡物服藥數日齒出毒血甚臭皂角丸治大風諸癩肥長皂角二十條先炙透後去皮弦其核自脫上以皂角肉多用酒慢火煎得稠黏濾出清稠者候冷入雪糕杵為丸桐子大每五十丸不飢飽酒送下硫黃酒殺癩風蟲明硫黃乳鉢研細上入酒調空心飲清汁明日添硫黃再研入酒如前或添大風油更好黑虎丹治大風諸癩惡蟲內蝕形骸變壞天靈蓋二兩蝦蟆二個去頭足燒存半生生人中白桃仁浸去皮各二兩麝香一錢硫黃雄黃各一兩穿山甲熱灰插焦老皂莢刺燒存半生各半兩輕粉二錢半上末煉蜜丸桐子大每三十丸月首五更米飲連日服取蟲盡則愈殺瘵蟲通用烏蛇丸治風癩殺五蟲胡麻子四兩烏蛇肉酒浸焙干蜂房炙各半兩苦參檳榔獨活桃仁浸去皮曬乾白蒺藜炒杵去刺各一兩皂莢刺炒焦貫衆各七錢半蕪荑雷丸雄黃硫黃各半兩硃砂二錢半蝦蟆二個去頭足炙焦上細末以長皂角十條水三升挪取濃汁去滓煎成膏和藥末丸如桐子每三十丸空心溫酒下雄朱散治大風雄黃硃砂滑石阿魏雌黃雷丸炒藜蘆炒硫黃生犀角屑各三錢半蕪青蟲斑蝥蟲各去翅足糯米炒透各用二十四個黑皂莢刺焙七錢半上細末每服三錢天明溫酒調下明日再服雷丸散風癩取蟲水銀硫黃雄黃各二錢半用乳鉢入點醋同研令星盡為度雷丸阿魏貫衆末各二錢半麝香半錢上研極細每一錢天明溫酒調下明日又服蝦蟆丸治大風殺五蟲干蝦蟆一兩炙黃肥長皂角一條先炙透後去皮弦核蘸酒再炙上為末以竹管引入羊腸內系兩頭用麩二升鋪甑內置麩上蒸熟去麩入麝香半錢同搗丸如桐子每二十一粒空心溫酒下蔓荊丸治大風蔓荊子蒼耳即鼠黏子枸杞子牛蒡子炒黑牽牛炒胡麻白芷何首烏威靈仙荊芥穗獨活蒺藜炒杵去刺華陰細辛去苗葉土直殭蠶炒去絲道人頭去刺取仁各半兩皂莢刺炒焦苦參大草烏去皮尖生各一兩上細末大風油和丸桐子大每二十四丸食前茶清下必用厲風方並返魂追命再造散皆治大風胡麻散解風毒熱氣癮疹瘙癢方並見歷節門蠟礬丸癩風常服以解內毒方見癰疽門聖惠方千金方治大風單服煉成松脂癩風服藥半月後兩腰眼各灸七壯附諸方磨風丸治大風川當歸羌活獨活川芎天麻細辛防風荊芥威靈仙麻黃何首烏石京子牛蒡子車前子皺面草即地松蒼耳子各一兩上皆不見火曬乾為細末酒煮麵糊為丸如梧桐子大每服三十丸食前溫酒下服後煎藥熏洗加減大造苦參丸治大風瘡及諸風赤白癜風苦參一斤防風荊芥蒼耳子胡麻子半生半熟皂角刺各十兩蔓荊子牛蒡子黃荊子枸杞子何首烏禹餘糧蛇床子各三兩香白芷一兩半薄荷生地黃各一兩上為細末用皂角搗爛熬膏入前藥勻為丸丸如梧桐子大每服五十丸茶酒任下一方治大風眉毛脫落肌膚拆裂用防風通聖散加苦參天麻蟬蛻早晚各一服至百帖必愈忌房事鹽醬葷腥生冷油膩之物一方治大麻風苦參酒浸一宿牙皂一兩龜板一個酥炙殭蠶一錢全蠍去頭凡一錢輕粉三分全副鵝毛鍋內炒化放於地上出火毒共為末每服一錢好酒調下每日早晚各一服一方治大麻風洗藥苦參荊芥防風白芷獨活羌活藁本各一兩落陽花四兩用燒酒一斤浸一宿酒不用上㕮咀勻作三次煎水洗汗出為度防風通聖散方見中風門當歸拈痛湯治大麻風兩足血風瘡痛癢等證方見腳氣門癜風癜風方雞子一枚用酸醋浸一宿上以針刺小穿瀝清汁入砒末並緑豆末少許夾和先以石札擦破次用青布蘸擦妙治赤癜白癜方硫黃明白礬並生上為末薑汁調茄蒂蘸擦二三次癜風方雄黃硫黃黃虢丹密陀僧大南星上等分為末先用薑汁擦患處次用姜蘸藥末擦擦後漸黑次日再擦黑散則無事矣附諸方蒼耳丸治諸風及諸風癮疹白紫癜風五月五日割取蒼耳草葉洗淨曬乾為末煉蜜丸如梧桐子大每服十丸日三服若身體有風處或如麻豆粒此為風毒出也可以針刺黃汁出盡乃止靈草丹治一切風疾及癮疹紫白癜風痛癢頑麻採紫背浮萍草攤於竹篩內下著水曬乾為細末煉蜜丸如彈子大每服一丸用黑豆淋酒化下及治腳氣打撲傷損渾身麻痹諸風應效酒治一切諸般風濕痹遍身骨節疼痛紫白癜風神效方見歷節門附汗斑方一方治汗斑紫白色者用白附子硫黃各等分為細末以茄蒂蘸醋黏末擦一方用夏枯草濃煎水日洗數次肥皂方去白癜黑䵟白癬諸般瘡痕令人面色好白芷白附子白殭蠶白芨豬牙皂角白蒺藜白蘞草烏山楂甘松白丁香大黃藁本鶴白杏仁豆粉各一兩豬脂去膜三兩輕粉密陀僧樟腦各半兩孩兒茶三錢肥皂去裡外皮筋並子只要淨肉一茶盞上先將淨肥皂肉搗爛用雞清和曬去氣息將各藥為末同肥皂豬脂雞清和為丸一方用生小茄兒分為節擦之三五次效諸瘡諸瘡方論諸瘡雖不能害人然浸淫無已亦有多年不獲愈者此皆心腎不濟飲食不節腸胃停留以致風毒與血氣搏凝滯於肌肉之間而發露也其名目療治有異焉凡人體虛感受風熱濕毒之氣發為瘡瘍癢痛焮腫身熱多汗是為惡瘡或生於手足間相對如新茱萸癢痛拆裂搔則黃汁淋漓有孔如瘑久而生蟲是為蝸瘡或初生如飯粒漸大而有根頭破血流膿出肉反如花開之狀是為反花瘡或初生甚小先癢後痛汁出浸淫濕爛肌肉延至遍身若從口發出流散四肢者輕若從四肢發生然後入口者重是為浸淫瘡或生於兩耳鼻面間及下部諸竅侵蝕筋絡月中則瘡盛月末則瘡衰以其隨月而生是為月蝕瘡小兒耳下瘡亦名月蝕或毒氣攻於手足指胬肉裹上指甲疼痛出血瘡中有蟲是為甲蛆瘡或指頭先腫焮熱掣痛然後於爪甲邊結膿甚者爪甲俱脫是為代指或人稟性畏漆見漆則中毒面癢而腫繞眼微赤癢處搔之隨起㾦癗重者遍身如豆如杏膿焮作痛是為漆瘡或盛夏腠理易開風熱毒氣搏於皮膚輕者狀如撒粟重者熱汗浸漬匝匝成瘡曰痱瘡或心神郁躁遍身發瘡多出膿血赤爛如火曰熱瘡或身觸風寒冷氣以致血澀不行其瘡頑滯不知痛癢經久難瘥曰冷瘡或身發瘡腫非癰非疽非癬非疥狀如惡瘡或瘥或劇曰無名瘡或頭生白團斑剝如癬上有白皮久則成痂遂至滿頭瘡中有孔有膿細蟲入里不痛微癢少長不瘥曰禿瘡或風熱毒氣流注兩腳生瘡腫爛疼痛步履艱難惟生於臁骨者為重曰臁瘡以其骨上肉少皮薄難愈至有多年無已瘡口開闊皮爛骨現臭穢可畏者先當取蟲然後敷藥或淫夫龜上生瘡初發如粟拂之則痛由是出清膿作臼孔侵蝕臭爛日漸大痛曰妒精瘡以婦人先有宿精在內或月水未斷與之交接滌穢不前傅氣而作婦人亦有生於玉門者曰陰蝕瘡或滿頰滿項發如豆梅癢而多汁延蔓兩耳內外濕爛如浸淫瘡之狀曰走皮㿐瘡田野呼為悲羊瘡以上數種名目不同治各有方條列於後諸瘡證治桑螵蛸散治諸惡瘡桑螵蛸地龍貝母厚黃柏各半兩虢丹煅乳香各一分粳米粉二錢雄黃輕粉各一錢麝香半錢上細末以不食井水和沙糖調敷又方蜘蛛曬為末麻油輕粉調敷乳香蠟油膏治蝸瘡久不瘥杏仁水浸去皮曬乳香各三錢硫黃輕粉各一錢半蠟半兩麻油一合上研極細先熬油沸入蠟溶盡次入諸藥煎攪成膏冷地出火毒瓷器收用又方燕窠取抱子處土為末摻先以白芷大腹皮煎湯洗拭後摻胭脂散治反花瘡胭脂貝母胡粉各一分硼砂沒藥各半分上末研細先以溫漿水洗拭後敷藥苦楝散治浸淫瘡苦楝根曬乾燒存性上為末豬脂調敷濕則摻先用苦參大腹皮煎湯洗胡粉散治月蝕瘡胡粉炒微黃白礬煅虢丹煅黃連淨輕粉各二錢胭脂一錢麝少許上末先以溫漿水入鹽洗拭後摻藥如瘡干麻油調敷緑礬散治甲瘡緑礬半兩燒熟蘆薈一錢半麝一字上研如粉以絹袋盛藥納所患指於袋中線扎定瘥為度烏梅醋法治代指手指甲頭腫烏梅捶去殼肉只取仁上研細米醋調得所入指漬之自愈又方中樣蚯蚓和豬脂搗如泥敷漆瘡方生蟹取黃隨瘡大小遍敷之又方臘茶用麻油調塗又方雞子中黃打開塗又方磨鐵槽中取泥塗磨刀石下泥亦得滑石粉治痱瘡緑豆粉二兩焙透軟滑石一兩研上末拌和以綿撲子蘸撲仍以石粉佐之紫草膏治熱瘡紫草茸黃連黃柏漏蘆各半兩赤小豆緑豆粉各一合上搗細入麻油為膏日三敷常服黃連阿膠丸清心又方治熱瘡淫濕南星半夏黃柏黃連各一分五倍子煅虢丹各半分上細末摻癢加煅白礬更癢加雄黃又方熱瘡止痛收汁先用大腹皮苦參白芷煎湯泡荊芥洗次用地榆苦參黃連等分上為細末入些真蚌粉乾摻更痛加去皮緑豆檳榔散治冷瘡雞心檳榔木香硫黃薑黃各半兩吳茱萸二錢麝一字上搗末麻油調敷有膿則乾摻赤豆散治無名瘡赤小豆吳茱萸赤色白膠厚黃柏黃連貝母硫黃糯米焙各一分虢丹煅半分上末麻油輕粉調抹槐枝煎湯先洗後抹烏羊膏治頭白禿瘡及惡瘡臁瘡獖豬糞臘月收燒灰半兩檳榔二錢雄黃一錢上末先以麻油調和鴨子清約頭大小作厚餅溫覆頭上引蟲不可熱覆不得動頭待十分癢忍不得令人急手揭起次用苦楝根煎湯淋洗拭淨濕則摻干則麻油輕粉調抹治頭爛瘡方燕窠土為末摻竹葉膏治兩腳骨臁瘡先用小網蝦三十尾去頭殼尾上同糯米飯一合研細臨臥以帛扎患處上下次以青紗罩瘡卻將蝦飯敷青紗上別用青紗罩蝦飯之上系定至五更初解紗連蝦飯揭起掛空閒處皆是小赤蟲即以漢椒蔥白煎湯候溫淋洗次用舊茶籠內白竹葉隨瘡大小剪貼軟帛系之一日二換直待汁水出盡方以好膏藥貼逐日煎苦楝根湯淋洗仍換膏藥直待生肉將滿則不用膏藥其瘡口只如筋尾許乃可以血竭或降真香節夾白蘞收平瘡口切忌動風發氣等物又臁瘡方先用荊芥蔥頭入白鹽少許煎湯洗拭次用雄黃雌黃硫黃白礬煅各二錢鷹爪黃連去須厚黃柏各三錢輕粉半錢虢丹煅二錢上並細末外用麻油一酒盞煎巴豆肉二錢濾清筆蘸抹藥末摻其上妙甚又方先用桑葉白芷煎湯洗拭次用木香檳榔五倍子白芷貝母等分末摻又方獖豬糞燒帶性半兩雞心檳榔三錢真龍骨二錢輕粉一字上末麻油調敷先鹽湯洗拭後用藥二日一換又方中鯽魚二尾洗淨滿尺皂角一條擘開兩片夾鯽魚用麻扎煨乾燒存性穿山甲炙焦入皂角內二錢上細末先以井花水洗盡膿汁用白竹葉一葉針插多孔縛於瘡上候水出盡然以麻油輕粉調藥敷又方先用酸漿水溫暖淋洗次用生覆盆子葉瓦上煅干上碾極細乾摻紗扎次日以新水濕去痂又用溫漿水洗拭摻藥麝香散治妒精瘡青黛干款冬花等分麝少許上末先以地骨皮桑白皮煎湯溫洗軟帛拭乾次以津唾調藥敷又方久年冊皮青紙以津唾黏濕貼上明日又重貼勿動自愈舊青紙蓋取青黛涼而殺蟲紙無性耳治陰汗濕癢方緑色爐甘石一分真蚌粉半分上細末撲敷豆坯散治陰蝕瘡緑豆粉蝦蟆灰各一分胭脂半分上細末乾摻神降散治走皮㿐桑寄生一小把木𣗬桑根取皮一握白芷黃連煎湯溫和以帛蘸洗候露出盡拭乾敷藥滿尺皂角去弦核燒存性麻竹大籜燒存性厚黃柏鷹爪黃連瓜樟葉干白芷上逐件為末等分麻油調抹自然生匕神效謹勿吃醋又癬瘡發歇不止凌霄藤並葉煎湯溫洗凌霄旁松柏𣗬生數次洗效蠟礬丸方見癰疽門諸瘡皆可服內消其毒凡洗瘡須用藥草煎湯疏風解毒散治諸惡瘡頑癢烘熱及婦人血風遍身紅斑圓點斑中漸發疹痱開爛成瘡癢痛白芷細辛蒺藜炒去刺麻黃去節雞心檳榔當歸鬚生乾地黃川芎赤芍藥川獨活牽牛微炒取仁蒼朮炒桑白皮炒枳殼制甘草微炙等分上銼散每服三錢入黑豆七十粒紫蘇五葉姜五片同煎服如大便祕加些生大黃次用貝母膏敷瘡貝母膏貝母三錢半半夏生南星五倍子白芷厚黃柏苦參各二錢半虢丹煅一錢半雄黃一錢上細末初用蜜水調敷二三次後只乾摻先以蜂房白芷苦參大腹皮煎湯熏洗拭乾即用藥或間有留滯不瘥以好膏藥貼惡瘡方赤色白膠一錢明白礬三錢黃色黃丹半錢上細末麻油調敷先以酸漿水暖過洗瘡拭乾用又方貝母為末入些雄黃摻又方治久不瘥透明硫黃黃連等分上細末以雞子清一個打碎鋪新瓦上焙為末夾上項藥麻油輕粉調敷先用白芷蔥頭煎洗諸瘡頭瘡方滿尺皂角去弦核一錠黃連淨半兩赤色白膠五倍子各三錢蛇床一錢黃丹煅二錢輕粉半錢上細末先用柳枝煎湯洗拭後摻或用黃連半兩蛇床一分曬乾為末麻油輕粉調敷又頭瘡方黃連為末用麻油輕粉調得所攤於碗中將艾一撮燒煙碗覆其上熏之續再加艾熏用治頭禿瘡方五靈脂白礬白芷青黛好草烏各一分上為末麻油調敷頭痹頭腦方頭枕後生正者為腦側者為痹輕浮白浮石燒存性為末上麻油輕粉調雞羽刷上勿用手按即漲或用黃牛糞於瓦上焙乾加之尤好亦治頭𤷍治𤷍方大幹芭蕉葉尉斗內燒存性上為末麻油輕粉打和敷𤷍留頭以軟紗貼換易三次或散或破無痕又方穿山甲蚌粉同炒上末麻油輕粉調敷胎㿐頭熱紅餅瘡方生艾白芷大腹皮連根蔥上煎湯洗拭以生藍青葉入些生艾搗細蜜水為膏敷亦治惡瘡又惡瘡方硫黃黃連淨末各一分黃丹赤白膠蛇床樟腦發灰各半分上末濕則摻干則麻油調敷又方白礬煅五倍子厚黃柏黃連淨黃丹煅海螵蛸貝母等分上為末入麝少許摻痛則加地榆癢則加苦參又方用貝母膏方見諸惡瘡類加黃連蜂房爛石膏尤好或用麻油膩粉調抹本方內去雄黃白禿頭方雄豬膽汁半入法醋須以雞羽掃敷附諸方當歸飲子治心血凝滯內蘊風熱發現皮膚遍身瘡疥或腫癢膿水浸淫或發赤疹㾦瘤當歸川芎芍藥地黃防風白蒺藜炒去刺荊芥穗各一錢七分何首烏黃耆甘草各八分半上㕮咀分二帖每帖水二盞姜三片煎八分溫服連翹飲治諸惡瘡痛癢不定心煩口乾及婦人血風紅斑圓點開爛成瘡流黃汁川芎當歸芍藥地黃防風荊芥連翹牛蒡子炒研破山梔黃芩瞿麥木通栝蔞根麥門冬去心甘草各等分上㕮咀每帖七錢水二盞燈心二十莖同煎八分服一方治一切疥瘡雄黃五錢樟腦五分大楓子取肉斑蝥去足翅炒各十隻狗脊蛇床子寒水石硫黃各五錢上為極細末疥瘡用桕油調搽癬瘡用柏油調搽一方治疥瘡神效大楓子肉樟腦各一兩水銀皂礬各一錢油核桃肉桕燭油先將大楓子搗爛次加樟腦水銀皂礬核桃碾和為末再將桕油熬化入藥和勻抓破瘡搽之效一方治凍爛腳成瘡黑附子生去皮臍上為末面水調貼白蘞散治凍耳成瘡癢痛黃柏白蘞各五錢上為末先湯洗次用香油調敷治手足皸裂方瀝青二兩黃蠟一兩共熬攪勻瓦罐盛貯先以熱湯洗令皮軟拭乾將藥於慢火上略炙擦敷一方治手足皸裂春夏不愈者生薑汁紅糟鹽豬膏臘月者佳上研爛炒熟擦入皸內一時雖痛少許使皮軟皸合再擦即安一方治腳跟皸用頭髮一大握桐油一碗於瓦器內熬候油沸頭髮化爛出火攤冷以瓦器收貯勿令灰入每用百沸湯泡洗皸裂令軟拭乾敷其上即安一方加米粉附楊梅瘡方防風通聖散治楊梅瘡初起疼痛憎寒壯熱方見中風門本方每服加山牛四兩如汗多去麻黃大便溏去硝黃服之又方冷飯糰一名土茯苓五加皮白蘚皮防風白芍藥木瓜各一兩半皂角白醜各三十粒生地黃酒洗地骨皮牛膝黃連槐花川芎尋風藤威靈仙白茯苓杜仲炒斷絲白芷當歸酒浸洗各一兩甘草炙半兩荊芥穗一兩半上㕮咀作二十服每服用水一鍾酒一鍾煎至一鍾在上食後服在下食前服忌牛肉又方當歸連翹羌活荊芥穗薄荷葉枳殼黃柏茯苓車前子防風木通芍藥川芎頭上用山梔桔梗天花粉殭蠶白芷甘草金銀花獨活各一兩柴胡前胡各半兩上㕮咀作二十服每服用水二鍾煎至八分溫服上多食後服下多食前服服此仍用熏藥並治一方治楊梅瘡神效人參白朮當歸生地黃各一錢二分防風一錢五分木通苦參川芎連翹薏苡仁各一錢木瓜皂角刺天花粉各八分甘草羌活青風藤各五分白蘚皮一錢山牛三兩金銀花一錢八分上㕮咀每服水三碗煎至二碗一次用渣並二次忌燒酒茶牛肉熏楊梅瘡方雄黃沉香各三分乳香沒藥硃砂各五分血竭三分黑鉛水銀各一錢上為末均作紙捻七條用香油點燈放床上令病人兩腿抱住上用單被通身蓋之口噙冷水頻頻換之則不損口頭一日用三條後每日用一條熏之有效一方治楊梅癰漏腫塊杜枸杞子防風牛膝牙皂枳殼當歸連翹苦參罌粟殼殭蠶赤芍藥杜仲荊芥白蘚皮川芎皂角刺木瓜防己薏苡仁天麻木通金銀花茯苓各等分黃柏牛蒡子上㕮咀每服一兩加冷飯糰四兩用水五碗煎三碗病在上食後服病在下食前服忌食雞魚牛肉煎炒虛者人參服之神效外用祕傳止血定痛生肌散摻之去腐生新收口方見折傷門疥癬疥癬方論疥與癬風毒客於肌膚所致也風毒之浮淺者為疥風毒之沉深者為癬疥則多因風毒挾熱得之癬則多因風毒挾濕得之疥發於手足或至於遍身癬則肌肉癮疹或圓或斜或如苔莓走散內藏汁而外有筐二者莫不均有蟲也亦莫不易為之染觸也焮赤癢痛作瘡有膿曰大疥隱起帶根搔不知痛曰馬疥㾦癗含漿摘破出水曰水疥癢而搔之皮起干痂曰乾疥薄皮小瘡常常淫汁曰濕疥此疥之名目然也乾癬則搔出白屑索然凋枯濕癬則淫如蟲行搔之多汁風癬則爪擦痹頑不知痛癢牛癬則狀如牛領皮厚而堅其若時作微癢白點相連是之謂狗癬輪廓全無縱橫不定是之謂刀癬此癬之種類然也疥癬治法驅風殺蟲固也然殺蟲於其外亦須以硫黃輕粉蠟礬丸輩服餌而內濟之庶絶其根矣若夫腫而濕者有熱槁而乾者無熱用藥加減又當權衡疥癬證治諸疥方透明生硫黃半兩明白礬煅二錢半白葉一葉去中心骨燒存性上末麻油輕粉調抹又方疥癬方硫黃明礬煅各半兩黃連淨七錢半雌黃胡粉蛇床各二錢上細末豬膏稀調抹又方生明硫黃半兩黃丹樟腦各一錢輕粉半錢上末乾擦熱疥赤腫加荊芥又方生明硫黃半兩爛石膏二錢黃丹一錢上末麻油調抹濕疥方生明硫黃半兩胡粉黃丹各二錢上末乾擦疥癬惡瘡方滿尺不蛀皂角三條炙去弦核為末米醋二大盞煮如溶膠濾清汁上入黃連末半兩輕粉二錢調抹太學全蠍散治瘡疥方見癢門諸癬妙方斑蝥二十一枚生用明硫黃藜蘆各三錢輕粉一錢半上細末麻油調擦又方鯽魚一頭生髮一雞子大明硫黃雄黃各半兩生豬脂四兩上件先煮豬脂溶沸即入鯽魚煎令煙盡次入發銷盡濾清即入硫黃雄黃末拌和瓷器收用又方草烏頭不去皮尖截小塊一半用豬脂煮令浮黃一半用鹽炒令焦黃上末酒麵糊丸桐子大每十五丸茶酒任下亦治諸風頑痹王醫師癬方先用川椒連根蔥紫蘇莖煎湯溫洗次用吳茱萸生半夏草烏白芷赤小豆等分上細末米醋夾生蜜稀調敷又惡癬方紫背草入生明礬研細敷二三次斷根又久癬方生硫黃硝石明礬煅各半兩雄黃雌黃各二錢半輕粉一錢上細末好麻油調敷濕則摻又方豬脂蘸真膩粉擦小兒癬豬脊骨髓條研和膩粉敷乾癬方狼毒草烏頭各二錢半斑蝥七枚去翅足上生為末津唾調抹濕癬方明礬煅黃連各半兩胡粉黃丹水銀各二錢上末用豬脂油二兩夾研令水銀星盡散瓷盒收用又方斑蝥去頭足糯米炒去米上為末以淮棗蕩軟取肉研圓津唾調抹牛皮癬方舊皮鞋底燒存性麻油輕粉調抹又癬方石榴根取皮蘸明礬末擦切莫用醋則蟲沉也輕粉治癬方五更吃炙牛肉一片細嚼下少刻以真輕粉醇酒調下遍身牛皮癬方川烏草烏去皮尖何首烏白芷蘇木等分上截小片臘月豬脂油煮焦候冷入鹽少許瓷器收時常挑一匙酒調空心服又方雌黃末入輕粉豬膏調抹附諸方連粉散風癬濕瘡並皆治之黃連膩粉黃柏黃丹枯白礬各一錢輕粉龍骨爐甘石各五分上為細末每用少許濕則干搽干則香油調搽碧玉散治癬銅緑硼砂白礬各等分上為細末香油調搽又方防風通聖散去硝黃加浮萍皂角刺服又用紫蘇樟腦蒼耳浮萍煎湯洗又方浮萍蒼耳蒼朮各一兩苦參一兩半黃芩半兩香附二錢半上用酒糊為丸一方治癬神效巴豆十粒黑棗五個共搗為爛搽之立效一方治諸癬神效川槿皮剪草木鱉子各等分上為細末用醋調塗之即愈
