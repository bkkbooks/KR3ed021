body:
  text: 卷之三諸風風論氣血痰水受病於內者也風寒暑濕致寇於外者也人之一身血氣既虛陰陽不守飲食居處嗜欲無節衝風臥地調護不加於是經絡空疏腠理開徹風邪乘其虛而入之中風諸風皆是物耳風之為病善行數變其中人也猝其眩人也暈激人之涎浮昏人之神亂挾熱則痿惰緩弛挾寒則急痛拘攣自其邪氣之入人也邪氣反緩正氣反急正氣引邪為喎僻為竄視為掣縱為搐搦為癱瘓為反張在於陽則皮膚緩在於陰則腹裡急緩則四肢不能收急則一身不能仰皆隨其邪氣所至表裡淺深而有證也種類雖多大要有四血氣偏虛半身不遂肌肉枯瘦骨間疼痛謂之偏枯神智不亂身體無痛四肢不舉一臂不隨謂之風痱能言則可治忽然迷僕舌強不語喉中窒塞噫噫有聲謂之風癔身軟有汗則生風寒濕三氣合而為痹其人肉厚身頑不知痛癢風多則走注寒多則疼痛濕多則重著在筋則筋屈而不伸在脈則血凝而不流在肉則不仁在骨則癃重夫是之謂風痹傷風一證發熱煩躁頭疼面光惡風自汗蓋風能散氣故有汗也風家脈浮者病在表脈實者病在裡脈虛者病在臟脈促者病在上浮則發散實則疏導虛則溫之促於上而病人壯盛胸喉澎湃者瓜蒂散少少吐之俗謂熱則生風大綱然爾多有胃虛氣虛血虛虛極而生風者若諸虛證候天雄附子官桂川烏又不可缺治法大要盡以消痰順氣為先順氣用南木香蘇合香丸輩消痰用南星半夏細辛殭蠶輩如石緑鐵焰水銀輕粉鉛霜朴硝等劑謹勿妄施寒毒入胃則血脈凝澀真氣消鑠不旋踵而廢人治風良劑小續命湯為上排風湯次之然二藥主風不主氣須以人參順氣散烏藥順氣散佐助其間氣一流行則風亦疏散矣至若口開手散瀉血遺尿眼合不開汗出不流吐沫氣粗聲如鼾睡面緋面黑髮直頭搖手足口鼻清冷口噤而脈急數皆為不治之證其餘諸風種類余於嬰兒驚風指要備論之諸風證治心中風心風偃臥熱而喑唇赤其身有汗生白黑青黃唇上見停停時悚扁醫驚心中風偃臥不能傾側發熱失音其舌焦赤汗流唇赤者可治灸心俞若唇上白黑青黃乃心壞為水面目停停時時悚動者並不治心俞二穴在第五椎骨下兩旁各一寸半五臟俞穴千金翼所載與六十七難注同取分寸法男左手女右手以中指第一節為一寸肝中風肝家踞怒不低頭左脅偏疼筋急搜額目唇青為可療目黃目白使人愁肝中風踞坐不能低頭上視多怒左脅偏疼諸筋攣急頭目瞤動其目青繞兩目連額微青面黃者可治灸肝俞若大勢青黑其目一黃一白者不治肝俞二穴在第九椎骨下兩旁各一寸半腎中風腎中踞而腰脊疼面浮耳黑賊風生脅無黃迹能痊愈直髮泥容旦暮傾腎中風踞坐腰脊痛引小腹面上浮腫其耳黑視左右脅未有點點黃色者可治灸腎俞若脅上黃點面如土色鬢髮直齒黃赤者不治腎俞二穴在第十四椎骨下兩旁各一寸半肺中風肺風喘促滿胸堂偃臥漐漐燥異常口鼻之間須要白尋衣肺壞色憂黃肺中風偃臥胸滿氣短喘息時嗽燥悶汗出其鼻白目下及鼻四周以至於口色白者可治灸肺俞若色黃乃肺壞為血其與尋衣摸空者並不治肺俞二穴在第三椎骨下兩旁各一寸半脾中風脾中風兮肌肉瞤踞而腹滿吐鹹酸唇並肢體通黃瘥手足眸青療已難脾中風踞坐腹滿皮肉瞤動四肢放縱其唇黃身通黃吐咸汁者可治灸脾俞若手足青且冷或目下青並不治脾俞二穴在第十一椎骨下兩旁各一寸半胃中風胃病根源飲食來抬肩喘息氣難開口張額汗腹中滿浮診雙關脈大哉胃中風腹滿䐜脹隔塞不通張口喘息額上多汗孫地仙所謂新食竟取風為胃風是也或曰風中諸臟不關諸腑是亦一説然胃為水穀之海五臟皆取風於胃故並存之三因云胃俞二穴在第十二椎骨下兩旁各一寸半中風惡證中風惡證細推求口噤須遲脈數憂眼合不開並竄瞪面緋面黑手難收口開吐沫氣粗大髮直搖頭汗不流鼾䶎喉鳴兼鼻冷遺尿瀉血並皆休中風多是惡風自汗心風脈浮洪肝風脈浮弦腎風脈浮滑肺風脈浮澀脾風脈浮緩或以三部候之或以本臟取之不可一概論也醫者當明辨之治猝中法圓白天南星濕紙裹煨楠木香蒼朮生白羊眼半夏用百沸湯就銚蘸少頃各一錢半辣細辛甘草生石菖蒲細切各一錢上件銼散分作二服水一盞半生薑七厚片煎取其半乘熱調蘇合香丸三丸灌下痰盛者加全蠍二枚炙治一切猝中不論中風中寒中暑中濕中氣及痰厥飲厥之類初作皆可用此先以皂角去弦皮細辛或生南星半夏為末揭以管子吹入鼻中俟其噴嚏即進前藥牙噤者中指點南星細辛末並烏梅肉頻擦自開又法楠木香細銼二錢生南星七片生薑七片石菖蒲二寸捶碎上煎取清汁乘熱調楠木香末一錢蘇合香丸三丸與之小續命湯治中風諸風迷僕涎潮舌強語謇或昏憒痿弛或厥冷拘攣不論表裡淺深服之皆驗麻黃去節人參防己官桂黃芩杏仁去皮尖焙白芍藥芎藭甘草炒各一兩防風一兩半附子炮去皮臍只用半兩上銼散每服三錢薑五厚片棗二枚水盞半煎一盞溫服恍惚加白茯苓骨節煩疼素有熱去附子倍芍藥煩躁大便祕去附子倍芍藥加竹瀝大便利素有寒去黃芩加白朮附子骨肉冷疼加辣桂附子嘔逆腹脹加人參半夏自汗去麻黃加芍藥大便結熱去附子加枳殼大黃痰多加南星炮切數片風虛加當歸渴加栝蔞根身疼加秦艽喘急加炒桑白皮排風湯治五臟風諸風亦治風毒腳氣腫痛白蘚皮白朮白芍藥辣桂去粗皮當歸川芎杏仁去皮尖微炒防風甘草各二兩炒獨活麻黃去節白茯苓各三兩上粗末每服三錢水盞半薑四片煎一盞溫服良方人參順氣散治諸風戰掉拳攣眩暈喎邪麻痹疼痛川芎桔梗白朮白芷陳皮枳殼炒甘草各一兩炒麻黃去節天台烏藥去心各一兩半人參白薑炮各半兩上為末每二錢薑棗煎服烏藥順氣散證治同前亦主腳氣烏藥去心麻黃去節陳皮各二兩川芎枳殼炒北梗白芷直殭蠶炒去絲甘草炒各一兩白薑炮半兩上為末每二錢薑棗煎服攝生飲治一切猝中不論中風中寒中暑中濕及痰厥飲厥氣厥之類初作即用此圓白南星濕紙裹煨楠木香半夏用百沸湯就銚蘸少頃各一錢半辣細辛蒼朮生甘草生細節石菖蒲各一錢上銼分二服每服水盞半薑七厚片煎取其半乘熱調蘇合香丸方具諸氣門三丸灌下痰盛加炙全蠍二枚先以皂角肉為細末管子揭些吹入鼻中候噴嚏即進藥牙噤者烏梅肉揉和南星細辛末以中指頻擦自開三生飲治猝中昏迷痰盛喉鳴口眼喎斜半身不遂但脈沉無熱者可服南星一兩川烏生附子生各去皮臍半兩楠木香二錢半上㕮咀每服三錢水一盞半薑十厚片煎取半微溫服附香飲證治如前附子生四錢木香二錢上㕮咀分二服每用水盞半薑十片煎取半微溫服虛人可用星香飲證治如前南星八錢木香二錢上銼分三服每用水盞半薑十片煎六分溫服氣盛人用此大醒風湯治猝中諸風涎潮痰厥語澀神昏附子生南星生各三分全蠍川芎防風各一分上銼散每三錢薑十片煎服氣不和加木香省風湯南星炮一兩防風半兩甘草炒一分上銼每服三錢薑十片煎服氣虛人加生附子沉香氣逆加紫蘇木香頭痛而暈加全蠍多痰加半夏左經丸治諸風癱瘓拘攣強直疼痛或跌撲傷損亦主之草烏炮去尖四兩川烏炮去皮臍二兩沒藥一兩半乳香一兩黑豆生一升以斑蝥二十一個去頭足翅同煮候豆熟為度去斑蝥取豆焙乾用上細末醋和豆為糊丸桐子大每服三十丸溫酒下鐵骨丹治諸風癱瘓拳攣半身不遂川烏頭草烏頭各炮去皮臍尖川芎當歸酒浸曬辣桂川續斷洗曬華陰細辛補骨脂炒烏蛇洗酒浸取肉曬乾七錢半直殭蠶炒去絲木鱉子去殼炒熟天麻酒浸曬巴戟酒浸去心曬防風滴乳香沒藥麻黃去節羌活獨活堅白南星炮熟白蒺藜炒搗去刺薏苡仁蒼朮炒各半兩薢萆鹽水煮乾杜仲去粗皮銼薑汁製炒焦牛膝酒浸曬各一兩虎脛骨洗酒浸炙焦自然銅燒紅醋淬七次各三兩白附子炮川五靈脂各四錢秦艽全蠍去毒微炒各二錢半麝香半錢上細末乳香沒藥麝香另研漸入拌和以浸藥酒調飛面煮糊研築丸彈子大每服一丸溫酒磨下或宣木瓜煎湯下黑豆淋酒下不拘時服仍間用高良薑碎一升煎湯圍熏湯浴最妙未服藥前須以斑蝥二十一個去翅足用黑豆一建盞慢火同炒焦只用七個並豆入全蠍十四枚微炒五靈脂二錢半為末糕糊丸麻子大每二十一丸老酒下先去其風根鐵彈丸治諸風癱瘓川烏炮去皮臍一兩半川五靈脂四兩乳香沒藥各一兩麝一錢上乳香以干竹葉包裹用尉斗火尉過即研成末余藥末之拌和再碾滴水為丸彈子大每一丸薄荷酒磨下拒風丹治一切風川芎四兩防風一兩半天麻甘草炒各一兩細辛蓽茇各半兩上末煉蜜和杵每兩作三十丸每服一丸細嚼荊芥酒下傷風鼻塞項強頭疼薑湯下麝香丸治白虎癧節風走注疼痛遍身瘙癢如蟲咬晝靜夜劇川烏大八角者三個全蠍二十一個地龍半兩黑豆並生用二錢半麝香半字上細末糯糊丸緑豆大每服七個甚者十丸夜臥令膈空溫酒下微出冷汗便瘥增味五痹湯治風寒濕合而為痹肌體麻痹不仁羌活防己片子薑黃白朮海桐皮當歸白芍藥各一兩甘草炒七錢半上銼每服三錢薑十厚片煎服病在上食後病在下食前瓜蒂散吐法上瓜蒂末一錢熟水調下若風癲證須以瓜蒂散吐痰稀涎散治風涎潮塞上膈氣閉不通豬牙皂角四條肥實不蛀者去黑皮光明晉礬一兩上細末輕者半錢重者三字熟水調下但少吐之弱者不可吐吐用養正丹三十丸研細楠木香煎湯調下仍與南星附子豁痰歸經雞心檳榔亦能疏風順氣鶴膝風攣方真紫金皮老酒煎候溫常服急風方硃砂一字輕粉一點巴豆去油如霜些兒全蠍一枚蟬殼兩枚去土上末之研和大人盡劑用薄荷泡湯調下小兒分半用乳汁調下或吐痰或泄毒物皆效烏龍丹治諸風癱瘓口眼喎斜語言謇澀真川烏生去皮臍好五靈脂各二兩上末入腦麝半錢同研滴水丸小彈大陰乾每一丸先薑汁研開次好酒調下空心食前日兩服似鐵彈丸廬江劉寶治痓良方歸荊湯治風痓昏迷吐沫抽掣背脊強直産後中痓通用當歸荊芥穗上等分末之每二錢水一盞酒少許煎七分灌下如牙緊用銅匙斡以雞羽沾藥入口或用童尿調下或以芎藭代當歸亦妙又方黑豆炒焦好酒淋之取清汁上每酒一盞獨活銼三錢煎七分溫服又連續進劑以瘥為度太陽風痓證候太陽風痓證候始則發熱腹痛喘息涎浮次則牙緊頭搖十指微動漸加項背強直轉則不仁甚者昏困失音目睛直視滑泄不禁身腰反張如此則十不救一新産血虛汗出傷風亦作痓證凡産後發熱若舌謇唇急手指微動便急作風痓療之荊歸湯獨活酒方見在濕門人為邪氣所幹則發而為病若氣若血若痰若水若風若寒若暑若濕臟腑表裡冷熱虛實各有受病之處用藥之法必究其原而後可以起病否則前賢所謂獵不知兔廣絡原野冀一人獲之術亦疏耳是可以人試技乎哉附諸賢論病機機要曰治風須分在臟在腑在經之異云風本為熱熱勝則風動宜以靜勝其燥是養血也治須少汗亦宜少下多汗則虛其衛多下則損其營宜治在經雖有汗下之戒而有中臟中腑之分中腑者多著四肢有表證而脈浮惡風拘急不仁中臟者多滯九竅唇緩失音耳聾鼻塞目瞀大便結閉中腑者宜汗之中臟者宜下之表裡已和宜治之在經當以大藥養之發明云中血脈則口眼喎斜中腑則肢節廢中臟則性命危治各不同中血脈外有六經之形證則從小續命加減中腑內有便溺之阻隔宜三化湯等通利之外無六經之形證內無便溺之阻隔宜養血通氣大秦艽湯羌活愈風湯主之劉宗厚曰按此分在表在裡在經之三證立汗下調養之三法可謂開後世之盲聾但所用諸方學者宜詳審之河間曰風病多因熱甚俗云風者言末而忘其本也所以中風有癱瘓者非謂肝木之風實甚而猝中之也亦非外中於風良由將息失宜而心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而猝倒無知也多因喜怒悲憂恐五志過極而猝中者皆為熱甚故也若微則但僵仆氣血流通筋脈不攣緩者發過如故或熱氣大盛鬱滯不通陰氣暴絶陽氣後竭而死痰涎者由熱甚則水化制火而生偏枯者由經絡一側得通痞者痹而癱瘓也口筋噤急者由風熱太甚以勝水濕又津液滯於胸膈以為痰涎則筋太燥然燥金主於收斂徑切故也或筋反緩者乃燥之甚血液衰少也諸筋攣易愈諸筋痿難復以見燥之微甚也丹溪云案內經以下皆謂外中風邪然地有南北之殊不可一概而論往劉守真作將息失宜水不能制火極是由今而言之西北二方亦有真為風所中者但極少爾東南之人多是濕土生痰痰生熱熱生風也邪之所湊其氣必虛風之傷人在肺臟為多許學士謂氣中者亦有七情所傷脈微而數或浮而緊緩而遲必也脈遲浮可治大數而極者死若果外中者則東垣所謂中血脈中腑中臟之理其於四肢不舉亦有與痿相類者當細分之局方風痿同治大謬發揮甚詳子和用三法如的系邪氣猝中痰盛實熱者可用否則不可河間曰中風之人不宜用龍麝犀朱譬之提鈴巡於街使盜者伏而不出益使邪入於骨髓如油入而莫能出也此之類焉若痰潮不省昏憒不知事宜用藥下其痰涎故風者乃百病之長雖審經意故莫不有疑者也籲醫之不明運氣造化地理病機之微而欲行通變之法者難矣哉附諸方防風通聖散宣明方論曰風寒熱諸疾之始生也人之臟腑皆風之起謂火熱陽之本也謂曲直動搖風之用也眩暈嘔吐謂風熱之甚也夫風熱拂鬱風火生於熱以熱為本而風為標凡言風者即風熱病也氣壅滯筋脈拘倦肢體焦痿頭目昏眩腰脊強痛耳鳴鼻塞口苦舌乾咽嗌不利胸膈痞悶咳嘔喘滿涕唾稠黏腸胃燥熱結便溺淋閉或夜臥寢汗咬牙睡語筋惕驚悸或腸胃怫鬱結水液不能浸潤於周身而但為小便多出者或濕熱內鬱而時有汗泄者或因亡液而成燥淋閉者或因腸胃燥郁水液不能宣行於外反以停濕而泄或燥濕往來而時結時泄或表之陽和正氣衛氣是也與邪熱相合並入於裡陽極似陰而戰煩渴者表氣寒故戰裡熱甚則渴或瘧氣久不已者經言邪熱與衛氣併入於裡則寒戰也並出之於表則發熱並則病作離則病已或風熱走注疼痛麻痹者或腎水真陰衰虛心火邪熱暴甚而僵仆或猝中久不語或一切暴喑而不語語不出聲或暗風癇者或洗頭風或破傷風或中風諸潮搐並小兒諸疳積熱或驚風積熱傷寒疫癘不能辨者或熱甚怫結而反出不快者或熱極黑陷將死或大人小兒風熱瘡疥及久不愈者或頭生屑遍身黑黧紫白斑駁或面鼻生紫赤風刺癮疹俗呼為肺風者或成風癘世傳為大風疾者或腸風痔漏並解酒過熱毒兼解利諸邪所傷及調理傷寒未發汗頭項身體疼痛者並兩感諸證兼治産後血液損虛以致陰氣衰殘陽氣鬱甚為諸熱證腹滿澀痛煩渴喘悶譫妄驚狂或熱極生風而熱燥郁舌強口噤筋惕肉瞤一切風熱燥證鬱而惡物不下腹滿撮痛而昏者惡物過多而不吐者不宜服之兼消除大小瘡及惡毒兼治墮馬打撲傷損疼痛或因熱結大小便澀滯不通或腹急痛腹滿喘悶者並皆治之防風川芎當歸芍藥大黃薄荷葉麻黃連翹芒硝朴硝制過者是以上各半兩石膏黃芩桔梗各一兩滑石三兩甘草二兩荊芥白朮梔子各二錢五分上為末每服三錢水一大盞生薑三片煎至六分溫服涎嗽加半夏五錢薑製此藥不可無生薑同前劉廷瑞方有縮砂無芒硝其餘皆同加減防風通聖散頂防風疾常服取效防風川芎當歸芍藥薄荷麻黃連翹各半兩黃芩桔梗各一兩甘草二兩荊芥白朮各二錢半烏藥羌活天麻殭蠶等分體弱氣虛者磨木香痰涎壅盛者加南星半夏枳實搜風順氣丸聖惠方治腸胃積熱以致膈間痞悶大便結燥小便赤澀腸風痔痛腰膝痠疼肢節頑麻手足癱瘓行步艱辛語言謇澀三十六般風及七十二般氣無不治之此藥宣通氣血清熱潤燥通利大小便則諸病自愈車前子一兩半白檳榔大麻子微炒去殼另研牛膝酒浸宿乾山藥各二兩枳殼去穰麩炒防風去蘆獨活各一兩郁李仁湯泡去皮研大黃五錢半生半熟上為細末煉蜜丸如梧桐子大每服二十丸茶酒米飲任下早晨臨臥各一服久覺大腸微動以羊肚肺羹補之此藥膏粱之家肥甘大過以致大便結燥尤宜服之老人大腸無血大便結燥最宜蘇合香丸療傳尸骨蒸殗殜肺痿疰忤鬼氣猝心痛霍亂吐利時氣鬼魅瘴瘧赤白暴痢淤血月閉痃癖疔腫驚癇及小兒吐乳大人狐貍等病小兒用大緋絹袋盛當心帶之一切邪鬼不敢近凡人痰氣及中風痰涎壅上喉中有聲不能下者青州白丸子同丸生薑自然汁化下立效産婦中風小兒驚風牙關緊硬不開及不省者擦牙即開然後用風藥治之小兒吐瀉驚疳先用火焙此藥然後用生薑白自然汁化開白湯調灌腳氣衝心用萆麻子去殼槌碎和丸敷則腳心疼痛立止心腹絞痛中滿嘔吐薑湯化服大人小兒傷風咳嗽薑蔥汁白湯調下中風狂亂如見鬼神白湯調服方見咳嗽門白丸子和劑方治男婦風痰壅盛手足癱瘓嘔吐涎沫及小兒驚風並皆治之方見痰類大秦艽湯拔粹方治中風外無六經之形證內無便溺之阻隔知為血弱不能養於筋故手足不能運動舌強不能言宜養血而筋自營秦艽石膏各三兩甘草川芎當歸羌活獨活防風去蘆黃芩白芍藥吳白芷白朮生地黃熟地黃白茯苓各二兩細辛五錢上㕮咀每服一兩水二盞煎至一盞去滓通口服如天陰雨加生薑七片如心下痞加枳實一錢煎服羌活愈風湯拔粹方治肝腎虛筋骨弱語言難精神昏憒及治風濕內弱風熱體重或瘦而一肢偏枯或肥而半身不遂心亂則百病生靜則萬病息此藥能安心養神調陰陽無偏勝羌活甘草炙防風去蘆黃耆去蘆人參去蘆蔓荊子川芎細辛去蘆枳殼去穰麩炒地骨皮麻黃去根知母去皮甘菊薄荷去枝枸杞當歸去蘆獨活白芷杜仲炒斷絲秦艽去蘆柴胡去苗半夏湯洗薑製厚朴薑製防己熟地黃前胡各二兩芍藥去皮黃芩去腐白茯苓去皮各三兩石膏生地黃蒼朮各四兩桂一兩上銼每服一兩水二盞煎至一盞去渣溫服如遇天陰加生薑三片煎空心一服臨臥再煎渣服常服之藥不可失四時之輔如望春大寒之後加半夏柴胡人參各二兩望夏穀雨之後加石膏黃芩知母各二兩季夏之月加防己白朮茯苓各二兩望秋大暑之後加厚朴藿香各二兩桂一兩望冬霜降之後加附子官桂各一兩當歸二兩大烏藥順氣散治諸風氣手足癱瘓歸芍地黃芎烏藥陳皮龍香附縮砂枳芩半與防風蘇桔並甘草乳沒沉香停薑棗均煎服諸風氣立通當歸芍藥生地黃川芎烏藥陳皮地龍香附子砂仁枳殼黃芩半夏防風紫蘇桔梗甘草各半兩乳香沒藥沉香各二錢五分此三味為末煎熟藥加內服上用薑棗同煎勻氣散瑞竹方治腰腿疼痛手足攣拳及治中風不語口眼喎斜半身不遂等證前代曾服有效白朮二兩煨天台烏藥一兩天麻半兩沉香青皮去穰白芷人參去蘆甘草紫蘇木瓜各二錢半上㕮咀作十服每服水一盞生薑三片煎至半盞去渣溫服換骨丹宣明方治癱瘓中風口眼喎斜半身不遂並一切風癇暗風並宜服之我有換骨丹傳之極幽祕疏開病者心扶起衰翁臂氣壯即延年神清自不睡南山張仙翁三百八十歲槐皮芎術芷仙人防首蔓十伴各停勻苦味香減半龍麝即少許硃砂作衣纏麻黃煎膏丸大小如指彈修合在深房勿令陰人見夜臥服一粒遍身汗津滿萬病自消除神仙為侶伴麻黃煎膏仙術槐角子取子桑白皮川芎香白朮威靈仙人參防風何首烏蔓荊子各一兩苦參五味子廣木香各半兩麝香龍腦少許研硃砂研為衣不拘多少上為末桑白單搗細稱以麻黃膏和就杵一萬五千下每兩分作十丸每服一丸以硬物擊碎溫酒半盞浸以物蓋不可透氣食後臨臥一呷咽之衣蓋覆當汗自出即瘥和胃湯調補及避風寒茶下半丸蓋出汗入膏時如稠再入水少許煎動入藥唯少為妙其麻黃膏不可多其麻黃膏煉法見後祕傳祛風散羌活獨活山梔半夏蒼朮蒼耳子甘草茯苓陳皮當歸生地黃防風荊芥漢防己白芍藥牙皂威靈仙各等分上㕮咀每服水二盞薑三片煎至一盞不拘時服加減於後御風丹聖惠方治一切中風半身不遂神昏語謇口眼喎斜婦人頭風血風暗風倒僕嘔噦涎痰手足麻痹川芎白芍藥桔梗細辛白殭蠶川羌活天南星薑製各半兩麻黃去根節防風去蘆白芷各一兩半乾生薑甘草炒各七錢半硃砂二錢半為衣上為細末煉蜜為丸如彈子大每服一丸熟酒化下食前日三服神昏有涎者加硃砂二錢半續命煮散大全良方治風氣留滯心中昏憒四肢無力口眼瞤動或時搐搦亡失津液渴欲飲水此藥能扶營衛去虛風中風自汗及産後中風自汗尤宜服之防風獨活當歸人參細辛葛根芍藥川芎甘草熟地黃遠志去心荊芥各五錢官桂七錢半半夏五錢汗多不止加牡蠣粉上㕮咀每服一兩生薑三片水二盞煎至一盞去滓通口服獨活湯大全良方治虛風昏憒不自知覺手足瘛瘲坐臥不寧或發寒熱若血虛不能服發汗藥及中風自汗尤宜服川獨活羌活人參去蘆防風當歸細辛茯神去木半夏桂心白薇遠志菖蒲去毛川芎甘草各五錢上㕮咀每服一兩水一盞生薑五片煎至八分去滓食後溫服川芎石膏湯宣明方治風熱上攻頭目昏眩痛悶風痰喘嗽鼻塞口瘡煩渴淋悶眼生翳膜此藥清神爽志宣通氣血治中風偏枯解中外諸邪調理諸病勞復傳染川芎芍藥當歸山梔子黃芩大黃菊花荊芥穗人參白朮各半兩滑石四兩寒水石桔梗各二兩甘草三兩砂仁二錢半石膏防風連翹薄荷葉各一兩上為末每服三錢水一盞煎至六分去滓食後服水調亦得忌薑醋發熱物保命丹千金方治諸風瘓瘲不能語言心忪健忘恍惚去來頭目暈眩胸中煩郁痰涎壅塞抑氣攻心精神昏憒治心氣不足神志不定驚恐怕怖悲憂慘蹙虛煩少睡喜怒不時或發狂癲神情昏亂及小兒驚癇驚風抽搐不定及大人暗風並羊癲豬癲發叫硃砂一兩珍珠二錢南星一兩麻黃去根節白附子炮雄黃龍腦各半兩琥珀三錢殭蠶炒犀角鎊麥門冬去心枳殼地骨皮神麯茯神遠志去心人參柴胡各一兩金箔一薄片牛黃三錢天麻半兩腦子少許麝香少許膽礬半兩牙硝四錢毫車天竺黃防風甘草桔梗白朮升麻各一兩蟬蛻半兩黃芩二兩荊芥二兩上為細末煉蜜為丸如彈子大每服一丸薄荷湯化下不拘時候忌豬羊蝦核桃動風引痰之物及豬羊血更加川烏炮去皮臍薑製半夏白芷川芎各一兩豬牙皂一兩和前藥丸服尤妙神效活絡丹治風濕諸痹肩臂腰膝筋骨疼痛口眼喎斜半身不遂行步艱辛筋脈拘攣能清心明目寬膈宜通氣血年逾四十預服十數丸至不生風病白花蛇酒浸焙乾二兩烏梢蛇酒浸焙乾半兩麻黃二兩去節細辛去土一兩全蠍一兩半去毒兩頭尖二兩酒浸赤芍藥一兩貫芎二兩防風二兩半葛根一兩半沒藥一兩另研血竭七錢半另研硃砂一兩另研烏犀骨半兩地龍半兩去土甘草二兩去皮炙丁香一兩去枝白殭蠶一兩炒乳香一兩研麝香半兩另研片腦一錢半另研官桂二兩去粗皮草豆蔻二兩川羌活二兩虎脛骨酥炙一兩玄參一兩牛黃二錢半另研天麻二兩威靈仙一兩半酒浸藿香二兩去土天竺黃一兩敗龜板一兩炙人參一兩何首烏二兩白芷二兩烏藥一兩安息香一兩青皮一兩黑附子一兩去皮炮香附一兩白豆蔻骨碎補各一兩黃連二兩茯苓一兩黃芩二兩白朮一兩熟地黃二兩松香脂半兩大黃二兩當歸一兩半木香二兩沉香二兩金箔為衣上為細末煉蜜為丸如彈子大每服一丸細嚼溫酒茶清漱下隨證上下食前後服頭風擂茶下搐鼻通天散治猝暗中風倒地牙關緊急人事昏沉川芎細辛藜蘆白芷防風薄荷各一錢豬牙皂角刮去皮三個上為細末用蘆筒納藥每用少許吹入鼻中麻黃膏宣明方治中風不省人事猝然倒地上須旺日乙卯者採麻黃一稱揀去根一寸長取東流水三石三斗以無油膩鐺量大小盛五七斗者可先煮五沸掠去滓逐旋添水盡至三五斗以來漉去麻黃淘在盆中澄定良久用細羅子濾去滓取清者鐺內再熬至一斗再澄再濾取汁再熬至升半以來為度只是勤攪勿令著底恐焦了熬時忌雞犬陰人澄時須蓋覆不得飛入塵土其藥放一二年不妨如膏稠用水解熬再勻凡中風猝倒用此膏加入湯藥內服或用此膏丸藥三化湯拔粹方治中風外有六經之形證先以加減續命湯隨證治之內有便溺之阻隔復以此導之厚朴薑製大黃枳實羌活等分上㕮咀每服三兩水三升煎至一升半終日服之以微利則已如內邪已除外邪已盡當從愈風湯以行中道久服大風悉去縱有微邪只從愈風湯加減治之然治病之法不可失於通塞或一氣之微汗或一旬之通利如此為常治之法也久則清濁自分營衛自和矣附預防中風出乾坤生意夫聖人治未病之病知未來之疾此其良也其中風者必有先兆之證覺大拇指及次指麻木不仁或手足少力或肌肉微掣者此先兆也三年內必有大風之至經云急則治其標緩則治其本宜調其營衛先服八風散愈風湯天麻丸各一料為效宜常服加減防風通聖散預防其病則風疾不作而獲其安矣愈風湯初覺風動服此藥不致倒僕此乃治未病之聖藥也又治中風症內邪已除外邪已盡當服此藥以行導諸經久服大風悉去縱有微邪只從此藥加減治之然治病之法不可失於通塞或一氣之微汗或一旬之通利如此乃常服之法也久則清濁自分營衛自和矣羌活甘草防風當歸蔓荊子川芎細辛黃耆枳殼人參麻黃香白芷甘菊花薄荷枸杞柴胡知母地骨皮獨活杜仲秦艽半夏前胡厚朴熟地黃防己各二兩茯苓黃芩芍藥各三兩石膏蒼朮生地黃各四兩肉桂一兩上銼每服一兩水二鍾生薑三片煎空心服臨臥煎滓服空心一服吞下二丹丸謂之重劑臨臥一服吞下四白丹謂之輕劑其立法是動以安神靜以清肺假令一氣之微用愈風湯三兩加麻黃一兩勻作四服加生薑空心服以粥投之得微汗則往如一旬之通利用愈風湯三兩加大黃一兩亦勻作四服如前服臨臥服得利為度此藥常服之不可失四時之輔如望春大寒之後本方加半夏人參柴胡各二兩通前四兩謂迎而奪少陽之氣也如望夏穀雨之後本方加石膏黃芩知母各二兩通四兩謂迎而奪陽明之氣也季夏之月本方中加防己白朮茯苓各二兩通前四兩謂勝脾土之濕也望秋大暑之後本方中加厚朴二兩藿香二兩桂一兩通前四兩謂迎而奪大陰之氣也望冬霜降之後本方中加附子官桂各一兩當歸二兩通前四兩謂勝少陰之氣也如得春氣候減冬所加四時類此此雖立四時加減更宜臨病之際審察虛實寒熱土地之宜邪氣靈少此藥具七情六欲四氣無使五臟偏勝及不動於營衛如風祕服之永不結滯此藥與天麻丸相為表裡治未病之聖藥也若已病者更宜常服無問男女老幼驚癇搐搦急慢驚風四時傷寒等病服之神效八風散和劑方治風氣上攻頭目昏眩肢體拘急皮膚瘙癢癮疹成瘡及治寒熱不調鼻塞聲重藿香去土半斤白芷前胡去蘆各一斤黃耆去蘆甘草爁人參去蘆各二斤羌活去蘆防風去蘆各三斤上為末每服二錢水一鍾入薄荷少許煎湯調下食後服之天麻丸治風因熱而生熱勝則動宜以靜勝其躁是養血也天麻牛膝二味用酒同浸三日焙乾玄參萆薢各六兩另研杜仲炒斷絲七兩附子炮一兩羌活十四兩川歸十兩生苄十六兩一方有獨活五兩腎間風上為末蜜為丸如梧桐大每服五七十丸空心溫酒白湯下豫按用藥治病之法寒因熱用熱因寒用正治也今中風癱瘓之證本風火陽邪而用烏附等熱藥治之何哉蓋中風癱瘓乃濕痰死血結滯於臟腑經絡之間非烏附等熱藥能開散流通之乎此非正治乃從治也書云從少從多各觀其事則從治之藥只可為引經而已丹溪云肥白人多濕少用烏附行經是也此方既用附子又用側子官桂助之其理安在哉本欲削去姑存以待肥白多濕之人減而用之中病則已不可過肥白多濕之人不可用也灸法風池百會曲池合谷肩髃風市絶骨環跳三里等穴皆可灸之附胃風胃風方論丹溪云此因初飲食訖乘風涼而致其證脹滿食飲不下形瘦腹大惡風頭多汗膈塞不通胃風湯正始此然亦看挾證加減脈右關弦而緩帶浮胃風湯拔粹方治虛風證能食麻木牙關急搐目內蠕瞤胃風面腫白芷一錢二分葛根蒼朮當歸身各一錢升麻二錢甘草炙一錢半柴胡藁本羌活黃柏草豆蔻各三分麻黃五分不去節蔓荊子一分上㕮咀水二盞薑三片棗一枚煎至一盞去滓溫服胃風湯治風冷入於腸胃泄下鮮血或腸胃濕毒下如豆汁或淤血方見瀉痢門附傷風傷風方論內經曰風為百病之長又曰風勝則動又曰賊虛邪者陽受之又曰傷於風者上先受之丹溪云傷風屬肺者多宜辛溫或辛涼之劑散之如桂枝湯參蘇飲消風散羌活散究證施治附諸方桂枝湯治太陽經傷風頭疼身痛或翕翕發熱或灑灑惡風自汗無汗者不可服桂枝芍藥各三兩甘草炙一兩上㕮咀每服三錢水一盞薑三片棗二枚煎七分去滓溫服不拘時服惟春初依此方自春末夏至以前加黃芩半兩夏至後加知母半兩石膏二兩或升麻半兩若病人素虛寒不用加減神朮散和劑方治四時瘟疫頭痛發熱及傷風鼻塞聲重蒼朮米泔浸五兩藁本去土香白芷細辛去葉土羌活去蘆川芎甘草炙各二兩上為細末每服三錢水一盞薑三片蔥白三寸煎七分溫服不拘時如傷風鼻塞用蔥茶調下二錢定風餅子簡易方治風客陽經邪傷腠理背膂強直言語謇澀體熱惡寒痰厥頭痛肉瞤筋惕手顫鼻淵及飲酒過多嘔吐涎沫頭目暈眩常服消風去邪川烏南星川芎乾薑甘草半夏天麻白茯苓各等分生用加白附子上為末薑汁丸如龍眼大作餅子生硃砂為衣每服一餅細嚼熱生薑湯下不拘時服金沸草散和劑方治肺經受風頭目昏痛咳嗽聲重涕唾稠黏及治時行寒疫壯熱惡風旋覆花去梗二兩荊芥穗四兩麻黃去節前胡去蘆各三兩甘草炙赤芍藥半夏湯洗七次薑汁浸各一兩上㕮咀每服五錢水一盞薑三片棗一枚煎八分溫服參蘇飲和劑方治感冒風邪發熱頭疼咳嗽聲重涕唾稠黏此藥大解肌熱寬中快膈或欲成癆瘵潮熱往來並能治之木香紫蘇葉乾葛洗半夏湯泡七次薑製前胡去苗人參去蘆茯苓去皮各七錢半枳殼去穰麩炒桔梗去蘆甘草炙陳皮去白各半兩上㕮咀每服四錢水一盞半薑七片棗一枚煎六分去滓熱服不拘時易簡方以氣盛不用木香沖和散簡易方治感冒風濕之氣頭目不清鼻塞聲重肢體倦怠欠伸出淚蒼朮米泔浸炒六兩荊芥穗二兩甘草一兩一錢半上㕮咀每服五錢水一盞煎八分去滓熱服不拘時消風百解散和劑方治四時傷寒頭疼發熱惡寒及風壅咳嗽鼻塞聲重荊芥白芷陳皮去白麻黃去節蒼朮各四兩甘草炙二兩上㕮咀每服五錢水一盞薑三片蔥白三莖煎七分不拘時服如咳嗽再加烏梅煎川芎茶調散和劑方治諸風上攻頭目昏重偏正頭疼鼻塞聲重薄荷去梗不見火八兩川芎四兩羌活二兩甘草二兩細辛去葉一兩防風去蘆一兩半白芷二兩荊芥去梗四兩上為末每服二錢食後茶清調下常服清頭目一方無細辛消風散和劑方治諸風上攻頭目昏眩項背拘急鼻嚏聲重耳作蟬鳴及皮膚頑麻瘙癢癮疹婦人血風頭痛腫癢並皆治之荊芥穗甘草炒各二兩陳皮去白半兩人參去蘆茯苓去皮用白者白殭蠶炒防風去蘆芎藭藿香葉去梗蟬蛻去土炒各一兩厚朴去皮薑製半兩羌活一兩上為細末每服二錢感風頭痛鼻流清涕者用荊芥湯茶清調下遍身瘡癬溫酒下大辰砂丸御藥院方清頭目化痰涎及感冒風寒聲重頭目昏眩項背拘急皮膚瘙癢並皆治之天麻去苗一兩防風去蘆二兩細辛去葉土半兩薄荷葉半兩川芎甘草炙吳白芷硃砂各一兩為衣上以七味為細末煉蜜丸如彈子大硃砂為衣每服一丸細嚼食後生薑湯下茶清亦可人參敗毒散和劑方治傷寒頭痛壯熱惡寒及風痰咳嗽鼻塞聲重如心經蘊熱口舌乾燥者加黃芩柴胡去苗甘草炙桔梗人參去蘆芎藭茯苓去皮枳殼去穰麩炒前胡去苗洗獨活去蘆各等分上㕮咀每服三錢水一盞薑三片薄荷少許同煎七分去滓溫服羌活散和劑方治風氣不調頭目昏眩痰涎壅滯遍身拘急及風邪塞壅頭痛項強鼻塞聲重肢節煩疼天陰風雨頓覺不安前胡去蘆羌活去蘆麻黃去根節白茯苓去皮川芎黃芩甘草炙蔓荊子去白皮枳殼去穰麩炒細辛去苗石膏另研菊花去梗防風去蘆各一兩上㕮咀每服一兩薑四片薄荷三葉水二盞煎至一盞溫服附破傷風破傷風方論病機云破傷風者同傷寒證治通於表裡分別陰陽有在表有在裡有在半表半裡者在裡宜下在表宜汗在表裡之間宜和解不可過其治也河間曰破傷風者從外至內甚於內者則病也因此猝暴傷損風襲之間傳播經絡至使寒熱更作身體反強口噤不開甚者邪氣入臟則分汗下之治諸瘡不瘥營衛虛肌肉不生瘡眼不合者風邪亦能外入於瘡為破傷風之候故諸瘡不瘥籲世皆言著灸為上是為熱瘡而不知火熱客毒逐經諸變不可勝數微則發熱甚則生風而搐或角弓反張口噤目邪皆因瘡鬱結於營衛不得宣通而生亦有破傷不灸而病此者瘡著白痂瘡口閉塞氣難通泄故陽熱亦為鬱結而熱甚則生風也故表脈浮而無力太陽也脈長而有力者陽明也脈浮而弦小者少陽也太陽宜汗陽明宜下少陽宜和若明此三法而治不中病者未之有也羌活防風湯拔粹方治破傷風邪初傳在表羌活防風川芎藁本當歸芍藥甘草各一兩地榆細辛各二兩上㕮咀每服五七錢水一盞半同煎至七分去渣熱服不拘時候量緊慢加減用之熱則加大黃二兩大便祕則加大黃一兩緩緩令過白朮防風湯拔粹方若服前藥之過有自汗者宜服此藥白朮黃耆各一兩防風二兩上㕮咀每服五七錢水一盞半煎至一盞去渣溫服不拘時候臟腑和而有自汗可用此藥破傷風臟腑祕小便赤自汗不止者因用熱藥汗出不休故知無寒也宜速下之先用芎黃湯三二服後用大芎黃湯下之芎黃湯拔粹方川芎一兩黃芩六錢甘草二錢上㕮咀每服五七錢水一盞半同煎至七分去滓溫服不拘時候三服即止再用下藥大芎黃湯拔粹方川芎羌活黃芩大黃各一兩上㕮咀依前煎服宜利為度羌活湯拔粹方治半在表半在裡羌活去蘆菊花去梗麻黃去根節川芎白茯苓去皮防風去蘆石膏研前胡去蘆黃芩蔓荊子細辛去葉甘草炙枳殼各一兩薄荷香白芷各半兩上㕮咀每服一兩水二盞生薑五片煎至一盞去滓通口服食後滓再煎服白