散令日晡作寒慘壯熱渾身灑淅宜加桂煎服出汗便解大順散和劑方治胃暑伏熱引飲過多脾胃受濕水穀下分霍亂嘔吐臟腑不調甘草三斤乾薑杏仁去皮尖炒肉桂去皮各六兩四錢上先將甘草用白砂蜜炒及八分黃熟次入乾薑同炒卻入杏仁候杏仁不作聲為度用篩篩淨後入肉桂一處搗羅為末每服三錢水一盞煎至七分溫服如煩躁井華水調下不拘時候以沸湯點服亦可十味香薷飲百一選方消暑氣和脾胃香薷一兩人參去蘆陳皮去白白朮黃耆去蘆白扁豆炒去殼甘草炙厚朴去皮薑汁炒黑色乾木瓜白茯苓去皮各半兩上為末每服二錢熱湯冷水任調下清暑益氣湯東垣方治長夏濕熱蒸人人感之四肢困倦精神減少懶於動作胸滿氣促肢下疼痛或氣高而喘身熱而煩心下膨悶小便黃而數大便溏而頻或痢或渴不思飲食自汗體虛黃耆蒼朮米泔制升麻各一錢人參白朮神麯陳皮澤瀉各五分甘草炙酒柏麥門冬當歸各三分葛根三分五味子九粒青皮二分半上㕮咀作一服水二大鐘煎至一鍾去渣大溫服食遠益元散即天水散又名六一散治中暑身熱小便不利此藥性涼除胃脘積熱又淡能滲濕故利小便而散濕熱也滑石六兩桂府者為效非桂府則不為佳甘草微炒一兩上為末每服三錢蜜少許熱湯冷水任下如欲發汗以蔥白豆豉湯調下桂苓甘露散治伏暑引飲過度肚腹膨脹霍亂瀉利白朮茯苓去皮甘草炙葛根澤瀉石膏寒水石各一兩官桂半兩人參去蘆藿香各半兩滑石一兩木香二錢半上為細末每服二錢白湯下新汲水薑湯亦好暑病治例出明醫雜著王節齋曰夏至日後病熱為暑暑者相火行令也夏日人感之自口齒而入傷心包絡之經其脈虛或浮大而散或弦細芤遲蓋熱傷氣則氣消而脈虛弱其為症汗煩則喘渴靜則多言身熱而煩心痛大渴引飲頭疼自汗倦怠少氣或下血發黃生斑甚者火熱致金不能平木搐搦不省人事治暑之法清心利小便最好暑傷氣宜補真氣為要又有惡寒或四肢逆冷甚者迷悶不省而為霍亂吐利痰滯嘔逆腹痛瀉利此則非暑傷人乃因暑而自致之病也以其因暑而得故亦謂之暑病然治法不同也若行人或農夫於日中勞役得之者是動而得之陽證也其病必苦頭痛發燥熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃天熱外傷元氣也宜清暑益氣用香薷黃連扁豆人參黃耆五味知母石膏之類暑熱發渴脈虛用人參白虎湯或用竹葉石膏湯亦好俱見前東垣清暑益氣湯治長夏濕熱蒸人人感之四肢困倦精神少胸滿氣促肢節痛或氣高而喘身熱而煩心下痞悶小便黃而數大便溏而頻或痢或渴不思飲食自汗體虛此湯最好見前若暑熱之時無病之人或避暑熱納涼於深堂大廈涼臺冷館大扇風車得之者是靜而得之陰證也其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚大熱無汗此為陰寒所遏使周身陽氣不得伸越宜用辛溫之劑以解表散寒用厚朴紫蘇乾葛藿香羌活蒼朮之類若外既受寒內復傷冰水生冷瓜果之類前藥再加乾薑縮砂神麯之類此非治暑也治因暑而致之病也若外不受寒只是內傷冰水冷物腹痛泄瀉或霍亂吐逆宜縮脾飲見前或理中湯見中寒類加神麯麥芽縮砂蒼朮此專治內溫中消食也若吐瀉脈沉微甚者不可用涼藥可用大順散見前加熟附子等分或附子理中加炒芍藥夏月多食冷物及過飲茶水致傷脾胃吐瀉霍亂故治暑藥多用溫脾消食治濕利小便之藥醫者要識此意若既傷暑熱復傷生冷外熱內寒宜先治其內溫中消食次治其外消暑補氣而以理脾為主於前陰陽二條內相兼取用東垣清暑益氣湯已兼此意其用黃耆升麻人參白朮甘草麥門冬當歸五味黃柏葛根是清暑補氣也蒼朮陳皮神麯澤瀉青皮是治內補脾也附暑風治暑風猝倒法凡人中暑先著於心一時昏迷切不可與冷水飲並臥濕地其法先以熱湯灌或童便灌及用布蘸熱湯尉臍並氣海續續令暖氣透徹臍腹俟其蘇省然後進藥若旅途中猝然暈倒急扶在陰涼處掬路中熱灰土作窩於臍中令人尿其內即蘇卻灌以人尿或攪地漿飲之半碗或車輪土五錢冷水調澄清服皆可一方用大蒜三兩瓣細嚼溫湯送下禁冷水即愈丹溪云挾火挾痰用二陳湯加黃連實者可用吐法戴氏曰暑風者夏月猝倒不省人事者是也有因火者有因痰者火君相二火也暑天地二火也內外合而炎爍所以猝倒也痰者人身之痰飲也因暑氣入而鼓激痰飲塞礙心之竅道則手足不知動躡而猝倒也此二者皆可吐內經曰火鬱則發之吐即發散也量其虛實而吐之吐醒後可用清劑調治之附疰夏疰夏屬陰虛元氣不足夏初春末頭疼腳軟食少體熱者是宜補中益氣湯去柴胡升麻加炒柏白芍藥挾痰者加南星半夏陳皮煎服又或用生脈湯補中益氣湯方見內傷門濕中濕論天氣下降地氣上騰二氣熏蒸此即濕也豈必水流濕而後為濕哉且風之撼動人知其為風寒之嚴凝人知其為寒暑之炎熱人知其為暑惟濕之入人行住坐臥實薰染於冥冥之中人居戴履受濕最多況夫濕能傷脾脾土一虧百病根源發軔於此矣滯而為喘嗽漬而為嘔吐滲而為泄瀉溢而為浮腫濕淤熱則發黃濕遍體則重著濕入關節則一身盡痛濕聚痰涎則昏不知人至於為身熱為鼻塞為直視為鄭聲為虛汗為腳氣為腹中脹臍下堅為小便難大便自利皆其證也濕家不可汗汗之則發痓熱而痓者斃又不可下下之則額汗胸滿微喘而噦小便淋閉難以有瘳治濕之法通利小便為上益脾順氣次之半夏茯苓蒼朮白朮官桂乾薑皆要藥耳其若小便挾熱不利則赤茯苓防己輩自有奇功大抵濕之為病易至沉深漸潤之餘淪肌浹髓於斯時也須以朮附薑桂作大劑與之藥力相接病當漸解不可以旦暮而責效焉要之治濕莫若生附蒼朮為快中濕證治加劑除濕湯治氣虛傷濕身重腰疼四肢微冷或嘔逆或溏泄並主之蒼朮炒白朮甘草炙各一兩乾薑炮茯苓各二兩橘紅辣桂厚朴制各半兩上銼每服三錢薑棗煎服茯苓白朮湯治受濕身體痛重茯苓乾薑炮甘草炙白朮辣桂蒼朮炒等分上銼每三錢水煎服腎著湯治腎虛受濕小便自利腰冷而痛重乾薑炮茯苓各二兩甘草炙白朮各一兩上銼每二錢半水煎服加桂亦得黃耆建中湯治傷濕鼻塞身痛黃耆微炙辣桂各三兩甘草炙二兩白芍藥六兩上粗散每服三錢薑四片棗一枚煎食前服不換金正氣散治濕益脾順氣加茯苓生薑方見寒類神術丸治濕消飲方見痰涎類可用正氣散送下生附除濕湯治寒濕交攻身體冷痛附子生一兩蒼朮制一兩半白朮厚朴制半兩宣木瓜甘草炙各三錢半上銼每服四錢水二盞薑十厚片煎一盞食前微溫服桂枝附子湯治風濕相搏汗出氣短身體煩疼微腫惡風不欲去衣辣桂二兩白朮附子熟各一兩半甘草炙一兩上銼散每服二錢半水盞半薑七片棗二枚煎一盞食前微溫服小便不利悸氣加茯苓痹加防己腹痛加芍藥甘草附子湯治中濕小便不利大便自利附子熟一個七錢淨者白朮甘草炙各一兩辣桂二兩上銼每服三錢薑七片煎食前微溫服汗出加防風悸氣加茯苓朮附湯治傷濕大小便皆自利白朮二兩甘草炒一兩附子熟七錢半上銼細每服三錢薑七片水盞半煎一盞食前微溫服五苓散治濕證小便不利經云治濕之法不利小便非其治也方見水飲類茵陳湯治濕氣淤熱發黃小便祕澀渴引水漿茵陳蒿一兩半大黃半斤小紅梔子十枚上銼每服三錢水煎服五苓散亦治發黃二藥夾煎尤穩濕瀉身痛方五苓散加蒼朮煎點隨意附諸賢論賈真孫曰濕為土氣火熱能生濕土故夏熱則萬物濕潤秋涼則萬物乾燥濕病本不自生因熱而怫鬱不能宣行水道故停滯而生濕也況脾土脆弱之人易為感冒豈必水不流而後為濕哉人只知風寒之威嚴不知暑濕之炎暄感人於冥冥之中也病式云諸痓強直積飲等證皆屬於濕或胕腫體寒而有水氣里必小便赤少不通或渴是蓄熱入里極深非病寒也大抵治法宜理脾清熱利小便為上故治濕不利小便非其治也宜桂苓甘露木香葶藶木通治之守真師曰葶藶木香散下神芎丸此藥下水濕消腫脹利小便理脾胃無出乎此也腹脹腳腫甚者舟車丸下之濕熱內深發黃茵陳湯下之或佐以防己黃耆一身盡腫痛或無汗是濕流關節邪氣在表宜五苓散加官桂蒼朮微汗之不可大汗若自汗出多熱燥津液內水不利切勿利之重損津液也宜防風白朮甘草湯主之其濕證有二濕熱證多濕寒證少當以脈證明辨之如脈滑數小便赤澀引飲為濕熱證若小便自利清白大便瀉利身疼自汗為寒濕證治之宜五苓散加生附蒼朮木瓜主之附諸方防己黃耆湯金匱方治風濕脈浮身重汗出惡風或痛少力防己一兩甘草炙半兩白朮七錢半黃耆一兩上㕮咀每服一兩入薑棗煎喘者加麻黃胃氣不和加芍藥氣上衝加桂枝下有寒加細辛按濕勝身重陽微中風則汗出惡風故用黃耆甘草實表防己白朮勝濕也足三陰例藥五積散和劑方治外感風寒冒寒濕身體重痛見寒類按海藏云麻黃桂芍甘草即麻黃桂枝各半湯也蒼朮甘草陳皮厚朴即平胃散也枳殼桔梗陳皮茯苓半夏即桔梗半夏等湯也又川芎當歸治血兼乾薑厚朴散氣此數藥相合為解表溫中泄濕之劑去痰消痞調經之方雖為內寒外感表裡之分之所制實非仲景表裡麻黃桂枝薑附之的方也至於積冷嘔泄時疫項背拘急如蔥白豆豉厥逆加吳茱萸寒熱咳逆加棗婦人之産加醋始知用之非一途也惟知活法者其擇之滲濕湯和劑方治寒濕所傷身重腰冷如坐水中小便或澀大便溏泄皆坐臥濕地或陰雨所襲之也蒼朮白朮甘草各一兩乾薑茯苓各二兩陳皮丁香各二錢半上㕮咀每服四錢入棗煎按此足陽明太陰藥也溫中勝濕之劑茵陳五苓散治濕熱勝發熱黃疸茵陳蒿十分五苓散五分上二物和勻水煎服桂苓甘露飲宣明方治濕熱內甚煩渴瀉利小便澀大便急痛霍亂吐下頭痛口乾方見暑門清燥湯東垣方治表裡有濕熱痿厥癱瘓不能行走或足踝膝上背腫痛口乾瀉痢方見痿門三花神祐丸宣明方治一切水濕腫病大腹實脹喘滿輕粉一錢大黃一兩牽牛二兩芫花醋炒甘遂大戟各半兩上為末滴水丸小豆大初服五丸每服加五丸溫水下無時日三服平胃散和劑方治脾胃不和不進飲食常服暖胃消痰蒼朮米泔浸五斤厚朴薑製炒陳皮各三斤二兩甘草炒三十兩上為末每五錢薑三片棗一枚煎服入鹽一捻沸湯點服亦得一方加草果名平胃草果散升陽除濕湯東垣方升陽除濕防風湯東垣方俱見泄瀉門煮酒應效方治諸般濕氣筋骨疼痛方見風門祕授仙方萬應膏貼一切濕氣襲於肌肉入於筋骨疼痛不常貼之神效方見疽疸門神芎導水丸治濕熱內郁胸膈痞滿鼽衄口舌生瘡咽喉不利牙疳齒蝕口臭或遍身生濕瘡乾疥睡語咬牙驚惕怔忡大小便滯澀風熱酒毒蘊熱等證大黃黃芩各二兩牽牛頭末滑石各四兩上為末水丸如桐子大每服四五十丸溫水下虛實隨證臨時加減舟車丸大黃二兩甘遂大戟芫花青皮陳皮各一兩牽牛頭末四兩木香五錢上為細末水丸如梧桐子大每服六七十丸白沸湯下隨時加減經驗祛濕煮酒方治風濕相搏遍身手足疼痛者服之神效川芎威靈仙荊芥麻黃防風天麻青木香金毛狗脊羌活獨活枳殼各五錢川烏草烏各四錢蒼朮陳皮川當歸各五錢上㕮咀用好頭酒五壺將藥用絹袋懸於壇口再用重紙裹壇口再用麵糊密糊勿令泄氣用文武火煮熟每服五盞為度附瘟疫瘟疫方論內經曰蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也又曰冬不藏精者春必病瘟是以多感於房勞辛苦之人安樂者未之有也俗名瘟病雜著云冬溫為病此乃天時不正陽氣反泄藥忌溫熱時行寒疫卻在溫暖之時時本溫暖而寒反為病此亦天時不正陰氣反逆藥忌寒涼又云此病多發於春夏一概相同者此天地之厲氣當參運氣而施治也東垣云陽明邪熱太甚資實少陽相火而為之視其腫勢在何部隨經治之當緩勿令重劑過其病所陽明為邪首大腫少陽為邪出於耳前後先以酒炒芩連炙甘草煎少少不住服再用大黃鼠黏子煎入芒硝等分時時呷之毋令飲食在後及邪氣已只服前藥未已再煎次第服之取大便邪氣已即止陽明渴加石膏少陽渴加瓜蔞根陽明行經升麻芍藥葛根甘草太陽行經羌活防風荊芥並與上藥相合用之十神湯治時令不正瘟疫妄行升麻葛根湯治大人小兒時氣瘟疫頭痛發熱柴胡升麻湯治時行瘟疫壯熱惡風頭痛體疼鼻塞咽乾咳嗽涕唾稠黏方見傷寒門小柴胡湯治瘟疫內虛發熱胸脅痞悶渴加瓜蔞仁方見血門竹葉石膏湯傷寒時氣表裡俱虛遍身發熱心胸煩悶得汗已解內無津液虛羸少氣欲吐方見暑門大青丸治時行瘟疫發熱並勞役發熱上膈一切結熱神效薄荷甘草梔子黃芩黃連各三錢大黃八錢玄明粉連翹各六錢上為細末用青蒿自然汁為丸如緑豆大用雄黃為衣治雜病發熱者硃砂青黛為衣每服五六十丸白滾湯送下黃連鮮毒湯治時疫三日已汗解或因飲酒復劇若煩悶乾嘔口燥呻吟錯語不睡方見眼目門荊防敗毒散蘊要方獨活前胡人參茯苓川芎枳殼桔梗甘草荊芥牛蒡子薄荷各一錢防風一錢半羌活一錢上㕮咀水煎服如內熱加黃芩一錢口渴加天花粉一錢四君子湯四物湯俱見補損門補中益氣湯方見內傷門嶺南諸病出明醫雜著春秋時月人感山嵐瘴霧毒氣發寒熱脅膈飽悶不思飲食此毒氣從鼻口入內也治當清上焦解內毒行氣降痰不宜發汗黃連一錢薑水洗升麻蒼朮各一錢半米泔浸鹽水炒黃芩酒拌炒木香厚朴薑製枳實麩炒半夏湯泡七次桔梗去蘆川芎柴胡木通各一錢生甘草七分生薑五片水一鍾半煎七分食前熱服滓煎四分繼服寒溫不節汗身脫衣巾感冒風寒之氣氣閉發熱頭疼此傷寒類也但嶺南氣溫易出汗故多類瘧重則寒熱不退輕則為瘧南方氣升故嶺南人得此病者猝皆胸滿痰涎壅塞飲食不進與北方傷寒只傷表而里自和者不同治當解表清熱降氣行痰此方用於寒涼時月及雖在溫暖時而感冒風寒者羌活一錢半蒼朮泔浸柴胡黃芩橘紅去白半夏湯洗枳實甘草炙川芎各一錢生薑五片水一鍾半煎七分食前溫服渣煎四分隨服取汗出止服瘴瘧時瘧寒熱往來柴胡知母炒半夏湯洗各一錢半蒼朮泔洗黃芩酒炒乾葛陳皮川芎各一錢甘草炙七分生薑三大片烏梅肉二個水一鍾半煎七分食前清晨服滓煎四分午前服瘧久者加人參一錢半當歸一錢汗多者去蒼朮換白朮加酒炒白芍藥各一錢半後變成痢疾瘧後之痢從虛治用補脾胃藥黃連炒木香縮砂黃芩炒橘皮當歸酒洗各一錢白朮一錢半白芍藥炒二錢甘草炙五分生薑三片水二鍾煎八分食前熱服溫暑之月民病天行瘟疫熱病治宜清熱解毒兼治內外枯黃芩酒炒知母酒炒乾葛各一錢石膏白芍藥酒炒人參各一錢半黃連酒炒生地黃酒洗各五分升麻一錢生甘草七分羌活三錢生薑三片水鍾半煎七分食前熱服滓煎四分繼服若胸膈痞滿痰涎壅塞者加枳實半夏各一錢生薑汁四五匙若脾胃不實加白朮一錢半時氣發熱變為黃病所謂瘟黃也宜治內瀉濕熱茵陳黃連薑水炒山梔仁白朮白茯苓去皮厚朴薑水炒木通去皮人參各一錢白芍藥酒炒乾葛各一錢半木香七分生薑三大片水二鍾煎七分食前溫服渣煎四分繼服附運氣證治出乾坤生意運氣證治者所以參天地陰陽之理明五行衰旺之機考氣候之寒溫察民病之凶吉推加臨補瀉之法施寒熱溫涼之劑古人云治時病不知運氣如涉海問津誠哉言也今遵先賢圖訣撮其要領使人一覽而知其悉也矣五運配十干之年甲己得合為土運乙庚得合為金運丁壬得合為木運丙辛得合為水運戊癸得合為火運六氣為司天之歲子午少陰君火丑未太陰濕土寅申少陽相火卯酉陽明燥金辰戌太陽寒水巳亥厥陰風木南政北政甲己土運為南政蓋土居中央君尊南面而行餘四運以臣事之面北面受令所以有別也十二支年分運氣子午年少陰君火司天歲氣熱化之候司天者天之氣候也君火者手少陰心經也心者君主之官神明出焉君火乃主宰陽氣之本余象生土乃發生萬物之源陽明燥金在泉在泉者地之氣候也初之氣厥陰風木用事子上父下益辛瀉苦自年前十二月大寒節起至二月驚蟄終止天時寒風切冽霜雪水冰蟄蟲伏藏民病關節禁固腰腿疼中外瘡瘍二之氣少陰君火用事火盛金衰補肺瀉心自二月春分節起至四月立夏終止天時風與時寒雨生羽蟲民病淋氣鬱於上而熱令人目赤三之氣少陽相火用事君相二火瀉苦益辛自四月小滿節起至六月小暑終止天時大火行熱氣生羽蟲不鳴燕百舌杜宇之類民病厥熱心痛寒更作咳喘目赤四之氣太陰濕土用事子母相順瀉肺補腎自六月大暑節起至八月白露終止天時大雨時行寒熱互作民病黃疸衄血咽乾嘔吐痰飲五之氣陽明燥金用事心盛肺衰火怕水復自八月秋分節起至十月立冬終止天時溫氣乃至初冬尤暖萬物尚榮民病寒熱伏邪於春為瘧六之氣太陽寒水用事火衰心病瀉咸益苦自十月小雪節起至十二月小寒終止天時暴寒徑切火邪恣毒寒氣暴止民病生腫咳喘甚則血溢下連小腹而作寒中丑未年太陰濕土司天歲氣濕化之候太陰濕土者足太陰脾經也脾屬中央戊己土每季寄旺一十八日合為七十二日以應一歲六六三百六十日之成數也太陽寒水在泉初之氣厥陰風木用事主旺客衰瀉酸補甘自年前十二月大寒節起至閏二月驚蟄終止天時大風發榮雨生毛蟲民病血溢經絡拘強關節不利身重筋痛二之氣少陰君火用事以下生上瀉甘補咸自二月春分節起至四月立夏終止天時大火至疫癘君令宣行濕蒸相搏暴雨時降民病瘟疫盛行遠近鹹苦三之氣少陽相火用事土旺剋水補腎瀉脾自四月小滿節起至六月小暑終止天時雷雨電雹地氣騰濕氣降民病身重跗腫胸腹滿感冒濕氣四之氣太陰濕土用事甘旺咸衰補腎益膀胱自六月大暑節起至八月白露終止天時炎熱沸騰地氣升濕化不流民病腠理熱血暴溢寒瘧心腹脹浮腫五之氣陽明燥金用事土能生金益肝瀉肺自八月秋分節起至十月立冬終止天時大涼霧露降民病皮膚寒瘧痢甚行六之氣太陽寒水用事以上克下瀉脾補腎自十月小雪節起至十一月小寒終止天時大寒凝冽民病關節禁固腰腿拘痛寅申年少陽相火司天歲氣火化之候少陽相火者三焦浮流之火火邪炎上上克肺金金受克腎水失母則上盛下虛虛陽上攻變生諸疾致傷元氣厥陰風木在泉初之氣厥陰風木用事子父相逢瀉苦益辛自年前十二月大寒節起至二月驚蟄終止天時熱風傷人時氣流行民病寒熱交作咳逆頭痛血氣不調心腹不快二之氣少陰君火用事肺衰心盛制苦益辛自二月春分節起至四月立夏終止天時暴風疾雨溫濕相蒸民病上熱咳逆胸膈不利頭痛寒熱三之氣少陽相火用事夏旺火熾補肺益大腸自四月小滿節起至六月小暑終止天時炎暑亢旱草萎河輸民病煩熱目赤喉閉失血熱渴風邪人多暴死四之氣太陰濕土用事火能生土瀉甘補咸自六月大暑節起至八月白露終止天時風雨時降炎暑未去民病瘧病交作寒熱頭痛五之氣陽明燥金用事肺金受邪瀉苦補辛自八月秋分節起至十月立冬終止天時寒熱風雨草木黃落民病寒邪風熱君子周密六之氣太陽寒水用事心火受克瀉咸補苦自十月小雪節起至十一月小寒終止天時寒溫無時地氣正寒霜露乃降民病感冒寒邪關節不利心腹痛卯酉年陽明燥金司天歲氣燥化之候陽明燥金者肺與大腸之氣象庚辛金也少陰君火在泉初之氣厥陰風木用事金木相剋補酸瀉辛自年前十二月大寒節起二月驚蟄終止天時陰始凝風始肅水乃冰寒雨多花開遲民病寒熱浮腫失血嘔吐小便赤淋二之氣少陰君火用事火盛金衰瀉苦益辛自二月春分節起至四月立夏終止天時臣居君位大熱早行民病疫癘流行人多猝暴三之氣少陽相火用事主盛客衰瀉心補肺自四月小滿節起至六月小暑終止天時燥熱交合風雨暴至民病寒熱頭疼心煩作渴四之氣太陰濕土用事以下生上瀉辛益酸自六月大暑節起至八月白露終止天時早秋寒雨有傷苗稼民病猝暴寒熱風邪傷人心疼浮腫瘡瘍失血五之氣陽明燥金用事金盛木衰瀉肺補肝自八月秋分節起至十月立冬終止天時冬行春令草木生青風雨生蟲民病寒熱作痢氣血不和六之氣太陽寒水用事客來助主益苦瀉咸自十月小雪節起至十二月小寒終止天時氣候反溫蟄蟲出現反行春令民病疫癘溫毒寒熱伏邪辰戌年太陽寒水司天歲氣寒化之候太陽寒水者足膀胱經也與足少陰腎經合為表裡屬北方壬癸水太陰濕土在泉初之氣厥陰風木用事脾胃受邪瀉咸助甘自年前十二月大寒節起至二月驚蟄終止天時氣早暖草早榮溫風至民病瘟疫寒熱頭痛嘔吐瘡瘍二之氣少陰君火用事心火受邪瀉咸補甘自二月春分節起至四月立夏終止天時春寒多雨寒濕無時民病氣鬱中滿浮腫寒熱三之氣少陽相火用事以上克下瀉咸助苦自四月小滿節起至六月小暑終止天時暴熱乍涼疾風暴雨民病寒熱吐利生煩悶亂癰疽瘡瘍四之氣太陰濕土用事木旺土衰瀉甘補酸自六月大暑節起至八月白露終止天時風濕交爭雨生羽蟲暴風疾雨民病大熱短氣赤白痢瀉五之氣陽明燥金用事金生水旺制咸益苦自八月秋分節起至十月立冬終止天時濕熱而行客行主令民病氣虛客熱血熱妄行肺氣壅盛六之氣太陽寒水用事水盛火衰瀉咸助苦自十月小雪節起至十二月小寒終止天時凝寒雨雪地氣正濕令行民病病乃悽慘孕婦多災脾受濕肺旺肝衰己亥年厥陰風木司天歲氣風化之候厥陰風木者足厥陰肝經也肝屬東方甲乙木春旺七十二日也少陽相火在泉初之氣厥陰風木用事脾胃受邪瀉酸補甘自年前十二月大寒節起至二月驚蟄終止天時寒始肅客行主令殺氣方至民病寒居右脅氣滯脾胃虛壅二之氣少陰君火用事火旺金衰瀉心補肺自二月春分節起至四月立夏終止天時寒不去霜雪水殺氣施水草焦寒雨至民病熱中氣血不升降三之氣少陽相火用事肺經受邪瀉苦益辛自四月小滿節起至六月小暑終止天時風熱大作雨生羽蟲民病淚出耳鳴掉眩四之氣太陰濕土用事木土相刑瀉酸益甘自六月大暑節起至八月白露終止天時熱氣返用山澤浮雲暴雨溽溫民病心受邪黃疸面為浮腫五之氣陽明燥金用事以金刑木瀉肺益肝自八月秋分節起至十月立冬終止天時燥濕更朦沉陰乃布風雨乃行民病寒氣及體肺受風脾受濕發為瘧六之氣太陽寒水用事主助客勝瀉酸補甘自十月小雪節起至十二月小寒終止天時畏火司令陽乃火化蟄蟲出現流水不冰地氣大發草乃生民病瘟疫心腎相制謹按運氣之説內經言之詳矣夫人在氣交之中與天地相為流通苟不先立其年以明其氣臨病施治之際烏乎以用補瀉之藥哉此運氣證治不可不知也又嘗按而驗之多有不應何則陰陽之消長寒暑之更易或失其常在智者通其活變豈可膠柱鼓瑟按圖索驥也耶
